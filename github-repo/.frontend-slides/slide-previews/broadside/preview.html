<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>统一开发框架 - Broadside Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --stage-bg: #111111;
  --slide-bg: #111111;
  --ink-black: #111111;
  --ink-black-alt: #1A1A18;
  --fire-orange: #E85D26;
  --cream: #F0ECE5;
  --cream-muted: #888880;
  --cream-hint: #505048;
  --border-dark: #282826;
}

html,body{width:100%;height:100%;margin:0;overflow:hidden;background:var(--stage-bg,#000)}
.deck-viewport{position:fixed;inset:0;overflow:hidden;background:var(--stage-bg,#000)}
.deck-stage{position:absolute;left:0;top:0;width:1920px;height:1080px;overflow:hidden;transform-origin:0 0;background:var(--slide-bg,#fff)}
.slide{position:absolute;inset:0;width:1920px;height:1080px;overflow:hidden;display:block;visibility:hidden;opacity:0;pointer-events:none;background:var(--slide-bg,#fff)}
.slide.active,.slide.visible{visibility:visible;opacity:1;pointer-events:auto;z-index:1}
img,video,canvas,svg{max-width:100%;max-height:100%}
.deck-controls{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:1000}
@media(print){html,body{width:1920px;height:auto;overflow:visible;background:#fff}.deck-viewport{position:static;overflow:visible;background:#fff}.deck-stage{position:static;width:auto;height:auto;transform:none!important;background:none}.slide{position:relative;display:block!important;visibility:visible!important;opacity:1!important;pointer-events:auto!important;width:1920px;height:1080px;break-after:page}.slide:last-child{break-after:auto}.deck-controls{display:none!important}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.2s!important}}

/* Orange declaration slide */
.slide.s01 {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 100px 120px;
  background: var(--fire-orange);
}

/* Top hairline */
.s01::before {
  content: '';
  position: absolute;
  top: 60px;
  left: 120px;
  right: 120px;
  height: 1px;
  background: rgba(17,17,17,0.2);
}

.s01 .kicker {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 15px;
  font-weight: 500;
  color: rgba(17,17,17,0.5);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 48px;
}

.s01 .title-cn {
  font-family: 'Barlow', sans-serif;
  font-weight: 900;
  font-size: clamp(80px, 9vw, 140px);
  line-height: 0.95;
  color: var(--ink-black);
  margin: 0;
  text-transform: lowercase;
}

.s01 .title-en {
  font-family: 'Barlow', sans-serif;
  font-weight: 900;
  font-size: clamp(28px, 3.5vw, 48px);
  line-height: 1.1;
  color: rgba(17,17,17,0.65);
  margin: 24px 0 0 0;
  text-transform: lowercase;
}

.s01 .subtitle {
  font-family: 'Barlow', sans-serif;
  font-weight: 500;
  font-size: 28px;
  color: rgba(17,17,17,0.6);
  margin: 40px 0 0 0;
  line-height: 1.5;
}

/* Bottom hairline */
.s01::after {
  content: '';
  position: absolute;
  bottom: 60px;
  left: 120px;
  right: 120px;
  height: 1px;
  background: rgba(17,17,17,0.2);
}

.s01 .page-num {
  position: absolute;
  bottom: 22px;
  right: 120px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  color: rgba(17,17,17,0.35);
}
</style>
</head>
<body>
<div class="deck-viewport">
  <div class="deck-stage">
    <div class="slide s01 active">
      <div class="kicker">training deck / 2026</div>
      <h1 class="title-cn">統一開發框架</h1>
      <p class="title-en">unified development framework</p>
      <p class="subtitle">四 agent · 六阶段 · pdca 闭环 · tdd 驱动</p>
      <div class="page-num">1 / N</div>
    </div>
  </div>
</div>
<script>
(function(){
  const vp=document.querySelector('.deck-viewport');
  const st=document.querySelector('.deck-stage');
  function scale(){
    const w=window.innerWidth,h=window.innerHeight;
    const s=Math.min(w/1920,h/1080);
    const l=(w-1920*s)/2,t=(h-1080*s)/2;
    st.style.transform='translate('+l+'px,'+t+'px) scale('+s+')';
  }
  window.addEventListener('resize',scale);
  scale();
})();
</script>
</body>
</html>
