<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>统一开发框架 - Vellum Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=DM+Sans:wght@400;500;700&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --stage-bg: #1F2858;
  --slide-bg: #2A3870;
  --navy: #2A3870;
  --navy-alt: #343F80;
  --navy-deep: #1F2858;
  --yellow: #E8D85C;
  --emphasis-yellow: #F5E168;
  --teal: #3A7878;
}

/* viewport-base.css */
html,body{width:100%;height:100%;margin:0;overflow:hidden;background:var(--stage-bg,#000)}
.deck-viewport{position:fixed;inset:0;overflow:hidden;background:var(--stage-bg,#000)}
.deck-stage{position:absolute;left:0;top:0;width:1920px;height:1080px;overflow:hidden;transform-origin:0 0;background:var(--slide-bg,#fff)}
.slide{position:absolute;inset:0;width:1920px;height:1080px;overflow:hidden;display:block;visibility:hidden;opacity:0;pointer-events:none;background:var(--slide-bg,#fff)}
.slide.active,.slide.visible{visibility:visible;opacity:1;pointer-events:auto;z-index:1}
img,video,canvas,svg{max-width:100%;max-height:100%}
.deck-controls{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:1000}
@media(print){html,body{width:1920px;height:auto;overflow:visible;background:#fff}.deck-viewport{position:static;overflow:visible;background:#fff}.deck-stage{position:static;width:auto;height:auto;transform:none!important;background:none}.slide{position:relative;display:block!important;visibility:visible!important;opacity:1!important;pointer-events:auto!important;width:1920px;height:1080px;break-after:page}.slide:last-child{break-after:auto}.deck-controls{display:none!important}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.2s!important}}

/* Slide design */
.slide.s01 {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 0 200px;
}

.s01 .kicker {
  font-family: 'Courier Prime', monospace;
  font-size: 18px;
  font-weight: 400;
  color: var(--teal);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 60px;
}

.s01 .title {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 96px;
  line-height: 1.15;
  color: var(--yellow);
  margin: 0 0 36px 0;
  max-width: 1200px;
}

.s01 .subtitle {
  font-family: 'DM Sans', sans-serif;
  font-size: 26px;
  font-weight: 400;
  color: #A8B4D8;
  line-height: 1.6;
  margin: 0 0 8px 0;
}

.s01 .subtitle-en {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 28px;
  color: var(--teal);
  margin: 0;
}

.s01 .pin-note {
  position: absolute;
  bottom: 48px;
  left: 80px;
  font-family: 'Courier Prime', monospace;
  font-size: 15px;
  color: var(--teal);
  letter-spacing: 0.08em;
}

.s01 .page-num {
  position: absolute;
  bottom: 48px;
  right: 80px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  color: #A8B4D8;
}

.s01 .rule {
  width: 80px;
  height: 1px;
  background: var(--teal);
  margin-bottom: 60px;
  opacity: 0.5;
}
</style>
</head>
<body>
<div class="deck-viewport">
  <div class="deck-stage">
    <div class="slide s01 active">
      <div class="kicker">TRAINING DECK · 2026</div>
      <div class="rule"></div>
      <h1 class="title">统一开发框架</h1>
      <p class="subtitle">四 Agent · 六阶段 · PDCA 闭环 · TDD 驱动</p>
      <p class="subtitle-en">Unified Development Framework</p>
      <div class="pin-note">pin &mdash; unified-dev-framework</div>
      <div class="page-num">1 / N</div>
    </div>
  </div>
</div>
<script>
(function(){
  const vp=document.querySelector('.deck-viewport');
  const st=document.querySelector('.deck-stage');
  function scale(){
    const w=window.innerWidth,h=window.innerHeight;
    const s=Math.min(w/1920,h/1080);
    const l=(w-1920*s)/2,t=(h-1080*s)/2;
    st.style.transform='translate('+l+'px,'+t+'px) scale('+s+')';
  }
  window.addEventListener('resize',scale);
  scale();
})();
</script>
</body>
</html>
