以为万万不可。</p>\n<p>陈先生： 「身体方面有什么要注意的？</p>\n<p>」</p>\n<p>唐老师： 「官杀强旺，多疑心重，容易发生意外血光，火旺为病易脑神经衰弱，</p>\n<p>睡不着；排泄系统也要注意。 」</p>\n<hr>\n<p><strong>来源《015-2009.07_《四柱学教程》_徐丙昕著 (2)》</strong></p>\n<p>4407916 公众号：九鼎学堂</p>\n<p>获取更多最新易学资料 加微信：804407916 公众号：九鼎学堂</p>\n<p>（三）凡是五行相克而成疾者。</p>\n<p>赋云：“筋骨疼痛，皆因木被金伤。眼目暗昏，必是火遭水克。土虚逢</p>\n<p>木旺之乡，脾伤定论。金弱遇火炎之地，血疾无疑二、 ”又木逢全克，定主腰</p>\n<p>胁之灾。火被水伤，必主眼目之疾。心肺喘满，亦主金火相刑脾胃损伤，</p>\n<p>蓄因水土交战。</p>\n<p>（四）凡日主遭克太过者之疾。</p>\n<p>甲乙见庚辛申酉多者：内主肝胆惊悸劳损，手足顽麻，筋骨疼痛。外主</p>\n<p>头目眩晕，口眼歪斜，左瘫右痪，跌扑损伤。通丙丁火，无水相济，则痰喘</p>\n<p>咯血，中风不语，皮肤干燥，内热口干。女人主血气欠调，小儿主急慢惊</p>\n<p>风，夜啼咳嗽，面色青黯是也。</p>\n<p>丙丁见壬癸亥子多者：内主心气疼痛，目痛咽哑，效慢惊风，语言表</p>\n<p>溢，外主潮热发狂，眼暗失明，小肠迹气，疮痰脓血，小便淋浊，妇女主干</p>\n<p>血疹，经脉不调，小儿生痘疹疥癣，面色红赤是也。</p>\n<p>戊己见甲乙寅卯多者：内主脾胃不合，翻胃肠食，气噎肿胀，泄泻黄</p>\n<p>肿，择拣饮食，呕吐恶心。外主右手沈重，湿毒流注，胸腹痞塞。妇人主吞</p>\n<p>酸虚弱，呵欠困倦。小儿主五疮五软，内热好睡，面色萎黄是也。</p>\n<h2>参见</h2>\n<li>旺衰派·基础理论</li>\n<li>格局派·基础理论</li>\n<li>盲派·基础理论</li>\n<li>神煞·基础理论</li>\n<li>病药·基础理论</li>\n<li>阴阳·基础理论</li>\n<li>综合·基础理论</li>\n<li>其他·基础理论</li>", "source_count": 18, "block_count": 21, "see_also": ["旺衰派·基础理论", "格局派·基础理论", "盲派·基础理论", "神煞·基础理论", "病药·基础理论", "阴阳·基础理论", "综合·基础理论", "其他·基础理论"]}, {"topic": "大运", "content": "<h2>调候 · 大运</h2>\n<p>共收录 8 条相关内容，来自 8 本书籍。</p>\n<p><strong>来源《007-2007.09《四柱乾坤》徐丙昕编》</strong></p>\n<p>4407916 公众号：九鼎学堂</p>\n<p>获取更多最新易学资料 加微信：804407916 公众号：九鼎学堂</p>\n<p>第二十一章死期浅论 317</p>\n<p>命理分析：日主甲木生于丁巳月，年支午火，未戌中所藏</p>\n<p>丁火，巳午未会成火局，皆助火势，火旺可用水调候。而整个</p>\n<p>命局中只见克泄耗，而不见生扶，日主极弱之命，自身不保只</p>\n<p>能从儿火。这时甲木不能再见生扶，忌木助身，如果木来助身</p>\n<p>则凶，当大运乙丑来临，乙木有助身之势，丑未戌构成了三</p>\n<p>刑，又和时柱天克地冲，这些不稳定因素注定了凶险，流年甲</p>\n<p>戌一到，地支一片刑冲混乱，又加辰月，四土刑冲，日主得乙</p>\n<p>与甲的帮扶，起了反叛抗之心，激起土怒，于是驾鹤西去。那</p>\n<p>日主为什么不在74年甲寅流年死去呢，那个运程为甲子，也</p>\n<p>具备了邦身助气运年。子运也冲午，但流年甲寅与命局构成寅</p>\n<p>午戌火局，不但没有帮身而是化火，乙卯流年依然与戌合化</p>\n<p>火，都不至为大灾。</p>\n<p>实例说明，乾造，1961年10月9日（农历八月三十）申</p>\n<p>时生人，死于1991年。</p>\n<p>辛丑戊戌乙亥甲申</p>\n<p>大运：乙未。流年：辛未。</p>\n<hr>\n<p><strong>来源《2022老人参弟子班培训教材《滴天髓与民间应用》》</strong></p>\n<p>根气走调侯的运就是差运，走不调侯的运才是好运。这种就要反正了，所以有时候 调侯对，有时候调侯又不对。</p>\n<p>‘暖虽至要寒有根 ’比如一个八字全是火，很燥，需要壬癸水来调候，有时候碰到大 n<p> 使八字失去平衡者无助反</p>\n<p>有累</p>\n<p> 本造食神为调候</p>\n<p> 印星为平衡</p>\n<p> 故岳父母均对本人有</p>\n<p>益</p>\n<hr>\n<p><strong>来源《《君臣之道》(1)》</strong></p>\n<p>官再生印， 印生身， 或正官合身， 都是用官化偏财的最高境界。</p>\n<p>例： 财官日</p>\n<p>己庚乙</p>\n<p>巳申未</p>\n<p>此造日主乙木合月上正官， 官是真官， 官又得年上己土偏财所生， 官星有源， 当官发财。</p>\n<p>十神之间的作用关系</p>\n<p>十神之间的关系是有一定规律的：</p>\n<p>比劫生食伤，食伤生财， 财生官杀， 官杀生印枭， 印枭生比劫， 比劫帮身。</p>\n<p>了解了十神的相互关系后，在分析命局时， 我们就能知道怎么去调候， 怎么化解。</p>\n<p>1、官杀克身， 用印解救</p>\n<p>正印是生我的， 代表学历，权力、房子、车。</p>\n<p>枭印和正印一样， 代表权力，房子， 车子；</p>\n<p>但在学历方面， 代表的是技能， 和正印是有区别的。</p>\n<p>印星是生我的神， 是助我力量的， 印是我的体， 是我用于取财的工具， 印不宜被克制， 喜生扶。</p>\n<p>那么印化杀： 当日主去合财时，命中却有官杀来搅局，让我合不成时， 用印化官杀生 身， 化凶为吉， 反而增加了日主的力量，所以， 用印化官杀做功的效率高，层次也高。</p>\n<p>比如： 甲己合， 我想去合财， 却有庚辛官杀来搅局，让我合不成， 怎么样才能化解， 让官杀克我的力量减轻呢?</p>\n<hr>\n<p><strong>来源《无风道 盲师口诀断命300招》</strong></p>\n<p>此人财富有三个亿。</p>\n<p>31、七杀入墓夫命休，财星入墓妻定死。</p>\n<p>乾造： 戊丁戊甲 此造子水财星入了辰</p>\n<p>辰 巳 子 寅 墓，老婆死了。子水是 \t财星，子巳绝合，子辰半盒，戊土克子水，子 水受伤入辰墓，老婆死了。这就是“七杀入墓夫</p>\n<p>命休，财星入墓妻定死”.</p>\n<p>坤造：戊戊丙己此造亥水是七杀是老</p>\n<p>戌 午 辰 亥 公，己亥自合、午亥绝 合、戌土克亥水，亥水入辰墓，老公死了。女命 七杀入墓，老公容易死亡；男命财星入墓，老 婆</p>\n<p>容易死亡。七杀入墓夫命休，财星入墓妻定死。</p>\n<p>32、年月命现双重枭，家境贫寒又潦倒。</p>\n<p>凡是年月出现两个枭印，年月地支都是枭印， 家境贫困潦倒，全靠自已打拼。出生都很卑微。 凡是年月透出两个凶神的，都是穷困潦倒之命。</p>\n<p>乾造：戊己辛辛 此造年月戊己土都是</p>\n<p>寅 未 酉 卯 枭印，枭神夺食，家里 一无所有。全靠自己打拼。这就是：年月命现双 重枭，家境贫寒又潦倒。凡是年月天干地支出 现了两次枭印，都是家境贫寒又穷困潦倒。</p>\n<p>乾造：癸辛癸癸 此造金寒水冷，不见</p>\n<p>丑 酉 丑 亥 火星，年月偏印枭神</p>\n<p>太重，穷苦出生，父母都帮不到什么,全靠自己。</p>\n<h2>参见</h2>\n<li>旺衰派·婚姻</li>\n<li>格局派·婚姻</li>\n<li>盲派·婚姻</li>\n<li>神煞·婚姻</li>\n<li>病药·婚姻</li>\n<li>阴阳·婚姻</li>\n<li>综合·婚姻</li>\n<li>其他·婚姻</li>", "source_count": 42, "block_count": 81, "see_also": ["旺衰派·婚姻", "格局派·婚姻", "盲派·婚姻", "神煞·婚姻", "病药·婚姻", "阴阳·婚姻", "综合·婚姻", "其他·婚姻"]}, {"topic": "学业", "content": "<h2>调候 · 学业</h2>\n<p>共收录 36 条相关内容，来自 17 本书籍。</p>\n<p><strong>来源《007-2007.09《四柱乾坤》徐丙昕编》</strong></p>\n<p>4407916 公众号：九鼎学堂</p>\n<p>获取更多最新易学资料 加微信：804407916 公众号：九鼎学堂</p>\n<p>第二十一章死期浅论 317</p>\n<p>命理分析：日主甲木生于丁巳月，年支午火，未戌中所藏</p>\n<p>丁火，巳午未会成火局，皆助火势，火旺可用水调候。而整个</p>\n<p>命局中只见克泄耗，而不见生扶，日主极弱之命，自身不保只</p>\n<p>能从儿火。这时甲木不能再见生扶，忌木助身，如果木来助身</ <p>助火炎上。故为朝中之贵官。</p>\n<hr>\n<p><strong>来源《八字入门 金玉章编著（新）》</strong></p>\n<p>可以从</p>\n<p>其他更多的角度，进行合理地推演。这样在论命的过程中，会挖掘</p>\n<p>出无穷无尽的人生信息。 </p>\n<p> 74</p>\n<p>第八章 分析八字的常见角度 </p>\n<p>第一节 命理的三个元规则 </p>\n<p>初学八字的人，学习大多数的八字理论流派，都会接触旺衰强</p>\n<p>弱、寒暖燥湿、格局用神喜忌等等这些术语。在分析八字的起手式</p>\n<p>上，尤其是“找用神”，几乎成为主流手法。 </p>\n<p>为什么要在八字里找用神呢？这个问题，就触及到 </p>\n<p>命理的根本规则， 即——我们评判一个八字所反映的命运特性，</p>\n<p>诸如富、贵、贫、贱、寿、夭等信息，有什么依据呢？ </p>\n<p>《月谈赋》有言：中和纯粹者吉，浊乱偏枯者凶。吉概指一切</p>\n<p>命运中有利的信息，包括了富贵康寿等；凶则指不利的信息，包括</p>\n<p>贫贱病夭等。找用神的目的，是为了评判命局呈现的吉凶祸福的基</p>\n<p>本特性。据此，判断一个八字有两大方向：中和、纯粹。 </p>\n<p>所谓纯粹， 是指命局有某一种五行独旺局中， 构成强大的气势，</p>\n<p>足以主导命局，即以维护这种五行的纯粹为最佳方向。若命局能呈</p>\n<p>现纯粹的气象， 则可判定为 “吉命” ， 富贵康寿等信息， 则是在此基</p>\n<p>础上，需要进一步确认。</p>\n<h2>参见</h2>\n<li>旺衰派·寿命</li>\n<li>格局派·寿命</li>\n<li>盲派·寿命</li>\n<li>神煞·寿命</li>\n<li>病药·寿命</li>\n<li>阴阳·寿命</li>\n<li>综合·寿命</li>\n<li>其他·寿命</li>", "source_count": 20, "block_count": 33, "see_also": ["旺衰派·寿命", "格局派·寿命", "盲派·寿命", "神煞·寿命", "病药·寿命", "阴阳·寿命", "综合·寿命", "其他·寿命"]}, {"topic": "性格", "content": "<h2>调候 · 性格</h2>\n<p>共收录 15 条相关内容，来自 11 本书籍。</p>\n<p><strong>来源《《君臣之道》》</strong></p>\n<p>场买了一个摊位，整天和鸡屎、脏水打交道。庚金不成器，冷</p>\n<p>漠、坚硬，没人理，干底层工作的特性完全体现。</p>\n<p>197</p>\n<p>枭 杀 日 比</p>\n<p>例 六 乾 造 ： 己 未 丁 丑 辛 丑 辛 卯</p>\n<p>命主日干为辛金，成才之金，生在冬天有调候，显贵。名牌大学毕业，AT行业白领。</p>\n<p>说话结巴，人缘很好，和领导关系更为亲密。</p>\n<p>食 枭 日 枭</p>\n<p>例 七 乾 造 ： 癸 亥 己 未 辛 亥 己 亥</p>\n<p>此命主和上造一样，聪明有才华，为人处事很得体，在校受老师、领导的喜欢，进单</p>\n<p>位受长辈、领导的重用。</p>\n<p>五行很奇妙，只要掌握一、二，足以让你惊叹不已。</p>\n<p>十神之玄机、五行之奥秘，为八字之精髓，但不是一般人所能领悟和破解。</p>\n<p>人的学识来自两条途径：一是天赋，二是后天学习。</p>\n<p>天赋好的人，学习的目的不是为了学到多少东西，而是通过学习感应潜在的信息，唤</p>\n<p>醒沉睡的记忆，也就是引发头脑中潜在的才能，这种潜能一旦被感应，沉睡的记忆就会苏</p>\n<p>醒，那就会灵感迸发，思如涌泉，马上就能获得大量的相关知识。“青出于兰胜于兰”,</p>\n<p>悟性高，聪明的人，都属于这种人，在这方面我有最深刻的体会。</p>\n<p>要是没什么天赋，那只有通过不断地学习，逐渐地积累来走向成功了。</p>\n<hr>\n<p><strong>来源《杨清娟《教学体系命例集细解》》</strong></p>\n<p>、酉金生在丑土里）。</p>\n<p>辰土喜欢酉金，但酉金不喜欢辰土（因辰中水化酉金，若酉为禄，遇辰 是险中求）；</p>\n<p>午火喜欢辰土，生起辰土才体现其伟大，而且辰土也喜欢午火，让其变 的温暖；</p>\n<p>未土喜欢卯木，两者互相喜欢；</p>\n<p>未土意向性地生酉金，也就是虚情假意。例如： 戊 甲 戊 戊</p>\n<p>辰 子 午 午  土太燥需要子水来调候，甲木才能茁壮成长。此命就需要 甲木旺，如没有甲木，一片土就一无是处。所以此甲杀不能制。</p>\n<p>会局专，力量强，是因为物以类居；</p>\n<p>三合局不真，比较松散， 因太杂乱，有虚伪的成份，此人虽有号召力， 但手下人经常有不听指挥的，也有拉帮结派之嫌。</p>\n<p>例 140，</p>\n<p>坤： 庚    丁    庚    已 戌    亥    戌    卯</p>\n<p>盲人算命讲求质与量，也就是五行平衡观（看体与禄马是否平衡）。</p>\n<p>1、命中天干透比劫在年、月，不喜欢财、官透年、月。年上的庚比劫是魁 罡， 日主也是魁罡。丁官虽从家里的戌中出来是真的，但坐在亥水上不旺。官 立不住，只能当财看。</p>\n<p>2、丁亥自合，食神合官，说明日主是吃皇粮的。天干透比劫，最高是事业 单位。</p>\n<hr>\n<p><strong>来源《八字入门 金玉章编著（新）》</strong></p>\n<p>之力。通根丑则变寒湿，若有火调候，也可发挥它的作</p>\n<p>用。此乃自然之理，极其微妙。</p>\n<p>第八节 论干支关系</p>\n<p>命理源于易理， 表达自然之道和社会之理。 天、 地、 人三才， 是</p>\n<p>一个完整的系统。每个人的命运，都会受到天道、地道和人道的共</p>\n<p>同影响， 用现代语言来说， 就是天时、 地理、 社会三个维度的影响。</p>\n<p>在八字里面， 天干的原始意象， 代表天道； 地支， 代表地道； 而支中</p>\n<p>藏干，代表人道，统称三元或者三才。 </p>\n<p>八字通过干支符号系统，形成一种预测人生命运的模型。一个</p>\n<p>八字中的天干、地支及支中藏干之间的复杂关系，用来表达这个人</p>\n<p>命运的各个方面的信息。 </p>\n<p>干与支的关系，我们通过六十组干支来进行分类说明。 </p>\n<p>一类是天地一气的组合， 如： 甲寅、 乙卯、 丙午、 丁巳、 戊戌、</p>\n<p>戊辰、 己未、 己丑、 庚申、 辛酉、 壬子、 癸亥。 这一类十二组干支的</p>\n<p>特点是：天干和地支的主气是相通的，干和支相互照应，能量是最</p>\n<p>强旺的。这十二组干支的组合特点，又不尽相同。其中乙卯、辛酉</p>\n<p>这两组，干支的气完全一样，不含杂气，非常纯粹。其次是壬子一</p>\n<p>组，干支皆阳性，但子中所藏癸水为阴。</p>\n<hr>\n<p><strong>来源《穷通宝鉴  白话评注  下_（明）佚名著；（清）余春台整理；徐乐吾评注；方成竹注译》</strong></p>\n<p>癸水总论</p>\n<p>癸水至弱，达于天津①。得龙而运，功化斯神。不愁火土，不论庚辛。合 戊见火，化象斯真。</p>\n<p>徐乐吾曰：癸乃纯阴之水，发源虽长，其性至静而至弱，所谓“五阴皆阴癸 为至也”。龙，辰也，通干见辰，则化气之原神透出，为一定之理，详见《滴天髓 征义》。不愁火土者，至弱之性，见火土多则从化矣。不论庚辛者，弱水不能泄金 气，而金多反浊，即指癸水而言。合戊见火者，戊土燥厚，四柱见丙辰，引出化 神，化象乃真也。若生于秋冬金水旺地，纵遇丙辰，亦难从化，宜细详之。</p>\n<hr>\n<p><strong>来源《02-金镖门老人参辛丑弟子班笔记中（325页》</strong></p>\n<p>，多研究。</p>\n<p>107</p>\n<p>好又全资源网wwwhao8451.com加微信66697526 送千本易学电子书</p>\n<p>2021.3.13 寒 暖</p>\n<p>天道有寒暖，发育万物，人道行之，不可过也。</p>\n<p>这里说天道人道，实际上就是咱头几篇时提到的三元，说的就</p>\n<p>是天地人道，简单理解就是天时，地利，人和。</p>\n<p>在这里天道指的是气候的意思，就是万物都得依靠气候来调节。</p>\n<p>所谓有生就有死，有死就有生，这是自然的更替，生死轮回。人也一</p>\n<p>样，要遵守这个气象，因为人也是生活在大自然里，反应到八字里也</p>\n<p>是需要调节气候的。</p>\n<p>这里面的寒暖，不单指的是气象，实际上说的就是整个的阴阳</p>\n<p>体系。比如月份的寒暖和整个八字的寒暖；比如出生在夏天，可能就</p>\n<p>热；或者出生在冬天，就冷。</p>\n<p>这里面的寒暖指的是四柱的阴阳寒暖关系，和五行的寒暖关系</p>\n<p>其实本质就是阴阳。咱们主要学习气象寒暖的调和问题，说白了也是</p>\n<p>一个平衡的问题。以前说过，在八字里要平衡，这样可能会出现好命。</p>\n<p>同样这个气象跟阴阳也是需要平衡的，实际归根到底都是说阴</p>\n<p>阳要平衡的意思，这就是易经的本质， p>有长</p>\n<p>养</p>\n<p>、</p>\n<p>化</p>\n<p>育</p>\n<p>的</p>\n<p>特</p>\n<p>性</p>\n<p>；</p>\n<p>“</p>\n<p>金</p>\n<p>”</p>\n<p>具</p>\n<p>有</p>\n<p>清</p>\n<p>静</p>\n<p>、</p>\n<p>收</p>\n<p>杀</p>\n<p>的</p>\n<p>特</p>\n<p>性</p>\n<p>；</p>\n<p>水</p>\n<p>具</p>\n<p>有</p>\n<p>寒</p>\n<p>冷</p>\n<p>、</p>\n<p>向</p>\n<p>下</p>\n<p>的</p>\n<p>特</p>\n<p>性</p>\n<p>。</p>\n<p>这</p>\n<p>些</p>\n<p>特</p>\n<p>性都</p>\n<p>是阴</p>\n<p>阳冷</p>\n<p>暖的</p>\n<p>延伸</p>\n<p>表述</p>\n<p>。</p>\n<h2>参见</h2>\n<li>旺衰派·性格</li>\n<li>格局派·性格</li>\n<li>盲派·性格</li>\n<li>神煞·性格</li>\n<li>病药·性格</li>\n<li>阴阳·性格</li>\n<li>综合·性格</li>\n<li>其他·性格</li>", "source_count": 11, "block_count": 15, "see_also": ["旺衰派·性格", "格局派·性格", "盲派·性格", "神煞·性格", "病药·性格", "阴阳·性格", "综合·性格", "其他·性格"]}, {"topic": "用神", "content": "<h2>调候 · 用神</h2>\n<p>共收录 13 条相关内容，来自 10 本书籍。</p>\n<p><strong>来源《老人参滴天髓之应用》</strong></p>\n<p>有火就不行。此局印太旺得局了，我用神为财，只要财有力，就 OK，这人就没有问题。有火来生土了就更好。</p>\n<p>命主怕走木运吗？不怕，因为火也可以护卫己土的。木运来了， 木生火，也能缓解，但  是木也能克己土，木运肯定不如走火土的运，如果己土要是虚的，走木运就完了。己土实， 有两个通根，来木被克一下，也不要紧，况且还要一个丙火生他，就没有问题，这个跟火有没有根，没有关系。主要午火还是己土的通根，如果丙和己两个都没有通根，那就不行了， 要么火通根，要么土通根。如果都没通根， 这时来木运的话就完了，壬寅运，天干壬水克丙， 地支寅亥化木，就完了。丙和己最起码得有一个是有强根的，配合。没有强根， 他俩配合也白搭。</p>\n<p>学生：跟寒暖有关系吗？</p>\n<p>答：跟寒暖当然有关系，暖给命局加分了。但是没有这个暖行不行？没暖的话，命局 就降层次了，但是也行，因为土有力，只不过是没有带暖的层次高。</p>\n<p>学生：跟暖有没有根是什么关系？</p>\n<p>答：当然要暖有根，但是这局不需要考虑寒暖的事。寒木向阳，来了暖当然更好，没 有暖也行，是喜欢暖，但命局不依赖暖，暖不是命局的命根子。</p>\n<p>学生：没有午火，这个丙也不用去吗？</p>\n<hr>\n<p><strong>来源《八字命理秘传【我好疼你啊我要嫁给你版】》</strong></p>\n<p>练：</p>\n<p>男命：庚申、甲申、丙子、癸巳，日主是旺还是弱？用神是什么？</p>\n<p>AAKK0088800加微信进群聊</p>\n<p>第五讲论日主干支</p>\n<p>甲木参天，脱胎要火，春不溶金，秋不溶土，火炽乘龙，水荡骑虎，地</p>\n<p>润天和，植立千古。</p>\n<p>解注：甲木为纯阳之木，为高大的乔木，有参天之势，若甲木为日主本</p>\n<p>命，生于冬月与寅月，此时天寒地冻之时，若使甲木勃发，须用火来温暖，</p>\n<p>好比阴冷之时，有太阳悬照，除甲木之寒，甲木方能荣发，故而此时甲木，</p>\n<p>取火为用为上策。</p>\n<p>比如四柱：丁未壬寅甲子壬申</p>\n<p>乙巳丙子甲申癸酉</p>\n<p>戊申癸亥甲午乙丑</p>\n<p>这几组四柱，甲木都生冬天或正月，命中寒气重，就要以火为调候，方</p>\n<p>可发达，或取木生火亦可，得火之利，便为好命，一生多顺。</p>\n<p>春不溶金，秋不溶土，春月之木，新芽新枝刚生，不喜刚金克伐，有金</p>\n<p>克伐，有百害无一利，见之则命之组合就不好，易受挫折，且易受伤，若生</p>\n<p>秋天，强金当令，本对甲木就造成克害，若有土又来生金，助封为虐，又耗</p>\n<p>损甲木之力，都为不顺，若四柱组合，生于秋又见土助金，是为坏命，一生</p>\n<p>贫困，难以出人头地。多劳少获，艰辛异常。</p>\n<hr>\n<p><strong>来源《新派命理-李涵辰-八字预测真踪-于大有提供》</strong></p>\n<p>局的五行弱下去，以求利于命局，那么在从格或化格中，自然 就少不了调候的参与，这是调候的一种复杂形式。</p>\n<p>第四节  调候格测算举例</p>\n<p>安徽省太和县魏先生 官劫日元食</p>\n<p>癸丑丁巳丙辰戊子 比印枭官杀</p>\n<p>丙辰乙卯甲寅癸丑壬子</p>\n<p>丙火生于巳月帮身，年支丑土晦巳火，日支辰土晦巳火，巳火两次受制，帮身之力弱，辰土 泄日干丙火，年干癸水克月干丁火，丁火受制帮丙火之力有减，日干弱。本局中导致日干弱 的病根为辰丑土晦火，辰丑为局中忌神。</p>\n<p>本局中有以下组合，年丑晦巳火，巳火减力，生辰土力小，辰土制日干丙力就小，丑土弱时 巳火旺，生辰力大，辰力大晦日干丙力增，要达到让丙火旺的目的，首先是要辰土受制不晦 火，同时又不伤害巳火，日干受帮扶才应吉，谁能又制辰土又使巳火增力或不减力呢?寅、  戌，其次卯、申也具有制辰而巳不减力的效用。要遵照“寒用暖医’的原则，本局中辰丑为忌， 当行巳、午运吉， 行巳、午运自然有帮扶日干好的一面，但同时，巳、午生辰、丑， 辰、丑 也旺，又增大了辰、丑忌神之力，带来效果不佳的另一面。</p>\n<hr>\n<p><strong>来源《八字命理秘传【我好疼你啊我要嫁给你版】》</strong></p>\n<p>成水局反抗，引起了水土大</p>\n<p>战，结果两败俱伤，因为伤官土有五火作后援，水官最终被克绝，命主一命</p>\n<p>呜呼。</p>\n<p>实例：乾造，1956年12月2日（农历十一月初一）酉时生人，死于</p>\n<p>1993年十月。</p>\n<p>丙申己亥癸卯癸酉</p>\n<p>大运：癸卯。流年：癸酉。</p>\n<p>命理分析：日主癸水，生于亥月当令为旺，时干透癸，地支申酉生水，</p>\n<p>明显水旺身强，忌金水，喜火调候暖身，土来制水为用。干透丙火，无根地</p>\n<p>火虚，己土无根而湿流。喜用不得力。大运癸卯，与日主伏吟，水来为忌，</p>\n<p>本已不利，流年癸酉，又加重了水势，一片汪洋大水，虽说卯木可生丙火，</p>\n<p>奈何被酉冲破，又加流月癸亥，水汹涌肆虐，喜用全被克灭。命主只有奔流</p>\n<p>到海不复回。</p>\n<p>实例：乾造，1920年4月29日（农历三月十一）巳时牛人，死于1998</p>\n<p>270</p>\n<p>AAKK0088800加微信进群聊</p>\n<hr>\n<p><strong>来源《徐茂华《八字预测详解》下+282页1749247845》</strong></p>\n<p>一戊出，名一 将当关，群邪自伏。</p>\n<p>卯月：用戊，辛，庚。三春壬水绝地，取庚，辛发 水之源。水多用戊。</p>\n<p>辰月：用甲，庚。甲疏季上，次取庚金发水源，金 多预丙制之为妙。</p>\n<p>巳月：用壬，辛庚，癸。壬水弱极，取庚，辛为 源，壬癸比劫。</p>\n<p>午月：用癸，庚，辛。取庚为源，取癸为佐。无庚 用辛。</p>\n<p>未月：用辛，甲。以辛金发水源，甲木疏土。</p>\n<p>申月：用戊，丁。取丁火佐戊制庚，戊土通根辰 戌，丁火通根午戌，方可为用。</p>\n<p>酉月：用甲，庚。无甲，用金发水之源，名独水犯 庚辛，体全之义。</p>\n<p>戌月：用甲，丙。以甲制戌中戊土，丙火为佐。</p>\n<p>亥月：用戊，丙，庚。如甲出制戊，须以庚金为 救 。</p>\n<p>子月：用戊，丙。水旺宜戊，调候宜丙，丙戊必须 兼用。</p>\n<p>丑月：用丙，丁，甲。上半月专用丙火，下半月用 丙，甲木为佐。</p>\n<p>癸水日主调候用神：</p>\n<p>寅月：用辛，丙。用辛生癸水为源，无辛用庚，丙 不可少。</p>\n<p>卯月：用庚，辛。乙木司令，专用庚金，辛金次 之 。</p>\n<p>辰月：用丙，辛，甲。上半月专用丙火，下半月虽</p>\n<p>用丙火，辛甲为佐。</p>\n<p>巳月：用辛。无辛用庚。</p>\n<hr>\n<p><strong>来源《京南道人2024-5月深圳》</strong></p>\n<p>格局  就要看调候的力度大小了，如果调候正好，那么就富贵，如果调候力度弱， 那么就不富贵，减富贵，不富贵，因为调候弱。</p>\n<p>为什么这个就需要调候上面那个就不需要调候呢，这个意思是由于 八字格局本身来决定的然因为上一个八字的格局，他就没有调候，所以就 是寒极为美，他不需要调候，这个八字日主的 奔袭、长期出差、经商走卒之类。</p>\n<p>正如原文所引卜商一样，博学笃志，传授五经，但是西河讲学，离群索居。</p>\n<p>六虚临于乙亥，孟浩然徒有文章；三才会于壬辰，石季伦恣情金玉。</p>\n<p>何为六虚？</p>\n<p>在八字命里，六虚指空亡对冲之位，比如甲子旬，空亡在戌亥，则辰巳为六虚。</p>\n<p>空亡对冲，无物可对，也有不实之象，即对面无物，只有自己。</p>\n<p>乙亥六虚，即辰巳空亡，生在甲午旬。</p>\n<p>戌亥居乾位，国家之位，带六虚，则无位，有名无实。</p>\n<hr>\n<p><strong>来源《陈朝阳-《象法大成精华版》盲派高级象法分享版.》</strong></p>\n<p>西方：申藏庚壬戊，酉藏辛，戌藏戊辛丁。西方白虎。</p>\n<p>北方：亥藏壬甲，子藏癸，丑藏己癸辛。北方玄武。</p>\n<p>地支藏天干的歌诀：子中藏癸水，丑藏己癸辛，寅中甲丙戊，卯中乙木逢。辰藏戊 乙癸，巳中丙戊庚，午宫丁己土，未宫己乙丁。申宫庚壬戊，酉中独辛金，戌宫戊 辛丁，亥中壬甲逢。</p>\n<p>象 法 大 成 精 华 版</p>\n<p>第四章  阴阳</p>\n<p>阴阳本无细分，阴中有阳，阳中有阴；阴极变阳，阳极化阴。阴阳既相互对立， 阴阳又彼此互补；只有在相互对立的情况下，才产生阴阳。刚开始先熟悉对立，然 后再运用互补，相生，相克。</p>\n<p>日月 大小  多少 干湿  高低  明暗  长短  软硬  快慢  黑 白</p>\n<p>胖瘦  男女  雌雄  寒暖  冷热  燥湿  喜怒  哀乐  悲喜  忙闲</p>\n<p>凉暖  来去 尖钝  美丑  粗细  俯仰  浮沉  好坏 轻重  前后</p>\n<p>左右  是非 有无  老少  新旧 首尾  始终  宽窄  难易 深浅</p>\n<p>强弱  出 入 开 关 斜正  动静  开合 生 熟 成败 贵贱  爱恨</p>\n<p>生死  贫富 死活  买卖  远 近 增减  安危 松紧  善恶  忠奸</p>\n<hr>\n<p><strong>来源《《八字读象预测法》黄勇智(1)》</strong></p>\n<p>，为财多身弱，一  事无成 。至甲午运，木无根而从火， 己巳年火土并旺，气血必伤，病患肠胃血症而亡。</p>\n<p>此造己土生于丑月，全局一片寒湿之地，没有丁点阳暖之象，故不宜用火调候，应顺其  寒湿之气，取金水为用，忌火运逆其寒湿之气 。所以此造是从寒格 。年月二柱为用神之象， 按象直读祖业必丰、荫庇有余；日支为妻宫，亥水正财临之为得位，大运癸巳，与日柱反吟，</p>\n<p>妻星妻宫被伤之象很明显，按象直读妻有灾；同样甲午大运为忌神大运，大运之象为忌神凶  象，流年己巳与日干天比地冲，地支用神被伤，凶险之象感应到日主与妻宫，妻已故，与妻  无关，这时必应自己，按象直读，他自己有灾病，什么病？ 巳火为红色之象、亥水为水之象， 合起来为血水、血液之象，又己土为脾胃之象，按象直读病患肠胃血症而亡。</p>\n<p>食神   劫财    日干   食神</p>\n<p>例三： 男命  乙巳   丙戌   丁未    乙巳</p>\n<p>大运： 乙酉  甲申  癸未  壬午  庚辰  辛巳  己卯  戊寅</p>\n<hr>\n<p><strong>来源《穷通宝鉴  白话评注  下_（明）佚名著；（清）余春台整理；徐乐吾评注；方成竹注译》</strong></p>\n<p>绶，一则月令七煞也。壬不离丙，丙不离壬，水火以既济为 美，故次用丙火。用土者，以煞为子，以财为妻星。</p>\n<p>方先生曰：此段总结九月壬水取用总的原则，季秋戌土月建，土旺秉令之 时，七杀乘权，用甲木破土，食神制杀为正用。与八月用甲不同，八月水旺， 印绶当令，取甲木者，用食神以泄秀。九月壬水，如果汪洋一片，取一戊制群 水，为 一 将当关，群邪自伏，又要用丙火为辅。所谓次看丙火者，因水旺于 秋，则土寒水冷之故。所以，九月土旺秉令之时，不外乎用甲、用戊两法，丙 火、庚金，只为应病之药。以甲木破土为正用，如见水旺，戊土须酌用之，因 水寒土冷，要次看丙火，水多无丙，只以戊土为用者，则为平常人物。壬不离 丙，丙不离壬，壬旺取丙，丙旺用壬，水火总以既济为美。用甲木者，木子水 妻；以戊土为用者，土子火妻。</p>\n<p>命例 一：</p>\n<p>才丙寅 杀 戊戌 壬戌 印辛丑</p>\n<p>身旺官旺，又得丙透，参政。</p>\n<p>徐乐吾曰：财生煞旺，无甲，以辛金化煞为用。甲木藏寅，寅戌会局，不 能取以制煞也。</p>\n<p>命例二：</p>\n<p>印 辛丑</p>\n<p>杀 戊戌 壬戌</p>\n<p>食甲 辰</p>\n<p> 常有不听指挥的，也有拉帮结派之嫌。</p>\n<p>例 140，</p>\n<p>坤： 庚    丁    庚    已 戌    亥    戌    卯</p>\n<p>盲人算命讲求质与量，也就是五行平衡观（看体与禄马是否平衡）。</p>\n<p>1、命中天干透比劫在年、月，不喜欢财、官透年、月。年上的庚比劫是魁 罡， 日主也是魁罡。丁官虽从家里的戌中出来是真的，但坐在亥水上不旺。官 立不住，只能当财看。</p>\n<p>2、丁亥自合，食神合官，说明日主是吃皇粮的。天干透比劫，最高是事业 单位。</p>\n<h2>参见</h2>\n<li>旺衰派·财运</li>\n<li>格局派·财运</li>\n<li>盲派·财运</li>\n<li>神煞·财运</li>\n<li>病药·财运</li>\n<li>阴阳·财运</li>\n<li>综合·财运</li>\n<li>其他·财运</li>", "source_count": 54, "block_count": 139, "see_also": ["旺衰派·财运", "格局派·财运", "盲派·财运", "神煞·财运", "病药·财运", "阴阳·财运", "综合·财运", "其他·财运"]}]}, {"name": "阴阳", "topics": [{"topic": "事业", "content": "<h2>阴阳 · 事业</h2>\n<p>共收录 441 条相关内容，来自 93 本书籍。</p>\n<p><strong>来源《《潘昭佑老师新浪微博所有文章》569页副本》</strong></p>\n<p>以阴</p>\n<p>阳平</p>\n<p>衡为</p>\n<p>依据</p>\n<p>，</p>\n<p>都</p>\n<p>以化</p>\n<p>泄旺</p>\n<p>气而</p>\n<p>能通</p>\n<p>比劫</p>\n<p>的字</p>\n<p>的出</p>\n<p>现为</p>\n<p>兄弟</p>\n<p>姐妹</p>\n<p>数量</p>\n<p>。</p>\n<p>那</p>\n<p>么这</p>\n<p>种论</p>\n<p>法的</p>\n<p>理论</p>\n<p>根据</p>\n<p>是什</p>\n<p>么？</p>\n<p>理论</p>\n<p>根据</p>\n<p>是太</p>\n<p>极</p>\n<p>，</p>\n<p>方</p>\n<p>法是</p>\n<p>论存</p>\n<p>在</p>\n<p>，</p>\n<p>存</p>\n<p>在的</p>\n<p>原</p>\n<p>因</p>\n<p>是有</p>\n<p>阴阳</p>\n<p>二气</p>\n<p>而能</p>\n<p>成一</p>\n<p>太极</p>\n<p>。</p>\n<p>②</p>\n<p>、</p>\n<p>兄弟</p>\n<p>姐妹</p>\n<p>少</p>\n<p>从</p>\n<p>五行</p>\n<p>生克</p>\n<p>而论</p>\n<p>存在</p>\n<p>，财</p>\n<p>官使</p>\n<p>局中</p>\n<p>一气</p>\n<p>成偏</p>\n<p>而克</p>\n<p>比劫</p>\n<p>，论</p>\n<p>兄弟</p>\n<p>姐妹</p>\n<p>少。</p>\n<p>③</p>\n<p>、</p>\n<p>兄弟</p>\n<p>多还</p>\n<p>是姐</p>\n<p>妹多</p>\n<hr>\n<p><strong>来源《018-2009.11_《子平实战指引》_徐伟刚著 (2) (1)》</strong></p>\n<p>4407916 公众号：九鼎学堂</p>\n<p>获取更多最新易学资料 加微信：804407916 公众号：九鼎学堂</p>\n<p>之不同属性去区别之。</p>\n<p>财为养命之源，人人需要有用。既然月令有财星有益人生之物，则此宝</p>\n<p>物必须保卫或生养之，使其长久生存兴旺发达而不遭破坏败绝，故而财格之</p>\n<p>成立，有如下几条因素：一者喜官星之保卫；二者喜伤食之生财；三者喜佩</p>\n<p>印助身以担任之。财格之失败也同样有如下之因素：一者忌比劫之分夺；二</p>\n<p>者忌生煞以害命攻身；三者忌身弱不能负荷而破财成“富室贫人” 。</p>\n<p>总结上文之成格败格因素，大致可以把财格分为以下几种情况：</p>\n<p>一、财格透正偏财；</p>\n<p>二、财格透官煞；</p>\n<p>三、财格透正偏印；</p>\n<p>四、财格透伤食；</p>\n<p>五、财格透比劫。</p>\n<p>这五种基本情形就是财格所要讨论的对象。</p>\n<p>乾造：丙午庚寅辛酉壬辰</p>\n<p>1 11 2131 41516171</p>\n<p>大运：辛卯壬辰癸巳甲午乙未丙申丁酉戊戌</p>\n<p>这个男命是典型的财格生官又逢伤破的局面，月令寅财生年干丙官，年</p>\n<p>上丙官又逢时上壬伤，形成格局先成后败之象。</p>\n<hr>\n<p><strong>来源《素水盲派《壬寅年格局大运流年班内部资料》2022年格局大运流年培训教材209页》</strong></p>\n<p>成。</p>\n<p>官透出来的好，透出来的影响大。没透时，就看地支的关系。</p>\n<p>子丑合，闭库了。跟官的缘份就浅了。</p>\n<p>这个甲透出来，丁也虚透，但这里富贵不看这个食生财。</p>\n<p>如果这个八字一片比劫，只靠这个食财，就穷了。</p>\n<p>地支亥子丑会劫财， 也不是重点。</p>\n<p>申亥也穿，但印透出来，天干没坏，印就完整。</p>\n<p>但时上有印，印是贵点。</p>\n<p>学历三本，企业中做销售工作。食生财，是工作性质。</p>\n<p>有印的人，身旺也是有层次的。都是穷命的，也是有层次的。开个小店也 是老板。没印的人，就是要差一些。</p>\n<p>阴阳核心永远不变，变得是动态，阴阳运动变化产生的结果。这个动态就 是配置，作用关系等。成不成格，看作用关系，分为1,2,3,4,各种条件， 看成不成。</p>\n<p>第十七课  大 运 流 年 2</p>\n<p>大运流年，是息息相关的，但要组合来看。原局是主人，大运流年的吉凶</p>\n<p>是跟着原命局走的。它跟原命局展现的意义是不同的。不能把大运流年当作五</p>\n<p>柱，六柱去看。</p>\n<p>如果把大运流年排成六柱去看，就说明这六柱都是命局的结构了。那么官 格为什么时上透伤，就不行了呢。如果大运透了一个官，能当官吗?原命局不 当官的，大运流年来了官，是不可能当官的。</p>\n<hr>\n<p><strong>来源《易理案例解释》</strong></p>\n<p>随，只因月印的力量不同，</p>\n<p>导致层次的天地差别</p>\n<p>禄印相随好福气，不被坏的（刑冲……）还容易进入其贵格。印在月的力量是很重要的，因</p>\n<p>为它决定了层次的高低，印在月有力对于禄印格来说是文凭高，如果无力的话就文化低了，</p>\n<p>这样不利于权利晋升，层次就降低了。</p>\n<p>乾造，癸丑，癸亥，乙卯，丁亥</p>\n<p>乙卯日，乙木坐卯禄，遇到月时亥印，没有财官来坏，成禄印格，日主有根有水是活木，活</p>\n<p>木喜火喜水，特别喜欢月柱水印有力，印是喜神有力文凭高，月亥再生卯禄（这时禄可以代</p>\n<p>表权），局主可用知识去取禄权，格局很纯属于贵格。</p>\n<p>乾造，乙卯，癸未，乙卯，丁亥</p>\n<p>同为乙卯日柱，同样是禄印相随，而此造月干癸水印确是虚透无力的，按宫位理论年月主早，</p>\n<p>读书的时间段在这两个时间里，当印是用神时最怕虚透无力了，弱印在原局里表文凭不高，</p>\n<p>局主不能用知识去追求权禄了，这样层次就低下来。很多人认为是财克印，未土在地是克不</p>\n<p>了天上的癸水，只能说印水不给力，早年吸收的知识少，不能靠少量的知识更上一层楼。</p>\n<hr>\n<p><strong>来源《10.鄗邑山人-《五行八字案例分析》478页》</strong></p>\n<p>死。。。。。。有机会把八字要来研</p>\n<p>究一下</p>\n<p>沐清风</p>\n<p>e</p>\n<p>沐清风</p>\n<p>@符亮此人生前做什么</p>\n<p>符亮</p>\n<p>癸丁相见，逢食伤与官杀，或枭夺食，癸旺</p>\n<p>,容易溺水，丁旺容易触电，雷击，或火灾</p>\n<p>原局甲～寅禄，亥卯合局，财旺生双官为煞～卯戌也合火，庚没 什么根基，这是典型的财煞特别重身特别轻的结构，这样，日主就不 能得根及见食伤……庚午运，寅午戌三合火局～丁煞旺。癸未年，就 是日主的伤官，与原局就是伤官见官……丁巳月……寅午戌、亥卯未、 巳 午 未 … … 甲 丁 … … … … 癸 ～ 庚 … … 因 财 而 官 非 。</p>\n<p>道教纯五行传统命理研讨群  群主：部邑山人18533141468 2021年12月9日星期四</p>\n<p>68、自杀死案例解析</p>\n<p>昨日，在道教纯五行传统命理研讨群内，我从别群转载分享了一 个案例：</p>\n<p>乾造：戊申、丁巳、壬午、丙午</p>\n<p>大运：壬戌</p>\n<p>流年：庚子</p>\n<p>原局财煞重克身，日主只有申金长生之根，属于典型的煞特别重 而身特别轻的结构。这样在遇到财煞的生旺墓岁运或者日主得根及日 主食伤年，必然会有较大的灾祸。</p>\n<hr>\n<p><strong>来源《曲炜四柱详真》</strong></p>\n<p>人、女人，即阳为男，阴为女。即然四柱是用来测人生的，测生活在现实生活中的人，那么五行理论必须与现实生</p>\n<p>活中男女(阴阳)实际关系相一致，这样才能正确反映现实。</p>\n<p>“同性相斥，异性相吸”是人人皆知的真理，是现实社会中万事万物普遍规律，同性气场不合有一种排斥力，因而关系不合谐，异性气场</p>\n<p>相吸，因而有一种亲合力，能够情投意合，如胶似漆。正如社会中的</p>\n<p>男人与女人之间，男人与男人之间，女人与女人之间，亲合力最大的</p>\n<p>关系是男人与女人之间的关系，只有此二者之间才可以达到亲密无</p>\n<p>间，生死与共，为了对方能牺牲自己或是事业或是全身心付出自己全</p>\n<p>部的爱与力量，而同性之间的亲合力及为对方付出程度与之不能相</p>\n<p>比。虽古有刘、关、张三结义，然真正象此种关系，世上能有几人?</p>\n<p>他不具有代表性和普遍性。世界上现实生活中为爱为情倾心付出，甚</p>\n<p>至不惜一切代价的男女之情比比皆是，试想想又有几个男的为了另</p>\n<p>个男的象男女之情一样那么真心情愿付出?我们从世上男女之间婚</p>\n<p>姻恋爱这一普遍现象，可以看阴阳相生是情愿相生，情愿付出，这种</p>\n<p>相生力能不大吗。不是情愿相生，带有同性排斥性的给予，又能给予</p>\n<hr>\n<p><strong>来源《崔老师 催文举 盲派八字精进班 328页W》</strong></p>\n<p>但原局没有阳，这个时候我们去 大运里边找阳。大运里边如果有阳，我们就以大运阳来定。我刚财说了，如果家</p>\n<p>里有财官，我们就先找家里的财官，家里没有再到外边找财官，阴阳也是一样，</p>\n<p>如果原局全是阴的或全是阳，那么我们就要到大运里边去找阴合阳。</p>\n<p>这个盘原局找不出阳，</p>\n<p>什么是真正的阴合阳，阴就是水，阳就是火，火财是真正意义上的阳，这 个盘只有是巳火运合午火运这两个大运，如果我们定巳行不行，已翻到天上是丙 合丁，丙合丁是16合17岁，能结婚吗，特殊地区或许是有，如果你非要定巳运 就是找丁丑年，如果是定午运，午火翻到天上是丙丁，就是丁亥年结婚。在当今 社会选丁亥年财是标准，22-23岁后。</p>\n<p>阴阳不平衡、原 局中太干，需要 辰中的水，</p>\n<p>壬辰，癸已，</p>\n<p>在原局里面除了戌中有点金之外，全盘都是土，原局有两个星， 一个是戌 中的辛金，第二个星是辰土中的水，也是我的星，我的星不能跑到外面去，跑到 外面去你必犯桃花，什么时间犯，就看命中缩写。</p>\n<hr>\n<p><strong>来源《王庆探8探索门命理学象法班笔记2014-王庆1730037215》</strong></p>\n<p>为天地主气时，格局用神只要在，针对立格局点的天敌就算在岁运中出 现，也伤害不到立格局点。</p>\n<p>财杀日伤</p>\n<p>例2乾造：癸丑甲子戊寅辛酉（申酉空）</p>\n<p>1、\t阴阳象法：甲木被癸水侵入，有严重的风湿病。甲木成了癸水的保护神。只 有金出，木死，土出，水阴有制之时，病情才能好转。</p>\n<p>按照之前的论命方法看,庚寅年，是不可能治疗风湿的。金生水，水又生木, 风湿会更严重。</p>\n<p>2、\t实际情况:风湿病在庚寅年遇到治疗风湿的高手，庚寅、辛卯年基本治好 的，虽然没有根治，但是已经不影响工作了。之前也到处在找医生，全国都找过 了，就是没有效果。</p>\n<p>财食日才</p>\n<p>例3乾造：壬戌辛亥己未癸酉（子丑空）</p>\n<p>1、阴阳象法:原局水阴旺，甲寅运，大运见到保护神木，想要水阴有制必须要制住木。</p>\n<p>八字有格局架，取财的方式有两种，一种是去掉格局瑕疵的岁运，不用看五 行，只看十神。还有一种发财的方式，不看格局，看五行。</p>\n<p>如果不看格局，甲寅大运很不好。原局水阴旺，甲寅大运，水阴得到保护，但 原局有用神辛金，所以甲寅、乙卯大运，照样会有几年能发财。等到流年金出现克 木的时候，就能发财。</p>\n<hr>\n<p><strong>来源《《潘昭佑老师新浪微博所有文章》569页副本》</strong></p>\n<p>干枝</p>\n<p>共司</p>\n<p>一岁</p>\n<p>之事</p>\n<p>。</p>\n<p>即</p>\n<p>如种</p>\n<p>种神</p>\n<p>煞</p>\n<p>。</p>\n<p>从</ 癸水出</p>\n<p>库被制，只是因为局中功神火入大运墓制的效果没有其它出来的运好而已。</p>\n<p>乾造 乙巳 庚辰 戊午 甲寅 某著名易学家八字</p>\n<p>木火成势制辰中水。原局水遁藏在辰库中，巳午火无法制，只有水出现在</p>\n<p>大运才能制住。丁丑大运水到了，命主此运不仅开始发财，且瞬间名动天下；</p>\n<p>丁丑大运的丙子年运作，丁丑年就开始发财了，后来一路发起来；当时命主发</p>\n<p>财的势头之猛，发财之快，不是亲眼所见简直很难相信的。丙子大运癸水从辰</p>\n<p>中出来，命主更是天财横发。现为亿万富翁。</p>\n<p>当然，这也是个寅生午，午生日干的化用做功八字，命主己卯、戊寅运学</p>\n<p>习成绩突出，且考取军校，在部队做的也是顺风顺水。相比之下，还是制辰的</p>\n<p>功事业成绩大。</p>\n<p>乾造 乙巳 庚辰 丙午 甲午</p>\n<p>类似上面的八字，局中火成势制辰中水。大运丁丑，财运不错；大运丙子，</p>\n<p>名气、财利简直一日千里。</p>\n<h2>参见</h2>\n<li>旺衰派·事业</li>\n<li>格局派·事业</li>\n<li>盲派·事业</li>\n<li>神煞·事业</li>\n<li>调候·事业</li>\n<li>病药·事业</li>\n<li>综合·事业</li>\n<li>其他·事业</li>", "source_count": 93, "block_count": 441, "see_also": ["旺衰派·事业", "格局派·事业", "盲派·事业", "神煞·事业", "调候·事业", "病药·事业", "综合·事业", "其他·事业"]}, {"topic": "健康", "content": "<h2>阴阳 · 健康</h2>\n<p>共收录 739 条相关内容，来自 110 本书籍。</p>\n<p><strong>来源《八字命理秘传【我好疼你啊我要嫁给你版】》</strong></p>\n<p>子时，春夏，财官生旺吉；秋冬四季，背禄逐马，凶。寅</p>\n<p>月，金火运，郎官。午月，东北运，金紫。忌壬寅月，</p>\n<p>恶死。壬申月，</p>\n<p>过贫遭刑。癸酉月，破败。己日喜逢甲子时，财官双美贵希奇；一朝</p>\n<p>得遇风云会，独步蟾宫折桂枝。己日时临甲子，化生土厚滋基。财官</p>\n<p>既助显光辉，有似青龙戏水。不遇庚金卯午，为人禄至福齐。常人发</p>\n<p>福有施为，君子登科及第。</p>\n<p>AAKK0088800加微信进群聊</p>\n<p>222</p>\n<p>六己日乙丑</p>\n<p>时断</p>\n<p>六己日生时乙丑，煞星受制不为伤；柱中身旺多荣贵，无助生人昼</p>\n<p>夜忙。</p>\n<p>己日乙丑时，专财逢鬼，丑上有明乙为鬼，暗癸为财。若有倚托通</p>\n<p>身旺者，贵；通运亦吉。若鬼有助，旺不能任者，衣禄平常。</p>\n<p>己丑日乙丑时，时上偏官，居武职都阃，还看地方断之。卯月金水</p>\n<p>运，六七品贵。</p>\n<p>己卯日乙丑时，子申月，行金土运，侯伯。巳酉丑戌年月，俱吉。</p>\n<p>己巳日乙丑时，寅卯月，偏官格。无酉戌字，文进贵命。</p>\n<p>己未日乙丑时，时日并冲，妻生财可也。卯午年月，金神入火乡，</p>\n<p>西南运，贵。辰戌四季全，大贵。干透丁辛，纯阴亦贵。</p>\n<p>己酉日乙丑时，卯月，偏官。辰月，</p>\n<p>财煞，贵。申酉，伤官伤尽。</p>\n<p>巳午，印绶，俱贵。丑戌，亦贵。</p>\n<hr>\n<p><strong>来源《子平烛观》</strong></p>\n<p>比劫争财。损了先天格局。 在此有一人生挫折要经历。</p>\n<p>test 发表于2009-11-1517:23</p>\n<p>呆师：连我认为最细心的小鼠samoyed 都没看出来我的用意，看来一定是我自己的错，,一 定是我自己没有讲解清楚，,在旧帖中讲过“子平用多寡之暗冲不用暗合”,,看来没有老师 注意到我那句话，如天元老师所讲，地支三申可以暗冲出一个寅木虚神。寅为丙火虚神之 根，弱而不从。立才格论成败。用年上正官为用。地支申亥互破害，已经从格的能量级别 降入局的级别。癸根受伤，层次再将。最不妥的是虚神寅木，通官比之关，官星再也难以 护住财星。岁运忌再克泄官杀。</p>\n<p>正官       偏财       日主       比 肩</p>\n<p>乾造：    癸         庚         丙         丙         (辰巳空)</p>\n<p>亥          申                申                 申</p>\n<p>大运：己未   戊 午    丁 巳   丙 辰    乙 卯    甲 寅    癸 丑   壬 子</p>\n<hr>\n<p><strong>来源《子平真诠本义精简版》</strong></p>\n<p>拘泥外格为活变；论生克，则不察喜忌，而以伤旺扶弱为定法；论行运，则不问同中有异，而以干支相类为一例。</p>\n<p>解读：以八字算命是有定理和法则的。有些人不得真传，不知道正宗的子平命理及其法则，便胡编乱造一些似是而非的命理和法则，弄得命学界歪理当道，邪说横行。千千万万的后学者没有能力辨别是非，妄听妄信妄传，现在已经达到了积重难返的地步了。</p>\n<p>比如论干支，就不知道干支的阴阳之理，而以所谓的“体象歌诀”来论干支，说什么甲木为参天大木，宜斫削，而乙木是花草弱木，宜生扶等等，都是乱弹琴。</p>\n<p>比如论格局，则不知道要专从月令取用定格，而是随便到处取用神定格局，还说这是活变！特别是现在好多人，连用神的概念都还没有弄清楚，哪里就谈得上活变呢！</p>\n<p>比如论生克，则不从格局上着眼，总是只按旺则宜克，弱则宜扶的死法来论命，只讲八字五行的平衡与流通，不讲八字格局的成败与高低，你看旺，我看衰，瞎猜胡断。</p>\n<p>比如论行运，则不问是甲还是乙，是寅还是卯，只看干支都属木，就以木来论喜忌，而不知有时候甲木破格而乙木成格，有时候则寅木成格而卯木破格，没有看到某些细节的不同会导致整体格局的变化。</p>\n<hr>\n<p><strong>来源《易理案例解释》</strong></p>\n<p>而开始变衰，虽然自己想从政</p>\n<p>（申拱辰官杀库），奈何辰弱又被丙戌冲（表竞争大），最终没有重振世家荣耀。</p>\n<p>知道辰是寿星还是原局核心，就来解读先生反馈的情况，逢印木时好点，这木可不是生日主</p>\n<p>的，因为丙的根因为反吟而连接不上，丙成了天火太阳，所以不是生日干，而是冲合申财，</p>\n<p>这样申就不泄辰，辰好自然就好了。遇庚申辛酉子亥时，都是泄的就不好了，病倒还破财。</p>\n<p>戊戌运，戌是原局反吟忌神，辰戌冲，辰受伤的应期到了，戊子流年子水入局三合化水，原</p>\n<p>本受伤的食被一合就走了，所以此年驾</p>\n<p>不是食神制杀不了，而是宾位食不是自己的，</p>\n<p>日主靠自合官星取贵</p>\n<p>乾造，乙亥，己丑，癸巳，丁巳</p>\n<p>癸巳日，原局有食神制杀，如果制的好那就是武贵，按位置看可入朝（年柱有用），看袁大</p>\n<p>头的:己未，癸酉，丁巳，丁未，就是这样的位置。</p>\n<p>按理说乙食把己杀制好了，局主应该武贵，可现实却是文贵，怎么回事？</p>\n<p>有的说杀有根还有财生制不好，其实丑是湿土不怎么帮土的，就算有巳火生，可丑紧贴亥水，</p>\n<p>生过来也不能让丑成燥土去帮己。</p>\n<hr>\n<p><strong>来源《018-2009.11_《子平实战指引》_徐伟刚著 (2) (1)》</strong></p>\n<p>4407916 公众号：九鼎学堂</p>\n<p>获取更多最新易学资料 加微信：804407916 公众号：九鼎学堂</p>\n<p>之不同属性去区别之。</p>\n<p>财为养命之源，人人需要有用。既然月令有财星有益人生之物，则此宝</p>\n<p>物必须保卫或生养之，使其长久生存兴旺发达而不遭破坏败绝，故而财格之</p>\n<p>成立，有如下几条因素：一者喜官星之保卫；二者喜伤食之生财；三者喜佩</p>\n<p>印助身以担任之。财格之失败也同样有如下之因素：一者忌比劫之分夺；二</p>\n<p>者忌生煞以害命攻身；三者忌身弱不能负荷而破财成“富室贫人” 。</p>\n<p>总结上文之成格败格因素，大致可以把财格分为以下几种情况：</p>\n<p>一、财格透正偏财；</p>\n<p>二、财格透官煞；</p>\n<p>三、财格透正偏印；</p>\n<p>四、财格透伤食；</p>\n<p>五、财格透比劫。</p>\n<p>这五种基本情形就是财格所要讨论的对象。</p>\n<p>乾造：丙午庚寅辛酉壬辰</p>\n<p>1 11 2131 41516171</p>\n<p>大运：辛卯壬辰癸巳甲午乙未丙申丁酉戊戌</p>\n<p>这个男命是典型的财格生官又逢伤破的局面，月令寅财生年干丙官，年</p>\n<p>上丙官又逢时上壬伤，形成格局先成后败之象。</p>\n<hr>\n<p><strong>来源《素水盲派《壬寅年格局大运流年班内部资料》2022年格局大运流年培训教材209页》</strong></p>\n<p>成。</p>\n<p>官透出来的好，透出来的影响大。没透时，就看地支的关系。</p>\n<p>子丑合，闭库了。跟官的缘份就浅了。</p>\n<p>这个甲透出来，丁也虚透，但这里富贵不看这个食生财。</p>\n<p>如果这个八字一片比劫，只靠这个食财，就穷了。</p>\n<p>地支亥子丑会劫财， 也不是重点。</p>\n<p>申亥也穿，但印透出来，天干没坏，印就完整。</p>\n<p>但时上有印，印是贵点。</p>\n<p>学历三本，企业中做销售工作。食生财，是工作性质。</p>\n<p>有印的人，身旺也是有层次的。都是穷命的，也是有层次的。开个小店也 是老板。没印的人，就是要差一些。</p>\n<p>阴阳核心永远不变，变得是动态，阴阳运动变化产生的结果。这个动态就 是配置，作用关系等。成不成格，看作用关系，分为1,2,3,4,各种条件， 看成不成。</p>\n<p>第十七课  大 运 流 年 2</p>\n<p>大运流年，是息息相关的，但要组合来看。原局是主人，大运流年的吉凶</p>\n<p>是跟着原命局走的。它跟原命局展现的意义是不同的。不能把大运流年当作五</p>\n<p>柱，六柱去看。</p>\n<p>如果把大运流年排成六柱去看，就说明这六柱都是命局的结构了。那么官 格为什么时上透伤，就不行了呢。如果大运透了一个官，能当官吗?原命局不 当官的，大运流年来了官，是不可能当官的。</p>\n<hr>\n<p><strong>来源《003-2003.12《命理技法与决断：四维时空占吉凶》_董忠清著 (1)》</strong></p>\n<p>4407916 公众号：九鼎学堂</p>\n<p>获取更多最新易学资料 加微信：804407916 公众号：九鼎学堂</p>\n<p>命理技法与决断</p>\n<p>批注：</p>\n<p>命书说：六丁日生时辛丑，库中助谷多陈朽，</p>\n<p>身无依倚不为凶，有托妾贤而宫厚。</p>\n<p>此造最日时井冲，但生西月通水气，应为吉命评述。该小</p>\n<p>姐系退伍军人，找我．她预洲时26岁，我石了她的八字后断她</p>\n<p>生来无伴，行亥运时家中不安。</p>\n<p>第十二例：乾造</p>\n<p>某先生生于1953年n月初八日亥时</p>\n<p>五行含量</p>\n<p>（官）财癸已庚丙戊食袅比金：2</p>\n<p>（胎）杀甲子癸财木：2</p>\n<p>（墓）日戊戌辛丁戊伤印比水：4</p>\n<p>（绝）财癸亥甲壬杀才火：2</p>\n<p>土：3</p>\n<p>安命：戊午天福星临命</p>\n<p>此造预测时50岁，该先生首先对我发问，问他有几兄弟</p>\n<p>和有几个孩子。我将他的八字列式后，对他说：“你有四兄弟，</p>\n<p>你命中有两个男孩，三个女孩” 。他满意的叫我继续讲述他的</p>\n<p>全部情况。现列式表述，以供参考。</p>\n<hr>\n<p><strong>来源《太极阴阳法命理入门（李法能）-2023年》</strong></p>\n<p>珍海味，聘请额外雇工等； </p>\n<p>（3）大把花钱、超额贷款、感情出轨、因财弃学、因</p>\n<p>财惹祸、因父母破财等。 </p>\n<p>4 性格特征 </p>\n<p>（1）偏财为喜而不受损时，表现为慷慨大方、精明干</p>\n<p>练、机智敏锐、仗义轻财、乐于助人、人缘特佳、活动</p>\n<p>力强、富于交际、善于投机、做事干脆利落、喜欢一步</p>\n<p>到位、性偏急躁等； </p>\n<p>（2）偏财为忌而无制时， 表现为挥霍无度、奢侈浪费、</p>\n<p>轻佻浮华、贪财好色、放纵情欲、狂赌烂嫖、玩弄情感、</p>\n<p>虚诈不实、玩世不恭等。 </p>\n<p>5 六亲方面 </p>\n<p>（1）男命代表父亲、伯叔、小妾、情人； </p>\n<p>（2）女命代表姑妈、婆婆、嫂子、弟媳。 </p>\n<p>（七）伤官 </p>\n<p>伤官含义： </p>\n<p>1、我生之而阴阳相异，泄我精华而无所节制； </p>\n<p>李法能  李法能  李法能  李法能</p>\n<p>李法能  李法能  李法能  李法能</p>\n<p>李法能  李法能  李法能  李法能</p>\n<p>李法能  李法能  李法能  李法能</p>\n<p>李法能  李法能  李法能  李法能</p>\n<p>李法能  李法能  李法能  李法能</p>\n<p>李法能  李法能  李法能  李法能</p>\n<p> 李法能  李法能  李法能  李法能</p>\n<p> 李法能  李法能  李法能  李法能</p>\n<p> 李法能  李法能  李法能  李法能</p>\n<hr>\n<p><strong>来源《《君臣之道》》</strong></p>\n<p>庚</p>\n<p>卯申亥寅</p>\n<p>大运：40丙辰</p>\n<p>年份：2002</p>\n<p>寅酉绝，寅酉穿血衣，丙辰运，43岁乙酉，妻子车祸死亡。</p>\n<p>444</p>\n<p>坤造：甲壬癸甲</p>\n<p>辰申卯寅</p>\n<p>大运：36戊辰</p>\n<p>年份：1999</p>\n<p>39 岁壬午年丈夫车祸死亡。</p>\n<p>乾造：戊己丙己</p>\n<p>辰未寅亥</p>\n<p>大运：10庚申20辛酉</p>\n<p>年份：19972007</p>\n<p>寅酉绝，寅酉穿血衣，2010年庚寅年外出工作，机器打掉一只胳膊。</p>\n<p>乾造：癸甲甲戊</p>\n<p>卯子寅辰</p>\n<p>大 运 ： 1 0 癸 亥 2 0 壬 戌 3 0 辛 酉</p>\n<p>年份：197219821992</p>\n<p>37 岁酉运98戊寅年，心脏手术开刀。</p>\n<p>气 ( 水 火 ) 不 讲 根 ， 形 ( 金 木 ) 讲 根 。</p>\n<p>金木为体，为身体，有形的，水火土无形。</p>\n<p>水木阳刃若被去，命中无灾反有权。四凶神要被制才好。</p>\n<p>乾造：乙戊己癸</p>\n<p>巳寅丑酉</p>\n<p>大运：31 甲戌4 1 癸酉</p>\n<p>年份 ： 1995 2005 看</p>\n<p>戌运辛巳、壬午年。</p>\n<p>乙生巳，印带官帽，必须和自己产生关系，没有关系不当官，合到主位从政命。</p>\n<p>三合一定要注意中神，自己不在中神为副职，酉是正，其他为副。</p>\n<p>有官进公门，但是有2 次婚姻。</p>\n<p>妻宫被合走，劫去合财，老婆有外情，还骗钱。</p>\n<hr>\n<p><strong>来源《祝国英天人接命理授徒讲义》</strong></p>\n<p>则。</p>\n<p>后天风水中如阴宅阳宅格局的阴阳关系是平衡为吉：不平衡如青龙低矮白</p>\n<p>虎高大就是阴克阳而男人不吉。此种情况如果是阳宅，此时把青龙方的建筑物</p>\n<p>改建成与白虎方建筑物同样高大就实现了阴阳平衡而治好了男人受克制的病。</p>\n<p>八字预测技法中的阴阳关系却与此相反，完全平衡的八字即木火与金水力量相</p>\n<p>当的八字是最大的病，肯定不是富贵命，所以才有地支阴阳三制一一般都是富</p>\n<p>贵命之说。八字预测的阴阳之间只有克制，没有平衡之说。要注意的是“日干</p>\n<p>中和、偏旺偏弱”之类与本节说的阴阳平衡是风马牛。</p>\n<p>制用做功的主要作用方式包括刑、冲、合、害、克、晦、脆、生等，另外</p>\n<p>扶、泄、耗、破等也有制用之功，只不过相比之下功小而已。但必须要明确的</p>\n<p>是，制用做功中最根本的做功点是阴制阳或阳制阴，就是同是刑冲合害，如果</p>\n<p>阳刑阳如未刑戌则无制用之功，丑刑戌则有制用之功；合也是如此，如辰酉合、</p>\n<p>卯戌合则无制用之功，巳申合、寅丑合则肯定有制用之功等等。</p>\n<p>制用做功分为典型制用做功与一般制用两种方式。典型制用方式就是地支</p>\n<p>三阴制一阳或三阳制一阴的格局，此时不论天干如何。这类八字阴或阳一方明</p>\n<p>显势大，另一方明显势小，势大一方克制势小一方为功。</p>\n<h2>参见</h2>\n<li>旺衰派·健康</li>\n<li>格局派·健康</li>\n<li>盲派·健康</li>\n<li>神煞·健康</li>\n<li>调候·健康</li>\n<li>病药·健康</li>\n<li>综合·健康</li>\n<li>其他·健康</li>", "source_count": 110, "block_count": 739, "see_also": ["旺衰派·健康", "格局派·健康", "盲派·健康", "神煞·健康", "调候·健康", "病药·健康", "综合·健康", "其他·健康"]}, {"topic": "六亲", "content": "<h2>阴阳 · 六亲</h2>\n<p>共收录 263 条相关内容，来自 72 本书籍。</p>\n<p><strong>来源《《潘昭佑老师新浪微博所有文章》569页副本》</strong></p>\n<p>以阴</p>\n<p>阳平</p>\n<p>衡为</p>\n<p>依据</p>\n<p>，</p>\n<p>都</p>\n<p>以化</p>\n<p>泄旺</p>\n<p>气而</p>\n<p>能通</p>\n<p>比劫</p>\n<p>的字</p>\n<p>的 》黄勇智》</strong></p>\n<p>之象法</p>\n<p>第十节      读伏吟之象法</p>\n<p>第十一节   读合会之象法</p>\n<p>第十二节   读生助之象法</p>\n<p>第十三节   读制化之象法</p>\n<p>第十四节   读脆晦之象法</p>\n<p>第十五节   读墓库之象法</p>\n<p>第十六节   读旬空之象法</p>\n<p>第十七节   读明暗之象法</p>\n<p>第十八节   读刑害之象法</p>\n<p>第十九节   读外应之象法</p>\n<p>第二十节   读标志之象法</p>\n<p>第九课      全面批断八字</p>\n<p>第一节      性情分析</p>\n<p>第二节      学历分析</p>\n<p>第三节      六亲分析</p>\n<p>第四节      婚恋分析</p>\n<p>第五节      子女分析</p>\n<p>第六节      事业分析</p>\n<p>第七节      财运分析</p>\n<p>第八节      健康分析</p>\n<p>第九节      官讼分析</p>\n<p>第十节      详批举例</p>\n<p>附： 命学宝典的学习方法与运用</p>\n<p>第一课      八字的基础知识</p>\n<p>第一节       阴阳五行的知识</p>\n<p>一、何谓阴阳五行。</p>\n<h2>参见</h2>\n<li>旺衰派·六亲</li>\n<li>格局派·六亲</li>\n<li>盲派·六亲</li>\n<li>神煞·六亲</li>\n<li>调候·六亲</li>\n<li>病药·六亲</li>\n<li>综合·六亲</li>\n<li>其他·六亲</li>", "source_count": 72, "block_count": 263, "see_also": ["旺衰派·六亲", "格局派·六亲", "盲派·六亲", "神煞·六亲", "调候·六亲", "病药·六亲", "综合·六亲", "其他·六亲"]}, {"topic": "基础理论", "content": "<h2>阴阳 · 基础理论</h2>\n<p>共收录 158 条相关内容，来自 67 本书籍。</p>\n<p><strong>来源《007-2007.09《四柱乾坤》徐丙昕编》</strong></p>\n<p>4407916 公众号：九鼎学堂</p>\n<p>获取更多最新易学资料 加微信：804407916 公众号：九鼎学堂</p>\n<p>第二十一章死期浅论 317</p>\n<p>命理分析：日主甲木生于丁巳月，年支午火，未戌中所藏</p>\n<p>丁火，巳午未会成火局，皆助火势，火旺可用水调候。而整个</p>\n<p>命局中只见克泄耗，而不见生扶，日主极弱之命，自身不保只</p>\n<p>能从儿火。这时甲木不能再见生扶，忌木助身，如果木来助身</p>\n<p>则凶，当大运乙丑来临，乙木有助身之势，丑未戌构成了三</p>\n<p>刑，又和时柱天克地冲，这些不稳定因素注定了凶险，流年甲</p>\n<p>戌一到，地支一片刑冲混乱，又加辰月，四土刑冲，日主得乙</p>\n<p>与甲的帮扶，起了反叛抗之心，激起土怒，于是驾鹤西去。那</p>\n<p>日主为什么不在74年甲寅流年死去呢，那个运程为甲子，也</p>\n<p>具备了邦身助气运年。子运也冲午，但流年甲寅与命局构成寅</p>\n<p>午戌火局，不但没有帮身而是化火，乙卯流年依然与戌合化</p>\n<p>火，都不至为大灾。</p>\n<p>实例说明，乾造，1961年10月9日（农历八月三十）申</p>\n<p>时生人，死于1991年。</p>\n<p>辛丑戊戌乙亥甲申</p>\n<p>大运：乙未。流年：辛未。</p>\n<hr>\n<p><strong>来源《祝国英天人接命理授徒讲义》</strong></p>\n<p>则。</p>\n<p>后天风水中如阴宅阳宅格局的阴阳关系是平衡为吉：不平衡如青龙低矮白</p>\n<p>虎高大就是阴克阳而男人不吉。此种情况如果是阳宅，此时把青龙方的建筑物</p>\n<p>改建成与白虎方建筑物同样高大就实现了阴阳平衡而治好了男人受克制的病。</p>\n<p>八字预测技法中的阴阳关系却与此相反，完全平衡的八字即木火与金水力量相</p>\n<p>当的八字是最大的病，肯定不是富贵命，所以才有地支阴阳三制一一般都是富</p>\n<p>贵命之说。八字预测的阴阳之间只有克制，没有平衡之说。要注意的是“日干</p>\n<p>中和、偏旺偏弱”之类与本节说的阴阳平衡是风马牛。</p>\n<p>制用做功的主要作用方式包括刑、冲、合、害、克、晦、脆、生等，另外</p>\n<p>扶、泄、耗、破等也有制用之功，只不过相比之下功小而已。但必须要明确的</p>\n<p>是，制用做功中最根本的做功点是阴制阳或阳制阴，就是同是刑冲合害，如果</p>\n<p>阳刑阳如未刑戌则无制用之功，丑刑戌则有制用之功；合也是如此，如辰酉合、</p>\n<p>卯戌合则无制用之功，巳申合、寅丑合则肯定有制用之功等等。</p>\n<p>制用做功分为典型制用做功与一般制用两种方式。典型制用方式就是地支</p>\n<p>三阴制一阳或三阳制一阴的格局，此时不论天干如何。这类八字阴或阳一方明</p>\n<p>显势大，另一方明显势小，势大一方克制势小一方为功。</p>\n<hr>\n<p><strong>来源《《八字读象预测法》黄勇智》</strong></p>\n<p>望大家能够灵活辩证运用， 为批准八字打好基石，这才是我的真正初衷。</p>\n<p>第一节：  日干旺衰的来源</p>\n<p>日干旺衰的来源有三： 一是月令对日干旺衰的影响， 即日干在月令所处旺相 休囚死的原始状态，月支在不受制的情况下，月令对日干旺衰的影响力有 4 成左右 （3－5 成），其它 6 个干支合共占 6 成左右；二是日支、月干、 时干  对日干的五 行生克作用的影响；三是年柱对日干旺衰的影响，它不直接作用日干，而是通过对 月柱的影响而间接影响日干的旺衰，年柱是决定日干是否从弱从旺的关键。时支对 日干的影响微乎其微，它只对日支、时干起损益作用，从而间接作用日干。</p>\n<p>比如：坤造   辛酉   庚子   丁亥   壬寅</p>\n<p>日干丁火生子月处死地，受克伐，有 5 成弱的状态， 日支、月干、时干都是克耗日  干的， 日干有从弱的趋向，是否真的从弱，最后看年柱，年柱双体辛酉财星不帮扶  日干， 日干从弱，此命为从弱格 。有人会问， 时支寅木为日干正印可以生助日干， 这种理解是错误的，在正格八个干支中，时支对日干影响最小，微乎其微，何况时</p>\n<hr>\n<p><strong>来源《冬日暖阳庚子讲课阴阳法核心副本》</strong></p>\n<p>定他也有生克权,弱气只要被生助,被救应，</p>\n<p>它就为肯定，反过来，旺是一定有生克权的。 </p>\n<p>第五条：成地。天地阴阳发生与落实,有来源为发生，有落实为落实,有干找支，</p>\n<p>有支找干，有来源找落实,有地支基础找天干来源。弱气克旺，有可能发生了旺</p>\n<p>气上的吉凶内容，因为你弱气引动了旺气。 </p>\n<p>5 </p>\n<p>第六条：作用。我对年的根本作用。</p>\n<p>202 / 242</p>\n<p>我对年生克作用的好坏,是我的好和坏,我对月的作用是对年的帮助。 </p>\n<p>第七： 以年为体， 所有的吉凶状态都是年气规定的,吉凶程度以月令来看,年为气，</p>\n<p>月为权。年为恒气,为不变，为主体、为根本。代表了祖上的血脉来源。 </p>\n<p>第八，以年为体，月为用,年月成为一个主体状态，规定的全部的变化作用。 </p>\n<p>第九条，动应。 </p>\n<p>年为体为不变,月为用,看年气在各个月的变化。年月为体、为不变,日时为动</p>\n<p>应为变化。 </p>\n<p>日为不变为体 ,时为日的变化 ,时为把你的日的状态再一次规定 ,比如说你是</p>\n<p>甲子，比如说一个甲子日，那么你是什么时辰的甲子日。 </p>\n<p>第十条,年月是社会的,是父母的，日时的干支是你自己的。</p>\n<hr>\n<p><strong>来源《陈朝阳集成象法大成精华版》</strong></p>\n<p>”，用现在的术语是磁 场，称为“磁力”。</p>\n<p>6风气：物质的区域性作用结果即是现象，也可称为“风力”。</p>\n<p>宇宙中的“六大气”代表了所有的物质，就是说物质的本体是“气”，这些 “气”构成了宇宙的全部，宇宙中一切物象都是由气变化而来，由于他们的特性和 作用各不相同，其表现形式也不相同，有的无形无象，有的时现时无，有的形体长 存，就这样构成了复杂的宇宙现象。</p>\n<p>注：上面讲的阴阳二气是按照物质的属性讲的，和现在学科中化学里讲的性质是 一样的，这里的阴性和化学上的‘碱性’相对应，这里的阳性和化学上的'酸性’ 相对应。另外，它与中医上的‘寒，热’也是相对应的，这里的阴性与寒对应，这  里的阳性与热对应。</p>\n<p>六。了解宇宙物质之间的作用关系：</p>\n<p>物质与物质之间不是孤立的，而是有着一定的作用关系，大致可分为：生，克，冲， 合，刑，害。共有六种关系，而这六种关系又分作物象作用和物性作用，也即是后 章节讲解的干支作用关系代表的人事现象。</p>\n<p>第二章 干支基础知识</p>\n<p>一、十天干知识</p>\n<p>所谓天道就是天时，天意，我们常说出门看天，就是这个意思。在八字预测表述中，常用十天干来形容。天乃阳明。</p>\n<hr>\n<p><strong>来源《陈朝阳-《象法大成精华版》盲派高级象法分享版.》</strong></p>\n<p>西方：申藏庚壬戊，酉藏辛，戌藏戊辛丁。西方白虎。</p>\n<p>北方：亥藏壬甲，子藏癸，丑藏己癸辛。北方玄武。</p>\n<p>地支藏天干的歌诀：子中藏癸水，丑藏己癸辛，寅中甲丙戊，卯中乙木逢。辰藏戊 乙癸，巳中丙戊庚，午宫丁己土，未宫己乙丁。申宫庚壬戊，酉中独辛金，戌宫戊 辛丁，亥中壬甲逢。</p>\n<p>象 法 大 成 精 华 版</p>\n<p>第四章  阴阳</p>\n<p>阴阳本无细分，阴中有阳，阳中有阴；阴极变阳，阳极化阴。阴阳既相互对立， 阴阳又彼此互补；只有在相互对立的情况下，才产生阴阳。刚开始先熟悉对立，然 后再运用互补，相生，相克。</p>\n<p>日月 大小  多少 干湿  高低  明暗  长短  软硬  快慢  黑 白</p>\n<p>胖瘦  男女  雌雄  寒暖  冷热  燥湿  喜怒  哀乐  悲喜  忙闲</p>\n<p>凉暖  来去 尖钝  美丑  粗细  俯仰  浮沉  好坏 轻重  前后</p>\n<p>左右  是非 有无  老少  新旧 首尾  始终  宽窄  难易 深浅</p>\n<p>强弱  出 入 开 关 斜正  动静  开合 生 熟 成败 贵贱  爱恨</p>\n<p>生死  贫富 死活  买卖  远 近 增减  安危 松紧  善恶  忠奸</p>\n<hr>\n<p><strong>来源《《潘昭佑老师新浪微博所有文章》569页副本》</strong></p>\n<p>于一</p>\n<p>个太</p>\n<p>极</p>\n<p>之</p>\n<p>中</p>\n<p>，</p>\n<p>即</p>\n<p>没有</p>\n<p>阴</p>\n<p>，</p>\n<p>阳</p>\n<p>不能</p>\n<p>存在</p>\n<p>；</p>\n<p>没</p>\n<p>有阳</p>\n<p>，</p>\n<p>阴</p>\n<p>也不</p>\n<p>存在</p>\n<p>。</p>\n<p>正</p>\n<p>如没</p>\n<p>有乾</p>\n<p>，</p>\n<p>就</p>\n<p>没有</p>\n<p>坤</p>\n<p>，</p>\n<p>没</p>\n<p>有天</p>\n<p>，也</p>\n<p>就没</p>\n<p>有地</p>\n<p>。</p>\n<p>《</p>\n<p>素问</p>\n<p>阴阳</p>\n<p>应象</p>\n<p>大论</p>\n<p>》说</p>\n<p>：</p>\n<p>“</p>\n<p>阴</p>\n<p>在内</p>\n<p>，阳</p>\n<p>守之</p>\n<p>，阳</p>\n<p>在外</p>\n<p>，</p>\n<p>阴</p>\n<p>之使</p>\n<p>也</p>\n<p>。</p>\n<p>”</p>\n<p>因</p>\n<p>此阴</p>\n<p>阳是</p>\n<p>互相</p>\n<p>依存</p>\n<p>，互</p>\n<p>相为</p>\n<p>用的</p>\n<p>。</p>\n<p>五</p>\n<p>、阴</p>\n<p>阳消</p>\n<p>长</p>\n<p>阴</p>\n<p>阳消</p>\n<p>长</p>\n<p>，</p>\n<p>是</p>\n<p>指事</p>\n<p>物和</p>\n<p>现象</p>\n<p>中对</p>\n<p>立着</p>\n<p>的两</p>\n<p>个方</p>\n<p>面</p>\n<p>，</p>\n<p>是</p>\n<p>运动</p>\n<p>变化</p>\n<p>的</p>\n<p>。</p>\n<p>其</p>\n<p>运动</p>\n<p>是以</p>\n<p>彼</p>\n<p>此消</p>\n<p>长的</p>\n<p>形式</p>\n<p>进行</p>\n<p>的</p>\n<p>。</p>\n<p>由</p>\n<p>于阴</p>\n<p>阳两</p>\n<p>个对</p>\n<p>立的</p>\n<p>矛盾</p>\n<p>，</p>\n<p>始</p>\n<p>终处</p>\n<p>在彼</p>\n<p>消此</p>\n<p>长</p>\n<p>、</p>\n<p>此</p>\n<p>进</p>\n<p>彼</p>\n<p>退的</p>\n<p>动态</p>\n<p>平衡</p>\n<p>之中</p>\n<p>，</p>\n<p>才</p>\n<p>能保</p>\n<p>持事</p>\n<p>物的</p>\n<p>正常</p>\n<p>发展</p>\n<p>变化</p>\n<p>。</p>\n<p>《</p>\n<p>系</p>\n<p>辞</p>\n<p>》</p>\n<p>有</p>\n<p>云</p>\n<p>：</p>\n<p>“</p>\n<p>日</p>\n<p>往月</p>\n<p>则</p>\n<p>来</p>\n<p>，</p>\n<p>月</p>\n<p>往日</p>\n<p>则来</p>\n<p>，</p>\n<p>日</p>\n<p>月相</p>\n<p>推而</p>\n<p>明生</p>\n<p>焉</p>\n<p>。</p>\n<p>寒</p>\n<p>往暑</p>\n<p>来</p>\n<p>，</p>\n<p>暑</p>\n<p>往则</p>\n<p>寒来</p>\n<p>，</p>\n<p>寒</p>\n<p>暑相</p>\n<p>推而</p>\n<p>成</p>\n<p>岁</p>\n<p>焉</p>\n<p>。</p>\n<p>”</p>\n<p>所</p>\n<p>谓</p>\n<p>往</p>\n<p>来</p>\n<p>就</p>\n<p>是</p>\n<p>阴</p>\n<p>阳</p>\n<p>消</p>\n<p>长</p>\n<p>，</p>\n<p>白</p>\n<p>天</p>\n<p>变</p>\n<p>黑</p>\n<p>夜</p>\n<p>，</p>\n<p>黑</p>\n<p>夜</p>\n<p>变</p>\n<p>白</p>\n<p>天</p>\n<p>，</p>\n<p>天</p>\n<p>气</p>\n<p>由</p>\n<p>热</p>\n<p>变</p>\n<p>冷</p>\n<p>由</p>\n<p>冷变</p>\n<p>热</p>\n<p>。</p>\n<hr>\n<p><strong>来源《太极阴阳法命理入门（李法能）-2023年》</strong></p>\n<p>，有合兵共讨者，有割地修好者，有嫁妹</p>\n<p>妻敌者，有舍王就侯者，有分邦两制而不扰者，有吞其疆而容其民者。 </p>\n<p>李法能  李法能  李法能  李法能</p>\n<p>李法能  李法能  李法能  李法能</p>\n<p>李法能  李法能  李法能  李法能</p>\n<p>李法能  李法能  李法能  李法能</p>\n<p>李法能  李法能  李法能  李法能</p>\n<p>李法能  李法能  李法能  李法能</p>\n<p>李法能  李法能  李法能  李法能</p>\n<p> 李法能  李法能  李法能  李法能</p>\n<p> 李法能  李法能  李法能  李法能</p>\n<p> 李法能  李法能  李法能  李法能</p>\n<p>李法能——太极阴阳法入门（命理卷） </p>\n<p>购纸质教材微信：duolei1984               ~ 42 ~            学习交流微信：x18711830139</p>\n<p>2.地支相冲 </p>\n<p>地支六冲分别为：子午、卯酉、寅申、巳亥、辰戌、丑未。相冲是正面</p>\n<p>的对抗、冲击，当抵挡不过对方时可以跑掉，故冲还有冲走之意。</p>\n<hr>\n<p><strong>来源《290878529859421民间八字直断精华整理》</strong></p>\n<p>上部。凶星忌</p>\n<p>神在日、时柱的，不雅标志一般在身体的下部，但当力量过大</p>\n<p>或过小时，上下位置会发生变化。</p>\n<p>Y}SÈQhDnQ\u0000 \u0000 \u0000w\u0000w\u0000w\u0000.\u0000h\u0000a\u0000o\u00008\u00004\u00005\u00001\u0000.\u0000c\u0000o\u0000m\u0000 \u0000 SCYWONN÷f\u0013[fDn_®Oá\u0000 ÿ\u001a\u00006\u00006\u00006\u00009\u00007\u00005\u00002\u00006\u0000 \u0000 R燳}S藧\u0001\u00001\u00000\u00000\u00000g,f\u0013[fu5[PNf</p>\n<p>民间八字直断整理精华  </p>\n<li>71 - </li>\n<p>五、 前后、左右按一般书上划分的去论，但必须要参着五行阴阳及</p>\n<p>十神力量大小。</p>\n<p>五行之病:</p>\n<p>肺部疾病(属金)</p>\n<p>肺病，是恼人得来的。什么是恼 ?嫉妒人、记仇、什么事都记在</p>\n<p>心里容易得:气喘、咳嗽、吐血、肺炎、肺结核等。</p>\n<p>心脏疾病(属火)</p>\n<p>心脏病，是从恨上来的。恨人就会伤心，容易得 :心慌、心热、失眠</p>\n<p>多怪梦、咳嗽吐血、癫狂、是语言重了就是精神病等</p>\n<p>脾、胃疾病(属土)</p>\n<p>胃病是从怨上来的，怨人就伤脾，这种人无论发生什么事情，从来不</p>\n<p>找自己毛病，只一味的怨恨他人。把胃伤了，膨胀、胀饱、噎喝、上</p>\n<p>吐下泻、就得上胃病了。</p>\n<p>容易得:胃炎、胃溃疡、胃黏膜脱落、十二指肠、最后就是胃癌等。</p>\n<hr>\n<p><strong>来源《千里命稿 (1)》</strong></p>\n<p>防)。</p>\n<p>火</p>\n<p>原始       南方阳极而生热，热乃生火。</p>\n<p>性          属太阳，炎上。</p>\n<p>体          积阳之热气反者为火，火虽阳物，阴在其内，故火体内暗。 质          炽烈。</p>\n<p>天干        丙 丁属火。</p>\n<p>地支       巳午属火 。</p>\n<p>地藏        巳午未寅戌中 皆 藏火。</p>\n<p>生克       受木之生，生火，为水所克，克金。</p>\n<p>种类       火分六类，和有喜忌。</p>\n<p>(一)强火，当令或繁盛为强，喜金分力、水相济、土泄秀，忌木生火、火加重。  ( 二 ) 弱火，失令或稀少为弱，喜木生火、火 比助，忌金分力、水 克 熄 、土 掩晦。 ( 三 ) 炽火，木多易晦，喜金制木，忌水助木。</p>\n<p>(四)晦火，土多易晦，喜金泄土、木制土，忌火生土、土坚重。 ( 五 ) 熄火，金多易熄，喜木生火，忌金加重。</p>\n<p>( 六 ) 灭火，水多易灭，喜土制水存火、木泄水生火，忌金助水、水盛旺。 四 季火之喜忌</p>\n<p>土</p>\n<p>原始       中央属阴阳交而生湿，湿乃生土。</p>\n<p>性</p>\n<p>体</p>\n<p>质</p>\n<p>天干 地支 支藏 生克 种类</p>\n<h2>参见</h2>\n<li>旺衰派·基础理论</li>\n<li>格局派·基础理论</li>\n<li>盲派·基础理论</li>\n<li>神煞·基础理论</li>\n<li>调候·基础理论</li>\n<li>病药·基础理论</li>\n<li>综合·基础理论</li>\n<li>其他·基础理论</li>", "source_count": 67, "block_count": 158, "see_also": ["旺衰派·基础理论", "格局派·基础理论", "盲派·基础理论", "神煞·基础理论", "调候·基础理论", "病药·基础理论", "综合·基础理论", "其他·基础理论"]}, {"topic": "大运", "content": "<h2>阴阳 · 大运</h2>\n<p>共收录 103 条相关内容，来自 46 本书籍。</p>\n<p><strong>来源《01-金镖门老人参辛丑弟子班笔记上册（341页）》</strong></p>\n<p>—</p>\n<p>用神无力，这叫做弃x 就 x;</p>\n<p>还有，木火，金水，他们各是一伙的，有时候他们不必分 的那么清楚。</p>\n<p>如木火为用，或金水为用，如木火为用，命里土把火泄过 了，或者水把火克过了，这时候就</p>\n<p>用木了，因为火没力量了。</p>\n<p>就是如果把其中的一个克泄坏了，就以另外的一个为用神。</p>\n<p>竹臣你昨夜发我那八字发过来。</p>\n<p>乾造：</p>\n<p>丁 癸 丙 丙</p>\n<p>卯 卯 子 申</p>\n<p>这命都知道用神是啥吧</p>\n<p>不忘初心 有印有比身旺</p>\n<p>静悟 没错，身旺，不屑于争议，凭啥说身弱 东离 我以为身强旺是靠着自身</p>\n<p>的，不是靠印的</p>\n<p>静悟 睁眼说瞎话，这是多少木火，还有气势有位置</p>\n<p>虚致 春月生火有帮扶</p>\n<p>静悟 金水为用不屑于任何争议吧，此时，锁定金 水，再确定一下是用金还是用水的</p>\n<p>问题，咋确定，看关系</p>\n<p>不忘初心 用金 静悟 没错</p>\n<p>虚致 水坏了，用金</p>\n<p>静悟 水都让木火贴着化了，没错，全指着金呢，</p>\n<p>此时就锁定申金为用。</p>\n<p>东离 申金还被丙火克了呢</p>\n<p>静悟 所以就是破格了，此时锁定申金为用，一切围 绕用神判断吉凶喜忌，一切围绕申金，</p>\n<p>大运解决申金被克就好。</p>\n<hr>\n<p><strong>来源《007-2007.09《四柱乾坤》徐丙昕编》</strong></p>\n<p>4407916 公众号：九鼎学堂</p>\n<p>获取更多最新易学资料 加微信：804407916 公众号：九鼎学堂</p>\n<p>第二十一章死期浅论 317</p>\n<p>命理分析：日主甲木生于丁巳月，年支午火，未戌中所藏</p>\n<p>丁火，巳午未会成火局，皆助火势，火旺可用水调候。而整个</p>\n<p>命局中只见克泄耗，而不见生扶，日主极弱之命，自身不保只</p>\n<p>能从儿火。这时甲木不能再见生扶，忌木助身，如果木来助身</p>\n<p>则凶，当大运乙丑来临，乙木有助身之势，丑未戌构成了三</p>\n<p>刑，又和时柱天克地冲，这些不稳定因素注定了凶险，流年甲</p>\n<p>戌一到，地支一片刑冲混乱，又加辰月，四土刑冲，日主得乙</p>\n<p>与甲的帮扶，起了反叛抗之心，激起土怒，于是驾鹤西去。那</p>\n<p>日主为什么不在74年甲寅流年死去呢，那个运程为甲子，也</p>\n<p>具备了邦身助气运年。子运也冲午，但流年甲寅与命局构成寅</p>\n<p>午戌火局，不但没有帮身而是化火，乙卯流年依然与戌合化</p>\n<p>火，都不至为大灾。</p>\n<p>实例说明，乾造，1961年10月9日（农历八月三十）申</p>\n<p>时生人，死于1991年。</p>\n<p>辛丑戊戌乙亥甲申</p>\n<p>大运：乙未。流年：辛未。</p>\n<hr>\n<p><strong>来源《真宗子平格局法》</strong></p>\n<p>能有几个当正处级或以上的?比例是多少?)</p>\n<p>就如你所说葛参政的八字，那么多问题，还不是贵了而且很贵。</p>\n<p>(那个古八字，可贵在先天成格用神，通过地支的正确搭配作用，而得以保存下来而成格。 子午冲解午卯之穿，同时午冲空亡之支论解空而不坏月令真神。自然是病中有救贵禄相随， 例子要多参详，不能简单的把自己去类比，魔鬼都在细节中，命理的关键是在你是不是对  最基础的知识有正确掌握和应用),</p>\n<p>通过看呆的东西现在拿捏程度只不过是个大概，非常模糊。且不说后天岁运。你看看地支 关系，冲合刑害破，他全说很重要，试问地支里面没有上诉关系的有几个搭配?这个拿捏 没有经验根本谈不上论分量。</p>\n<p>(这里想起 test   老师的一句话“各自爬山吧”,境界不同后眼光自然就会变得不同)</p>\n<p>对真宗的夹拱、虚神诀都是首次听闻，发一造请鬼大师和大家评评： 下元乾造</p>\n<p>庚辰甲申甲辰辛未</p>\n<p>8乙酉18丙戌28丁亥38戊子48己丑58庚寅68辛卯78壬辰88癸巳</p>\n<p>就用笨笨的真宗子平来拆下命格：庚辰甲申甲辰辛未</p>\n<hr>\n<p><strong>来源《子平烛观》</strong></p>\n<p>这个八字上，</p>\n<p>生在戌时头的，此流年克父偏才星，数在子月。 生在戌时中，人品不好，但流年平安没大碍。</p>\n<p>生在戌时尾，命数福禄更不济，此年是要破财克妻，数在午月。单单用子平术看八字只是 种普及型的粗看法，不能象铁版再精确入刻分，也没兼顾到祖坟风水和其他的因素，,所以 也不能对一种初步的工具太过苛求，,所探讨的时辰三分部份也是属于传统的子平习惯用法 范围，只是具体用法从没见公开的书上记载过罢了，民间传承的命家多数都讲究这点。子 平旧书上教人的，顶多讲到月令要分日来扣实，来厘定格或局，对时辰用法部分都不讲， 天生的，是偏财甲木当令(注意这个甲木不是讲人元)。遇到这个辛亥辛巳的破局岁运时， 看具体应事时辰的头尾不同，就容易有不同倾向2比如这个乾造，节后。生在时辰头的，时 支中当令的主气，对月气中的偏财甲木，有绝大多数的决定能力。所以懂得厘定时头中尾 的不同主气，有时对某些细节有大帮助。</p>\n<p>四柱八字是由两个区块组成的， 一个是由年遁出月， 一个是由日遁出时</p>\n<hr>\n<p><strong>来源《《潘昭佑老师新浪微博所有文章》569页副本》</strong></p>\n<p>应之</p>\n<p>字</p>\n<p>，</p>\n<p>而</p>\n<p>不需</p>\n<p>要去</p>\n<p>学什</p>\n<p>么</p>\n<p>“</p>\n<p>结</p>\n<p>局朝</p>\n<p>元</p>\n<p>、</p>\n<p>实</p>\n<p>神到</p>\n<p>位</p>\n<p>”</p>\n<p>等</p>\n<p>不成</p> 婚姻</li>\n<li>病药·婚姻</li>\n<li>综合·婚姻</li>\n<li>其他·婚姻</li>", "source_count": 102, "block_count": 537, "see_also": ["旺衰派·婚姻", "格局派·婚姻", "盲派·婚姻", "神煞·婚姻", "调候·婚姻", "病药·婚姻", "综合·婚姻", "其他·婚姻"]}, {"topic": "学业", "content": "<h2>阴阳 · 学业</h2>\n<p>共收录 212 条相关内容，来自 66 本书籍。</p>\n<p><strong>来源《子平真诠本义精简版》</strong></p>\n<p>拘泥外格为活变；论生克，则不察喜忌，而以伤旺扶弱为定法；论行运，则不问同中有异，而以干支相类为一例。</p>\n<p>解读：以八字算命是有定理和法则的。有些人不得真传，不知道正宗的子平命理及其法则，便胡编乱造一些似是而非的命理和法则，弄得命学界歪理当道，邪说横行。千千万万的后学者没有能力辨别是非，妄听妄信妄传，现在已经达到了积重难返的地步了。</p>\n<p>比如论干支，就不知道干支的阴阳之理，而以所谓的“体象歌诀”来论干支，说什么甲木为参天大木，宜斫削，而乙木是花草弱木，宜生扶等等，都是乱弹琴。</p>\n<p>比如论格局，则不知道要专从月令取用定格，而是随便到处取用神定格局，还说这是活变！特别是现在好多人，连用神的概念都还没有弄清楚，哪里就谈得上活变呢！</p>\n<p>比如论生克，则不从格局上着眼，总是只按旺则宜克，弱则宜扶的死法来论命，只讲八字五行的平衡与流通，不讲八字格局的成败与高低，你看旺，我看衰，瞎猜胡断。</p>\n<p>比如论行运，则不问是甲还是乙，是寅还是卯，只看干支都属木，就以木来论喜忌，而不知有时候甲木破格而乙木成格，有时候则寅木成格而卯木破格，没有看到某些细节的不同会导致整体格局的变化。</p>\n<hr>\n<p><strong>来源《太极阴阳法命理入门（李法能）-2023年 (1)》</strong></p>\n<p>李法能  李法能</p>\n<p> 李法能  李法能  李法能  李法能</p>\n<p> 李法能  李法能  李法能  李法能</p>\n<p>李法能——太极阴阳法入门（命理卷） </p>\n<p>购纸质教材微信：duolei1984               ~ 148 ~            学习交流微信：x18711830139 </p>\n<p>造 辰 丑 寅 巳 </p>\n<p>戊土命元生于丑月值己土司令， 得天时， 又得辰、 巳、 丁三势，身旺极。 </p>\n<p>思考：失时得四势是身太旺还是身旺极？得时失势有可能身弱极吗？</p>\n<hr>\n<p><strong>来源《007-2007.09《四柱乾坤》徐丙昕编》</strong></p>\n<p>4407916 公众号：九鼎学堂</p>\n<p>获取更多最新易学资料 加微信：804407916 公众号：九鼎学堂</p>\n<p>第二十一章死期浅论 317</p>\n<p>命理分析：日主甲木生于丁巳月，年支午火，未戌中所藏</p>\n<p>丁火，巳午未会成火局，皆助火势，火旺可用水调候。而整个</p>\n<p>命局中只见克泄耗，而不见生扶，日主极弱之命，自身不保只</p>\n<p>能从儿火。这时甲木不能再见生扶，忌木助身，如果木来助身</p>\n<p>则凶，当大运乙丑来临，乙木有助身之势，丑未戌构成了三</p>\n<p>刑，又和时柱天克地冲，这些不稳定因素注定了凶险，流年甲</p>\n<p>戌一到，地支一片刑冲混乱，又加辰月，四土刑冲，日主得乙</p>\n<p>与甲的帮扶，起了反叛抗之心，激起土怒，于是驾鹤西去。那</p>\n<p>日主为什么不在74年甲寅流年死去呢，那个运程为甲子，也</p>\n<p>具备了邦身助气运年。子运也冲午，但流年甲寅与命局构成寅</p>\n<p>午戌火局，不但没有帮身而是化火，乙卯流年依然与戌合化</p>\n<p>火，都不至为大灾。</p>\n<p>实例说明，乾造，1961年10月9日（农历八月三十）申</p>\n<p>时生人，死于1991年。</p>\n<p>辛丑戊戌乙亥甲申</p>\n<p>大运：乙未。流年：辛未。</p>\n<hr>\n<p><strong>来源《易理案例解释》</strong></p>\n<p>随，只因月印的力量不同，</p>\n<p>导致层次的天地差别</p>\n<p>禄印相随好福气，不被坏的（刑冲……）还容易进入其贵格。印在月的力量是很重要的，因</p>\n<p>为它决定了层次的高低，印在月有力对于禄印格来说是文凭高，如果无力的话就文化低了，</p>\n<p>这样不利于权利晋升，层次就降低了。</p>\n<p>乾造，癸丑，癸亥，乙卯，丁亥</p>\n<p>乙卯日，乙木坐卯禄，遇到月时亥印，没有财官来坏，成禄印格，日主有根有水是活木，活</p>\n<p>木喜火喜水，特别喜欢月柱水印有力，印是喜神有力文凭高，月亥再生卯禄（这时禄可以代</p>\n<p>表权），局主可用知识去取禄权，格局很纯属于贵格。</p>\n<p>乾造，乙卯，癸未，乙卯，丁亥</p>\n<p>同为乙卯日柱，同样是禄印相随，而此造月干癸水印确是虚透无力的，按宫位理论年月主早，</p>\n<p>读书的时间段在这两个时间里，当印是用神时最怕虚透无力了，弱印在原局里表文凭不高，</p>\n<p>局主不能用知识去追求权禄了，这样层次就低下来。很多人认为是财克印，未土在地是克不</p>\n<p>了天上的癸水，只能说印水不给力，早年吸收的知识少，不能靠少量的知识更上一层楼。</p>\n<hr>\n<p><strong>来源《八字命理秘传【我好疼你啊我要嫁给你版】》</strong></p>\n<p>讲究留白，甚至何处落款何处用印都要配合整体的效果和美感。</p>\n<p>207</p>\n<p>AAKK0088800加微信进群聊</p>\n<p>四为壬学片程</p>\n<p>中国的古代先哲们没有像希腊哲学家那样，把主要的精力和智慧用在对自然</p>\n<p>界的思考上。中国先哲们把宇宙作为一个整体去思考，是宇宙生生不息的无</p>\n<p>限过程，强调万物存在的变化的连续性与不可分割的整体性。</p>\n<p>从大的方面说，宇宙是一个整体，人、自然和社会也都是一个整体。整</p>\n<p>体中包含有许多部分，各部分之间有密切的联系，因而构成的一个整体。人</p>\n<p>存在于天地之中，与天地息息相通，天地是个大宇宙，人是一个小宇宙。这</p>\n<p>个大宇宙是由阴阳二气以及由阴阳二气生化出来的五行所构成，它按照自己</p>\n<p>的法则运行着。人的“初察”的命造，也是由阴阳和五行所构成的。它是宇</p>\n<p>宙运行的片断复制，也是宇宙运行片断的缩影。这具体表现在每一个命造结</p>\n<p>构中，其阴阳五行要素的势力对比，都是由出生时天地间五行“旺相休囚</p>\n<p>死”的情况所规定的。而且，一旦命造结构作为一个存在的实体，正如人降</p>\n<p>生到这个世界上来了以后，它依旧处在大宇宙的运行环境之中。 “命”是通</p>\n<p>过跟“运”即由大运和流年等组成的环境的相互作用，展现出丰富多彩的人</p>\n<p>生起伏轨迹来。</p>\n<hr>\n<p><strong>来源《八字命理秘传【我好疼你啊我要嫁给你版】》</strong></p>\n<p>水流不止，须土以拥之；火盛无依，惟水以</p>\n<p>济之。五行用得其直，虽相克而为福；若用失其宜，虽相生而为灾。</p>\n<p>凡五行过多而相件，如禄多则贫，马多则病，印多则孤，库多则</p>\n<p>闭，生旺多</p>\n<p>无归宿，死绝多无激扬。五行不可太相安，不可太纯粹。</p>\n<p>贵人马多，升擢；常人马多，奔驰；破要伤祸，空要空尽；所爱者不</p>\n<p>可毁，所畏者不可旺；先畏后爱为福，先爱后畏为祸；合多不发而媚，</p>\n<p>学堂多则无成；贵人多则巽懦而无立志，禄马太显不可以贵人论；贵</p>\n<p>人表里足，不可以常人论；四柱俱阳，口恶心善；四柱俱朗，狠戾沉</p>\n<p>毒，拱要拱马、拱禄、拱贵、拱福神，不要拱刑，拱祸、拱岁、拱时，</p>\n<p>阴阳贵在均协，病伤要有克制。</p>\n<hr>\n<p><strong>来源《陈朝阳集成象法大成精华版》</strong></p>\n<p>”，用现在的术语是磁 场，称为“磁力”。</p>\n<p>6风气：物质的区域性作用结果即是现象，也可称为“风力”。</p>\n<p>宇宙中的“六大气”代表了所有的物质，就是说物质的本体是“气”，这些 “气”构成了宇宙的全部，宇宙中一切物象都是由气变化而来，由于他们的特性和 作用各不相同，其表现形式也不相同，有的无形无象，有的时现时无，有的形体长 存，就这样构成了复杂的宇宙现象。</p>\n<p>注：上面讲的阴阳二气是按照物质的属性讲的，和现在学科中化学里讲的性质是 一样的，这里的阴性和化学上的‘碱性’相对应，这里的阳性和化学上的'酸性’ 相对应。另外，它与中医上的‘寒，热’也是相对应的，这里的阴性与寒对应，这  里的阳性与热对应。</p>\n<p>六。了解宇宙物质之间的作用关系：</p>\n<p>物质与物质之间不是孤立的，而是有着一定的作用关系，大致可分为：生，克，冲， 合，刑，害。共有六种关系，而这六种关系又分作物象作用和物性作用，也即是后 章节讲解的干支作用关系代表的人事现象。</p>\n<p>第二章 干支基础知识</p>\n<p>一、十天干知识</p>\n<p>所谓天道就是天时，天意，我们常说出门看天，就是这个意思。在八字预测表述中，常用十天干来形容。天乃阳明。</p>\n<hr>\n<p><strong>来源《太极阴阳法命理入门（李法能）-2023年》</strong></p>\n<p>，有合兵共讨者，有割地修好者，有嫁妹</p>\n<p>妻敌者，有舍王就侯者，有分邦两制而不扰者，有吞其疆而容其民者。 </p>\n<p>李法能  李法能  李法能  李法能</p>\n<p>李法能  李法能  李法能  李法能</p>\n<p>李法能  李法能  李法能  李法能</p>\n<p>李法能  李法能  李法能  李法能</p>\n<p>李法能  李法能  李法能  李法能</p>\n<p>李法能  李法能  李法能  李法能</p>\n<p>李法能  李法能  李法能  李法能</p>\n<p> 李法能  李法能  李法能  李法能</p>\n<p> 李法能  李法能  李法能  李法能</p>\n<p> 李法能  李法能  李法能  李法能</p>\n<p>李法能——太极阴阳法入门（命理卷） </p>\n<p>购纸质教材微信：duolei1984               ~ 42 ~            学习交流微信：x18711830139</p>\n<p>2.地支相冲 </p>\n<p>地支六冲分别为：子午、卯酉、寅申、巳亥、辰戌、丑未。相冲是正面</p>\n<p>的对抗、冲击，当抵挡不过对方时可以跑掉，故冲还有冲走之意。</p>\n<hr>\n<p><strong>来源《祝国英天人接命理授徒讲义》</strong></p>\n<p>的</p>\n<p>火制不了水库辰，当然更不能生，申酉与辰都是合的关系，合就是合二为一，</p>\n<p>此时制了申酉就是制了辰了。亥子都是水，都是辰中出来的，成势的火一直在</p>\n<p>等着呢，出来就制了。行丑运也吉，丑是湿土是水的余气。戌冲辰也是癸水出</p>\n<p>库被制，只是因为局中功神火入大运墓制的效果没有其它出来的运好而已。</p>\n<p>乾造 乙巳 庚辰 戊午 甲寅 某著名易学家八字</p>\n<p>木火成势制辰中水。原局水遁藏在辰库中，巳午火无法制，只有水出现在</p>\n<p>大运才能制住。丁丑大运水到了，命主此运不仅开始发财，且瞬间名动天下；</p>\n<p>丁丑大运的丙子年运作，丁丑年就开始发财了，后来一路发起来；当时命主发</p>\n<p>财的势头之猛，发财之快，不是亲眼所见简直很难相信的。丙子大运癸水从辰</p>\n<p>中出来，命主更是天财横发。现为亿万富翁。</p>\n<p>当然，这也是个寅生午，午生日干的化用做功八字，命主己卯、戊寅运学</p>\n<p>习成绩突出，且考取军校，在部队做的也是顺风顺水。相比之下，还是制辰的</p>\n<p>功事业成绩大。</p>\n<p>乾造 乙巳 庚辰 丙午 甲午</p>\n<p>类似上面的八字，局中火成势制辰中水。大运丁丑，财运不错；大运丙子，</p>\n<p>名气、财利简直一日千里。</p>\n<hr>\n<p><strong>来源《太极阴阳法命理入门（李法能）-2023年》</strong></p>\n<p>李法能  李法能</p>\n<p> 李法能  李法能  李法能  李法能</p>\n<p> 李法能  李法能  李法能  李法能</p>\n<p>李法能——太极阴阳法入门（命理卷） </p>\n<p>购纸质教材微信：duolei1984               ~ 92 ~            学习交流微信：x18711830139 </p>\n<p>工厂、店铺、车船、衣帽、床被、营帐等； </p>\n<p>（3）知识、书籍、技术、学术、艺术、文章、文凭、 </p>\n<p>文件、 契约、 合同、 印章、 广告、 商标、 旗帜、 徽章等； </p>\n<p>（4）文化机构、福利机构、教育机构、文艺机构、宣</p>\n<p>传机构、宗教机构、慈善机构等。 </p>\n<p>3 行为特性 </p>\n<p>（1）读书学习、研究技艺、修心养性、休息睡觉、滋</p>\n<p>补身体、文过饰非； </p>\n<p>（2）得到长辈支持、遇到贵人提携、从事慈善活动、</p>\n<p>参加宗教组织、购置房子、 车船、 店面、 书画、 营养品； </p>\n<p>（3）受到母亲的训斥、感到长辈的束缚、放弃读书学</p>\n<p>习的机会、上当受骗而破财、投资失误而亏本等等。</p>\n<h2>参见</h2>\n<li>旺衰派·学业</li>\n<li>格局派·学业</li>\n<li>盲派·学业</li>\n<li>神煞·学业</li>\n<li>调候·学业</li>\n<li>病药·学业</li>\n<li>综合·学业</li>\n<li>其他·学业</li>", "source_count": 66, "block_count": 212, "see_also": ["旺衰派·学业", "格局派·学业", "盲派·学业", "神煞·学业", "调候·学业", "病药·学业", "综合·学业", "其他·学业"]}, {"topic": "寿命", "content": "<h2>阴阳 · 寿命</h2>\n<p>共收录 117 条相关内容，来自 46 本书籍。</p>\n<p><strong>来源《易理案例解释》</strong></p>\n<p>而开始变衰，虽然自己想从政</p>\n<p>（申拱辰官杀库），奈何辰弱又被丙戌冲（表竞争大），最终没有重振世家荣耀。</p>\n<p>知道辰是寿星还是原局核心，就来解读先生反馈的情况，逢印木时好点，这木可不是生日主</p>\n<p>的，因为丙的根因为反吟而连接不上，丙成了天火太阳，所以不是生日干，而是冲合申财，</p>\n<p>这样申就不泄辰，辰好自然就好了。遇庚申辛酉子亥时，都是泄的就不好了，病倒还破财。</p>\n<p>戊戌运，戌是原局反吟忌神，辰戌冲，辰受伤的应期到了，戊子流年子水入局三合化水，原</p>\n<p>本受伤的食被一合就走了，所以此年驾</p>\n<p>不是食神制杀不了，而是宾位食不是自己的，</p>\n<p>日主靠自合官星取贵</p>\n<p>乾造，乙亥，己丑，癸巳，丁巳</p>\n<p>癸巳日，原局有食神制杀，如果制的好那就是武贵，按位置看可入朝（年柱有用），看袁大</p>\n<p>头的:己未，癸酉，丁巳，丁未，就是这样的位置。</p>\n<p>按理说乙食把己杀制好了，局主应该武贵，可现实却是文贵，怎么回事？</p>\n<p>有的说杀有根还有财生制不好，其实丑是湿土不怎么帮土的，就算有巳火生，可丑紧贴亥水，</p>\n<p>生过来也不能让丑成燥土去帮己。</p>\n<hr>\n<p><strong>来源《曲炜四柱详真》</strong></p>\n<p>人、女人，即阳为男，阴为女。即然四柱是用来测人生的，测生活在现实生活中的人，那么五行理论必须与现实生</p>\n<p>活中男女(阴阳)实际关系相一致，这样才能正确反映现实。</p>\n<p>“同性相斥，异性相吸”是人人皆知的真理，是现实社会中万事万物普遍规律，同性气场不合有一种排斥力，因而关系不合谐，异性气场</p>\n<p>相吸，因而有一种亲合力，能够情投意合，如胶似漆。正如社会中的</p>\n<p>男人与女人之间，男人与男人之间，女人与女人之间，亲合力最大的</p>\n<p>关系是男人与女人之间的关系，只有此二者之间才可以达到亲密无</p>\n<p>间，生死与共，为了对方能牺牲自己或是事业或是全身心付出自己全</p>\n<p>部的爱与力量，而同性之间的亲合力及为对方付出程度与之不能相</p>\n<p>比。虽古有刘、关、张三结义，然真正象此种关系，世上能有几人?</p>\n<p>他不具有代表性和普遍性。世界上现实生活中为爱为情倾心付出，甚</p>\n<p>至不惜一切代价的男女之情比比皆是，试想想又有几个男的为了另</p>\n<p>个男的象男女之情一样那么真心情愿付出?我们从世上男女之间婚</p>\n<p>姻恋爱这一普遍现象，可以看阴阳相生是情愿相生，情愿付出，这种</p>\n<p>相生力能不大吗。不是情愿相生，带有同性排斥性的给予，又能给予</p>\n<hr>\n<p><strong>来源《陈朝阳-《象法大成精华版》盲派高级象法分享版.》</strong></p>\n<p>西方：申藏庚壬戊，酉藏辛，戌藏戊辛丁。西方白虎。</p>\n<p>北方：亥藏壬甲，子藏癸，丑藏己癸辛。北方玄武。</p>\n<p>地支藏天干的歌诀：子中藏癸水，丑藏己癸辛，寅中甲丙戊，卯中乙木逢。辰藏戊 乙癸，巳中丙戊庚，午宫丁己土，未宫己乙丁。申宫庚壬戊，酉中独辛金，戌宫戊 辛丁，亥中壬甲逢。</p>\n<p>象 法 大 成 精 华 版</p>\n<p>第四章  阴阳</p>\n<p>阴阳本无细分，阴中有阳，阳中有阴；阴极变阳，阳极化阴。阴阳既相互对立， 阴阳又彼此互补；只有在相互对立的情况下，才产生阴阳。刚开始先熟悉对立，然 后再运用互补，相生，相克。</p>\n<p>日月 大小  多少 干湿  高低  明暗  长短  软硬  快慢  黑 白</p>\n<p>胖瘦  男女  雌雄  寒暖  冷热  燥湿  喜怒  哀乐  悲喜  忙闲</p>\n<p>凉暖  来去 医学理论与五行理论一脉相通。所以，中医十分重视阴阳五行的研究，以前很多老中医先生就懂易学。</p>\n<p>天干地支所代表的脏腑及人体部位无论是在命理的研究中，还是在风水的应用中，都会很实用。</p>\n<p>天干地支所代表的脏腑：</p>\n<p>甲肝乙胆丙小肠，丁心戊胃己脾乡，庚是大肠辛属肺；壬是膀胱癸肾藏。</p>\n<hr>\n<p><strong>来源《王庆探8探索门命理学象法班笔记2014-王庆1730037215》</strong></p>\n<p>阳的首席 代表，所以，认识了阴阳以后，可以直接把五行当阴阳看，也可以直接把阴阳代入 人、事、物来看。</p>\n<p>由此,阴阳不再抽象，阴阳就是五行，阴阳就是生和成，阴阳就是具体的人、事、物。</p>\n<p>阴阳论命的轮廊已明朗，先把八字中的所有元素都对应成阴阳，然后再把阴 阳演化成具体的人事物，包括富贵贫贱、寿夭吉凶、工作职业、成败得失，最后用 子平阴阳论命的四大法则来取象、断吉凶。人生万象，随即而出。</p>\n<p>阴阳四大法则：中和法则、阴阳法则、吉凶法则、太极法则，为子平论命秘中 之秘，但其使用的前提是先要明了阴阳的本象、成象和败象，阴和阳各代表什么 人事物、成时显何象出何吉、败者又显何象出何凶，结果一目了然,论命就如此的 简洁。</p>\n<p>一、阳本象</p>\n<p>气、光、能、热、暖、功能、效率、作用、价值、成熟、成就。</p>\n<p>健康、活力、美丽、成长、力量、生命。</p>\n<p>刚、进、顺、动、明、显、亮。</p>\n<p>白天、光明、合理、秩序、透明、公平、公正、自由、民主。</p>\n<p>智慧、直接、释放、奉献。</p>\n<p>传统、传承、当下。</p>\n<p>稳定、安全、整洁、舒适、温暖。</p>\n<p>亲情、福气、靠山、福荫、衣食。</p>\n<p>文化、艺术、文明、教育。</p>\n<p>保健、休闲、安逸、轻松、快乐。</p>\n<hr>\n<p><strong>来源《《君臣之道》》</strong></p>\n<p>为女，伤为子，有刑为互换)。</p>\n<p>辛巳一柱，巳中丙火与辛是天合地合，丙辛化水、可以产生水。</p>\n<p>水为子女星。</p>\n<p>164</p>\n<p>为什么庚申年也有过?因为巳申也是化水的。</p>\n<p>那为什么又掉了呢?局里寅巳申三刑刚好那年产生，能不流掉?</p>\n<p>酉为辛的根，代表来了个女的坐在巳火上，就是在男人的怀抱里。</p>\n<p>时很好，有一个好的归宿，人一生不都是为了向时靠拢。</p>\n<p>时柱看晚年运和总运势，那要是一个人短命而时柱又很好的话，代表了什么呢?</p>\n<p>这代表无福享受。</p>\n<p>坤：癸乙己庚</p>\n<p>丑卯未午</p>\n<p>五行趋于一方，相反的就是异性是配偶星。</p>\n<p>此局木火成势，庚就是异性，所以庚当夫看。</p>\n<p>阴阳是最重要的东西。</p>\n<p>乾：庚甲壬戊</p>\n<p>午申子申</p>\n<p>一片金水，此时戊土也是阴的，不能拿戊土当星了。</p>\n<p>家里没有外面找，外面的午火是星。</p>\n<p>全局都是阴的，肯定要找这个午火。</p>\n<p>乾：己己丁癸</p>\n<p>亥巳未卯</p>\n<p>家里癸水是星。</p>\n<p>看财杀癸水是，看阴阳也是，所以癸水直接就定位了。</p>\n<p>下一步就是找到癸是哪年来的?</p>\n<p>二十多岁，三十多岁，没来星，有个印：有印来就是家来了，水来了的年头结</p>\n<p>婚。</p>\n<p>是否离婚命，其本质是，夫妻两人的缘分是否走到了尽头，若缘分已尽，必然</p>\n<p>离婚。</p>\n<hr>\n<p><strong>来源《《潘昭佑老师新浪微博所有文章》569页副本》</strong></p>\n<p>中又</p>\n<p>以阴</p>\n<p>阳二</p>\n<p>气的</p>\n<p>性质</p>\n<p>和旺</p>\n<p>衰来</p>\n<p>区分</p>\n<p>生命</p>\n<p>被损</p>\n<p>的方</p>\n<p>式</p>\n<p>。</p>\n<p>详</p>\n<p>见《</p>\n<p>论夭</p>\n<p>寿</p>\n<p>》</p>\n<p>。</p>\n<p>4</p>\n<p>8</p>\n<p>0</p>\n<p>*</p>\n<p>、</p>\n<p>论婚</p>\n<p>姻</p>\n<p>论</p>\n<p>婚姻</p>\n<p>首先</p>\n<p>确定</p>\n<p>婚姻</p>\n<p>存在</p>\n<p>的形</p>\n<p>式和</ 调候·寿命</li>\n<li>病药·寿命</li>\n<li>综合·寿命</li>\n<li>其他·寿命</li>", "source_count": 46, "block_count": 117, "see_also": ["旺衰派·寿命", "格局派·寿命", "盲派·寿命", "神煞·寿命", "调候·寿命", "病药·寿命", "综合·寿命", "其他·寿命"]}, {"topic": "性格", "content": "<h2>阴阳 · 性格</h2>\n<p>共收录 122 条相关内容，来自 55 本书籍。</p>\n<p><strong>来源《八字命理秘传【我好疼你啊我要嫁给你版】》</strong></p>\n<p>讲究留白，甚至何处落款何处用印都要配合整体的效果和美感。</p>\n<p>207</p>\n<p>AAKK0088800加微信进群聊</p>\n<p>四为壬学片程</p>\n<p>中国的古代先哲们没有像希腊哲学家那样，把主要的精力和智慧用在对自然</p>\n<p>界的思考上。中国先哲们把宇宙作为一个整体去思考，是宇宙生生不息的无</p>\n<p>限过程，强调万物存在的变化的连续性与不可分割的整体性。</p>\n<p>从大的方面说，宇宙是一个整体，人、自然和社会也都是一个整体。整</p>\n<p>体中包含有许多部分，各部分之间有密切的联系，因而构成的一个整体。人</p>\n<p>存在于天地之中，与天地息息相通，天地是个大宇宙，人是一个小宇宙。这</p>\n<p>个大宇宙是由阴阳二气以及由阴阳二气生化出来的五行所构成，它按照自己</p>\n<p>的法则运行着。人的“初察”的命造，也是由阴阳和五行所构成的。它是宇</p>\n<p>宙运行的片断复制，也是宇宙运行片断的缩影。这具体表现在每一个命造结</p>\n<p>构中，其阴阳五行要素的势力对比，都是由出生时天地间五行“旺相休囚</p>\n<p>死”的情况所规定的。而且，一旦命造结构作为一个存在的实体，正如人降</p>\n<p>生到这个世界上来了以后，它依旧处在大宇宙的运行环境之中。 “命”是通</p>\n<p>过跟“运”即由大运和流年等组成的环境的相互作用，展现出丰富多彩的人</p>\n<p>生起伏轨迹来。</p>\n<hr>\n<p><strong>来源《陈朝阳集成象法大成精华版》</strong></p>\n<p>”，用现在的术语是磁 场，称为“磁力”。</p>\n<p>6风气：物质的区域性作用结果即是现象，也可称为“风力”。</p>\n<p>宇宙中的“六大气”代表了所有的物质，就是说物质的本体是“气”，这些 “气”构成了宇宙的全部，宇宙中一切物象都是由气变化而来，由于他们的特性和 作用各不相同，其表现形式也不相同，有的无形无象，有的时现时无，有的形体长 存，就这样构成了复杂的宇宙现象。</p>\n<p>注：上面讲的阴阳二气是按照物质的属性讲的，和现在学科中化学里讲的性质是 一样的，这里的阴性和化学上的‘碱性’相对应，这里的阳性和化学上的'酸性’ 相对应。另外，它与中医上的‘寒，热’也是相对应的，这里的阴性与寒对应，这  里的阳性与热对应。</p>\n<p>六。了解宇宙物质之间的作用关系：</p>\n<p>物质与物质之间不是孤立的，而是有着一定的作用关系，大致可分为：生，克，冲， 合，刑，害。共有六种关系，而这六种关系又分作物象作用和物性作用，也即是后 章节讲解的干支作用关系代表的人事现象。</p>\n<p>第二章 干支基础知识</p>\n<p>一、十天干知识</p>\n<p>所谓天道就是天时，天意，我们常说出门看天，就是这个意思。在八字预测表述中，常用十天干来形容。天乃阳明。</p>\n<hr>\n<p><strong>来源《千里命稿 (1)》</strong></p>\n<p>防)。</p>\n<p>火</p>\n<p>原始       南方阳极而生热，热乃生火。</p>\n<p>性          属太阳，炎上。</p>\n<p>体          积阳之热气反者为火，火虽阳物，阴在其内，故火体内暗。 质          炽烈。</p>\n<p>天干        丙 丁属火。</p>\n<p>地支       巳午属火 。</p>\n<p>地藏        巳午未寅戌中 皆 藏火。</p>\n<p>生克       受木之生，生火，为水所克，克金。</p>\n<p>种类       火分六类，和有喜忌。</p>\n<p>(一)强火，当令或繁盛为强，喜金分力、水相济、土泄秀，忌木生火、火加重。  ( 二 ) 弱火，失令或稀少为弱，喜木生火、火 比助，忌金分力、水 克 熄 、土 掩晦。 ( 三 ) 炽火，木多易晦，喜金制木，忌水助木。</p>\n<p>(四)晦火，土多易晦，喜金泄土、木制土，忌火生土、土坚重。 ( 五 ) 熄火，金多易熄，喜木生火，忌金加重。</p>\n<p>( 六 ) 灭火，水多易灭，喜土制水存火、木泄水生火，忌金助水、水盛旺。 四 季火之喜忌</p>\n<p>土</p>\n<p>原始       中央属阴阳交而生湿，湿乃生土。</p>\n<p>性</p>\n<p>体</p>\n<p>质</p>\n<p>天干 地支 支藏 生克 种类</p>\n<hr>\n<p><strong>来源《太极阴阳法命理入门（李法能）-2023年 (1)》</strong></p>\n<p>金五行表现为缺乏弹性和韧性的坚固形态， 其能量表现为具有稳重、 肃</p>\n<p>杀、禁止、收敛特性，称为从革。</p>\n<p>（五）水 </p>\n<p>水五行表现为液态，其能量表现为具有虚寒、应变、渗透、流动、润下</p>\n<p>特性，称为润下。</p>\n<p>三、五行意象 </p>\n<p>  五行 </p>\n<p>意象 </p>\n<p>木 金 火 水 土 </p>\n<p>五常 仁 义 礼 智 信 </p>\n<p>李法能  李法能  李法能  李法能</p>\n<p>李法能  李法能  李法能  李法能</p>\n<p>李法能  李法能  李法能  李法能</p>\n<p>李法能  李法能  李法能  李法能</p>\n<p>李法能  李法能  李法能  李法能</p>\n<p>李法能  李法能  李法能  李法能</p>\n<p>李法能  李法能  李法能  李法能</p>\n<p> 李法能  李法能  李法能  李法能</p>\n<p> 李法能  李法能  李法能  李法能</p>\n<p> 李法能  李法能  李法能  李法能</p>\n<p>李法能——太极阴阳法入门（命理卷） </p>\n<p>购纸质教材微信：duolei1984               ~ 20 ~            学习交流微信：x18711830139 </p>\n<p>五色 青 白 红 黑 黄 </p>\n<p>五味 酸 辣 苦 咸 甘 </p>\n<p>五情 怒 悲 喜 恐 思 </p>\n<p>五方 东 西 南 北 中 </p>\n<p>五气 风 燥 暑 寒 湿</p>\n<hr>\n<p><strong>来源《易理案例解释》</strong></p>\n<p>，巳拱丑，说明是</p>\n<p>认识的人，己土财也看父星，但是是养父，局主出生后母亲身体一直难以恢复，壬寅一柱都</p>\n<p>可以看母（壬寅特性）被伤了，父亲觉得她克母就把她送养给同厂工友，后来企业倒闭了，</p>\n<p>工友就带着她回老家，养父家跟她家是同省不同地区的，因为时柱可以代表外地，这样她就</p>\n<p>离祖而去了。</p>\n<p>华盖象，丙辰组合</p>\n<p>万事万物皆有象，华盖也有象，它也是建立在基础象上组合而来的，天干象和地支象就是基</p>\n<p>础取象的根，再配上阴阳性质加以熟练，取象就无往不破了。</p>\n<p>丙火类象太阳，火热，光明，文化，名气，花朵，色彩，希望，城门……等，大多给人的是</p>\n<p>美好印象，太阳之火也是所有生命生长的一种主要力量，因为阳光能使万物复苏成长，所以</p>\n<p>丙有用时是可以治愈一切的。</p>\n<p>辰土是温土，也是四大华盖星之一，辰是阳包阴的性质，因为里面藏两个阴干乙木和癸水，</p>\n<p>癸性质冰冷，辰象有易经，中医，医院，机械，汽车，田园，水库……等。</p>\n<hr>\n<p><strong>来源《015-2009.07_《四柱学教程》_徐丙昕著 (2)》</strong></p>\n<p>性，所有求知的东</p>\n<p>西都会引起人们的思考，特别是人自身，人自身的思芬克斯之谜是人类</p>\n<p>的一个永恒的话题。</p>\n<p>在探索人生命运的过程中，中外的先哲们似乎都感到宇宙自然与人</p>\n<p>类命运的相关性，外国所采用的星辰学，利用人出生时间的星辰的位置</p>\n<p>来对人生命运进行预测，自然有一定道理，因为这一方法与中国人的天</p>\n<p>体大宇宙，人体小宇宙的观点不谋而合。中国先哲们创造了四柱预测学，</p>\n<p>作为命理学推理出发点的“四柱”，即由一个人出生的年、月、日、时的</p>\n<p>天干地支排列成“四柱”，共八个字，此正是这个人出生时刻宇宙运动状</p>\n<p>态的标记。因此，由四柱构成的“命造”之阴阳五行结构，反映了人出</p>\n<p>生当时所察赋的宇宙状态，人出生时的宇宙状态固结为“命”，但宇宙的</p>\n<p>运动永不停息，于是，对于“命”，不断流变的宇宙状态又形成“运” 。</p>\n<p>“命”和“运”的相互作用，就表现出丰富多彩的人生起伏轨迹，所以人</p>\n<p>的命运究其根本，就是一个固结了的特定宇宙状态，在流变且不同的宇</p>\n<p>宙状态中的遭遇，四柱命理学就是应用阴阳五行原理来描写和预测这样</p>\n<p>的遭遇，这里并没有任何神秘的色彩。</p>\n<hr>\n<p><strong>来源《八字入门 金玉章编著（新）》</strong></p>\n<p>壬子 甲子 壬申 </p>\n<p>甲木无根，弱不堪扶。 </p>\n<p>以上规则也适用于判断其它天干的状态。</p>\n<p>第三节 阴阳五行</p>\n<p>天干有阴阳属性。 五阳干：甲、丙、戊、 庚、 壬； 五阴干：乙、</p>\n<p>丁、己、辛、癸。 </p>\n<p>同一五行，阳干比阴干更为强旺、外向、活跃，自主性更高。 </p>\n<p>地支也有阴阳属性。 子、 寅、 辰、 午、 申、 戌为阳； 丑、 卯、 巳、</p>\n<p>未、酉、亥为阴。 </p>\n<p>四柱干支八个字，按阴阳属性，可以分成纯阳、纯阴、阳多阴</p>\n<p>少、 阴多阳少、 阴外阳内、 阴内阳外六种类型。 其中纯阳、 纯阴形成</p>\n<p>一种明显的气势，对命主的心性影响较大。 </p>\n<p> 1、纯阳。八个字全是阳性的干支构成。这类八字的人，往往</p>\n<p>性格豪爽冲动，行为大胆有闯劲。女命纯阳，不利婚姻。 </p>\n<p> 乾：壬午 戊申 壬戌 壬寅 </p>\n<p> 八字干支纯阳， 又构成偏官格。 一局长八字。 壬子运丁巳年升</p>\n<p>为县劳动局局长。为人很有魄力。 </p>\n<p> 2、纯阴。八个字全是阴性的干支构成。这类八字的人，往往</p>\n<p>性格阴柔内向，但执著有韧性。男命纯阴，不利婚姻。如 </p>\n<p> 乾：丁未 己酉 辛卯 乙未 </p>\n<p> 乾：癸巳 乙卯 丁卯 己酉 </p>\n<p> 3、阳多阴少。八个字有六个字是阳性，两个字是阴性。</p>\n<hr>\n<p><strong>来源《朱祖夏 命理应用精解》</strong></p>\n<p>枭印的心性，说明命主为人精明 能干，多才多艺，但有时难免过于固执孤独、尖锐刻 薄，人际关系不尽圆满。</p>\n<p>日主旺强有力，不需生扶时，命局中偏偏又出现重 重枭印，此枭印自然成为日主的忌神，其枭印的心性表 现：为人怪异，性格乖僻，爱好广泛，多学少成，始勤 终惰，有始无终，内心深沉，爱报复别人，作事进退不 决，逢关键问题难以作出果断择决。例如：</p>\n<p>枭      财     日     枭</p>\n<p>乾造：丁未壬寅 己 未 丁 卯</p>\n<p>日主己土自坐强根，又通年支本气根有力，天干丁 火枭印生扶日主，通根年日月寅未中中气根有力，日主 强旺有力，命局中枭印重重扶助日主，使日主己土更加 旺强，丁火枭印为忌神。命主为人虽然好学识广，但都 是略知皮毛，无法进一步专研，干事多是虎头蛇尾，有</p>\n<p>始无终。</p>\n<p>五、比肩心性体现的性格</p>\n<p>在后面的叙述中就不再谈十神的一般心性，而是结 合具体情况直接分析。</p>\n<hr>\n<p><strong>来源《朱祖夏 命理应用精解》</strong></p>\n<p>旺相之地克制官星有力，二寅冲一申，命局中的官星 受到天克地冲，命主自然难逃官非之事。</p>\n<p>三 、晋 升</p>\n<p>从命局和岁运中看人晋升的信息标志，一般比较重 视正官和七杀。因正官代表着光明正大，品行端正，克 己奉公，遵纪守法，唯有这种为人公道、尽责尽职的 人，才能得到上级领导的提拔。七杀是威严的象征，为 权力主义者，具有领导才干，当为日主所用时，表示有 威信。看流年晋升主要是看流年干支介入后，官杀力量 的强弱是否和日主平衡，其官杀是否为日主所用。</p>\n<p>通过原命局和岁运组合，经过生克制化、合冲刑害 后，如果日主旺相，能胜官杀，而官杀也有根气，身官 平衡，命主就有晋升的机会。</p>\n<p>晋升，不一定都指升官。业务范围扩大，下属人员 增多等，也属晋升之列。当官也不一定都指在政府部门 担任领导职务，只要是领导群众、管理人员，如董事 长、总经理等，都可以认为是当官的。</p>\n<p>98年冬季，笔者正在家里闭门写书，一位年青人登 门要求预测运程。他的命局如下：</p>\n<p>官   劫    日    比</p>\n<p>乾造 ： 戊申壬戌癸酉癸丑 大运：癸亥甲子乙丑丙寅</p>\n<p>3              13       23         ·33</p>\n<hr>\n<p><strong>来源《王庆学格局论命》</strong></p>\n<p>理生活化、生活命理化，对十神在现实生活中的体现 留意的比较多。这次借开博之际，总结一部分与大家分享。</p>\n<p>五行和十神是八字的解说者，尤其十神更是现实生活中人、事、物、 景的详细表述者。现实生活中有什么样的人、事、物、景，那么八字中就 会有什么样的十神去对应。</p>\n<p>大小、内外、高低、上下为生活中最常见之人、事、物、景， 如年龄 大小、心胸大小、事业大小、身份高低、职务高低、位置上下、生人熟人、 主内主外等等，这些都是论命时经常要谈到的细节，更是象法论命的基础。</p>\n<p>象法论命涉及到阴阳、五行、十神、干支、宫位、神煞、纳音等，十 神不仅最为好学易用，而且应用面广泛，把握了十神基本上可以论命了。 其它方面的取象技巧不用着急， 等你真正认识了十神之后，思路开阔了， 到时一教就会。要是不从十神入手，看不活八字，思路跟不上，就算有高 手指点也是事倍功半。</p>\n<p>大小、内外、高低、上下在人生中随处可见，我主要从年龄、身份、 体形、性格、气质、心理、言行、专业选择、事业成就及综合实断这几个 方面加以阐述。有了这些思路，你自己可以去无限延伸，理通了，法自显。</p>\n<h2>参见</h2>\n<li>旺衰派·性格</li>\n<li>格局派·性格</li>\n<li>盲派·性格</li>\n<li>神煞·性格</li>\n<li>调候·性格</li>\n<li>病药·性格</li>\n<li>综合·性格</li>\n<li>其他·性格</li>", "source_count": 55, "block_count": 122, "see_also": ["旺衰派·性格", "格局派·性格", "盲派·性格", "神煞·性格", "调候·性格", "病药·性格", "综合·性格", "其他·性格"]}, {"topic": "用神", "content": "<h2>阴阳 · 用神</h2>\n<p>共收录 57 条相关内容，来自 26 本书籍。</p>\n<p><strong>来源《子平真诠本义精简版》</strong></p>\n<p>拘泥外格为活变；论生克，则不察喜忌，而以伤旺扶弱为定法；论行运，则不问同中有异，而以干支相类为一例。</p>\n<p>解读：以八字算命是有定理和法则的。有些人不得真传，不知道正宗的子平命理及其法则，便胡编乱造一些似是而非的命理和法则，弄得命学界歪理当道，邪说横行。千千万万的后学者没有能力辨别是非，妄听妄信妄传，现在已经达到了积重难返的地步了。</p>\n<p>比如论干支，就不知道干支的阴阳之理，而以所谓的“体象歌诀”来论干支，说什么甲木为参天大木，宜斫削，而乙木是花草弱木，宜生扶等等，都是乱弹琴。</p>\n<p>比如论格局，则不知道要专从月令取用定格，而是随便到处取用神定格局，还说这是活变！特别是现在好多人，连用神的概念都还没有弄清楚，哪里就谈得上活变呢！</p>\n<p>比如论生克，则不从格局上着眼，总是只按旺则宜克，弱则宜扶的死法来论命，只讲八字五行的平衡与流通，不讲八字格局的成败与高低，你看旺，我看衰，瞎猜胡断。</p>\n<p>比如论行运，则不问是甲还是乙，是寅还是卯，只看干支都属木，就以木来论喜忌，而不知有时候甲木破格而乙木成格，有时候则寅木成格而卯木破格，没有看到某些细节的不同会导致整体格局的变化。</p>\n<hr>\n<p><strong>来源《01-金镖门老人参辛丑弟子班笔记上册（341页）》</strong></p>\n<p>—</p>\n<p>用神无力，这叫做弃x 就 x;</p>\n<p>还有，木火，金水，他们各是一伙的，有时候他们不必分 的那么清楚。</p>\n<p>如木火为用，或金水为用，如木火为用，命里土把火泄过 了，或者水把火克过了，这时候就</p>\n<p>用木了，因为火没力量了。</p>\n<p>就是如果把其中的一个克泄坏了，就以另外的一个为用神。</p>\n<p>竹臣你昨夜发我那八字发过来。</p>\n<p>乾造：</p>\n<p>丁 癸 丙 丙</p>\n<p>卯 卯 子 申</p>\n<p>这命都知道用神是啥吧</p>\n<p>不忘初心 有印有比身旺</p>\n<p>静悟 没错，身旺，不屑于争议，凭啥说身弱 东离 我以为身强旺是靠着自身</p>\n<p>的，不是靠印的</p>\n<p>静悟 睁眼说瞎话，这是多少木火，还有气势有位置</p>\n<p>虚致 春月生火有帮扶</p>\n<p>静悟 金水为用不屑于任何争议吧，此时，锁定金 水，再确定一下是用金还是用水的</p>\n<p>问题，咋确定，看关系</p>\n<p>不忘初心 用金 静悟 没错</p>\n<p>虚致 水坏了，用金</p>\n<p>静悟 水都让木火贴着化了，没错，全指着金呢，</p>\n<p>此时就锁定申金为用。</p>\n<p>东离 申金还被丙火克了呢</p>\n<p>静悟 所以就是破格了，此时锁定申金为用，一切围 绕用神判断吉凶喜忌，一切围绕申金，</p>\n<p>大运解决申金被克就好。</p>\n<hr>\n<p><strong>来源《真宗子平格局法》</strong></p>\n<p>能有几个当正处级或以上的?比例是多少?)</p>\n<p>就如你所说葛参政的八字，那么多问题，还不是贵了而且很贵。</p>\n<p>(那个古八字，可贵在先天成格用神，通过地支的正确搭配作用，而得以保存下来而成格。 子午冲解午卯之穿，同时午冲空亡之支论解空而不坏月令真神。自然是病中有救贵禄相随， 例子要多参详，不能简单的把自己去类比，魔鬼都在细节中，命理的关键是在你是不是对  最基础的知识有正确掌握和应用),</p>\n<p>通过看呆的东西现在拿捏程度只不过是个大概，非常模糊。且不说后天岁运。你看看地支 关系，冲合刑害破，他全说很重要，试问地支里面没有上诉关系的有几个搭配?这个拿捏 没有经验根本谈不上论分量。</p>\n<p>(这里想起 test   老师的一句话“各自爬山吧”,境界不同后眼光自然就会变得不同)</p>\n<p>对真宗的夹拱、虚神诀都是首次听闻，发一造请鬼大师和大家评评： 下元乾造</p>\n<p>庚辰甲申甲辰辛未</p>\n<p>8乙酉18丙戌28丁亥38戊子48己丑58庚寅68辛卯78壬辰88癸巳</p>\n<p>就用笨笨的真宗子平来拆下命格：庚辰甲申甲辰辛未</p>\n<hr>\n<p><strong>来源《玄门内部资料-《四柱精髓高级预测》207页》</strong></p>\n<p>是有帮助的。</p>\n<p>1、阴阳对立：</p>\n<p>阴阳对立即指世间一切事物或现象都存在着相互对立的阴阳两个方面，如上</p>\n<p>与下、天与地、好与坏、动与静、升与降等等，其中上属阳，下属阴；天为阳， 地为阴，好为阳，坏为阴；动为阳，静为阴，升属阳，降属阴。它们之间永远是  处于对立的角度。这也是太极成立的必要条件，如果没有了阴阳对立，世间的事  物就不会存在。换句话说，任何事物必须存在阴阳两个面，这是一个客观规律。 例如一个再伟大的人，也难免会有些缺点。一个无恶不作的坏人，也势必有他的 优点。这就是阴阳的体现。也可以引申我们后面要讲的八字中的用神、忌神(其  实所谓用神忌神也就是一个相对而言的说法，而实质也是一个阴阳对立的表现), 一个命局的成立，不管是什么格局，永远都会存在着用神、忌神(其中包含用神  起坏作用、忌神起好作用)两帮相对立的力量。它们在时空状态下永远是对立的  两个方面。我们仔细从阴阳太极图可以看出，从大太极球分出的阴、阳两个区间  里，阴里有阳、阳里含阴。故而结合四柱预测而言，太极球中的木、火、土、金、 水，永远都是处于阴阳两个面。</p>\n<hr>\n<p><strong>来源《太极阴阳法命理入门（李法能）-2023年 (1)》</strong></p>\n<p>仰则观象于天，俯则观法于地。人有贤不肖之殊， 命有过不及之异。 太过者</p>\n<p>从之斯成，不及者益之则利。万物玄宗，立极本根，先论格局之气象规模，</p>\n<p>次观用神之出处精微。 白洞裂变， 其天光下临无限， 黑洞聚变，其地德上载</p>\n<p>无穷。 </p>\n<p>观天之道，在于顺行；察地之道，在于逆用。天地顺遂而精粹者昌，阴</p>\n<p>阳乖悖而混乱者亡。 天倾西北， 始其所始； 地陷东南， 终其所终。 天阳地阴，</p>\n<p>气兮势兮；阴阳五气，生兮克兮。势斯增减，气有盈亏；运岁顺逆，吉兮凶</p>\n<p>兮。 </p>\n<p>五行法天地， 阴阳道世间。 生扶护卫， 时雨滋苗； 冲刑害绝， 秋霜杀草；</p>\n<p>长生帝旺，争如金谷之园；墓破空亡，尤如泥犁之地；阴阳相乘，祸咎必踵</p>\n<p>李法能——太极阴阳法入门（命理卷）</p>\n<hr>\n<p><strong>来源《242 -佚名 - 真宗子平格局法论述》</strong></p>\n<p>用神之根。贵不可言。 原来是克林顿的八字，我刚才还没想到是个外国人的。</p>\n<p>我上网查了下，他的时间是：</p>\n<p>克林顿生日八字：1946年8月19日，8:5lam, 时区+6,93:35W,33:40N 你引用的蔡昔全的博客资料是错的八字。</p>\n<p>真的是我前边猜的辰时，不是老蔡批的那个卯时盘。</p>\n<p>所以我旧帖中讲，名人的八字九成不真，还好他是个老外，有公开资料可查，要是中国人 就只能靠猜了，学命理最好的资料还是自己熟悉的确切时间的熟人，不过70年代以前手 表都是稀罕物，乡镇的多在自家生，时间也多是很模糊的。</p>\n<p>乾造：  丙        丙         乙        庚</p>\n<p>戌        申        丑        辰        空亡(戌亥)</p>\n<p>丙戌丙申乙丑庚辰</p>\n<p>就真宗子平来讲，此造发贵开始在亥庚运，辛运合伤动格正是精华发泄之时，壬运也还是 很顺好的运，名利不退。要是生在中国可以这样断。但在美国，总统有任期，十年后法律 规定就必须“裸退”,所以他在辛运干完两任就必须退。</p>\n<hr>\n<p><strong>来源《太极阴阳法命理入门（李法能）-2023年 (1)》</strong></p>\n<p>李法能  李法能</p>\n<p> 李法能  李法能  李法能  李法能</p>\n<p> 李法能  李法能  李法能  李法能</p>\n<p>李法能——太极阴阳法入门（命理卷） </p>\n<p>购纸质教材微信：duolei1984               ~ 158 ~            学习交流微信：x18711830139 </p>\n<p>大    运 </p>\n<p>甲 乙 丙 丁 戊 己     </p>\n<p>寅 卯 辰 巳 午 未     </p>\n<p>3 岁 13 岁 23 岁 33 岁 43 岁 53 岁     </p>\n<p>2001 2011 2021 2031 2041 2051     </p>\n<p>命主辛金生于丑月， 值人元分野己气真神透干秉权司令， 得天时之生气，</p>\n<p>丑未同为己气的阴阳真体， 不再重复判命元衰旺。 细辨命主只得天时， 并没</p>\n<p>得地利一势，可判正局身弱。天干不减气，局吉。又查月令偏印格，格吉。</p>\n<p>少阴用神己土，少阳用神食神。 </p>\n<p>再析辛未为命主，体内藏杀而透年，五行火衰，最怕心、眼之疾。少阴</p>\n<p>用神己土有丑墓， 且与命体自开墓为凶。 未有乙克己的先天垂象凶藏， 行大</p>\n<p>运乙卯就组成元凶之象（乙克己，乙从未出） ，少阴用神受制为凶。</p>\n<hr>\n<p><strong>来源《242 -佚名 - 真宗子平格局法论述》</strong></p>\n<p>。</p>\n<p>乾造：壬        壬          癸       己          (午未空)</p>\n<p>戌        子        巳       未</p>\n<p>师兄。你的八字是阴日主。不必考虑阳刃架杀了。 因为只有阳日主的刃才会与杀相合，如下：</p>\n<p>乾造： 戊       癸       壬       壬</p>\n<p>子      亥      戌        寅        空亡(子丑)</p>\n<p>但是师兄认为立杀、立劫相同，似乎仅是殊途同归而已。就直接以此八字为例来说： 此八字本该立杀局，则癸劫能合戊杀成局。</p>\n<p>此八字若依师兄之意立劫局，则反不成局。因戊土坐空亡、癸水无制。</p>\n<p>无司令以立格时，立局以凶神优先。众凶神中则以杀为先，乃因其为杀身之物。</p>\n<p>壬子辛亥甲寅甲子</p>\n<p>此造偏印立格(不是局)论成败。(无食神兼身不衰，不以枭神来看。) 偏印格用先天辛官为格用神，以比劫为先天体用之神。</p>\n<p>成格三要件：护卫，真假，清纯，三关这个八字都达到，很明白首先定为贵命。</p>\n<hr>\n<p><strong>来源《015-2009.07_《四柱学教程》_徐丙昕著 (2)》</strong></p>\n<p>4407916 公众号：九鼎学堂</p>\n<p>获取更多最新易学资料 加微信：804407916 公众号：九鼎学堂</p>\n<p>大运庚寅，干透庚金生之，寅木泄之，命局都不忌，命局喜泄。这步不</p>\n<p>差，只要得之好的流年则可发福发贵。流年甲子，透出用神甲木，甲木在大</p>\n<p>运寅中得地，其自身能力得到发挥，能表现出来，子水又不忌，没有破损力</p>\n<p>量，故此年当有喜事，该年升职。</p>\n<p>实例：乾造，1972年12月11日（农历十一月初六）巳时生人</p>\n<p>壬子壬子丙子癸巳</p>\n<p>大运：9癸丑，19甲寅，29乙卯。</p>\n<p>命局静态分析：丙日主生于十一月，失令身弱，命局中全是官杀一片，</p>\n<p>独一巳火为根，形成水火大战之局，故仍以木来通关为妙，但不喜丙丁火来</p>\n<p>助身。</p>\n<p>命主的第一运明显不是太好，因 也虚透，但这里富贵不看这个食生财。</p>\n<p>如果这个八字一片比劫，只靠这个食财，就穷了。</p>\n<p>地支亥子丑会劫财， 也不是重点。</p>\n<p>申亥也穿，但印透出来，天干没坏，印就完整。</p>\n<p>但时上有印，印是贵点。</p>\n<p>学历三本，企业中做销售工作。食生财，是工作性质。</p>\n<p>有印的人，身旺也是有层次的。都是穷命的，也是有层次的。开个小店也 是老板。没印的人，就是要差一些。</p>\n<p>阴阳核心永远不变，变得是动态，阴阳运动变化产生的结果。这个动态就 是配置，作用关系等。成不成格，看作用关系，分为1,2,3,4,各种条件， 看成不成。</p>\n<p>第十七课  大 运 流 年 2</p>\n<p>大运流年，是息息相关的，但要组合来看。原局是主人，大运流年的吉凶</p>\n<p>是跟着原命局走的。它跟原命局展现的意义是不同的。不能把大运流年当作五</p>\n<p>柱，六柱去看。</p>\n<p>如果把大运流年排成六柱去看，就说明这六柱都是命局的结构了。那么官 格为什么时上透伤，就不行了呢。如果大运透了一个官，能当官吗?原命局不 当官的，大运流年来了官，是不可能当官的。</p>\n<hr>\n<p><strong>来源《003-2003.12《命理技法与决断：四维时空占吉凶》_董忠清著 (1)》</strong></p>\n<p>4407916 公众号：九鼎学堂</p>\n<p>获取更多最新易学资料 加微信：804407916 公众号：九鼎学堂</p>\n<p>命理技法与决断</p>\n<p>批注：</p>\n<p>命书说：六丁日生时辛丑，库中助谷多陈朽，</p>\n<p>身无依倚不为凶，有托妾贤而宫厚。</p>\n<p>此造最日时井冲，但生西月通水气，应为吉命评述。该小</p>\n<p>姐系退伍军人，找我．她预洲时26岁，我石了她的八字后断她</p>\n<p>生来无伴，行亥运时家中不安。</p>\n<p>第十二例：乾造</p>\n<p>某先生生于1953年n月初八日亥时</p>\n<p>五行含量</p>\n<p>（官）财癸已庚丙戊食袅比金：2</p>\n<p>（胎）杀甲子癸财木：2</p>\n<p>（墓）日戊戌辛丁戊伤印比水：4</p>\n<p>（绝）财癸亥甲壬杀才火：2</p>\n<p>土：3</p>\n<p>安命：戊午天福星临命</p>\n<p>此造预测时50岁，该先生首先对我发问，问他有几兄弟</p>\n<p>和有几个孩子。我将他的八字列式后，对他说：“你有四兄弟，</p>\n<p>你命中有两个男孩，三个女孩” 。他满意的叫我继续讲述他的</p>\n<p>全部情况。现列式表述，以供参考。</p>\n<hr>\n<p><strong>来源《祝国英天人接命理授徒讲义》</strong></p>\n<p>则。</p>\n<p>后天风水中如阴宅阳宅格局的阴阳关系是平衡为吉：不平衡如青龙低矮白</p>\n<p>虎高大就是阴克阳而男人不吉。此种情况如果是阳宅，此时把青龙方的建筑物</p>\n<p>改建成与白虎方建筑物同样高大就实现了阴阳平衡而治好了男人受克制的病。</p>\n<p>八字预测技法中的阴阳关系却与此相反，完全平衡的八字即木火与金水力量相</p>\n<p>当的八字是最大的病，肯定不是富贵命，所以才有地支阴阳三制一一般都是富</p>\n<p>贵命之说。八字预测的阴阳之间只有克制，没有平衡之说。要注意的是“日干</p>\n<p>中和、偏旺偏弱”之类与本节说的阴阳平衡是风马牛。</p>\n<p>制用做功的主要作用方式包括刑、冲、合、害、克、晦、脆、生等，另外</p>\n<p>扶、泄、耗、破等也有制用之功，只不过相比之下功小而已。但必须要明确的</p>\n<p>是，制用做功中最根本的做功点是阴制阳或阳制阴，就是同是刑冲合害，如果</p>\n<p>阳刑阳如未刑戌则无制用之功，丑刑戌则有制用之功；合也是如此，如辰酉合、</p>\n<p>卯戌合则无制用之功，巳申合、寅丑合则肯定有制用之功等等。</p>\n<p>制用做功分为典型制用做功与一般制用两种方式。典型制用方式就是地支</p>\n<p>三阴制一阳或三阳制一阴的格局，此时不论天干如何。这类八字阴或阳一方明</p>\n<p>显势大，另一方明显势小，势大一方克制势小一方为功。</p>\n<h2>参见</h2>\n<li>旺衰派·财运</li>\n<li>格局派·财运</li>\n<li>盲派·财运</li>\n<li>神煞·财运</li>\n<li>调候·财运</li>\n<li>病药·财运</li>\n<li>综合·财运</li>\n<li>其他·财运</li>", "source_count": 113, "block_count": 699, "see_also": ["旺衰派·财运", "格局派·财运", "盲派·财运", "神煞·财运", "调候·财运", "病药·财运", "综合·财运", "其他·财运"]}]}];

let activeGenre = null;
let activeTopic = null;

function buildTree(genres) {
    const tree = document.getElementById('tree');
    tree.innerHTML = '';
    genres.forEach((g, gi) => {
        const group = document.createElement('div');
        group.className = 'genre-group';
        group.setAttribute('data-genre', g.name);

        const title = document.createElement('div');
        title.className = 'genre-title';
        title.innerHTML = `<span class="arrow">▶</span> ${g.name} <span class="count">${g.topics.length}专题</span>`;
        title.onclick = () => toggleGenre(gi, title);

        const list = document.createElement('div');
        list.className = 'topics-list';
        list.id = 'topics-' + gi;

        g.topics.forEach((t, ti) => {
            const item = document.createElement('div');
            item.className = 'topic-item';
            item.textContent = t.topic + ' (' + t.block_count + ')';
            item.onclick = (e) => { e.stopPropagation(); selectTopic(gi, ti, item); };
            list.appendChild(item);
        });

        group.appendChild(title);
        group.appendChild(list);
        tree.appendChild(group);
    });
}

function toggleGenre(gi, titleEl) {
    const list = document.getElementById('topics-' + gi);
    const arrow = titleEl.querySelector('.arrow');
    list.classList.toggle('open');
    arrow.classList.toggle('open');
}

function selectTopic(gi, ti, itemEl) {
    document.querySelectorAll('.topic-item').forEach(el => el.classList.remove('active'));
    itemEl.classList.add('active');
    activeGenre = gi;
    activeTopic = ti;
    renderContent(ENCYCLOPEDIA[gi], ENCYCLOPEDIA[gi].topics[ti]);
}

function renderContent(genre, topic) {
    const content = document.getElementById('content');
    const meta = `<div class="meta"><span>来源: ${topic.source_count}本书</span><span>内容块: ${topic.block_count}条</span></div>`;
    let seeAlso = '';
    if (topic.see_also && topic.see_also.length > 0) {
        seeAlso = '<hr><p><strong>参见：</strong>' + topic.see_also.join(' · ') + '</p>';
    }
    content.innerHTML = `<h1>${genre.name} · ${topic.topic}</h1>${meta}${topic.content}${seeAlso}`;
    content.scrollTop = 0;
}

function filterTree() {
    const q = document.getElementById('search-box').value.toLowerCase();
    const groups = document.querySelectorAll('.genre-group');
    groups.forEach(g => {
        const gn = (g.getAttribute('data-genre') || '').toLowerCase();
        const items = g.querySelectorAll('.topic-item');
        let anyVisible = false;
        items.forEach(item => {
            const text = item.textContent.toLowerCase();
            if (!q || gn.includes(q) || text.includes(q)) {
                item.style.display = '';
                anyVisible = true;
            } else {
                item.style.display = 'none';
            }
        });
        g.style.display = (!q || gn.includes(q) || anyVisible) ? '' : 'none';
    });
}

buildTree(ENCYCLOPEDIA);
</script>
