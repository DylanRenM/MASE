/p>\n<p>乙酉年穿害戌，制去偶星成婚。这与上例丑年刑去戌冲去未是同一种应期法。</p>\n<hr>\n<p><strong>来源《从零开始学八字202210》</strong></p>\n<p>表示考试之类，所以七杀有可能为火，或与火直接交涉之干支； 等等，所有不利我之物，都可引申为七杀之意。</p>\n<p>七杀，还表示疾病。因为是克我之物，犹如疾病缠身，克哪，哪得病。也要看七杀是哪个干 支表示的，带何种恶煞。比如七杀是子水，冲了午火禄星，那么病在子或午。或者子刑了卯， 病也有可能在卯。所以命带七杀之人，最好日主生旺，这样多少能抗住七杀之克，得病时， 也能挺住。如果身弱，再有七杀重克，多半身体不好，亚健康之类。这一点，看病时，百断 百验，千算千准。</p>\n<p>继续想，正官是贵，正统；七杀则与之相反，是贱，是偏门。此贱，可表示卑贱，不仅仅是 品性的描述，还可以指一类人，比如小人，卑鄙的小人，因为小人性贱，不做正直之事，行 事作风与君子相异，所以命带七杀，就容易遇小人，遇到不利自己的人，不管是在生活还是 工作中。是什么样的小人，就要看这个七杀带有什么特点。比如，七杀是酉，就带酉的性质， 酉是兑卦，表示少女，这个小人或许就是个女的。然后还要看酉上带何物，比如带丁，即丁 酉，丁是朱雀，表示语言，丁是阴火，絮絮叨叨，可能就是背后说人坏话了。</p>\n<hr>\n<p><strong>来源《05.王相山-子平真诠《格局真诠》544页1》</strong></p>\n<p>都有着这</p>\n<p>样或那样的毛病，只要大运走好，能救应格中的毛病，使格局得以修复，也</p>\n<p>是一样可以获取富贵的。所以《五言独步》说：“有病方为贵，无伤不是奇，</p>\n<p>格中若弃病，财禄喜相随”。</p>\n<p>七、正官格破败救应。</p>\n<p>（一）成而复破。“正官逢财而又逢伤，透官而又逢合”。正官逢财，财</p>\n<p>生官旺，为格之成，但八字又碰到伤官克官，官格就破了，这伤官便是破格</p>\n<p>的忌神。还有，月令正官，官透天干，格之所喜，虽不见破格之伤官，但若</p>\n<p>碰到日元之外的其它字把官星合住，也是破格，这合官之字便是破格忌神。</p>\n<hr>\n<p><strong>来源《神峰通考命理正宗原本校注》</strong></p>\n<p>，女命食伤重者，多是品行不端、放逸为非之悍妇，安能合乎礼节?家庭 岂能和谐?此说不合实情，不宜盲从。</p>\n<p>如男命木盛宜金者，得女命之刚金补之，则为尽美。得土生金者亦佳。 得火者较次。得水木者则无取矣。如女命金刚喜火者，得男命之烈火助之， 则为尽美。得木生火者，亦佳。得水者较次。得金土者，则无取矣。</p>\n<p>衰氏之论，较为符合病药精神，可取!</p>\n<p>坤造：丁巳、丁未、甲午、丙寅</p>\n<p>火长夏天金未叠，大运金水一路补。夫为地产老板。</p>\n<p>乾造：辛亥、丁酉、壬子、己酉</p>\n<p>地产商。原局金水多，火土弱，女命原局火土旺。</p>\n<p>动静说</p>\n<p>何以为之动也?</p>\n<p>其体属阳，阳主动，故天行健，圆转循环而无端。故以人之八字，天干 透露于上者，为之动也。</p>\n<p>如八字天干之甲木，但能克运上天干之戊土也，不能克巳中所藏之戊土 也。盖以动攻动为亲切，如男人之攻得男人也，不攻闺阃中所藏之女人也。 但虽不能攻人，而亦有摇动震惊之意，但不能作实祸也。如女人见男来攻， 虽不能加捶楚于其身，而亦有恐惧之意焉。如运上申中地支之庚金，亦不能 攻我八字中天干所透之甲木也。</p>\n<p>是以天干之动，只能攻得天干之动，不能攻地支之静也，明矣。</p>\n<p>何以为之静也?</p>\n<hr>\n<p><strong>来源《王君凌+月光八字命例精析+高级教材+上部240页1730204550》</strong></p>\n<p>合，此年又入狱。</p>\n<p>辛丑年，丑中有水。天干食旺生财而不克官。官星解脱，主不受官</p>\n<p>方管制，此年出狱。</p>\n<p>四十五、 乾：农历1982年十一月十三辰时.      出生：河北</p>\n<p>枭 枭 壬 壬</p>\n<p>戌 子</p>\n<p>大运：丑</p>\n<p>5</p>\n<p>比</p>\n<p>甲</p>\n<p>寅</p>\n<p>15</p>\n<p>劫</p>\n<p>乙</p>\n<p>卯</p>\n<p>25</p>\n<p>伤</p>\n<p>丁</p>\n<p>巳</p>\n<p>45</p>\n<p>财</p>\n<p>戊</p>\n<p>午</p>\n<p>55</p>\n<p>年份：198619962006201620262036</p>\n<p>1.学历：初中。</p>\n<p>2.财富层次：小康。</p>\n<p>3.职业：商人，卖皮革类商品。</p>\n<p>4.婚姻： 一婚已离。庚寅年十八岁结婚，己亥年离婚。</p>\n<p>重点流年：</p>\n<p>2018年正月被逮捕，因为贩卖假货，被起诉逮捕。己亥、庚子至今</p>\n<p>一直在监狱。</p>\n<p>命局分析：</p>\n<p>冬月甲木，首用火调候。戌为火库，调候有力。再看旺衰，甲只通 根于辰中乙，水旺成势。金不克木，反助水旺。财星透出通根于戌，必 用财克印。这是病药取用法。水旺为病，药是火土。用财克印的，为求 财之人。官杀生印为忌，水多主流动性大，没有固定住所，适合经商求</p>\n<p>财。官杀被化尽，主不喜欢受约束，为自由职业。</p>\n<hr>\n<p><strong>来源《简略本 古代命理学研究命理格局》</strong></p>\n<p>，主其福薄命浅，婚姻欠佳。 身旺，七煞喜逢时上一位贵格，主其子女发达。</p>\n<p>5.七煞人与旺弱生日的关系</p>\n<p>七煞最忌身弱，必出身寒微。七煞过多，身弱逢刑冲，必至 贫困，煞重制轻，暗病在身。</p>\n<p>七煞最喜日主健旺。羊刃合煞，主其一生富贵荣华。 七煞逢元神强，更增加其威权显赫。</p>\n<p>七煞逢日主衰弱，则多病多灾。流年逢七煞，祸事更多。</p>\n<p>6.七煞人的职业选择</p>\n<p>在司法界方面：适合当公安局长、法院院长、警察、律师、 法官、侦探。</p>\n<p>在军事界方面：适合当一名将军及公检法等各级武职官。</p>\n<p>在文化界方面：适合当战地采访记者、、武术演员。 在事业方面：适合在造船业、建筑业工作。</p>\n<p>7.官煞在四柱中的作用</p>\n<p>①官煞在四柱中有护身卫财的作用，女性则是代表丈夫的 星位。</p>\n<p>②官煞的顺生面是：财生官煞，官煞能生印；官煞的对立面 是：官煞克制比劫，伤食克制官煞。</p>\n<p>③四柱无官煞，欠威风，资财难以相聚，常遭兄弟、朋友、 亲属等侵占，或因事件牵连、拖累。</p>\n<p>④四柱无官煞，女性婚姻不良，男性自由浪漫，婚姻也 波折。</p>\n<hr>\n<p><strong>来源《吴九龙-8字直读 高清原版》</strong></p>\n<p>过多等胃部疾病， 而且戊土日出生的人容易患糖尿病 ，  因为传统中医三消属脾 ，脾胃  相表里失调。</p>\n<p>己土：己土病源多在脾，大多数肠胃不好，易患肠炎，十二指肠溃疡， 尤其青少年时期会出现不想吃饭。而且己土日出生的人有一定机率出  现异食癖 ，若有“ 甲 ”字来合 ，肠胃倒是特别好。</p>\n<p>庚金：庚金属大肠，病源在大肠。容易患有肠炎 ，皮肤病 ，而且容易 患有过敏性的病，脸上也容易出现疮疤、疙瘩等。庚金日的人，容易 牙齿不固 ， 如其他天干有“ 乙 ”字 ，反而牙齿特别好。</p>\n<p>辛金：辛金病源在肺，易患肺部疾病，肺部功能差，容易感冒、咳嗽、 气喘、神经痛、风湿性关节酸痛等症状。</p>\n<p>壬水：病在膀胱，易患有泌尿系统病症，而且容易有糖尿病、肾脏炎、 脑溢血等，而肾脏与膀胱病居多。</p>\n<p>癸水：病源在肾，易患肾脏方面的症状，容易有泌尿系统疾病、膀胱 炎、而且便秘症状也是比较常见。</p>\n<p>扫一扫，观众“南方龙师兄”公众号，我会更新更多命理、风水等相 关文章。</p>\n<p>第十三章：直读六亲</p>\n<p>思 路 ：</p>\n<p>1、男命偏财为父，正印为母，正财为妻，偏财为情人，正官为女儿， 七杀为儿子，比肩为兄弟，劫财为姐妹。</p>\n<hr>\n<p><strong>来源《穷通宝鉴  白话评注  下_（明）佚名著；（清）余春台整理；徐乐吾评注；方成竹注译》</strong></p>\n<p>常 人；见壬，贫不太甚。辛藏无丁，贡监衣衿；或见癸制丁，衣禄充足，但有刑  妻之祸，择配须硬命者吉。</p>\n<p>徐乐吾曰：此言用辛金，忌丁火伤用，时值火旺，即使辛金出干，丁火藏 午，亦被销熔，必以壬癸为救。但壬见丁相合，即使不化，总嫌有情，聊胜于 无制，故云贫不太甚。见癸制丁，病药相当，但丁为财，妻财被劫，不免刑 妻，择金水旺者相配为吉。</p>\n<p>方先生曰：四月癸水，火神司权，身临绝地，非印劫并透生助，难以自存。</p>\n<hr>\n<p><strong>来源《2022老人参弟子班培训教材《滴天髓与民间应用》》</strong></p>\n<p>1999  2009  2019  2029  2039  2049  2059  2069</p>\n<p>未 寅 午 子   运 己丑  戊子  丁亥  丙戌  乙酉  甲申  癸未  壬午</p>\n<p>辛未 庚寅 庚午 丙子</p>\n<p>年柱辛未，虽然辛坐未土不如做丑土，但起码是个印，不符合特殊格局的要求。按正常 格局来分析，没有力量的要补上他，有力量的要抑制的。</p>\n<p>找一下这局的毛病出在哪？财生杀旺，毛病在午火。旺了就要想办法解决问题。 学生：午火为病克身有力，喜子午冲去火存金</p>\n<p>京南：说的对，去火说的对，存金就不对，因为局里没有金。子水就是去火的药，食神 制杀了。如果没有子水，有个丑土印也行，丑土泄火。</p>\n<p>天干露三个金，没有通根，辛未有点力，日主是不旺，但是日主是有点力。不考虑七杀 的情况是有力。有力就能食神制杀， 跟日主虚透无力强制杀是不一样的。当然日主还是偏弱 的额，有丑土来化更好。</p>\n<p>子水运去病发大财。戊子运统看也可以， 戊土泄火生金，子水克午火，去病了。如果没 有寅木就是制杀太过了，这个杀有源头，就算制了，也不会把杀制绝了，还是平衡的。</p>\n<p>第 120  页</p>\n<h2>参见</h2>\n<li>旺衰派·婚姻</li>\n<li>格局派·婚姻</li>\n<li>盲派·婚姻</li>\n<li>神煞·婚姻</li>\n<li>调候·婚姻</li>\n<li>阴阳·婚姻</li>\n<li>综合·婚姻</li>\n<li>其他·婚姻</li>", "source_count": 18, "block_count": 23, "see_also": ["旺衰派·婚姻", "格局派·婚姻", "盲派·婚姻", "神煞·婚姻", "调候·婚姻", "阴阳·婚姻", "综合·婚姻", "其他·婚姻"]}, {"topic": "学业", "content": "<h2>病药 · 学业</h2>\n<p>共收录 4 条相关内容，来自 4 本书籍。</p>\n<p><strong>来源《05.王相山-子平真诠《格局真诠》544页1》</strong></p>\n<p>，格成煞印相生。但申中庚财透时，</p>\n<p>庚金又合乙克甲，财星坏印，这不是破了煞印相生格吗？子平为何说贵格？</p>\n<p>第二章 七煞格</p>\n<p>-91-</p>\n<p>因为庚有丙隔，没有坏印。八字印星太多，天透两印，支有寅亥强根，寅亥</p>\n<p>一合，煞化成印，印星多达三个以上；寅戌会局，丙坐火库，又长生于寅，</p>\n<p>身亦重。一位独煞被化，用神不清，导致煞轻、身重、印多。故用财星损其</p>\n<p>有余，就能起清格之用。所以用庚金盖头寅木这个组合，起到损印滋煞的作</p>\n<p>用。如果原局独煞一位，印也一位，庚金财星必是破格之神。《子平真诠》没</p>\n<p>有把印多印重的问题讲清楚，只含糊地说“煞又化印，用神不清，而借财以</p>\n<p>清”，为什么不清呢？是印多了不清的，故能用财损其余而清格。《子平真诠》</p>\n<p>是经典之学，但有时论述也模糊，这个例子就是。</p>\n<p>严格地说，七煞格中没有财滋弱煞格。他只是煞邀食制格见印破格，需</p>\n<p>财制印救食；或煞印相生格，印星太多，身强煞弱，需财损印救格，顺便滋</p>\n<p>滋弱煞，以清格局的情况。但《子平真诠》单独把七煞格用财列了出来，我</p>\n<p>们就单独来理解它，消化它。你消化了，理解了病在何处，去病则贵，仍按</p>\n<p>煞邀食制或煞印相生格论，不会犯原则错误。</p>\n<p>三、财滋弱煞格取运喜忌。</p>\n<hr>\n<p><strong>来源《018-2009.11_《子平实战指引》_徐伟刚著 (2) (1)》</strong></p>\n<p>4407916 公众号：九鼎学堂</p>\n<p>获取更多最新易学资料 加微信：804407916 公众号：九鼎学堂</p>\n<p>第八章六格大纲</p>\n<p>四柱是个“小天地”，它实质是在研究人和世界的关系。一个人出生于</p>\n<p>这个世界，这个世界必然会准备很多配套相应的“待遇”跟着这个人而来</p>\n<p>（此一论调源自朱熹）。一个人在这个世界上会拥有多少“待遇”，并不是无</p>\n<p>规律可循的。四柱之中日主代表自身，其全七字就是本人所要面对的外在世</p>\n<p>界，也就是“老天爷”为其出生所配套跟着他来的全部“待遇” 。古人发明</p>\n<p>的格局理论，就是非常系统地具体地研究个人生存于世界之中可能的所有</p>\n<p>“待遇”情况。</p>\n<p>令人困惑的是，四柱命学最初创造者、传承者、集大成者们极其重视万</p>\n<p>分的格局理论，竟然会被绝大多数的后人“研究者”们曲解肢解甚至以为格</p>\n<p>局可有可无一文不值，纯粹是古人先贤瞎忙乎，无中生有故弄玄虚；事实上</p>\n<p>真是如此吗？当然不是！正是由于后世术士们的不学无术，未能洞察用神的</p>\n<p>原始理念与确实含义，导致他们对古贤所传的格局迷惑不解；也正是他们依</p>\n<p>赖以为十分对头的“病药”用神观来指导研究命学，就不可避免地跟先贤书</p>\n<p>中所传的大量格局理论难于调和统一。</p>\n<hr>\n<p><strong>来源《2022老人参弟子班培训教材《滴天髓与民间应用》(1)》</strong></p>\n<p>你没病，也就没有灾。所以说真正好的中医大夫一定得会算命。真正</p>\n<p>会算命的，他也一定会看病，这是通着的。京南老师客服微信：jndr95</p>\n<p>她病在哪儿？不要跟我说病在肺，傻子都能看见辛金被克了，说那没用。从中医上来讲，</p>\n<p>病根儿在哪儿呢？一个人有没有病是怎么看呢？你要说她牙不好，肯定能蒙对，是个人都知</p>\n<p>道。实际上毛病不在这儿。为什么牙不好？牙不好的病根在哪， 病在火，病在心。那么病重</p>\n<p>还是病轻怎么论？心脏肯定也有病，肝肯定也有病，牙肯定也有病，一个人有病不光是这有</p>\n<p>病，那边也有病，但是终究病在哪？终究病在火旺。所以说肝肯定也不好，说哪个都对。</p>\n<p>但是治病得治哪？这病能治吗？有解吗？是那种能治的病吗？有的人有病了能治，有的</p>\n<p>有病了治不了，为什么？这病是戴上一颗假牙就好了吗？治不了。唯一能治的就是修心，通</p>\n<p>过医疗方法没法治。吃中药，她泄火倒是也能调理，但是她忌神入五脏了。</p>\n<p>什么叫忌神入五脏？时支午火很难制，假设就算命主吃一颗神药或者说做手术了，把午</p>\n<p>火给去了，能说这病就去了根吗？去不了，因为它在里头藏着，忌神入五脏。</p>\n<p>那么以前我们在自学的时候可能都知道说丑土代表癌症。</p>\n<hr>\n<p><strong>来源《八字命理秘传【我好疼你啊我要嫁给你版】》</strong></p>\n<p>的传统文化是讲“中和”的，讲“平衡”的，讲“对称”的，讲</p>\n<p>2O9</p>\n<p>AAKK0088800加微信进群聊</p>\n<p>“协调”的，讲“流通”的，讲“变化”的。所以，儒家讲中庸，道家讲阴</p>\n<p>阳，这些理论不仅体现在思想领域，可以说在生活的任何层面反映出来，比</p>\n<p>如建筑，中国建筑以平稳厚重见长，绝不会出现哥特式教堂建筑风格。最为</p>\n<p>经典的要数故宫，以对称为美，讲协调，又富于变化。比如书法，线条的配</p>\n<p>合要浓淡相间，什么地方要饱墨重彩，什么地方要留白飞扬，什么地方古</p>\n<p>拙，什么地方轻盈，什么地方设险，什么地方救起，这些都要以平衡、对</p>\n<p>称、协调为准，而此中最讲的是流通与变化。在命理学中，同样是以中和为</p>\n<p>美，可以说所有的判断标准最后都要归为这一点上来。可以说在命理学中，</p>\n<p>中国传统文化的精髓理论在里面得到淋漓尽致的表现，五言独步云：“有病</p>\n<p>方为贵，无伤不是奇，格中若去病，财禄两相随”所以四柱命理中不中和</p>\n<p>的，不平衡的，就像病，必须救治，所以要生扶，要克泄，达到了中和，达</p>\n<p>到了平衡，那么就是最理想的状态了。</p>\n<h2>参见</h2>\n<li>旺衰派·学业</li>\n<li>格局派·学业</li>\n<li>盲派·学业</li>\n<li>神煞·学业</li>\n<li>调候·学业</li>\n<li>阴阳·学业</li>\n<li>综合·学业</li>\n<li>其他·学业</li>", "source_count": 4, "block_count": 4, "see_also": ["旺衰派·学业", "格局派·学业", "盲派·学业", "神煞·学业", "调候·学业", "阴阳·学业", "综合·学业", "其他·学业"]}, {"topic": "寿命", "content": "<h2>病药 · 寿命</h2>\n<p>共收录 3 条相关内容，来自 3 本书籍。</p>\n<p><strong>来源《京南道人2024-5月深圳》</strong></p>\n<p>好用神之后，我们再看用神的力量，既然找到八字的病，就要找到 用神的药。有病有药才吉，有病药被夺大凶。</p>\n<p>子水他临丙火和午火，子午相冲，子水被午火来冲坏，火当令，水又 没有源，没有金来生，可以定是火旺水败的，寅卯木他的力量全部化火， 他克身，他去生火，火又生身，这是一种展转相生，喜神反而为忌，财官 全部对日主无情。那么就主夭折命。既然身旺用财官，这个财官没有一个 起到好的作用，那么就是身旺克泄耗全无，所以就主夭折命，在死亡命例 里讲过，死是身旺克泄耗太过要死，身弱财官旺极无泄，人也是寿终，用 神在年被坏，那么就主早年，年柱的限运就主平六岁以前，大概的，具体 的要看大运，</p>\n<p>癸巳运是引动水和火，是火旺冲去水，大运凶，在这个大运里面，水 被冲克净，可以看作日主从火的势，那么根据这个信息，就直接看流年， 到这个大运，就告诉日主只有从火势，遇流年再给金水加力，就是凶。下 面我们就直接找金水旺的流年。庚辰年，是逆大运的势，庚辰年是土金一 体，他就逆大运的势，金有力他反抗火，反而被旺火克掉，旺极无泄那么 就主凶祸难免，命主实际在这年遇车祸而亡。</p>\n<p>乾造：丙 壬  戊  丁 辰  辰  子  酉</p>\n<hr>\n<p><strong>来源《象法是这样练成的－天干象意》</strong></p>\n<p>看病先</p>\n<p>看生气</p>\n<p>木火，</p>\n<p>重病木</p>\n<p>火与干</p>\n<p>之生源</p>\n<p>不能伤</p>\n<p>，再看</p>\n<p>病之干</p>\n<p>支，乙</p>\n<p>是风在</p>\n<p>年有</p>\n<p>脖子</p>\n<p>像，庚</p>\n<p>是伤官</p>\n<p>伤到乙</p>\n<p>，未又</p>\n<p>是己之</p>\n<p>身，那</p>\n<p>定是上</p>\n<p>半身病</p>\n<p>，巳空</p>\n<p>还是血</p>\n<p>虚，有</p>\n<p>未根没</p>\n<p>伤人</p>\n<p>大事</p>\n<p>没有，</p>\n<p>乙头受</p>\n<p>庚合制</p>\n<p>，还是</p>\n<p>昏沉气</p>\n<p>血不足</p>\n<p>，制庚</p>\n<p>申者巳</p>\n<p>也，调</p>\n<p>养气血</p>\n<p>，冲开</p>\n<p>乙庚，</p>\n<p>壬能</p>\n<p>生乙</p>\n<p>，那如</p>\n<p>果是近</p>\n<p>病，今</p>\n<p>天就会</p>\n<p>好一点</p>\n<p>，甲戌</p>\n<p>时</p>\n<p>问の</p>\n<p>率：</p>\n<p>下午</p>\n<p>4</p>\n<p>:</p>\n<p>0</p>\n<p>6</p>\n<p>:</p>\n<p>0</p>\n<p>9</p>\n<p>庚在</p>\n<p>辰肩胸</p>\n<p>之上，</p>\n<p>病在头</p>\n<p>胸，去</p>\n<p>庚之病</p>\n<p>首开合</p>\n<p>，壬庚</p>\n<p>相生不</p>\n<p>制乙，</p>\n<p>顺气了</p>\n<p>，掰</p>\n<p>得像吧</p>\n<p>丹元</p>\n<p>：</p>\n<p>下午</p>\n<p>4</p>\n<p>:</p>\n<p>0</p>\n<p>9</p>\n<p>:</p>\n<p>0</p>\n<p>9</p>\n<p>问の</p>\n<p>率：</p>\n<p>下午</p>\n<p>4</p>\n<p>:</p>\n<p>0</p>\n<p>9</p>\n<p>:</p>\n<p>2</p>\n<p>3</p>\n<p>辰巳</p>\n<p>乙都是</p>\n<p>风，辰</p>\n<p>巳是空</p>\n<p>为气虚</p>\n<p>，乙被</p>\n<p>合还是</p>\n<p>不顺气</p>\n<p>，庚申</p>\n<p>是寿元</p>\n<p>，透不</p>\n<p>碍死不</p>\n<p>了</p>\n<p>丹元</p>\n<p>：</p>\n<p>下午</p>\n<p>4</p>\n<p>:</p>\n<p>0</p>\n<p>9</p>\n<p>:</p>\n<p>4</p>\n<p>7</p>\n<p>卦看</p>\n<p>也死不</p>\n<p>了</p>\n<p>问の</p>\n<p>率：</p>\n<p>下午</p>\n<p>4</p>\n<p>:</p>\n<p>1</p>\n<p>1</p>\n<p>:</p>\n<p>1</p>\n<p>9</p>\n<p>不停</p>\n<p>的就实</p>\n<p>际已知</p>\n<p>条件来</p>\n<p>找理由</p>\n<p>，总有</p>\n<p>对得上</p>\n<p>的</p>\n<p>，煅</p>\n<p>炼的是</p>\n<p>思维，</p>\n<p>死了咱</p>\n<p>也不担</p>\n<p>责</p>\n<p>丹元</p>\n<p>：</p>\n<p>下午</p>\n<p>4</p>\n<p>:</p>\n<p>1</p>\n<p>1</p>\n<p>:</p>\n<p>3</p>\n<p>6</p>\n<p>问の</p>\n<p>率：</p>\n<p>下午</p>\n<p>4</p>\n<p>:</p>\n<p>1</p>\n<p>3</p>\n<p>:</p>\n<p>3</p>\n<p>5</p>\n<hr>\n<p><strong>来源《05.王相山-子平真诠《格局真诠》544页1》</strong></p>\n<p>可逆其性。病在八字丑土汇水，印星</p>\n<p>不透，水多金沉，则为身旺无依的贫寒之命。只能顺其天地一气之势，有根</p>\n<p>第九章 专旺格</p>\n<p>-423-</p>\n<p>方可（如初运甲寅乙卯吉顺无忧），不能逆其势，逆者无论有根与否都会冲激</p>\n<p>怒性而亡（如丙辰丁巳戊午己未运），故只宜东方顺势或西方助势。成气势之</p>\n<p>局，一定是顺之者昌，逆之者亡。起落异常， 贫富两极，多为寿元无延之命。</p>\n<p>初运甲寅乙卯顺其情势，家境比上不足比下有余，身强体健无忧无虑，升学</p>\n<p>考试一帆风顺。一交丙辰群劫争财，祸从天降，父母无疾，自身却灾祸。丙</p>\n<p>子流年比劫夺财，与女友双双被烧死在电器行里。其女友命造为；甲寅、壬</p>\n<p>申、丙申、壬辰。双杀夹日，寅申冲破，为禄倒马斜（官为禄财为马），同样</p>\n<p>是命运年拱合水火激战而致灾祸。</p>\n<p>乾造：壬 癸 壬 辛</p>\n<p>子 亥 子 亥</p>\n<p>张绍今《滴天髓命理新论》命例。八字七水，金助水势，呈北方玄武</p>\n<p>之 象。格成润下。水主智，必聪明绝顶。此造之憾，是辛金印星轻而无根</p>\n<p>，加 之一派汪洋泄之，近乎于身旺无依，贵气亦就没了。但印为用神，命</p>\n<p>主就不 停地追求功名。初运甲子，顺水之性，学业尚佳。</p>\n<h2>参见</h2>\n<li>旺衰派·寿命</li>\n<li>格局派·寿命</li>\n<li>盲派·寿命</li>\n<li>神煞·寿命</li>\n<li>调候·寿命</li>\n<li>阴阳·寿命</li>\n<li>综合·寿命</li>\n<li>其他·寿命</li>", "source_count": 3, "block_count": 3, "see_also": ["旺衰派·寿命", "格局派·寿命", "盲派·寿命", "神煞·寿命", "调候·寿命", "阴阳·寿命", "综合·寿命", "其他·寿命"]}, {"topic": "性格", "content": "<h2>病药 · 性格</h2>\n<p>共收录 3 条相关内容，来自 2 本书籍。</p>\n<p><strong>来源《这个书牛逼得我不知道取什么名》</strong></p>\n<p>固定五行如阳井必为木，阴井</p>\n<p>必为金之论也。关于这点参看博文《针灸探秘 1-子午流注定时开穴术数原理》</p>\n<p>三是穴性 “乱经”“周身十二经,各有井、荥、俞、经、合,其所主病,亦各不同。假如病在肝,宜针肝之荥穴—</p>\n<p>—行间,乃曰乙日肝之荥穴不属行间,而属心之荥穴——少府。舍肝之荥而针心之荥,是谓乱经,病可去乎? 不可去</p>\n<p>乎? ”</p>\n<p>答：汪机不知道有本经流注刺法和它经流注刺法两种流注，认为只有一种十二经流注法，关于这点参看《针灸探</p>\n<p>秘 10-纳支法根本不是子午流注 》</p>\n<p>四是 “谓阳日气先血后， 阴日气后血先， 此亦不通之论”“甲与己合,己日己巳时,脾引血出,甲戌时,胆引</p>\n<p>气行,固合阴日血先气后说矣。然甲日己巳时居前,而脾亦可引血先出,甲戌时居后,而胆亦可引气后行,如此则阳日</p>\n<p>血亦可先,气亦可后矣” ；</p>\n<p>五是纳甲法与养子时刻 法开穴各不相同， “甲与己合,己日己巳时,脾引血出,甲戌时,胆引气行,固合阴日血先</p>\n<p>气后说矣。</p>\n<hr>\n<p><strong>来源《这个书牛逼得我不知道取什么名》</strong></p>\n<p>转载子午流注针法之后， 曰： “此皆臆说， 素难不载， 不惟悖其经旨， 所说亦自相矛盾 多</p>\n<p>矣” 。</p>\n<p>其质疑有五： 一是无所谓阳日阳时阳穴开、 阴日 阴时阴穴开之说。云“故甲子日甲戌时,甲胆窍阴井开,此固然</p>\n<p>也。丙子时,属于乙丑日辰,乃阴日阳时也,而谓丙小肠前谷荥穴开,其与阳日阳时之说,合乎?”； 二是经脉腧穴五行</p>\n<p>属性 “颠倒错 乱” “经曰:阴井木,阳井金;阴荥火,阳荥水;阴经土,阳经木;阴俞金,阳俞火;阴合水,阳合土。今</p>\n<p>何公尽变其法,皆以十干配之十经,取干旺日时而注井荥俞经合。故甲日甲时取属甲胆,而甲胆阳井之金,亦依日干</p>\n<p>而变为木;小肠前谷荥水,亦依日干而变为火。然三焦、包络, 又依《难经》而无所变。颠倒错乱如此,与经合</p>\n<p>乎? ”； 三是穴性 “乱经”“周身十二经,各有井、荥、俞、经、合,其所主病,亦各不同。假如病在肝,宜针肝之</p>\n<p>荥穴——行间,乃曰乙日肝之荥穴不属行间,而属心之荥穴——少府。</p>\n<hr>\n<p><strong>来源《八字命理秘传【我好疼你啊我要嫁给你版】》</strong></p>\n<p>言， 不喜欢表达意见、 行事沉稳的人。 虽然无确切的答案， 笔者仍愿提</p>\n<p>出自己的看法与读者共同研讨。</p>\n<p>本造乃丁火日元生于仲秋处暑后十天， 乃</p>\n<p>庚金秉令司权之时， 三秋丁火， 退气柔</p>\n<p>弱， 喜有甲木为生身之本， 书云： 「如有嫡母可秋可冬。 」 今命局月令提纲庚金财</p>\n<p>星秉令，时逢卯木、有日元通根于年支未土，自坐卯木，虽言枯草引灯，但卯木</p>\n<p>却是月柱天干甲木－嫡母， 强而有力的根基， 年柱尚有乙木， 命局印星党多势众，</p>\n<p>呈现木多火塞，日元虽是身旺，但丁火却难有长明之象。</p>\n<p>五言独步云： 「有病方为贵，无伤不是奇，格中如去病，财禄两相随。 」八字命局</p>\n<p>不畏有缺点－即 「病」 ， 而贵在有去病之物－即 「药」 ， 此去病之 「药」 即是用神，</p>\n<p>若用神有力又有情，则富贵长相随。</p>\n<p>何谓用神有力？用神得令并</p>\n<p>通根透干或用神得地势无克破， 再逢运助。 合乎这些</p>\n<p>条件，用神最为有力。反之，则用神无力。</p>\n<p>何谓用神有情？用神紧贴日主，不受克、合化，又得生助，即为有情。另有合乎</p>\n<p>日元（依十干性质）所须亦是有情。反之，即无情。</p>\n<h2>参见</h2>\n<li>旺衰派·性格</li>\n<li>格局派·性格</li>\n<li>盲派·性格</li>\n<li>神煞·性格</li>\n<li>调候·性格</li>\n<li>阴阳·性格</li>\n<li>综合·性格</li>\n<li>其他·性格</li>", "source_count": 2, "block_count": 3, "see_also": ["旺衰派·性格", "格局派·性格", "盲派·性格", "神煞·性格", "调候·性格", "阴阳·性格", "综合·性格", "其他·性格"]}, {"topic": "用神", "content": "<h2>病药 · 用神</h2>\n<p>共收录 1 条相关内容，来自 1 本书籍。</p>\n<p><strong>来源《018-2009.11_《子平实战指引》_徐伟刚著 (2) (1)》</strong></p>\n<p>4407916 公众号：九鼎学堂</p>\n<p>获取更多最新易学资料 加微信：804407916 公众号：九鼎学堂</p>\n<p>第八章六格大纲</p>\n<p>四柱是个“小天地”，它实质是在研究人和世界的关系。一个人出生于</p>\n<p>这个世界，这个世界必然会准备很多配套相应的“待遇”跟着这个人而来</p>\n<p>（此一论调源自朱熹）。一个人在这个世界上会拥有多少“待遇”，并不是无</p>\n<p>规律可循的。四柱之中日主代表自身，其全七字就是本人所要面对的外在世</p>\n<p>界，也就是“老天爷”为其出生所配套跟着他来的全部“待遇” 。古人发明</p>\n<p>的格局理论，就是非常系统地具体地研究个人生存于世界之中可能的所有</p>\n<p>“待遇”情况。</p>\n<p>令人困惑的是，四柱命学最初创造者、传承者、集大成者们极其重视万</p>\n<p>分的格局理论，竟然会被绝大多数的后人“研究者”们曲解肢解甚至以为格</p>\n<p>局可有可无一文不值，纯粹是古人先贤瞎忙乎，无中生有故弄玄虚；事实上</p>\n<p>真是如此吗？当然不是！正是由于后世术士们的不学无术，未能洞察用神的</p>\n<p>原始理念与确实含义，导致他们对古贤所传的格局迷惑不解；也正是他们依</p>\n<p>赖以为十分对头的“病药”用神观来指导研究命学，就不可避免地跟先贤书</p>\n<p>中所传的大量格局理论难于调和统一。</p>\n<h2>参见</h2>\n<li>旺衰派·用神</li>\n<li>格局派·用神</li>\n<li>盲派·用神</li>\n<li>神煞·用神</li>\n<li>调候·用神</li>\n<li>阴阳·用神</li>\n<li>综合·用神</li>\n<li>其他·用神</li>", "source_count": 1, "block_count": 1, "see_also": ["旺衰派·用神", "格局派·用神", "盲派·用神", "神煞·用神", "调候·用神", "阴阳·用神", "综合·用神", "其他·用神"]}, {"topic": "财运", "content": "<h2>病药 · 财运</h2>\n<p>共收录 30 条相关内容，来自 20 本书籍。</p>\n<p><strong>来源《王庆探8探索门命理学象法班笔记2014-王庆1730037215》</strong></p>\n<p>为天地主气时，格局用神只要在，针对立格局点的天敌就算在岁运中出 现，也伤害不到立格局点。</p>\n<p>财杀日伤</p>\n<p>例2乾造：癸丑甲子戊寅辛酉（申酉空）</p>\n<p>1、\t阴阳象法：甲木被癸水侵入，有严重的风湿病。甲木成了癸水的保护神。只 有金出，木死，土出，水阴有制之时，病情才能好转。</p>\n<p>按照之前的论命方法看,庚寅年，是不可能治疗风湿的。金生水，水又生木, 风湿会更严重。</p>\n<p>2、\t实际情况:风湿病在庚寅年遇到治疗风湿的高手，庚寅、辛卯年基本治好 的，虽然没有根治，但是已经不影响工作了。之前也到处在找医生，全国都找过 了，就是没有效果。</p>\n<p>财食日才</p>\n<p>例3乾造：壬戌辛亥己未癸酉（子丑空）</p>\n<p>1、阴阳象法:原局水阴旺，甲寅运，大运见到保护神木，想要水阴有制必须要制住木。</p>\n<p>八字有格局架，取财的方式有两种，一种是去掉格局瑕疵的岁运，不用看五 行，只看十神。还有一种发财的方式，不看格局，看五行。</p>\n<p>如果不看格局，甲寅大运很不好。原局水阴旺，甲寅大运，水阴得到保护，但 原局有用神辛金，所以甲寅、乙卯大运，照样会有几年能发财。等到流年金出现克 木的时候，就能发财。</p>\n<hr>\n<p><strong>来源《05.王相山-子平真诠《格局真诠》544页1》</strong></p>\n<p>都有着这</p>\n<p>样或那样的毛病，只要大运走好，能救应格中的毛病，使格局得以修复，也</p>\n<p>是一样可以获取富贵的。所以《五言独步》说：“有病方为贵，无伤不是奇，</p>\n<p>格中若弃病，财禄喜相随”。</p>\n<p>七、正官格破败救应。</p>\n<p>（一）成而复破。“正官逢财而又逢伤，透官而又逢合”。正官逢财，财</p>\n<p>生官旺，为格之成，但八字又碰到伤官克官，官格就破了，这伤官便是破格</p>\n<p>的忌神。还有，月令正官，官透天干，格之所喜，虽不见破格之伤官，但若</p>\n<p>碰到日元之外的其它字把官星合住，也是破格，这合官之字便是破格忌神。</p>\n<hr>\n<p><strong>来源《京南道人2024-5月深圳》</strong></p>\n<p>好用神之后，我们再看用神的力量，既然找到八字的病，就要找到 用神的药。有病有药才吉，有病药被夺大凶。</p>\n<p>子水他临丙火和午火，子午相冲，子水被午火来冲坏，火当令，水又 没有源，没有金来生，可以定是火旺水败的，寅卯木他的力量全部化火， 他克身，他去生火，火又生身，这是一种展转相生，喜神反而为忌，财官 全部对日主无情。那么就主夭折命。既然身旺用财官，这个财官没有一个 起到好的作用，那么就是身旺克泄耗全无，所以就主夭折命，在死亡命例 里讲过，死是身旺克泄耗太过要死，身弱财官旺极无泄，人也是寿终，用 神在年被坏，那么就主早年，年柱的限运就主平六岁以前，大概的，具体 的要看大运，</p>\n<p>癸巳运是引动水和火，是火旺冲去水，大运凶，在这个大运里面，水 被冲克净，可以看作日主从火的势，那么根据这个信息，就直接看流年， 到这个大运，就告诉日主只有从火势，遇流年再给金水加力，就是凶。下 面我们就直接找金水旺的流年。庚辰年，是逆大运的势，庚辰年是土金一 体，他就逆大运的势，金有力他反抗火，反而被旺火克掉，旺极无泄那么 就主凶祸难免，命主实际在这年遇车祸而亡。</p>\n<p>乾造：丙 壬  戊  丁 辰  辰  子  酉</p>\n<hr>\n<p><strong>来源《王君凌+月光八字命例精析+高级教材+上部240页1730204550》</strong></p>\n<p>合，此年又入狱。</p>\n<p>辛丑年，丑中有水。天干食旺生财而不克官。官星解脱，主不受官</p>\n<p>方管制，此年出狱。</p>\n<p>四十五、 乾：农历1982年十一月十三辰时.      出生：河北</p>\n<p>枭 枭 壬 壬</p>\n<p>戌 子</p>\n<p>大运：丑</p>\n<p>5</p>\n<p>比</p>\n<p>甲</p>\n<p>寅</p>\n<p>15</p>\n<p>劫</p>\n<p>乙</p>\n<p>卯</p>\n<p>25</p>\n<p>伤</p>\n<p>丁</p>\n<p>巳</p>\n<p>45</p>\n<p>财</p>\n<p>戊</p>\n<p>午</p>\n<p>55</p>\n<p>年份：198619962006201620262036</p>\n<p>1.学历：初中。</p>\n<p>2.财富层次：小康。</p>\n<p>3.职业：商人，卖皮革类商品。</p>\n<p>4.婚姻： 一婚已离。庚寅年十八岁结婚，己亥年离婚。</p>\n<p>重点流年：</p>\n<p>2018年正月被逮捕，因为贩卖假货，被起诉逮捕。己亥、庚子至今</p>\n<p>一直在监狱。</p>\n<p>命局分析：</p>\n<p>冬月甲木，首用火调候。戌为火库，调候有力。再看旺衰，甲只通 根于辰中乙，水旺成势。金不克木，反助水旺。财星透出通根于戌，必 用财克印。这是病药取用法。水旺为病，药是火土。用财克印的，为求 财之人。官杀生印为忌，水多主流动性大，没有固定住所，适合经商求</p>\n<p>财。官杀被化尽，主不喜欢受约束，为自由职业。</p>\n<hr>\n<p><strong>来源《子平烛观》</strong></p>\n<p>午</p>\n<p>0 4 岁 1 4 岁 2 4 岁 3 4 岁 4 4 岁 5 4 岁 6 4 岁 7 4 岁</p>\n<p>节后16天，可能戊土当令。壬水无根，论弱。取年上枭神局，月上偏才局用。坐下空亡， 时巳火为根，但被已申绊。偏才无根，局半成。时上伤官为体用。</p>\n<p>海马甲：印局一定要犯艺!枭局，初运视同正印。</p>\n<p>阿星：俺认为金旺，根气浓厚，故先立枭；戌中戊当令，丁火还是可以为丙的根，但丙坐  空了，乙就能把戊土压了；只是病在丙坐空了，但丙假如实了，那么真神就有可能通关了， 所以这个丙火处于月干这个位置是进退两难的；对于岁运，俺认为最喜水透干，因先天有</p>\n<p>体用神乙木通水火的关，那个就注定水是岁运用神之一了。</p>\n<p>大运：丁亥，戊子，己丑，庚寅，辛卯。</p>\n<p>亥子两运是用神运，俺看吉，最少利学业；但子运又透戊土忌神，也不算好，家里不算富</p>\n<p>有；</p>\n<p>己丑运也不好，也是忌神透；庚寅运，体用神得地，吉。</p>\n<p>270、公历：1981年11月08日10时07分   立冬：公历1981年11月07日20时09分 劫财     正印      日柱     劫财</p>\n<p>坤造： 辛        己        庚       辛</p>\n<hr>\n<p><strong>来源《穷通宝鉴  白话评注  下_（明）佚名著；（清）余春台整理；徐乐吾评注；方成竹注译》</strong></p>\n<p>常 人；见壬，贫不太甚。辛藏无丁，贡监衣衿；或见癸制丁，衣禄充足，但有刑  妻之祸，择配须硬命者吉。</p>\n<p>徐乐吾曰：此言用辛金，忌丁火伤用，时值火旺，即使辛金出干，丁火藏 午，亦被销熔，必以壬癸为救。但壬见丁相合，即使不化，总嫌有情，聊胜于 无制，故云贫不太甚。见癸制丁，病药相当，但丁为财，妻财被劫，不免刑 妻，择金水旺者相配为吉。</p>\n<p>方先生曰：四月癸水，火神司权，身临绝地，非印劫并透生助，难以自存。</p>\n<hr>\n<p><strong>来源《05.王相山-子平真诠《格局真诠》544页1》</strong></p>\n<p>，格成煞印相生。但申中庚财透时，</p>\n<p>庚金又合乙克甲，财星坏印，这不是破了煞印相生格吗？子平为何说贵格？</p>\n<p>第二章 七煞格</p>\n<p>-91-</p>\n<p>因为庚有丙隔，没有坏印。八字印星太多，天透两印，支有寅亥强根，寅亥</p>\n<p>一合，煞化成印，印星多达三个以上；寅戌会局，丙坐火库，又长生于寅，</p>\n<p>身亦重。一位独煞被化，用神不清，导致煞轻、身重、印多。故用财星损其</p>\n<p>有余，就能起清格之用。所以用庚金盖头寅木这个组合，起到损印滋煞的作</p>\n<p>用。如果原局独煞一位，印也一位，庚金财星必是破格之神。《子平真诠》没</p>\n<p>有把印多印重的问题讲清楚，只含糊地说“煞又化印，用神不清，而借财以</p>\n<p>清”，为什么不清呢？是印多了不清的，故能用财损其余而清格。《子平真诠》</p>\n<p>是经典之学，但有时论述也模糊，这个例子就是。</p>\n<p>严格地说，七煞格中没有财滋弱煞格。他只是煞邀食制格见印破格，需</p>\n<p>财制印救食；或煞印相生格，印星太多，身强煞弱，需财损印救格，顺便滋</p>\n<p>滋弱煞，以清格局的情况。但《子平真诠》单独把七煞格用财列了出来，我</p>\n<p>们就单独来理解它，消化它。你消化了，理解了病在何处，去病则贵，仍按</p>\n<p>煞邀食制或煞印相生格论，不会犯原则错误。</p>\n<p>三、财滋弱煞格取运喜忌。</p>\n<hr>\n<p><strong>来源《《潘昭佑老师新浪微博所有文章》569页副本》</strong></p>\n<p>不</p>\n<p>足</p>\n<p>。</p>\n<p>制</p>\n<p>掉甲</p>\n<p>才是</p>\n<p>土透</p>\n<p>干成</p>\n<p>象</p>\n<p>呈</p>\n<p>凶之</p>\n<p>时。</p>\n<p>申运</p>\n<p>甲弱</p>\n<p>，寅</p>\n<p>年为</p>\n<p>甲被</p>\n<p>制之</p>\n<p>应。</p>\n<p>壬申</p>\n<p>运甲</p>\n<p>寅年</p>\n<p>是壬</p>\n<p>水出</p>\n<p>干受</p>\n<p>制</p>\n<p>，</p>\n<p>三</p>\n<p>刑</p>\n<p>，寅</p>\n<p>甲被</p>\n<p>制，</p>\n<p>壬水</p>\n<p>之生</p>\n<p>源申</p>\n<p>金也</p>\n<p>受伤</p>\n<p>之运</p>\n<p>，巳</p>\n<p>火戊</p>\n<p>已土</p>\n<p>呈凶</p>\n<p>，阴</p>\n<p>气受</p>\n<p>损</p>\n<p>，</p>\n<p>阴</p>\n<p>阳</p>\n<p>不平</p>\n<p>衡而</p>\n<p>凶。</p>\n<p>此年</p>\n<p>丧母</p>\n<p>之应</p>\n<p>。而</p>\n<p>仅凭</p>\n<p>三刑</p>\n<p>之象</p>\n<p>论凶</p>\n<p>是不</p>\n<p>成立</p>\n<p>的。</p>\n<p>而</p>\n<p>苏论</p>\n<p>，</p>\n<p>三</p>\n<p>刑印</p>\n<p>星原</p>\n<p>神巳</p>\n<p>受制</p>\n<p>而丧</p>\n<p>母</p>\n<p>，</p>\n<p>更</p>\n<p>是胡</p>\n<p>扯</p>\n<p>。</p>\n<p>至</p>\n<p>于局</p>\n<p>中巳</p>\n<p>申合</p>\n<p>化水</p>\n<p>之象</p>\n<p>在</p>\n<p>巳</p>\n<p>月火</p>\n<p>土旺</p>\n<p>月则</p>\n<p>不成</p>\n<p>立</p>\n<p>，</p>\n<p>但</p>\n<p>作为</p>\n<p>一种</p>\n<p>象</p>\n<p>，</p>\n<p>对</p>\n<p>阴阳</p>\n<p>平衡</p>\n<p>起好</p>\n<p>作用</p>\n<p>之象</p>\n<p>，</p>\n<p>岁</p>\n<p>运助</p>\n<p>起</p>\n<p>时</p>\n<p>有财</p>\n<p>官吉</p>\n<p>之应</p>\n<p>，</p>\n<p>但</p>\n<p>吉之</p>\n<p>程度</p>\n<p>很小</p>\n<p>。</p>\n<p>此</p>\n<p>局根</p>\n<p>本之</p>\n<p>病在</p>\n<p>于土</p>\n<p>乘旺</p>\n<p>止阴</p>\n<p>，</p>\n<p>破</p>\n<p>坏了</p>\n<p>阴</p>\n<p>阳</p>\n<p>平衡</p>\n<p>而凶</p>\n<p>。或</p>\n<p>按传</p>\n<p>统说</p>\n<p>法土</p>\n<p>旺埋</p>\n<p>金制</p>\n<p>水而</p>\n<p>凶。</p>\n<p>绝不</p>\n<p>是因</p>\n<p>三刑</p>\n<p>制住</p>\n<p>巳火</p>\n<p>而凶</p>\n<p>。</p>\n<p>再</p>\n<p>例《</p>\n<p>一口</p>\n<p>金》</p>\n<p>1</p>\n<p>1</p>\n<p>3</p>\n<p>页</p>\n<p>列康</p>\n<p>熙帝</p>\n<p>之造</p>\n<p>，</p>\n<p>乾</p>\n<p>：</p>\n<hr>\n<p><strong>来源《2022老人参弟子班培训教材《滴天髓与民间应用》》</strong></p>\n<p>1999  2009  2019  2029  2039  2049  2059  2069</p>\n<p>未 寅 午 子   运 己丑  戊子  丁亥  丙戌  乙酉  甲申  癸未  壬午</p>\n<p>辛未 庚寅 庚午 丙子</p>\n<p>年柱辛未，虽然辛坐未土不如做丑土，但起码是个印，不符合特殊格局的要求。按正常 格局来分析，没有力量的要补上他，有力量的要抑制的。</p>\n<p>找一下这局的毛病出在哪？财生杀旺，毛病在午火。旺了就要想办法解决问题。 学生：午火为病克身有力，喜子午冲去火存金</p>\n<p>京南：说的对，去火说的对，存金就不对，因为局里没有金。子水就是去火的药，食神 制杀了。如果没有子水，有个丑土印也行，丑土泄火。</p>\n<p>天干露三个金，没有通根，辛未有点力，日主是不旺，但是日主是有点力。不考虑七杀 的情况是有力。有力就能食神制杀， 跟日主虚透无力强制杀是不一样的。当然日主还是偏弱 的额，有丑土来化更好。</p>\n<p>子水运去病发大财。戊子运统看也可以， 戊土泄火生金，子水克午火，去病了。如果没 有寅木就是制杀太过了，这个杀有源头，就算制了，也不会把杀制绝了，还是平衡的。</p>\n<p>第 120  页</p>\n<hr>\n<p><strong>来源《037-八字基础 (2)》</strong></p>\n<p>om</p>\n<p>更多易学资料 加微信：804407916 公众号：九鼎学堂 九鼎易学网站: jdyx6.com</p>\n<p>42</p>\n<p>14.2 职业 </p>\n<p>    食伤泄秀, 宜从事文学, 书画, 文教, 艺术等职业. </p>\n<p>    杀印相生, 宜从事军事或外科医事, 或企业之高级职员. </p>\n<p>    官印双清, 宜学习政治, 法律. </p>\n<p>    财官相辅, 宜学习政治, 法律或财政. </p>\n<p>    食伤生财, 宜学习商务, 金融, 财政, 贸易, 或技术性商业. </p>\n<p>    身财两停, 宜商务, 贸易等. </p>\n<p>    伤官伤尽, 宜武备, 如军事, 警备等. </p>\n<p>    杀刃相生, 宜武备, 如军事, 警备等. </p>\n<p>    身旺无依, 最好不要独立经营. </p>\n<p>    身弱无助, 最好不要独立经营. </p>\n<p>    五行需水, 宜流动事业或外交职务. </p>\n<p>    命有驿马, 宜流动事业或外交职务. </p>\n<p>    五行偏枯, 做事多风波起落. </p>\n<p>    八字病重药轻, 作事多出自动, 而费力不讨好. </p>\n<p>    八字病药相济, 作事多出被动, 且现成而省力. </p>\n<p>    比劫重叠, 不宜为宦或从事工商事业, 以从事医生, 会计, 教师等自由职业为宜.</p>\n<h2>参见</h2>\n<li>旺衰派·财运</li>\n<li>格局派·财运</li>\n<li>盲派·财运</li>\n<li>神煞·财运</li>\n<li>调候·财运</li>\n<li>阴阳·财运</li>\n<li>综合·财运</li>\n<li>其他·财运</li>", "source_count": 20, "block_count": 30, "see_also": ["旺衰派·财运", "格局派·财运", "盲派·财运", "神煞·财运", "调候·财运", "阴阳·财运", "综合·财运", "其他·财运"]}]}, {"name": "盲派", "topics": [{"topic": "事业", "content": "<h2>盲派 · 事业</h2>\n<p>共收录 200 条相关内容，来自 59 本书籍。</p>\n<p><strong>来源《民间底层盲派经典初级班  真盲派》</strong></p>\n<p>土生金，连环相生，这就是有气势了。 </p>\n<p>乖衡衡（33539<em>*</em>）：</p>\n<p>南山诗阅   经典民间盲派资料</p>\n<p>12 </p>\n<p>12 </p>\n<p>怎么生的？ </p>\n<p>南山诗阅（2083412<em>*</em>）： </p>\n<p>时柱的寅生丙， 再生己， 再生辛。 但是它这个结构好像不太好， 一</p>\n<p>般般。 </p>\n<p>这个好。 四个木不是在地支相连了， 生天干两个火。 旺的官杀生印</p>\n<p>枭， 口诀简称旺官生印， 印枭简称印。这个串局就比较大了。 火印枭</p>\n<p>是店铺好像也是衣服。 火不就是网络电商， 与美有关的了。 她自己在</p>\n<p>家开网店，那些年还赚点钱。 </p>\n<p>你再看了，两个丙火离得太远。年丙火克辛金变弱了，丙被地支 4</p>\n<p>个木来生， 木多火熄。 时丙火也是木多火熄。 这不就是老师讲的熄火</p>\n<p>局了。印枭受伤影响学习了，影响她店铺了。她学历低，没工作的。</p>\n<p>后来网店赚钱费劲， 又开了公司， 然后压库存， 压力挺大。 辛食伤不</p>\n<p>也是看学习了看财运了？食伤基本含义代表头脑思想所以也可以看</p>\n<p>学习情况啦， 还代表财路， 那就可以看财运了。 好像左边和坐下都不</p>\n<p>好，也被影响了，被拆桥了。己生辛不就是过河了。 </p>\n<p>乖衡衡（33539<em>*</em>）： </p>\n<p>官杀有 4 个呢。</p>\n<hr>\n<p><strong>来源《真正民间底层盲派中级班 第一集 259页 (1)》</strong></p>\n<p>三个水生卯。串局形成了，属</p>\n<p>真正民间底层盲派 简派中级班  第 1 集</p>\n<p>内部讲义仅供内部学习使用</p>\n<p>71 </p>\n<p>71 </p>\n<p>于大串神。比劫生食神。比劫三个就是客户，很多人。注意简派</p>\n<p>的十神像的运用，都是非常简单直接的，并且找的是五行力量凝</p>\n<p>聚的地方。这就是看命局五行要找对路。不能瞎找，乱找，不能</p>\n<p>天马行空的找。比劫生食神。食神是什么？食伤共同含义可以是</p>\n<p>说话或者口才，是财源，米，才华，可以是艺术，可以是吃喝玩</p>\n<p>乐的东西。卯木是手（干支像） 。命理符号组合，很多人，很多</p>\n<p>客户，接触我的才华口才说话或者其他东西。食神是这些，那么</p>\n<p>卯是手，我边说话边手拿一些东西，什么东西，可能是吃喝玩乐</p>\n<p>的东西。 </p>\n<p>  那还有没有串局？两个金干支一体可以同时生三个水。 印枭生</p>\n<p>比劫星。工作地点或者店铺，或者公司有很多客户。大串神。 </p>\n<p>  整个命局只有一个火。巳火左右和上面的干支都不是同类。被</p>\n<p>围制了。这个就是简派典型的围局。巳火被敌人包围，围制了。</p>\n<p>所以是是伤神，给他干倒了，受伤了。受伤严不严重？严重，周</p>\n<p>围敌人那么多，两个打一个和4个打一个，那能一样吗？力量有</p>\n<p>区别。巳火财星受伤比较严重。</p>\n<hr>\n<p><strong>来源《九龙道长笔记 196页 封面》</strong></p>\n<p>大部分的八字，据我个人的一个经验呢，大部分的八字五行流 通之气是非常不顺畅的。因为它的五行不够平衡，</p>\n<p>它少了一样，或者某种五行太多，这都叫不平衡，那大家可以看这个八字案例。这个八 字案例满盘没有金。它哪怕地支的藏干，里边有一丁点金呢，都好。它没有金，那没有金 呢，就出现什么问题，他的性格儿就有缺失，这个人是个土命，咱不管他身强身弱，他是 个土命，那土是生金的。金就是他的食神和伤官。食神和伤官缺失，那你就要分析他什么 缺失，他的食神伤官却是十神代表了福气之神，吃喝玩乐享受之神。这个人没有食神，他</p>\n<p>就不会玩儿。整天就是说很闷。没有伤官，伤官代表了一个奋斗，一个上进心，那他上进</p>\n<p>心也不太强，这就是。五行缺失，五行不平衡，现在是少了一个五行，那我经常铁口直断， 就是有朋友来找我看八字，我直接给他断，我说你要小孩儿不好要，</p>\n<p>女同志食神伤官缺失的话，食神为女，伤官为子。她食神和伤官没有，他不好要孩子，</p>\n<p>那所以这个男同志的食神伤官也代表了他很多的意向，食神为口才。他没有食神，他心里 有事，他不会说，表达不出来</p>\n<hr>\n<p><strong>来源《京南道人2024-5月深圳》</strong></p>\n<p>用，那么就要先 看八字当中的病，比方说我们人生病，有的就适合用西医，有的就适合用中医，就是这个道理。知道了现在八字总体三大派别之后，就是说格局法，旺衰法，还有盲派的财官法，知道这个以后，我们现在要学的是什么样的思路，我们现在 学的就是旺衰法。大家可以参看滴天髓，我们的思路和曲炜李顺向是一样 的，经过实践验证，曲炜和李顺向的思路是非常不错，看事也很到位，怎么样具体学习旺衰法呢，看八字他就如造车一样，造车我们怎么样把这部车造好，第一步我们先要造每一个细小的零件，等到把每个零件都会造之 后，再把他组装起来，这样就组装成一部车，拿到八字上来讲，这个细小的零件就是我们学的每节课的基础知识，所以每节的基础知识都要掌握， 每一节细小的问题都要懂，如果不懂，就影响到以后的运用，我们在学的每一点的讲解，比方说生克制化旺衰等等，都是和造零件是一个道理的， 只有把每一件零件都造好了，到最后才能组装成一部车。</p>\n<hr>\n<p><strong>来源《梁氏批流年》</strong></p>\n<p>流年吉凶时，由于太极点不是日柱、不是命局，而是流年太岁，因此，视角完</p>\n<p>全不同，分析思路更是大相径庭！</p>\n<p>到解析流年的时候，我们已经不再区分盲派命理还是子平命理，而是相互穿插运用，</p>\n<p>互相佐证。犹如一个高明的医生，他既需要各种设备检测结果确诊病人疾病，他也</p>\n<p>需要从病人的脉相、气色、声音等方面进一步确诊疾病。</p>\n<p>杂气财官，命局有冲，流年再逢冲，主家属丧或病。</p>\n<p>一、什么是杂气？</p>\n<p>杂气就是“辰、戌、丑、未”。</p>\n<p>辰戌丑未为什么叫杂气？</p>\n<p>它们有一个共同特征：都是墓库，藏干都有本气、中气、余气，不如“子”中只有“癸</p>\n<p>水”那么纯，故称为杂气。</p>\n<p>可以理解为墓库的代名词，但称为“杂气”时，表达的意思并不是墓库，而是表明它</p>\n<p>们藏干不纯，有其它元素，是个“化合物”。</p>\n<p>二、案例说明</p>\n<hr>\n<p><strong>来源《四柱像法 九阴真经 第一卷 516页》</strong></p>\n<p>财， 粮食也管， 官杀库制比劫库，</p>\n<p>二层半功，省级，管老公。 </p>\n<p>女命：丙申  丙申  乙丑  癸未。</p>\n<p>下面咱们用简派的思路分析这个四柱， 然后你去跟上面盲派教</p>\n<p>材的理论，你去对比吧？ </p>\n<p>  四柱到手，先找串局。 </p>\n<p>  从癸水开始， 水生木， 木生火， 唉， 这是一个连环相生有一定</p>\n<p>气势。 </p>\n<p>  两个土生两个金，中串神，有力量的财星生有力量的官杀星，</p>\n<p>简称旺财生旺官。 两种十神正面含义相加， 典型的办公室管理层</p>\n<p>体制职位管人管理的像。 组合好， 有力量，官杀星体现地位面子</p>\n<p>体面名誉的性质。 </p>\n<p>  两个火克两个金，4 个干支也是中串神，有力量的食伤克有力</p>\n<p>量的官杀。 简称旺食克旺官。 两种十神正面含义相加， 头脑思想</p>\n<p>技术才干加上地位面子荣誉、积极能干管人管理。 </p>\n<p>  看明白没有？简单不简单， 都是找命局里面的重点。 清晰明了，</p>\n<p>简单直接。 找命局里面组合好的地方，有力量的地方。 这样就找</p>\n<hr>\n<p><strong>来源《3497.《全阳盲派八字命理》李安民+222页》</strong></p>\n<p>强水的力量是辛酉，辛酉是官，取象为人，辰为医院，则表示 医院的医生，所以去医院等于加速死亡。</p>\n<p>乾：</p>\n<p>己   己   壬   癸</p>\n<p>巳   巳   申   卯</p>\n<p>己是官杀，代表病气，又在年月，代表外面的杀气病气。己土克 了壬，癸，壬癸可以取象为肾，因为人体的肾是有两个的。</p>\n<p>原局中己得坐下巳生扶，代表病气厉害，双己克壬，癸。壬癸受伤严 重。</p>\n<p>实际此人得了肾癌。</p>\n<p>乾：</p>\n<p>丙  丙  癸  辛</p>\n<p>申  申  亥  酉</p>\n<p>命主1956生，先天的盲人。</p>\n<p>一 、天干两丙为两只眼</p>\n<p>二 、丙无根，弱，又无生，更弱</p>\n<p>三 、辛合两丙，辛旺丙弱， 一合两丙就被合住，等于眼睛闭住了。 所以盲人</p>\n<p>乾：</p>\n<p>辛  甲  己  庚 未  午  巳  午</p>\n<p>一位易友提供案例，直断盲人。</p>\n<p>一 、庚是体，为伤官，食伤代表命主想法，也代表快乐，为啥表示快 乐呢?食伤能生财，能制杀，火克金，不让食伤生财制杀，影响我赚 钱做事了，我干什么你都要制服我，约束我，当然不快乐啊，人都是 向往自由的。午克金，午让我不快乐。</p>\n<hr>\n<p><strong>来源《民间底层盲派经典初级班  真盲派》</strong></p>\n<p>效率比较低， 所以是个普通人， 收入较好些， 此</p>\n<p>人自己开了门 家</p>\n<p>指</p>\n<p>出错</p>\n<p>误，</p>\n<p>昭佑</p>\n<p>不胜</p>\n<p>感激</p>\n<p>，愿</p>\n<p>以重</p>\n<p>金表</p>\n<p>达谢</p>\n<p>意</p>\n<p>论</p>\n<p>寿</p>\n<p>元</p>\n<p>星</p>\n<p>论</p>\n<p>命首</p>\n<p>论寿</p>\n<p>命，</p>\n<p>次论</p>\n<p>贫富</p>\n<p>、贵</p>\n<p>贱、</p>\n<p>吉凶</p>\n<p>。</p>\n<p>有</p>\n<p>盲派</p>\n<p>学者</p>\n<p>预测</p>\n<p>寿命</p>\n<p>的方</p>\n<p>法是</p>\n<p>在八</p>\n<p>字中</p>\n<p>确定</p>\n<p>某一</p>\n<p>个字</p>\n<p>为寿</p>\n<p>元星</p>\n<p>，</p>\n<p>然</p>\n<p>后以</p>\n<p>寿元</p>\n<p>星</p>\n<hr>\n<p><strong>来源《民间底层盲派经典初级班  真盲派》</strong></p>\n<p>午年癸未年都升</p>\n<p>官。 是司法局局长 （原来是学校的学者， 做过院长， 后又辞局长回去</p>\n<p>当院长了） 。</p>\n<p>乾：癸乙甲己（岳飞） </p>\n<p>  未卯子巳 </p>\n<p>简派的分析： 两个水生三个木，旺印生旺比。 未土， 子水都受伤</p>\n<p>的很严重。 是不是岳飞的八字还要再研究。 必须要用盲斗校对。什么</p>\n<p>活木死木，子未害子卯刑都不看。 </p>\n<p>传统盲派的分析：活木。甲生卯月提强根，坐下见水，为活木，</p>\n<p>但子未穿， 比劫羊人库制印得权， 是武官， 但一穿根与印全坏了。 子</p>\n<p>运掌兵权，辛亥运，辛七杀克乙羊人，亥冲巳火，巳为寿元星，制食</p>\n<p>伤寿为寿到了。卜文：子破卯,子为忌。</p>\n<p>南山诗阅   经典民间盲派资料</p>\n<p>485 </p>\n<p>485</p>\n<hr>\n<p><strong>来源《王庆探8探索门命理学象法班笔记2014-王庆1730037215》</strong></p>\n<p>。</p>\n<p>丙丁火旺而得用，眼睛好看。如果火受伤，火成浊了，大多数会有近视眼。甚 至火土太旺成浊的为盲人。</p>\n<p>也有一种贫穷但相貌清秀的组合，就是水木组合。水见木，木克土，水阴无 制。如八字没有其他功能点，则贫穷。相貌上，木为少阳，皮肤白皙、清秀。水木组 合有技术、修道之象。所以水木组合是相貌清秀的技术、修道象。如水木组合再见 火，相貌会更漂亮。</p>\n<p>除此之外，贫贱之人，十有八九相貌平庸，不好看。原因就在于没有功能。可 见功能在论命中的重要性。简单一句话:论命就是论功能。有功能的前提是基础 与功能阴阳和合。</p>\n<p>由此,我们论谈论一下所谓用神。</p>\n<p>用神的实质</p>\n<p>之前所谓的用神，是从日主旺衰平衡的角度来取的用神，以此来论断富贵贫 贱、寿夭吉凶。但当我们知道了，论八字实际上就是在论功能之后，就知道了：真 正的名利用神实际上是应该围绕功能来看的，也就是围绕天地主气、水火、财官来取用神。</p>\n<p>论命首看格局，格局不讲旺衰平衡，针对天地主气而言，驾驭天地主气的就 是用神。</p>\n<p>无格局的看财官,论财官虽要结合旺衰，但核心是财官，而不是旺衰。</p>\n<p>其次看阴阳，阴阳首看水火，发用的阳，就是用神。</p>\n<hr>\n<p><strong>来源《金镖门2024年6月弟子班弟子班秘籍210页_》</strong></p>\n<p>作、表企业，年上的  印就是一个国企，乙木代表文化，巳又去制庚金，这些都是带有科技公司的像，搞软件。</p>\n<p>看八字寻根处，有库坐根就看库坐根，有地支做功就先看地支做功，做功就代表核心 的意思，也代表了具体职业的取像，在结合大运流年就看的很清楚。</p>\n<p>第四十九章：金口诀--盲派论大运流年的分析方法</p>\n<p>1、断语解析</p>\n<p>大运和流年都是在讲一件事情，就是应期的问题，这是我们拿到一个四柱八字以后， 对整个原局详细分解后，看应期就是看他动态的一个过程，四柱八字的原局它是一个静态 中间的动态，相当于手机，组装已经组装好了，线路怎么接，使用寿命是多长?都已经设 定好了，静态中间的动态是我要使用它，使用功能是什么?功能就是静态中间的动态关系， 功能在什么样的情况下，或产生什么样的结果，或因为使用人 ，拿到八字上来讲，这个细小的零件就是我们学的每节课的基础知识，所以每节的基础知识都要掌握， 每一节细小的问题都要懂，如果不懂，就影响到以后的运用，我们在学的每一点的讲解，比方说生克制化旺衰等等，都是和造零件是一个道理的， 只有把每一件零件都造好了，到最后才能组装成一部车。</p>\n<hr>\n<p><strong>来源《梁氏批流年》</strong></p>\n<p>流年吉凶时，由于太极点不是日柱、不是命局，而是流年太岁，因此，视角完</p>\n<p>全不同，分析思路更是大相径庭！</p>\n<p>到解析流年的时候，我们已经不再区分盲派命理还是子平命理，而是相互穿插运用，</p>\n<p>互相佐证。犹如一个高明的医生，他既需要各种设备检测结果确诊病人疾病，他也</p>\n<p>需要从病人的脉相、气色、声音等方面进一步确诊疾病。</p>\n<p>杂气财官，命局有冲，流年再逢冲，主家属丧或病。</p>\n<p>一、什么是杂气？</p>\n<p>杂气就是“辰、戌、丑、未”。</p>\n<p>辰戌丑未为什么叫杂气？</p>\n<p>它们有一个共同特征：都是墓库，藏干都有本气、中气、余气，不如“子”中只有“癸</p>\n<p>水”那么纯，故称为杂气。</p>\n<p>可以理解为墓库的代名词，但称为“杂气”时，表达的意思并不是墓库，而是表明它</p>\n<p>们藏干不纯，有其它元素，是个“化合物”。</p>\n<p>二、案例说明</p>\n<hr>\n<p><strong>来源《四柱像法 九阴真经 第一卷 516页》</strong></p>\n<p>财， 粮食也管， 官杀库制比劫库，</p>\n<p>二层半功，省级，管老公。 </p>\n<p>女命：丙申  丙申  乙丑  癸未。</p>\n<p>下面咱们用简派的思路分析这个四柱， 然后你去跟上面盲派教</p>\n<p>材的理论，你去对比吧？ </p>\n<p>  四柱到手，先找串局。 </p>\n<p>  从癸水开始， 水生木， 木生火， 唉， 这是一个连环相生有一定</p>\n<p>气势。 </p>\n<p>  两个土生两个金，中串神，有力量的财星生有力量的官杀星，</p>\n<p>简称旺财生旺官。 两种十神正面含义相加， 典型的办公室管理层</p>\n<p>体制职位管人管理的像。 组合好， 有力量，官杀星体现地位面子</p>\n<p>体面名誉的性质。 </p>\n<p>  两个火克两个金，4 个干支也是中串神，有力量的食伤克有力</p>\n<p>量的官杀。 简称旺食克旺官。 两种十神正面含义相加， 头脑思想</p>\n<p>技术才干加上地位面子荣誉、积极能干管人管理。 </p>\n<p>  看明白没有？简单不简单， 都是找命局里面的重点。 清晰明了，</p>\n<p>简单直接。 找命局里面组合好的地方，有力量的地方。 这样就找</p>\n<hr>\n<p><strong>来源《《君臣之道》》</strong></p>\n<p>定时辰需要用到多个知识点，大方面讲有以下几条</p>\n<p>一、阴阳</p>\n<p>二、先天后天八卦数</p>\n<p>三、河图洛书数(特记)</p>\n<p>四、地支藏天干，总称天地阴阳真</p>\n<p>五、五音诀</p>\n<p>庚戌时，庚数为1,戌数为6,6减1等于5,男命逢5变二，所以兄弟两个，也代表排行为2通</p>\n<p>过这些方法可推出父亲兄弟姐妹六个，五女一男，父亲姐妹兄弟五个，三男两女有伤老二。</p>\n<p>小时候没上过学，乙庚合在年柱，坏了卯所以没上过学。</p>\n<p>资亿万富翁，卯戌合，卯未合，卯木克丑士，土木结构，做土木工程</p>\n<p>如何看当官</p>\n<p>乾 乙 未 丁 亥 甲 午 丙 子</p>\n<p>甲木生亥月长生地，有水有根又见丙活木，午未合，子午冲制水，午亥合丁亥自合，木火制水，</p>\n<p>食伤制印代表权力。此人是个官员，走未卯升官，子未穿卯，壬午，癸未都升官，升为厅级干部。</p>\n<p>寻物口诀</p>\n<p>被盗失物，用当时问事的时空时干断，看盗贼是何人，空亡的时刻难寻找</p>\n<p>看盗贼是啥人，以问事当日的时干定是啥人，就是用时空的时干断。</p>\n<hr>\n<p><strong>来源《3497.《全阳盲派八字命理》李安民+222页》</strong></p>\n<p>强水的力量是辛酉，辛酉是官，取象为人，辰为医院，则表示 医院的医生，所以去医院等于加速死亡。</p>\n<p>乾：</p>\n<p>己   己   壬   癸</p>\n<p>巳   巳   申   卯</p>\n<p>己是官杀，代表病气，又在年月，代表外面的杀气病气。己土克 了壬，癸，壬癸可以取象为肾，因为人体的肾是有两个的。</p>\n<p>原局中己得坐下巳生扶，代表病气厉害，双己克壬，癸。壬癸受伤严 重。</p>\n<p>实际此人得了肾癌。</p>\n<p>乾：</p>\n<p>丙  丙  癸  辛</p>\n<p>申  申  亥  酉</p>\n<p>命主1956生，先天的盲人。</p>\n<p>一 、天干两丙为两只眼</p>\n<p>二 、丙无根，弱，又无生，更弱</p>\n<p>三 、辛合两丙，辛旺丙弱， 一合两丙就被合住，等于眼睛闭住了。 所以盲人</p>\n<p>乾：</p>\n<p>辛  甲  己  庚 未  午  巳  午</p>\n<p>一位易友提供案例，直断盲人。</p>\n<p>一 、庚是体，为伤官，食伤代表命主想法，也代表快乐，为啥表示快 乐呢?食伤能生财，能制杀，火克金，不让食伤生财制杀，影响我赚 钱做事了，我干什么你都要制服我，约束我，当然不快乐啊，人都是 向往自由的。午克金，午让我不快乐。</p>\n<h2>参见</h2>\n<li>旺衰派·财运</li>\n<li>格局派·财运</li>\n<li>神煞·财运</li>\n<li>调候·财运</li>\n<li>病药·财运</li>\n<li>阴阳·财运</li>\n<li>综合·财运</li>\n<li>其他·财运</li>", "source_count": 78, "block_count": 303, "see_also": ["旺衰派·财运", "格局派·财运", "神煞·财运", "调候·财运", "病药·财运", "阴阳·财运", "综合·财运", "其他·财运"]}]}, {"name": "神煞", "topics": [{"topic": "事业", "content": "<h2>神煞 · 事业</h2>\n<p>共收录 304 条相关内容，来自 110 本书籍。</p>\n<p><strong>来源《民间师父八字课程学习笔记本地》</strong></p>\n<p>。可惜啊可惜！亥卯 未局“卯”填实后冲日支丑，这在封建夫权社会为没有夫君之象。</p>\n<p>◇  故为大凶格。</p>\n<p>◇  日主坐杀，时支亦杀，天干透双杀，两处羊刃，身不弱有比劫无印， 用神只可取乙木。</p>\n<p>◇  用神食神不弱，一生有口福。</p>\n<p>◇  癸水生冬季未时，此时天空没有太阳。己象意为阴云，时柱亦己， 学员U阴云之象。乙象为微风中摇摆的柔草，也是败象。地支象意： 亥 为大洼地。丑之象亦为阴天，同时又是小土屋。未之象还是阴天，低洼 处。</p>\n<p>◇  日主癸似坑中一摊柔性的雪花霜粉。</p>\n<p>◇  想一想，低洼潮湿、暗淡无光的环境， 日主被七杀围，地支两处伤 官，命主能说会道但却只有小聪明，命主有口福。。。这些象，对于一 名女子不言而喻了。</p>\n<p>◇  批八字读象，就读这三个象：</p>\n<p>◇  第一，四柱之象——就是识大局，识整体。</p>\n<p>◇  第二，地支之象——来自八卦理论，识空间、方位、气候、季节等 状态。</p>\n<p>◇  第三，十神之象——来自五行理论，属于人物细节方面（就是古书 上说的人元方面）。</p>\n<p>◇  取象比类，就是解读干支这二十二个符号。</p>\n<p>◇  朋友们，是不是很简单啊？</p>\n<p>◆ 宗亲类象：</p>\n<hr>\n<p><strong>来源《文曾 盲派独门绝技》</strong></p>\n<p>一定是动的，所以有的时候是你不得不动， 有的时候是你追求所动，有的时候是主动有时被动，那比如说我不得</p>\n<p>不走，这种就是被动，比如说被官星克禄的时候，就是我的体受制的时候，都有不得不走的象，如果说是体制用的时候，比如说我用食伤制官星，我用比劫制财星的时候，这一般都是主动出行，体代表我的主动，体被克制的时候代表被动，被动出行，所以我们一般都是什么时候会有被动出行，一、财克印的时候会有被动出行，二、官克比劫的时候，官克比劫的时候会有被动出行，这两个是被动出行，其他的主动出行。</p>\n<p>二十六、出行的远近与方位(下)</p>\n<p>我们再来继续看：</p>\n<p>出行的远近与方位</p>\n<p>大运逢冲人必动，引动年上必远行引动月上离家近，引动坐下在家中盘中驿马星多见，引动哪个动那个驿马逢合要找冲，原局逢冲要找合原局若无驿马星，就以年日地支定寅午戌马在申子辰</p>\n<p>亥卯未马在巳酉丑</p>\n<p>印星逢动要搬家，求学</p>\n<p>财星逢动要求财，对象</p>\n<p>食伤逢动要游玩，投资</p>\n<p>官星逢动要调动，出差</p>\n<hr>\n<p><strong>来源《杨清娟盲 p>\n<p>护之</p>\n<p>，乙</p>\n<p>己鼠</p>\n<p>猴</p>\n<p>乡，</p>\n<p>贵人</p>\n<p>会辰</p>\n<p>财库</p>\n<p>合印</p>\n<p>局！母</p>\n<p>有财得之</p>\n<p>，必</p>\n<p>须寅</p>\n<p>卯辰</p>\n<p>全极</p>\n<p>贵、</p>\n<p>辰</p>\n<p>合酉</p>\n<p>化官</p>\n<p>，子</p>\n<p>合丑</p>\n<p>化财</p>\n<p>，寅合</p>\n<p>亥化日神，身强财官旺之局。</p>\n<p>二十，乙</p>\n<p>酉</p>\n<p>日神</p>\n<p>冲印</p>\n<p>星</p>\n<p>贵人</p>\n<p>，夫</p>\n<p>星</p>\n<p>与母</p>\n<p>不和</p>\n<p>，</p>\n<p>因癸</p>\n<p>壬败</p>\n<p>酉夫</p>\n<p>旺禄位，</p>\n<p>冲卯</p>\n<p>，癸</p>\n<p>正母</p>\n<p>长生</p>\n<p>位，</p>\n<p>印</p>\n<p>星天</p>\n<p>乙贵</p>\n<p>人位</p>\n<p>，冲</p>\n<p>印星</p>\n<p>羊刃帝</p>\n<p>旺，与母</p>\n<p>常争</p>\n<p>吵。</p>\n<p>冲七</p>\n<p>刹长</p>\n<p>生，</p>\n<p>有</p>\n<p>外遇</p>\n<p>之情</p>\n<p>，冲</p>\n<p>劫财</p>\n<p>败地</p>\n<p>，兄妹</p>\n<p>犯桃花破财，因子丑化土，为甲乙木之财星。</p>\n<hr>\n<p><strong>来源《05.王相山-子平真诠《格局真诠》544页1》</strong></p>\n<p>官煞</p>\n<p>成了印星不可损伤的源神，就不以官煞混杂论。</p>\n<p>二、官煞混杂的去留原则。</p>\n<p>命有官煞混杂，必须取清。去官煞混杂，只有两种办法：一是去官留煞，</p>\n<p>以煞论；二是去煞留官，以官论。官主贵，煞主威，故《元理赋》云：“去煞</p>\n<p>留官当论贵，去官留煞主威权”。行运上，“留官去煞莫逢煞，留煞去官休见</p>\n<p>官”。又曰：“官星七煞交差，却有合煞为贵”。合煞有二义，有合去合来，</p>\n<p>合来是去官留煞，合去是去煞留官。</p>\n<p>去官留煞：假令六甲生人，透辛正官，又透庚七煞，是官煞混杂，柱中却</p>\n<p>有乙木合庚煞，有丁火克辛官星，此是羊刃合煞，去官留煞。假令六己生人，</p>\n<p>透出甲正官，又透乙七煞，是官煞混杂，柱中却有庚克甲正官，来合乙七煞，</p>\n<p>是伤官合煞，去官留煞。</p>\n<p>去煞留官：如六庚生人，柱透丙煞，又透丁官，是官煞混杂，若柱有壬克</p>\n<p>丙，又来合丁，是伤官制煞，去煞留官。除一般常理外，去煞留官还要注意：</p>\n<p>1.凡看去留，先看官煞孰重孰轻。混杂轻重关系问题严重程度，官轻混</p>\n<p>煞问题小，恶煞混官问题大，常常有性命之忧。轻者易去，重者难去。官轻</p>\n<p>则宜去官留煞，煞轻则宜去煞留官。如甲生七月上旬， 为煞得令，纵有丙火，</p>\n<p>亦不能去。因为煞重食轻，就无力去煞。</p>\n<hr>\n<p><strong>来源《015-2009.07_《四柱学教程》_徐丙昕著 (2)》</strong></p>\n<p>男性而吃亏。</p>\n<p>官星离日主位置近，与男性关系密切，受男性影响也大；若离日主远，则关</p>\n<p>系也淡，影响也小。</p>\n<p>女性官星不宜太旺，也不宜官杀混杂，不然大都有感情的困扰，也带有</p>\n<p>不贞之嫌。故女命以一位正官或一位七杀星最理想，若是喜神，能近日干或</p>\n<p>合日干，又坐长生、冠带、建禄或帝旺者，丈夫必发达，婚姻幸福，并得丈</p>\n<p>夫之疼爱。</p>\n<p>如果一个人四柱中带桃花，或走到桃花运，也是异性缘较佳的标志，有</p>\n<p>关这一点，我们放到神煞的章节中去讨论。</p>\n<p>人们常说，“千里姻缘一线牵，无缘对面不相识。 ”结婚最讲究的就是</p>\n<p>缘分问题，缘分是什么？用四柱预测学的观点来看，就是两个人四柱中的天</p>\n<p>干，地支相生相合或五行上旺衰的互补关系，以及他们与流年，大运等的相</p>\n<p>生相合关系，与异性结缘恋爱结婚确定就是以此为根据的。</p>\n<hr>\n<p><strong>来源《丁亮   君臣命理525》</strong></p>\n<p>神衰，一生必定无</p>\n<p>功人”这个口决。</p>\n<p>我们看功神丁火的旺衰，丁火在月令亥水为胎地，在支寅为死地，在</p>\n<p>日时支为墓地，看旺衰必定掌握十二长生决。你看这个丁火用神，一点力 气都没有，象一个小孩一样，能做什么工作有什么成就，一个小孩怎能有 能力去创业，又怎样取事生子呢?盲师运用十二长生决，对事物类象运用 得出神入化。</p>\n<p>乙木假神，在月令为死地，本来为好事，但由于亥寅合化木成功。 乙木在寅为羊刃地，这个羊刃就一把锋利的刀，为乙木帮凶助威，甲木 为格，乙木为假，真假之神混杂无解，为比劫争夺亡命。比劫可以劫财， 可以劫妻，可以夺官，可以夺尽一切物质。正因为原命局，己形成了有 格无用之命。正应了命理天子，所讲的事实。也正应了：口决“假神生 旺，用神衰，一生必定无功人”的准确定语。</p>\n<p>我们这两个命造可以看出，一个是将军命，一个是无功人。从定格  上来讲是以月令中提取出来的。为何差别这么大。主要原因就要看格神  最终能不能成形、成气、成精、成格。“成格者必贵，成局者必富。”</p>\n<hr>\n<p><strong>来源《真正民间底层盲派中级班 第一集 259页 (1)》</strong></p>\n<p>花，黑陷，左眼已失明。其母梦见一老妇说： “我是观</p>\n<p>音，居鸿泽家三年，你可去求神膏，贴左太阳穴。 ”</p>\n<p>其母醒后，求到了膏药。医生喝斥他们胡闹，用灯火治盲眼，导致眼睛爆出，</p>\n<p>仅剩筋悬着未掉落。医生无计可施，便偷偷逃走了。 </p>\n<p>母亲恳切祈祷大士，念《心经》二千遍，仍然贴膏，左眼睛渐渐收进去了，盲</p>\n<p>目复明，天花也痊愈了。 《海南一勺》 </p>\n<p>  ●清时，江西浮梁县的程昭，曾因患痞病（腹中长硬块） ，念诵《心经》而</p>\n<p>治愈，所以经常持诵不间断。道光年间，春官下第，程回老家。在江中船翻沉，</p>\n<p>程漂荡了十余里，一心念《心经》 。好像有东西托着他的脚，他才得借以微坐，</p>\n<p>最终得救。    《海南一勺》 </p>\n<p>  ●陈泰和，乡试时生病，梦见两只猫、三只鼠、八只蛤蟆前来索命。陈许</p>\n<p>愿念诵《心经》超度它们。有公差说： “我禀告上级奉复。 ” </p>\n<p>后来，梦见公差说： “文昌帝君初说陈泰和是今科解元，为什么如此暴戾？如果</p>\n<p>托付苍生给他，岂不荼毒生灵？如果允许他入场参加考试，实在太宽待纵容他</p>\n<p>了。</p>\n<hr>\n<p><strong>来源《003-2003.12《命理技法与决断：四维时空占吉凶》_董忠清著 (1)》</strong></p>\n<p>4407916 公众号：九鼎学堂</p>\n<p>获取更多最新易学资料 加微信：804407916 公众号：九鼎学堂</p>\n<p>四维时空占吉凶</p>\n<p>18 、论禄神</p>\n<p>甲禄在寅，乙卯在卯，丙戊在巳，丁已在午，庚禄在申，</p>\n<p>辛禄在酉，壬禄在亥，癸禄在子。</p>\n<p>其查法以日干为主，四柱中地支见者为是，禄者系爵禄，</p>\n<p>禄在年支叫岁禄，在月地叫建禄，在日支叫专禄，在时支称归</p>\n<p>禄。</p>\n<p>注解：身旺的禄财宜见克泄，禄马衰兼死绝若无吉神加助</p>\n<p>时，定知破祖多劣，一律均怕入空亡或犯冲，如果取以为用，</p>\n<p>不幸入空亡或犯冲，又不行吉星解厄，，势必贫贱为奴，多主</p>\n<p>乞食飘零东西，即使不为如乞，也必是虚名虚誉。禄犯冲，谓</p>\n<p>之破禄，例如：甲禄在寅，见申为破，则气散不聚，贵者停职</p>\n<p>剥官，常人衣禄不足，岁禄和建禄逢冲，则贫无祖业，抛乡离</p>\n<p>故，奔走它方营谋。又禄多身旺，不宜见羊刃或劫财，否则克</p>\n<p>父，克妻，又禄为比肩，处临官旺地，日元弱最喜禄神来扶助</p>\n<p>帮身，再遇印生，吉星相助，建勋立业为有福之人。禄之吉凶</p>\n<p>喜忌如下：</p>\n<p>甲禄在寅，见丙为福星禄，戊寅为伏马禄俱吉。庚寅谓之</p>\n<p>破禄，半吉半凶，壬寅为之正禄，（带截路空亡，必为僧道）</p>\n<p>甲寅谓之长生禄大吉。</p>\n<h2>参见</h2>\n<li>旺衰派·事业</li>\n<li>格局派·事业</li>\n<li>盲派·事业</li>\n<li>调候·事业</li>\n<li>病药·事业</li>\n<li>阴阳·事业</li>\n<li>综合·事业</li>\n<li>其他·事业</li>", "source_count": 110, "block_count": 304, "see_also": ["旺衰派·事业", "格局派·事业", "盲派·事业", "调候·事业", "病药·事业", "阴阳·事业", "综合·事业", "其他·事业"]}, {"topic": "健康", "content": "<h2>神煞 · 健康</h2>\n<p>共收录 566 条相关内容，来自 125 本书籍。</p>\n<p><strong>来源《民间师父八字课程学习笔记本地》</strong></p>\n<p>格局，论配合，是徐子平的初衷。</p>\n<p>◇  格局论，是取类比象。</p>\n<p>◇  干支搭配合理才可成为大吉格局。</p>\n<p>◇  继续说上面例子，如果原局没有丁火，大运遇到丁火亦吉。</p>\n<p>◇  日干庚金，取用神时先要想到丁火，这是经验。</p>\n<p>◇  古语有言“土多埋金”，难道“火多就不埋金”吗？火生土啊！</p>\n<p>◇  所以，批八字是要在动态条件下辩证。</p>\n<p>◇  如食神制杀是大格局。。。定格局至少要看两股力量，这里，食神 对七杀。</p>\n<p>◇  如羊刃驾杀是大格局。。。定格局至少要看两股力量，这里，羊刃 对七杀。</p>\n<p>◇   《子平真诠》只看静态月令中的某一五行。。。显然经不起推敲。</p>\n<p>◇  说句大白话：定格局主要在于分出来命主在社会阶层档次，此即大 功告成了。至于损官、破财、疾厄之类等这些先放在一边免谈，大道至 简，不要制造麻烦，否则一塌糊涂。。。</p>\n<p>◇   定格局要参看大限，还有大运。</p>\n<p>◇  事物皆一分为二。月令固然重要，却也只是冰山一角。</p>\n<p>◇  死抠“月令格局”，就和练习瞄准打靶子一样，靶子是死的。</p>\n<p>◇  活用“格局用神”，就和瞄准打流动靶子一样，靶子是活的，或许是 动物，或许是战场上的敌人。</p>\n<hr>\n<p><strong>来源《民间师父八字课程学习笔记本地》</strong></p>\n<p>。可惜啊可惜！亥卯 未局“卯”填实后冲日支丑，这在封建夫权社会为没有夫君之象。</p>\n<p>◇  故为大凶格。</p>\n<p>◇  日主坐杀，时支亦杀，天干透双杀，两处羊刃，身不弱有比劫无印， 用神只可取乙木。</p>\n<p>◇  用神食神不弱，一生有口福。</p>\n<p>◇  癸水生冬季未时，此时天空没有太阳。己象意为阴云，时柱亦己， 学员U阴云之象。乙象为微风中摇摆的柔草，也是败象。地支象意： 亥 为大洼地。丑之象亦为阴天，同时又是小土屋。未之象还是阴天，低洼 处。</p>\n<p>◇  日主癸似坑中一摊柔性的雪花霜粉。</p>\n<p>◇  想一想，低洼潮湿、暗淡无光的环境， 日主被七杀围，地支两处伤 官，命主能说会道但却只有小聪明，命主有口福。。。这些象，对于一 名女子不言而喻了。</p>\n<p>◇  批八字读象，就读这三个象：</p>\n<p>◇  第一，四柱之象——就是识大局，识整体。</p>\n<p>◇  第二，地支之象——来自八卦理论，识空间、方位、气候、季节等 状态。</p>\n<p>◇  第三，十神之象——来自五行理论，属于人物细节方面（就是古书 上说的人元方面）。</p>\n<p>◇  取象比类，就是解读干支这二十二个符号。</p>\n<p>◇  朋友们，是不是很简单啊？</p>\n<p>◆ 宗亲类象：</p>\n<hr>\n<p><strong>来源《文曾 盲派独门绝技》</strong></p>\n<p>一定是动的，所以有的时候是你不得不动， 有的时候是你追求所动，有的时候是主动有时被动，那比如说我不得</p>\n<p>不走，这种就是被动，比如说被官星克禄的时候，就是我的体受制的时候，都有不得不走的象，如果说是体制用的时候，比如说我用食伤制官星，我用比劫制财星的时候，这一般都是主动出行，体代表我的主动，体被克制的时候代表被动，被动出行，所以我们一般都是什么时候会有被动出行，一、财克印的时候会有被动出行，二、官克比劫的时候，官克比劫的时候会有被动出行，这两个是被动出行，其他的主动出行。</p>\n<p>二十六、出行的远近与方位(下)</p>\n<p>我们再来继续看：</p>\n<p>出行的远近与方位</p>\n<p>大运逢冲人必动，引动年上必远行引动月上离家近，引动坐下在家中盘中驿马星多见，引动哪个动那个驿马逢合要找冲，原局逢冲要找合原局若无驿马星，就以年日地支定寅午戌马在申子辰</p>\n<p>亥卯未马在巳酉丑</p>\n<p>印星逢动要搬家，求学</p>\n<p>财星逢动要求财，对象</p>\n<p>食伤逢动要游玩，投资</p>\n<p>官星逢动要调动，出差</p>\n<hr>\n<p><strong>来源《015-2009.07_《四柱学教程》_徐丙昕著 (2)》</strong></p>\n<p>4407916 公众号：九鼎学堂</p>\n<p>获取更多最新易学资料 加微信：804407916 公众号：九鼎学堂</p>\n<p>父临库地，或财源被劫，父命先亡。</p>\n<p>兄弟身旺，父母有亏。</p>\n<p>偏财受克，父先丧。</p>\n<p>父母一离一合，定为印星临财。</p>\n<p>比肩重，父寿难延。天元刑战，父母不全。</p>\n<p>财空印旺，早年丧父。年逢杀刃，幼丧父母。</p>\n<p>羊刃月运，有母无父，伤官带刃，克父损母。</p>\n<p>柱逢单刃，克父。</p>\n<p>父母星坐空刑死绝之地，主父母贫穷，又被刑伤，寿短，或死于外乡不</p>\n<p>善终。</p>\n<p>柱带劫杀、亡神、羊刃、元辰者，克父母。</p>\n<p>月生日干，不喜逢财地，逢之克母或母有病。</p>\n<p>印被冲克，母贤而早亡。</p>\n<p>印缓被克，母不死则离。</p>\n<p>财多伤印，少年克母。印被伤，母早亡。</p>\n<p>幼年丧母，只因财多印死。</p>\n<p>柱中袅食并临，克母。</p>\n<p>财印俱伤，克母丧妻。</p>\n<p>日时两重犯亡神者克母。</p>\n<p>印星太弱，又坐绝地，母早衰。</p>\n<p>克印临孤辰、寡宿者，主双亲孤独，六亲无靠。</p>\n<p>年坐正官被伤官冲克，主父母多病或寿不长。</p>\n<p>年坐七杀、羊刃者，双亲性暴。</p>\n<p>印重官杀多，父母不得力。</p>\n<p>年柱用神岁运天冲地克，父母有丧。</p>\n<p>大运冲克提纲，流年岁君与年柱天冲地克者，不丧父则死母或父母俱</p>\n<p>丧。偏财逢岁运天克地冲时，父亡之期。</p>\n<hr>\n<p><strong>来源《杨清娟盲派八字基础班》</strong></p>\n<p>汗液、妇科病。、</p>\n<p>原命有子水，天干不透癸水，子水代表鬼，也就是所说的八字不清，容易招不</p>\n<p>干净的东西。子为玄学星，亥水为仙（亥水旺的情况下是仙，弱的情况下不是），</p>\n<p>亥水弱代表风，为风水，喜欢做的事业和壬癸水相同。</p>\n<p>寅卯木代表的事物及身体部位：毛发、手掌、肝、臂、指甲、神经、十指、其</p>\n<p>中卯木代表玄学星，喜欢做的事业和甲乙木相同。</p>\n<p>辰土代表身体部位：肩、胸、腹、腰、肠、消化系统。 喜欢的事业与戊己土</p>\n<p>相同。</p>\n<p>丑土代表身体部位：腹部、脾胃、子宫、皮肤、腰、嘴唇、阴茎、乳房。 喜</p>\n<p>欢做的事业和戊己土相同，丑土是华盖星。</p>\n<p>巳火代表的身体部位：心脏、面部、口腔、唇、肛门。 喜欢做的事业与丙火</p>\n<p>一样。</p>\n<p>午火代表的事物及身体部位：眼睛、额头、舌、血液。 喜欢做的事业与丁火</p>\n<p>一致。</p>\n<hr>\n<p><strong>来源《2022老人参弟子班培训教材《滴天髓与民间应用》(1)》</strong></p>\n<p>。用官又有伤官制官， 是</p>\n<p>不正确的。那肯定得犯官非， 但是命局有印护官了，保卫国家了，那就是护官的。当然这个</p>\n<p>亥水是独官，也不能说是犯法，如果再有个子水，那肯定就是犯法。但要是没有印， 把水去</p>\n<p>尽了也不犯法。要是去不尽就犯法了。</p>\n<p>然后走南方的时候去官星之寡发财。午火大运发财，但走未运的时候为啥没发财？走未</p>\n<p>运亥卯未，木旺。</p>\n<p>印是护卫国家的，他当兵去了。这没有什么劫财七杀， 也没有什么羊刃抗杀，根本就没</p>\n<p>有，他一样当兵的。</p>\n<p>学生：真正意义上这个八字has需要火来通关，去寡</p>\n<p>京南：没错，所以说此命是假去寡，但也叫去寡。当走上火运的时候就去寡了。所以说 我们</p>\n<p>要学活嘛，表面上看有印不是去寡，实际上还是叫去寡的。八字都是来回来去的变化， 会</p>\n<p>这种变化了才可以。</p>\n<p>乾 辛 庚 己 戊 1983 1993 2003 2013 2023 2033 2043 2053</p>\n<hr>\n<p><strong>来源《037-八字基础 (2)》</strong></p>\n<p>明. </p>\n<p>火命夏生,体健聪明. </p>\n<p>土命夏生,体健聪明. </p>\n<p>金命秋生,体健聪明. </p>\n<p>水命冬生,体健聪明.</p>\n<p>月带七杀,背父而生. </p>\n<p>时带伤官,子息凶顽. </p>\n<p>柱中食伤多,难为子息. </p>\n<p>印绶枭神,难得子息. </p>\n<p>柱中儿女宫遇墓,子女不多病则有牢狱 ,或残</p>\n<p>疾难养. </p>\n<p>偏财偏官偏印主偏生庶出 ,不然是第三第四</p>\n<p>胎. </p>\n<p>杀带刑,克子. </p>\n<p>母明父暗,多是偷生. </p>\n<p>女犯伤官偏印,丧子刑夫. </p>\n<p>日时辰戌两相冲,有子难登科. </p>\n<p>女命时临华盖遇空亡,一生不产. </p>\n<p>小儿身弱杀旺叠,不死也残. </p>\n<p>食神重叠,枭神太旺,无乳. </p>\n<p>女命官星处死地,又泄气太过,克子或无子. </p>\n<p>辰戌丑未全,既克夫又不育. </p>\n<p>女命生逢沐浴,头男长女须防哭. </p>\n<p>日临刑冲破会刃,主克头子. </p>\n<p>官休又逢伤,一子难送终. </p>\n<p>伤官太旺,抱姐妹之子为儿 </p>\n<p>七杀持两头,到老无后. </p>\n<p>伤官立四支,常哭儿. </p>\n<p>食神破用神,子败家. </p>\n<p>日主旺,食伤官杀落空亡,无子. </p>\n<p>年月财星克时印,防子伤残. </p>\n<p>时上官星无气,有子难养. </p>\n<p>食伤逢冲,于子女不利. </p>\n<p>时上逢伤官,有子难继书香. </p>\n<p>时座偏印,子女性情不良. </p>\n<p>时座劫财,子女多而败家.</p>\n<hr>\n<p><strong>来源《《巫咸撮要》解读》</strong></p>\n<p>好的运气与否。</p>\n<p>被动迎接好运，成就自然小。</p>\n<p>被动迎接恶运，损失当然大。</p>\n<p>在八字中的体现，也是一样的。</p>\n<p>财官八字，见伤官不喜，那就要增加印星的力量，克制伤官。</p>\n<p>尽量给伤官最小的活动和发挥空间，以及机会。</p>\n<p>所以，大运好坏，一定要找原局。</p>\n<p>原局的弱点，就是大运攻击的地方。</p>\n<p>原局的优点，也是大运辉煌的地方。</p>\n<p>流年则不同，流年是引动。</p>\n<p>比如原局七杀不喜，流年七杀，肯定是凶。</p>\n<p>原局正官大喜，正官流年，升官发财。</p>\n<p>大运，不只看大运本身，看大运与原局的关系。</p>\n<p>冲了哪支，刑了哪支，合了哪干，带什么神煞，是不是长生，是不是得禄。</p>\n<p>流年也是如此，合了没，冲了没，象在哪里。</p>\n<p>等等。</p>\n<p>所以啊，不要急着学流年大运。</p>\n<p>一定要把原局整明白，因为流年大运吉凶，都是建立在原局基础之上。</p>\n<hr>\n<p><strong>来源《金镖门2024年6月弟子班弟子班秘籍210页_》</strong></p>\n<p>的男女是不婚、同性、 淫贱，这种特殊的情况会涉及到神煞的概念，比如女犯六煞淫贱命，等这些后面在讲。当</p>\n<p>女人坐禄，比如辛酉，丁巳，戊戌，这些坐的都是比劫。女犯比劫妨公婆，嫁进夫家做主 人。首先讲就是女人比较独立，很自我，同时生理需求比较弱，怎么看生理需求?比如丁 巳，戊戌，辛酉，壬子等，一柱都是比劫星，金水还好一点，做怕的就是火土，做怕的就 是土，因为土克水，一般来讲在去财里面，比如戊戌，戌土是一个燥土，这样的女士对夫 妻生活没有什么想法，或者说能力比较弱，在加上八字火炎土燥，没有水来润，更加如此， 这样的女士脾气也很大，就是女生男性就是这种类型。女犯比劫妨公婆，就是比劫星特别 的多，这样的人一个是去财情商不高，财=情商，没有情商，女人和公婆之间的关系就不 会太好，直来直去，比劫又不会去理解别人，这样的嫁进夫家，这种情况就是要败夫家。</p>\n<p>2、案例实战</p>\n<p>例一 ： 乾</p>\n<p>天干 地支</p>\n<p>十神</p>\n<p>大运：</p>\n<p>(伤官)</p>\n<p>庚</p>\n<p>戌</p>\n<p>( 戊 丁 辛 )</p>\n<p>劫财偏印食神</p>\n<p>(比肩)</p>\n<p>己</p>\n<p>丑</p>\n<p>( 己 辛 癸 )</p>\n<p>比肩食神偏财</p>\n<p>(日)</p>\n<p>(辛) 食神</p>\n<p>(伤官)</p>\n<p>庚</p>\n<p>午</p>\n<p>( 丁 己 )</p>\n<hr>\n<p><strong>来源《杨清娟_盲派八字命理《教学体系命例集细解》_无水印245页高清版》</strong></p>\n<p>订的合同都能兑现。</p>\n<p>例 110，小姐命例</p>\n<p>坤： 庚 辛 丙 戊</p>\n<p>午 巳 戌 戌</p>\n<p>庚午、辛未路旁土命。</p>\n<p>1、巳为禄，天干没透比劫，这个禄就是自己的（如果天干透比劫，是自己</p>\n<p>有个很义气的朋友） 。</p>\n<p>2、丙辛合、丙戌自合，合的是才；辛巳自合，用禄合才也是合才。女命用</p>\n<p>禄来合才是小姐命（财官一家都代表男人） 。</p>\n<p>3、巳禄从戌火库中出来，戌为比劫库，里面有好多好多的男人，巳在月令</p>\n<p>旺，可挣大钱。</p>\n<p>4、辛也是戌库中出来，但为秋天的余气，不旺，但有戊生，有庚帮，才也</p>\n<p>还算旺（若有己土生，财相对还大一点） 。此命是用禄合财，要的是财旺，而不</p>\n<p>是禄旺，因禄己经很旺了。</p>\n<p>5、此女就是靠自己的身体挣钱。</p>\n<p>6、从什么时候起当小姐？见到财官的年份。</p>\n<p>（1） 、戊子年（2008 年） ，子午冲，引动羊刃，流产（这是处小男朋友，因</p>\n<p>没有库参与） 。</p>\n<p>（2） 、己丑年（2009 年） ：</p>\n<p>第一、己土伤官生辛才，巳丑拱出酉金，酉为男人，丑为官杀库，里面有</p>\n<p>好多男人。巳酉合，官合禄，破身了。</p>\n<p>第二、丑午穿，午也为禄，丑为伤官为孩子（丑土也坏了） ，当年流产。</p>\n<h2>参见</h2>\n<li>旺衰派·健康</li>\n<li>格局派·健康</li>\n<li>盲派·健康</li>\n<li>调候·健康</li>\n<li>病药·健康</li>\n<li>阴阳·健康</li>\n<li>综合·健康</li>\n<li>其他·健康</li>", "source_count": 125, "block_count": 566, "see_also": ["旺衰派·健康", "格局派·健康", "盲派·健康", "调候·健康", "病药·健康", "阴阳·健康", "综合·健康", "其他·健康"]}, {"topic": "六亲", "content": "<h2>神煞 · 六亲</h2>\n<p>共收录 196 条相关内容，来自 76 本书籍。</p>\n<p><strong>来源《037-八字基础 (2)》</strong></p>\n<p>明. </p>\n<p>火命夏生,体健聪明. </p>\n<p>土命夏生,体健聪明. </p>\n<p>金命秋生,体健聪明. </p>\n<p>水命冬生,体健聪明.</p>\n<p>月带七杀,背父而生. </p>\n<p>时带伤官,子息凶顽. </p>\n<p>柱中食伤多,难为子息. </p>\n<p>印绶枭神,难得子息. </p>\n<p>柱中儿女宫遇墓,子女不多病则有牢狱 ,或残</p>\n<p>疾难养. </p>\n<p>偏财偏官偏印主偏生庶出 ,不然是第三第四</p>\n<p>胎. </p>\n<p>杀带刑,克子. </p>\n<p>母明父暗,多是偷生. </p>\n<p>女犯伤官偏印,丧子刑夫. </p>\n<p>日时辰戌两相冲,有子难登科. </p>\n<p>女命时临华盖遇空亡,一生不产. </p>\n<p>小儿身弱杀旺叠,不死也残. </p>\n<p>食神重叠,枭神太旺,无乳. </p>\n<p>女命官星处死地,又泄气太过,克子或无子. </p>\n<p>辰戌丑未全,既克夫又不育. </p>\n<p>女命生逢沐浴,头男长女须防哭. </p>\n<p>日临刑冲破会刃,主克头子. </p>\n<p>官休又逢伤,一子难送终. </p>\n<p>伤官太旺,抱姐妹之子为儿 </p>\n<p>七杀持两头,到老无后. </p>\n<p>伤官立四支,常哭儿. </p>\n<p>食神破用神,子败家. </p>\n<p>日主旺,食伤官杀落空亡,无子. </p>\n<p>年月财星克时印,防子伤残. </p>\n<p>时上官星无气,有子难养. </p>\n<p>食伤逢冲,于子女不利. </p>\n<p>时上逢伤官,有子难继书香. </p>\n<p>时座偏印,子女性情不良. </p>\n<p>时座劫财,子女多而败家.</p>\n<hr>\n<p><strong>来源《xbz210648 流年决断 李耕先编著  274P》</strong></p>\n<p>争克时财，财星壬水与年干丁壬 外合，妻子有外遇。</p>\n<p>丙午大运，03癸未年，巳午未妻宫会局，妻子出轨。</p>\n<p>④某 女 5 4 年 生</p>\n<p>食  甲 午</p>\n<p>枭  庚午</p>\n<p>日</p>\n<p>壬 寅</p>\n<p>枭</p>\n<p>庚戌</p>\n<p>财</p>\n<p>运：丙寅</p>\n<p>枭 流年：90庚午</p>\n<p>87</p>\n<p>壬水身弱。夫宫寅午戌外合，丈夫外遇，本人没行旺地，无力抗争，只 能忍让。</p>\n<p>命主中年时作过办公室主任，很有才气。但是丈夫从</p>\n<p>90年起，不断在外沾花惹草。本人为了孩子而不忍离婚，心里苦不堪言。</p>\n<p>(2)自身外遇</p>\n<p>①某女64年生</p>\n<p>枭        比          日       枭</p>\n<p>甲辰      丙子      丙辰     甲 午</p>\n<p>杀  印</p>\n<p>运：壬申       流年：05乙酉</p>\n<p>39</p>\n<p>03</p>\n<p>丙火日主，通根羊刃，印生比助偏旺。命局明暗三官，婚恋有烦恼。</p>\n<p>命主下岗在家。壬申大运，偏官主事，申子辰合人夫宫，05乙酉年，流 年桃花，太岁酉金与夫宫辰土相合，此女当年与家附近某男有染，而且发展 为情人关系。</p>\n<p>②某女60年生</p>\n<p>劫       伤         日         劫</p>\n<p>庚子      壬午     辛未     庚寅</p>\n<hr>\n<p><strong>来源《015-2009.07_《四柱学教程》_徐丙昕著 (2)》</strong></p>\n<p>男性而吃亏。</p>\n<p>官星离日主位置近，与男性关系密切，受男性影响也大；若离日主远，则关</p>\n<p>系也淡，影响也小。</p>\n<p>女性官星不宜太旺，也不宜官杀混杂，不然大都有感情的困扰，也带有</p>\n<p>不贞之嫌。故女命以一位正官或一位七杀星最理想，若是喜神，能近日干或</p>\n<p>合日干，又坐长生、冠带、建禄或帝旺者，丈夫必发达，婚姻幸福，并得丈</p>\n<p>夫之疼爱。</p>\n<p>如果一个人四柱中带桃花，或走到桃花运，也是异性缘较佳的标志，有</p>\n<p>关这一点，我们放到神煞的章节中去讨论。</p>\n<p>人们常说，“千里姻缘一线牵，无缘对面不相识。 ”结婚最讲究的就是</p>\n<p>缘分问题，缘分是什么？用四柱预测学的观点来看，就是两个人四柱中的天</p>\n<p>干，地支相生相合或五行上旺衰的互补关系，以及他们与流年，大运等的相</p>\n<p>生相合关系，与异性结缘恋爱结婚确定就是以此为根据的。</p>\n<hr>\n<p><strong>来源《民间底层盲派经典初级班  真盲派》</strong></p>\n<p>又比较穷。 因为治病还负债了。 因为家里的情</p>\n<p>况，她辍学了。 </p>\n<p>壬水食伤星，子女星在时柱子女宫带像。天干透出干支一体带像。</p>\n<p>带六亲的像。 午火为这个子女星的身体或者是它的一部分。 七杀星被</p>\n<p>围制， 那就比较凶了。 官杀受伤， 破了工作， 破了感情， 破了行为了。</p>\n<p>行为就是想的、 说的、 做的， 有不好的行为。 这种行为的概念我好像</p>\n<p>就在正吉老师这里学到过，其他任何地方真的没有见到过这种说法。</p>\n<p>壬水食伤星不但可以代表孩子， 还可以代表桃花， 代表财路， 代表头</p>\n<p>脑。受伤了。孩子不好了，流产或者感情不顺了，想不开了。 。 。你看</p>\n<p>这思路太简单了。 午火七杀为男人是伤神了， 就代表情伤或者遇到渣</p>\n<p>男。 这个女的她以前失恋过， 投河自杀没有成功。 壬水代表江河湖海。</p>\n<p>南山诗阅   经典民间盲派资料</p>\n<hr>\n<p><strong>来源《10.鄗邑山人-《五行八字案例分析》478页》</strong></p>\n<p>年：庚子、辛丑</p>\n<p>该造与上坤造五行结构大致类似。所不同在于，此造日主衰弱而 木火力度较上造更为有力。</p>\n<p>本造原局金旺生水，而木泄癸水力弱，故以木火为用。</p>\n<p>断其为文化行业，反馈在某铁路学校一领导。</p>\n<p>庚子年，禄驮正印，当有印绶之喜，反馈乔迁新居。</p>\n<p>辛丑年，与乙未天克地冲，且地支巳酉丑三合局透出三辛，联动 年月日柱，是为枭神夺食。该年丈夫车祸、父亲肺癌、本人身体也是 疾病连连。</p>\n<p>壬寅年，丙财长生，暗冲癸水正印申，断其工作调动。反馈由市 局机关调回铁路学校----其在市局为借调。</p>\n<p>壬寅年，为劫财之年，劫财为阻隔为小人、嫉妒、竞争----劫财 穿日柱，为犯小人的典型信息。反馈原本在市局机关，因为小人诬告， 被迫调回原单位。</p>\n<p>其夫：庚申、丙戌、甲子、乙丑</p>\n<p>其女：辛卯、乙未、丁丑、乙巳</p>\n<p>道教纯五行传统命理研讨群  群主：部邑山人18533141468 2022年3月19日星期六</p>\n<p>79、明通赋心得之一</p>\n<p>正文如下：</p>\n<p>明通赋中有：</p>\n<p>纯耗纯刃交差，牛羊类断。纯阴纯阳排克，猪狗徒看。</p>\n<p>其释为：</p>\n<p>大耗羊刃，乃神煞之最恶者。孤阴孤阳，乃干支之不调者。</p>\n<hr>\n<p><strong>来源《289 -04.盲派八字读象实例教程系列官运篇139页》</strong></p>\n<p>可以起到画龙点睛的作用。</p>\n<p>同时现代医学技术高超，产妇完全可以在产前为子女找到一个好的出生时辰和八字。大地磁</p>\n<p>场的乾位是君主位，巽位是文昌位，加以充分利用。 【周易非常道】易学团队培养了一批专</p>\n<p>业的易学人才，希望可以推动易学行业的发展，提高人类的综合潜能。</p>\n<p>三 祖上与教育</p>\n<p>同样的八字，由于出生地点和经纬度的不同，文化底蕴和接受教育程度的不同，人生的层次</p>\n<p>和能量发挥也完全不同。不同的起点，人生肯定有差距，一个创业期的适龄人，你给他三万</p>\n<p>和三百万的的创业资金，结果可想而知。同样一件事，一个初中生和一个研究生，看待事件</p>\n<p>的角度不同，观点不同，层面不同，甚至结论会完全相左。</p>\n<p>四 英雄与时势</p>\n<p>英雄造时势，时势出英雄，无论怎么解说，都不矛盾。人的生命在历史的长河中只是昙花一</p>\n<p>现，人生的发展不能摆脱大自然的轮回规律。正是万物的新陈代谢，不断进化，才有了社会</p>\n<p>的繁荣。人必须听命与一个政体，听命与一个朝代，听命与一个君主。法律是规范约束人的</p>\n<p>思想，行为准则的，是任何一个政体为了本身利益和社会稳定必须采取的手段。</p>\n<hr>\n<p><strong>来源《八字命理秘传【我好疼你啊我要嫁给你版】》</strong></p>\n<p>亲，男命以年为父，胎</p>\n<p>为母，月为兄弟，官员以月为僚友，日为己身妻妾，时为子孙，官员</p>\n<p>以时为帝座祸福。凡是子午卯酉</p>\n<p>日生，主娶子午卯酉命妻，若妻申子</p>\n<p>辰生、丑生、甲己生者，皆不永。如克过头，妻再醮，不在此限。凡</p>\n<p>命四柱内有我克者为妻，无我克者，名曰局中无妻，却看所生日在何</p>\n<p>地？如在财旺之乡，当有得力之妻。更带贵人禄马，年主妻带官嫁夫。</p>\n<p>若在本命时财死墓绝败处，定主克陷，或一生鳏居。若日禄在时上遇</p>\n<p>见，如六丙日得癸巳时，六壬日得辛亥时之类，名曰誉煞，不惟主富，</p>\n<p>亦主因妻有官。若日带年之官，或年之印，主妻夺夫权，或禄出妻荫，</p>\n<p>或妻权贵之家，驸马郡马之类。日坐命财，更在财生旺之乡，主得妻</p>\n<p>财，又主妻贤明。日坐贵人，主妻有望族，或贤淑美丽。若命</p>\n<p>带日刑，</p>\n<p>AAKK0088800加微信进群聊</p>\n<p>179</p>\n<p>日带年冲破年、羊刃、劫煞、六厄、元辰、空亡，或三四娶，或无妻。</p>\n<p>定妇人孕生男女</p>\n<p>诀曰：</p>\n<p>父母岁数两头安，受胎之月中心取；干坎艮震为男儿，巽离坤兑总属</p>\n<p>女。</p>\n<p>假父母年双为折，受胎月只为单，成坎卦，定男；父母年只为单，</p>\n<p>受胎月双为拆，成离卦，定女。父年上，母年下，胎月中，余准此推。</p>\n<hr>\n<p><strong>来源《梁湘润《子平基础概要》简体版》</strong></p>\n<p>易学难精。</p>\n<p>⼆：「⽇⼲」之强弱，极为不易分清其「强、弱」的分野，以及区别⽇⼲「强、弱」的稳定法</p>\n<p>则。</p>\n<p>三：「神煞」到底是要⽤？或者是不⽤？</p>\n<p>四：「⽤神」之如何选⽤？</p>\n<p>当然，对「⼦平法」感到疑难之处，显然并不是只有以上四项问题？其他的次 要疑问诸如：</p>\n<p>甲：「特别格」是不是可以采⽤？</p>\n<p>⼄：⼀共有多少种「特别格」？</p>\n<p>丙：怎样才是「真从」？⼜怎样⽅可视为「假从」？</p>\n<p>丁：「⽀藏天⼲」与「阳死阴⽣」</p>\n<p>……</p>\n<p>等，是⼀种颇为难学的原因，却并不是「⼦平法」，真</p>\n<p>的是有什么难学之处。其所构成「难学」的因素有⼆。</p>\n<p>⼀：对「⼦平法」的基础规则，没有能够背诵得熟。</p>\n<p> 都不是极致的纯粹，其中一定有别的东西在里面，所以在学习过</p>\n<p>程中要了解藏干关系。</p>\n<p>这里教大家一个比较快捷的记忆藏干的方法，先把12地支进行 分类，分成三大类：</p>\n<p> 寅卯辰为木，它代表的是春天，东方木；</p>\n<p> 巳午未 代表是南方火，代表夏天；</p>\n<p> 申酉戌代表的是秋天；</p>\n<p> 亥子丑代表的是冬 、</p>\n<p>也就是每个季节都会有三个。而每个月第一个月是为孟月，第二 个月为仲月，第三个为季月，</p>\n<p>都是这样来排序的，就相当于1月2月 3月这样排。这里有一个特征大家记住，例如寅申巳亥为</p>\n<p>四长生之地， 原因在于火的长生在寅，金的长生在巳，水的长生在申，木的长生在亥，所以叫</p>\n<p>四长生，同时也叫四驿马，因为寅申巳亥代表多动多变的意思，它也代表在每个月的月初，即第</p>\n<p>一个月，是孟月的意思。</p>\n<p>那么在记它们的时候怎么记?</p>\n<p> 所有的第一个月，它和它的藏干全是阳的。例如寅中藏甲丙戊，巳中藏这个戊丙庚，然后申中</p>\n<p>藏戊庚壬， 亥中藏壬甲。</p>\n<hr>\n<p><strong>来源《京南道人2024-5月深圳》</strong></p>\n<p>疑，自认为能力大，对别人都不信任，一生麻烦多，因为官杀就代 表压力，如果压力重重，罔然就代表麻烦多，</p>\n<p>什么叫官杀混杂《月令正官不透，透出七杀，天干官杀并透，月令正  官不透，七杀也不透，但是地支却有七杀本气，在这里要注意，官杀都透， 一个在年；》一个在月，为官杀相连，这个当做七杀来论，不论混杂。这个  就要制服，但是一个在年或者在月，一个在时，就为混杂，混杂就要取轻，</p>\n<p>甲  乙  戊  丙 子  亥 子 子</p>\n<p>这个年月官杀相连不为混杂。</p>\n<p>甲  癸  戊  乙 子  酉  子  卯</p>\n<p>582</p>\n<p>这个杀在年，官在时，为混杂，</p>\n<p>怎么样算取清呢，合和克，这是取轻的办法或者合或者克。比如： 庚  乙  甲 戊</p>\n<p>寅  酉  子 辰</p>\n<p>这个正官在令透了七杀，这个为混杂，羊刃乙木透出来合庚，这种他 就为合杀留官，表示取轻了，</p>\n<p>庚  丙  甲  辛 寅 戌  午  未</p>\n<p>这个官杀庚辛都透，丙火合辛，丙火克庚，这种情况下合为留，克为 去，这种情况为合官留杀，也取清。</p>\n<p>庚  丁  甲  辛 寅  亥  午  未</p>\n<hr>\n<p><strong>来源《易海游龙 道家八字教程350页》</strong></p>\n<p>相 当 。 不 同 之 处 在 于 天 德</p>\n<p>贵 人 主 仁 善 ， 月 德 贵 人 主 勤 勉 。 命 中 带 天 月 二 德 贵 人 者 ， 福 力 比 一 般 人 深 厚 ，</p>\n<p>有 如 神 明 保 佑 ， 能 逢 凶 化 吉 ， 遇 难 呈 祥 。 仁 善 勤 勉 者 ， 遇 此 二 星 吉 气 显 著 。 但</p>\n<p>命局组合吉者更显福气，组合凶者更凶，遇刑冲破害不能发挥作用，虽有如无。</p>\n<p>二、桃花</p>\n<p>以年支或日支起都可以。区别主要在于：年支起的桃花，又叫人缘桃花”，</p>\n<p>包 括 但 不 限 于 两 性 情 缘 ， 主 ” 人 缘 好 、 受 人 欢 迎 “ ； 日 支 起 的 桃 花 叫 ” 情 缘 桃</p>\n<p>花“，主要指两性关系方面的吸引力。</p>\n<p>桃 花 ： 日 支 是 寅 午 戌 遇 到 卯 ； 申 子 辰 遇 到 酉 ； 巳 酉 丑 遇 到 午 ； 亥 卯 未 遇 到</p>\n<p>子</p>\n<p>内桃花：出现在年月。比较顾家。</p>\n<p>外 桃 花 ： 出 现 在 日 时 。 容 易 有 婚 外 情 ， 一 般 艺 人 ， 做 生 意 的 带 外 桃 花 则 人</p>\n<hr>\n<p><strong>来源《《君臣之道》(1)》</strong></p>\n<p>分。</p>\n<p>天干地支逃离不了人类的自然规律。</p>\n<p>天干也有自己的兄弟姐妹， 关系能有多少， 就从地支里找。</p>\n<p>十天干最直接的关系是“禄 ”,禄是最亲的， 是自己的手脚， 自己的身体。</p>\n<p>每个天干和他的“禄身”关系最近， 其次是羊刃和比劫， 再次是本库和余气库。 另外一个就是“长生 ”,这都是他们的关系。</p>\n<p>甲禄是寅， 羊刃是卯， 长生是亥， 本库是未， 余气库是辰， 甲与它们都 >\n<p>壬申年，给水加力，表示应期到了。财星水是三层，偏旺，又有金来生，容易旺极生灾，大 运金旺极的时候，水受生太过主灾，物极必反。</p>\n<p>辛丑运，是金坐库，戊子年是水旺之地，此年丧父。</p>\n<p>乾：己丁壬丙 未卯寅午</p>\n<p>运：丙寅、乙丑、甲子、癸亥、壬戌，10岁运，丙寅运，戊寅年丧父。</p>\n<h2>参见</h2>\n<li>旺衰派·大运</li>\n<li>格局派·大运</li>\n<li>盲派·大运</li>\n<li>调候·大运</li>\n<li>病药·大运</li>\n<li>阴阳·大运</li>\n<li>综合·大运</li>\n<li>其他·大运</li>", "source_count": 29, "block_count": 39, "see_also": ["旺衰派·大运", "格局派·大运", "盲派·大运", "调候·大运", "病药·大运", "阴阳·大运", "综合·大运", "其他·大运"]}, {"topic": "婚姻", "content": "<h2>神煞 · 婚姻</h2>\n<p>共收录 501 条相关内容，来自 116 本书籍。</p>\n<p><strong>来源《民间师父八字课程学习笔记本地》</strong></p>\n<p>格局，论配合，是徐子平的初衷。</p>\n<p>◇  格局论，是取类比象。</p>\n<p>◇  干支搭配合理才可成为大吉格局。</p>\n<p>◇  继续说上面例子，如果原局没有丁火，大运遇到丁火亦吉。</p>\n<p>◇  日干庚金，取用神时先要想到丁火，这是经验。</p>\n<p>◇  古语有言“土多埋金”，难道“火多就不埋金”吗？火生土啊！</p>\n<p>◇  所以，批八字是要在动态条件下辩证。</p>\n<p>◇  如食神制杀是大格局。。。定格局至少要看两股力量，这里，食神 对七杀。</p>\n<p>◇  如羊刃驾杀是大格局。。。定格局至少要看两股力量，这里，羊刃 对七杀。</p>\n<p>◇   《子平真诠》只看静态月令中的某一五行。。。显然经不起推敲。</p>\n<p>◇  说句大白话：定格局主要在于分出来命主在社会阶层档次，此即大 功告成了。至于损官、破财、疾厄之类等这些先放在一边免谈，大道至 简，不要制造麻烦，否则一塌糊涂。。。</p>\n<p>◇   定格局要参看大限，还有大运。</p>\n<p>◇  事物皆一分为二。月令固然重要，却也只是冰山一角。</p>\n<p>◇  死抠“月令格局”，就和练习瞄准打靶子一样，靶子是死的。</p>\n<p>◇  活用“格局用神”，就和瞄准打流动靶子一样，靶子是活的，或许是 动物，或许是战场上的敌人。</p>\n<hr>\n<p><strong>来源《民间师父八字课程学习笔记本地》</strong></p>\n<p>。可惜啊可惜！亥卯 未局“卯”填实后冲日支丑，这在封建夫权社会为没有夫君之象。</p>\n<p>◇  故为大凶格。</p>\n<p>◇  日主坐杀，时支亦杀，天干透双杀，两处羊刃，身不弱有比劫无印， 用神只可取乙木。</p>\n<p>◇  用神食神不弱，一生有口福。</p>\n<p>◇  癸水生冬季未时，此时天空没有太阳。己象意为阴云，时柱亦己， 学员U阴云之象。乙象为微风中摇摆的柔草，也是败象。地支象意： 亥 为大洼地。丑之象亦为阴天，同时又是小土屋。未之象还是阴天，低洼 处。</p>\n<p>◇  日主癸似坑中一摊柔性的雪花霜粉。</p>\n<p>◇  想一想，低洼潮湿、暗淡无光的环境， 日主被七杀围，地支两处伤 官，命主能说会道但却只有小聪明，命主有口福。。。这些象，对于一 名女子不言而喻了。</p>\n<p>◇  批八字读象，就读这三个象：</p>\n<p>◇  第一，四柱之象——就是识大局，识整体。</p>\n<p>◇  第二，地支之象——来自八卦理论，识空间、方位、气候、季节等 状态。</p>\n<p>◇  第三，十神之象——来自五行理论，属于人物细节方面（就是古书 上说的人元方面）。</p>\n<p>◇  取象比类，就是解读干支这二十二个符号。</p>\n<p>◇  朋友们，是不是很简单啊？</p>\n<p>◆ 宗亲类象：</p>\n<hr>\n<p><strong>来源《015-2009.07_《四柱学教程》_徐丙昕著 (2)》</strong></p>\n<p>4407916 公众号：九鼎学堂</p>\n<p>获取更多最新易学资料 加微信：804407916 公众号：九鼎学堂</p>\n<p>父临库地，或财源被劫，父命先亡。</p>\n<p>兄弟身旺，父母有亏。</p>\n<p>偏财受克，父先丧。</p>\n<p>父母一离一合，定为印星临财。</p>\n<p>比肩重，父寿难延。天元刑战，父母不全。</p>\n<p>财空印旺，早年丧父。年逢杀刃，幼丧父母。</p>\n<p>羊刃月运，有母无父，伤官带刃，克父损母。</p>\n<p>柱逢单刃，克父。</p>\n<p>父母星坐空刑死绝之地，主父母贫穷，又被刑伤，寿短，或死于外乡不</p>\n<p>善终。</p>\n<p>柱带劫杀、亡神、羊刃、元辰者，克父母。</p>\n<p>月生日干，不喜逢财地，逢之克母或母有病。</p>\n<p>印被冲克，母贤而早亡。</p>\n<p>印缓被克，母不死则离。</p>\n<p>财多伤印，少年克母。印被伤，母早亡。</p>\n<p>幼年丧母，只因财多印死。</p>\n<p>柱中袅食并临，克母。</p>\n<p>财印俱伤，克母丧妻。</p>\n<p>日时两重犯亡神者克母。</p>\n<p>印星太弱，又坐绝地，母早衰。</p>\n<p>克印临孤辰、寡宿者，主双亲孤独，六亲无靠。</p>\n<p>年坐正官被伤官冲克，主父母多病或寿不长。</p>\n<p>年坐七杀、羊刃者，双亲性暴。</p>\n<p>印重官杀多，父母不得力。</p>\n<p>年柱用神岁运天冲地克，父母有丧。</p>\n<p>大运冲克提纲，流年岁君与年柱天冲地克者，不丧父则死母或父母俱</p>\n<p>丧。偏财逢岁运天克地冲时，父亡之期。</p>\n<hr>\n<p><strong>来源《2022老人参弟子班培训教材《滴天髓与民间应用》(1)》</strong></p>\n<p>。用官又有伤官制官， 是</p>\n<p>不正确的。那肯定得犯官非， 但是命局有印护官了，保卫国家了，那就是护官的。当然这个</p>\n<p>亥水是独官，也不能说是犯法，如果再有个子水，那肯定就是犯法。但要是没有印， 把水去</p>\n<p>尽了也不犯法。要是去不尽就犯法了。</p>\n<p>然后走南方的时候去官星之寡发财。午火大运发财，但走未运的时候为啥没发财？走未</p>\n<p>运亥卯未，木旺。</p>\n<p>印是护卫国家的，他当兵去了。这没有什么劫财七杀， 也没有什么羊刃抗杀，根本就没</p>\n<p>有，他一样当兵的。</p>\n<p>学生：真正意义上这个八字has需要火来通关，去寡</p>\n<p>京南：没错，所以说此命是假去寡，但也叫去寡。当走上火运的时候就去寡了。所以说 我们</p>\n<p>要学活嘛，表面上看有印不是去寡，实际上还是叫去寡的。八字都是来回来去的变化， 会</p>\n<p>这种变化了才可以。</p>\n<p>乾 辛 庚 己 戊 1983 1993 2003 2013 2023 2033 2043 2053</p>\n<hr>\n<p><strong>来源《037-八字基础 (2)》</strong></p>\n<p>明. </p>\n<p>火命夏生,体健聪明. </p>\n<p>土命夏生,体健聪明. </p>\n<p>金命秋生,体健聪明. </p>\n<p>水命冬生,体健聪明.</p>\n<p>月带七杀,背父而生. </p>\n<p>时带伤官,子息凶顽. </p>\n<p>柱中食伤多,难为子息. </p>\n<p>印绶枭神,难得子息. </p>\n<p>柱中儿女宫遇墓,子女不多病则有牢狱 ,或残</p>\n<p>疾难养. </p>\n<p>偏财偏官偏印主偏生庶出 ,不然是第三第四</p>\n<p>胎. </p>\n<p>杀带刑,克子. </p>\n<p>母明父暗,多是偷生. </p>\n<p>女犯伤官偏印,丧子刑夫. </p>\n<p>日时辰戌两相冲,有子难登科. </p>\n<p>女命时临华盖遇空亡,一生不产. </p>\n<p>小儿身弱杀旺叠,不死也残. </p>\n<p>食神重叠,枭神太旺,无乳. </p>\n<p>女命官星处死地,又泄气太过,克子或无子. </p>\n<p>辰戌丑未全,既克夫又不育. </p>\n<p>女命生逢沐浴,头男长女须防哭. </p>\n<p>日临刑冲破会刃,主克头子. </p>\n<p>官休又逢伤,一子难送终. </p>\n<p>伤官太旺,抱姐妹之子为儿 </p>\n<p>七杀持两头,到老无后. </p>\n<p>伤官立四支,常哭儿. </p>\n<p>食神破用神,子败家. </p>\n<p>日主旺,食伤官杀落空亡,无子. </p>\n<p>年月财星克时印,防子伤残. </p>\n<p>时上官星无气,有子难养. </p>\n<p>食伤逢冲,于子女不利. </p>\n<p>时上逢伤官,有子难继书香. </p>\n<p>时座偏印,子女性情不良. </p>\n<p>时座劫财,子女多而败家.</p>\n<hr>\n<p><strong>来源《《巫咸撮要》解读》</strong></p>\n<p>好的运气与否。</p>\n<p>被动迎接好运，成就自然小。</p>\n<p>被动迎接恶运，损失当然大。</p>\n<p>在八字中的体现，也是一样的。</p>\n<p>财官八字，见伤官不喜，那就要增加印星的力量，克制伤官。</p>\n<p>尽量给伤官最小的活动和发挥空间，以及机会。</p>\n<p>所以，大运好坏，一定要找原局。</p>\n<p>原局的弱点，就是大运攻击的地方。</p>\n<p>原局的优点，也是大运辉煌的地方。</p>\n<p>流年则不同，流年是引动。</p>\n<p>比如原局七杀不喜，流年七杀，肯定是凶。</p>\n<p>原局正官大喜，正官流年，升官发财。</p>\n<p>大运，不只看大运本身，看大运与原局的关系。</p>\n<p>冲了哪支，刑了哪支，合了哪干，带什么神煞，是不是长生，是不是得禄。</p>\n<p>流年也是如此，合了没，冲了没，象在哪里。</p>\n<p>等等。</p>\n<p>所以啊，不要急着学流年大运。</p>\n<p>一定要把原局整明白，因为流年大运吉凶，都是建立在原局基础之上。</p>\n<hr>\n<p><strong>来源《金镖门2024年6月弟子班弟子班秘籍210页_》</strong></p>\n<p>的男女是不婚、同性、 淫贱，这种特殊的情况会涉及到神煞的概念，比如女犯六煞淫贱命，等这些后面在讲。当</p>\n<p>女人坐禄，比如辛酉，丁巳，戊戌，这些坐的都是比劫。女犯比劫妨公婆，嫁进夫家做主 人。首先讲就是女人比较独立，很自我，同时生理需求比较弱，怎么看生理需求?比如丁 巳，戊戌，辛酉，壬子等，一柱都是比劫星，金水还好一点，做怕的就是火土，做怕的就 是土，因为土克水，一般来讲在去财里面，比如戊戌，戌土是一个燥土，这样的女士对夫 妻生活没有什么想法，或者说能力比较弱，在加上八字火炎土燥，没有水来润，更加如此， 这样的女士脾气也很大，就是女生男性就是这种类型。女犯比劫妨公婆，就是比劫星特别 的多，这样的人一个是去财情商不高，财=情商，没有情商，女人和公婆之间的关系就不 会太好，直来直去，比劫又不会去理解别人，这样的嫁进夫家，这种情况就是要败夫家。</p>\n<p>2、案例实战</p>\n<p>例一 ： 乾</p>\n<p>天干 地支</p>\n<p>十神</p>\n<p>大运：</p>\n<p>(伤官)</p>\n<p>庚</p>\n<p>戌</p>\n<p>( 戊 丁 辛 )</p>\n<p>劫财偏印食神</p>\n<p>(比肩)</p>\n<p>己</p>\n<p>丑</p>\n<p>( 己 辛 癸 )</p>\n<p>比肩食神偏财</p>\n<p>(日)</p>\n<p>(辛) 食神</p>\n<p>(伤官)</p>\n<p>庚</p>\n<p>午</p>\n<p>( 丁 己 )</p>\n<hr>\n<p><strong>来源《xbz210648 流年决断 李耕先编著  274P》</strong></p>\n<p>争克时财，财星壬水与年干丁壬 外合，妻子有外遇。</p>\n<p>丙午大运，03癸未年，巳午未妻宫会局，妻子出轨。</p>\n<p>④某 女 5 4 年 生</p>\n<p>食  甲 午</p>\n<p>枭  庚午</p>\n<p>日</p>\n<p>壬 寅</p>\n<p>枭</p>\n<p>庚戌</p>\n<p>财</p>\n<p>运：丙寅</p>\n<p>枭 流年：90庚午</p>\n<p>87</p>\n<p>壬水身弱。夫宫寅午戌外合，丈夫外遇，本人没行旺地，无力抗争，只 能忍让。</p>\n<p>命主中年时作过办公室主任，很有才气。但是丈夫从</p>\n<p>90年起，不断在外沾花惹草。本人为了孩子而不忍离婚，心里苦不堪言。</p>\n<p>(2)自身外遇</p>\n<p>①某女64年生</p>\n<p>枭        比          日       枭</p>\n<p>甲辰      丙子      丙辰     甲 午</p>\n<p>杀  印</p>\n<p>运：壬申       流年：05乙酉</p>\n<p>39</p>\n<p>03</p>\n<p>丙火日主，通根羊刃，印生比助偏旺。命局明暗三官，婚恋有烦恼。</p>\n<p>命主下岗在家。壬申大运，偏官主事，申子辰合人夫宫，05乙酉年，流 年桃花，太岁酉金与夫宫辰土相合，此女当年与家附近某男有染，而且发展 为情人关系。</p>\n<p>②某女60年生</p>\n<p>劫       伤         日         劫</p>\n<p>庚子      壬午     辛未     庚寅</p>\n<hr>\n<p><strong>来源《八字命理秘传【我好疼你啊我要嫁给 留官：如六庚生人，柱透丙煞，又透丁官，是官煞混杂，若柱有壬克</p>\n<p>丙，又来合丁，是伤官制煞，去煞留官。除一般常理外，去煞留官还要注意：</p>\n<p>1.凡看去留，先看官煞孰重孰轻。混杂轻重关系问题严重程度，官轻混</p>\n<p>煞问题小，恶煞混官问题大，常常有性命之忧。轻者易去，重者难去。官轻</p>\n<p>则宜去官留煞，煞轻则宜去煞留官。如甲生七月上旬， 为煞得令，纵有丙火，</p>\n<p>亦不能去。因为煞重食轻，就无力去煞。</p>\n<h2>参见</h2>\n<li>旺衰派·婚姻</li>\n<li>格局派·婚姻</li>\n<li>盲派·婚姻</li>\n<li>调候·婚姻</li>\n<li>病药·婚姻</li>\n<li>阴阳·婚姻</li>\n<li>综合·婚姻</li>\n<li>其他·婚姻</li>", "source_count": 116, "block_count": 501, "see_also": ["旺衰派·婚姻", "格局派·婚姻", "盲派·婚姻", "调候·婚姻", "病药·婚姻", "阴阳·婚姻", "综合·婚姻", "其他·婚姻"]}, {"topic": "学业", "content": "<h2>神煞 · 学业</h2>\n<p>共收录 102 条相关内容，来自 59 本书籍。</p>\n<p><strong>来源《杨清娟盲派八字基础班》</strong></p>\n<p>汗液、妇科病。、</p>\n<p>原命有子水，天干不透癸水，子水代表鬼，也就是所说的八字不清，容易招不</p>\n<p>干净的东西。子为玄学星，亥水为仙（亥水旺的情况下是仙，弱的情况下不是），</p>\n<p>亥水弱代表风，为风水，喜欢做的事业和壬癸水相同。</p>\n<p>寅卯木代表的事物及身体部位：毛发、手掌、肝、臂、指甲、神经、十指、其</p>\n<p>中卯木代表玄学星，喜欢做的事业和甲乙木相同。</p>\n<p>辰土代表身体部位：肩、胸、腹、腰、肠、消化系统。 喜欢的事业与戊己土</p>\n<p>相同。</p>\n<p>丑土代表身体部位：腹部、脾胃、子宫、皮肤、腰、嘴唇、阴茎、乳房。 喜</p>\n<p>欢做的事业和戊己土相同，丑土是华盖星。</p>\n<p>巳火代表的身体部位：心脏、面部、口腔、唇、肛门。 喜欢做的事业与丙火</p>\n<p>一样。</p>\n<p>午火代表的事物及身体部位：眼睛、额头、舌、血液。 喜欢做的事业与丁火</p>\n<p>一致。</p>\n<hr>\n<p><strong>来源《八字格局笔记整理版》</strong></p>\n<p>，就是在表达所有的事物都不是极致的纯粹，其中一定有别的东西在里面，所以在学习过</p>\n<p>程中要了解藏干关系。</p>\n<p>这里教大家一个比较快捷的记忆藏干的方法，先把12地支进行 分类，分成三大类：</p>\n<p> 寅卯辰为木，它代表的是春天，东方木；</p>\n<p> 巳午未 代表是南方火，代表夏天；</p>\n<p> 申酉戌代表的是秋天；</p>\n<p> 亥子丑代表的是冬 、</p>\n<p>也就是每个季节都会有三个。而每个月第一个月是为孟月，第二 个月为仲月，第三个为季月，</p>\n<p>都是这样来排序的，就相当于1月2月 3月这样排。这里有一个特征大家记住，例如寅申巳亥为</p>\n<p>四长生之地， 原因在于火的长生在寅，金的长生在巳，水的长生在申，木的长生在亥，所以叫</p>\n<p>四长生，同时也叫四驿马，因为寅申巳亥代表多动多变的意思，它也代表在每个月的月初，即第</p>\n<p>一个月，是孟月的意思。</p>\n<p>那么在记它们的时候怎么记?</p>\n<p> 所有的第一个月，它和它的藏干全是阳的。例如寅中藏甲丙戊，巳中藏这个戊丙庚，然后申中</p>\n<p>藏戊庚壬， 亥中藏壬甲。</p>\n<hr>\n<p><strong>来源《真正民间底层盲派中级班 第一集 259页 (1)》</strong></p>\n<p>花，黑陷，左眼已失明。其母梦见一老妇说： “我是观</p>\n<p>音，居鸿泽家三年，你可去求神膏，贴左太阳穴。 ”</p>\n<p>其母醒后，求到了膏药。医生喝斥他们胡闹，用灯火治盲眼，导致眼睛爆出，</p>\n<p>仅剩筋悬着未掉落。医生无计可施，便偷偷逃走了。 </p>\n<p>母亲恳切祈祷大士，念《心经》二千遍，仍然贴膏，左眼睛渐渐收进去了，盲</p>\n<p>目复明，天花也痊愈了。 《海南一勺》 </p>\n<p>  ●清时，江西浮梁县的程昭，曾因患痞病（腹中长硬块） ，念诵《心经》而</p>\n<p>治愈，所以经常持诵不间断。道光年间，春官下第，程回老家 >午</p>\n<p>巳</p>\n<p>午</p>\n<p>申</p>\n<p>酉</p>\n<p>亥</p>\n<p>子</p>\n<p>寅</p>\n<p>卯</p>\n<p>金舆</p>\n<p>辰</p>\n<p>巳</p>\n<p>未</p>\n<p>申</p>\n<p>未</p>\n<p>申</p>\n<p>戌</p>\n<p>亥</p>\n<p>丑</p>\n<p>寅</p>\n<p>说词</p>\n<p>午</p>\n<p>未</p>\n<p>酉</p>\n<p>戌</p>\n<p>酉</p>\n<p>戌</p>\n<p>子</p>\n<p>丑</p>\n<p>卯</p>\n<p>辰</p>\n<p>羊刃</p>\n<p>卯</p>\n<p>辰</p>\n<p>午</p>\n<p>未</p>\n<p>午</p>\n<p>未</p>\n<p>酉</p>\n<p>戌</p>\n<p>子</p>\n<p>丑</p>\n<p>指背</p>\n<p>辰</p>\n<p>巳</p>\n<p>未</p>\n<p>申</p>\n<p>未</p>\n<p>申</p>\n<p>戌</p>\n<p>亥</p>\n<p>丑</p>\n<p>寅</p>\n<p>AAKK0088800加微信进群聊</p>\n<hr>\n<p><strong>来源《陈朝阳-《象法大成精华版》盲派高级象法分享版.》</strong></p>\n<p>，到了时柱，高透天干，被巳火禄神合到，正 因为和领导一条心，所以才会在官场上呼风唤雨，一路直上.</p>\n<p>乙丑大运，因为原八字功神火土一党被丑土财星穿晦，命主早年参加工作后， 只是一名学校的普通教师，在官场上还未曾显山露水.</p>\n<p>丙寅大运，代表命主本人到位，丙火坐长生寅木，八字木火土一派的势力增强，命 主开始走向升官发财的通道：寅亥相合为树木，园林，寅巳相穿为焚烧，拆迁，,午 戌化土为土方，建设，命主进入当地建筑工程公司，从普通员工一直干到科长，还 进了建委班子.</p>\n<p>丁卯大运，卯木印星又合到亥水官星，丁是羊刃，是权力，命主仍然一步步高 升，在市政建设中功绩显著,邀功请赏，很轻松就被封到了局级，市级职位.卯戌 合，志在戌库中的辛金，辛金是财星，是女人，深藏库中，对命主来说简直犹如阿 里巴巴眼前的藏宝洞一样让人热切向往.</p>\n<h2>参见</h2>\n<li>旺衰派·学业</li>\n<li>格局派·学业</li>\n<li>盲派·学业</li>\n<li>调候·学业</li>\n<li>病药·学业</li>\n<li>阴阳·学业</li>\n<li>综合·学业</li>\n<li>其他·学业</li>", "source_count": 59, "block_count": 102, "see_also": ["旺衰派·学业", "格局派·学业", "盲派·学业", "调候·学业", "病药·学业", "阴阳·学业", "综合·学业", "其他·学业"]}, {"topic": "寿命", "content": "<h2>神煞 · 寿命</h2>\n<p>共收录 73 条相关内容，来自 41 本书籍。</p>\n<p><strong>来源《015-2009.07_《四柱学教程》_徐丙昕著 (2)》</strong></p>\n<p>4407916 公众号：九鼎学堂</p>\n<p>获取更多最新易学资料 加微信：804407916 公众号：九鼎学堂</p>\n<p>父临库地，或财源被劫，父命先亡。</p>\n<p>兄弟身旺，父母有亏。</p>\n<p>偏财受克，父先丧。</p>\n<p>父母一离一合，定为印星临财。</p>\n<p>比肩重，父寿难延。天元刑战，父母不全。</p>\n<p>财空印旺，早年丧父。年逢杀刃，幼丧父母。</p>\n<p>羊刃月运，有母无父，伤官带刃，克父损母。</p>\n<p>柱逢单刃，克父。</p>\n<p>父母星坐空刑死绝之地，主父母贫穷，又被刑伤，寿短，或死于外乡不</p>\n<p>善终。</p>\n<p>柱带劫杀、亡神、羊刃、元辰者，克父母。</p>\n<p>月生日干，不喜逢财地，逢之克母或母有病。</p>\n<p>印被冲克，母贤而早亡。</p>\n<p>印缓被克，母不死则离。</p>\n<p>财多伤印，少年克母。印被伤，母早亡。</p>\n<p>幼年丧母，只因财多印死。</p>\n<p>柱中袅食并临，克母。</p>\n<p>财印俱伤，克母丧妻。</p>\n<p>日时两重犯亡神者克母。</p>\n<p>印星太弱，又坐绝地，母早衰。</p>\n<p>克印临孤辰、寡宿者，主双亲孤独，六亲无靠。</p>\n<p>年坐正官被伤官冲克，主父母多病或寿不长。</p>\n<p>年坐七杀、羊刃者，双亲性暴。</p>\n<p>印重官杀多，父母不得力。</p>\n<p>年柱用神岁运天冲地克，父母有丧。</p>\n<p>大运冲克提纲，流年岁君与年柱天冲地克者，不丧父则死母或父母俱</p>\n<p>丧。偏财逢岁运天克地冲时，父亡之期。</p>\n<hr>\n<p><strong>来源《素水盲派《壬寅年格局大运流年班内部资料》2022年格局大运流年培训教材209页》</strong></p>\n<p>来到什么地。</p>\n<p>财旺身弱，富屋贫人。财生杀，因财生祸。</p>\n<p>杀来了，先有坏事发生。能制，也是要经历的。</p>\n<p>男命，财多身弱，耳根子软。</p>\n<p>身财两停时，不喜再见比劫，最前面那个小姐的命，就是这样。</p>\n<p>财见七杀的，遇事败多。有印，有食神制，能好一些。身旺有羊刃的，也</p>\n<p>可以。位置也要注意。</p>\n<p>财格生杀，杀在年上，又跟透在时上不同。年上七杀不用制。真正的凶神 就在时上。</p>\n<p>例：杀伤日财</p>\n<p>壬己丙庚</p>\n<p>戌酉午寅</p>\n<p>正财在月令，寅午戌会局，午酉相破。代表命主坐下羊刃破财，财不完整， 碎银子。羊刃劫财是一帮穷人， 一帮差不多没层次的人。即使透出去了，也解 决不了。这种是解不了的。</p>\n<p>戌还穿酉，这种财也收获不到。天干透得再好也不行。</p>\n<p>代表他没本事。多灾多难。财也是福禄寿，犯小人，没本事。没能力解决  这个事。羊刃又坐夫妻宫，克夫，比劫伤官，背禄逐马，35岁前婚姻出问题。 这个女的，丈夫在30多岁时死的。</p>\n<p>丙午大运，30多岁，老公过世。</p>\n<p>时上落财，也能赚点钱。出国赚过钱，但劳禄辛苦。</p>\n<hr>\n<p><strong>来源《《君臣之道》》</strong></p>\n<p>卯 乾2:庚壬丙庚 申子午寅</p>\n<p>第1例是一个企业官，天干官枭相配，还行。 但也有多成多败的因素存在。</p>\n<p>但地支有卯酉冲，卯为杀，这个看起来是食冲杀，这种是风险求财的意思，也 容易走捷径，这种冲是不好的，不合地道的，因为地道不喜冲。</p>\n<p>所以拉投资一个项目上亿，结果破产。</p>\n<p>所以天干配置好，是代表有身份；但地道冲，中年有危机。 杀在月令，引发的事情一般跟事业有关。</p>\n<p>所以，吉神配置是稳当的，凶神配的好，也不稳。 第二例，羊刃架杀，也好。</p>\n<p>但财生杀，配置凶。</p>\n<p>而且地道有午子冲，寅申冲，地道的羊刃冲官，导致性质恶劣，这是一个黑社 会求财性质，被判无期徒刑。</p>\n<p>坤：一个老公有灾的命。天道向背，地道动静。 壬丙己甲</p>\n<p>午午酉戌</p>\n<p>此命老公为正官，配了财与印，正财坏正印的，老公必有官灾。 此人老公是个官，文革时被反动派枪毙了。</p>\n<p>因为天道配置有问题，地道又有午破酉，戌穿酉的组合，天地人都坏了，就凶 命。</p>\n<p>这种就不只是短寿，是官透出了，凶灾。 然后自己也疯了，因为这个局也是她的。 所以，地支一片冲穿破的，一定凶命。</p>\n<p>天道看向背、地道看安静</p>\n<p>乙己甲乙 亥丑辰丑</p>\n<hr>\n<p><strong>来源《三 命 通 会前七卷》</strong></p>\n<p>兄弟妻子星具何地？论旺相休囚而言其吉凶。如</p>\n<p>父母星坐长生旺库禄马贵人之地，则主父母富贵福寿荣耀；如</p>\n<p>坐空刑克煞死亡衰败交并之地，则主父母贫薄破伤刑夭，或死</p>\n<p>于外及不善终；若带刑带破害，虽居于生旺库之地，主父母有</p>\n<p>寿而贫贱。兄弟星若生得时得令，坐长生库旺禄马贵人之地，</p>\n<p>则主兄富贵荣华成群；如坐刑克煞刃死绝衰败之地，兄弟不得</p>\n<p>力；如坐长生旺库而遇刑冲破害者，虽有兄弟而仇敌及不得力。</p>\n<p>如妻妾星坐生旺库禄马贵人之地，或有物以生之，主妻妾富贵</p>\n<p>荣华，美貌多才；如坐空刑克煞羊刃死绝冲败之地，则主妻妾</p>\n<p>贫薄丑貌刑夭淫乱、残疾或产亡不得力；如坐生旺禄马之地，</p>\n<p>被刑冲克煞，妻虽有寿亦主破相贫薄。如子息星坐生旺禄马贵</p>\n<p>人官印之地，有物以相生，主子息荣华聪明，多得送老；如坐</p>\n<p>禄马贵人居于死绝之地，虽有聪明俊秀，不送老也。如居生旺</p>\n<p>之地被刑冲破害，有子主愚顽或残疾送老；如居死绝又刑冲破</p>\n<p>害劫财之地，不得子之力，纵有子主残疾破相或不才。女命如</p>\n<p>子居生旺之地，主多子；如 或劫财，否则克</p>\n<p>父，克妻，又禄为比肩，处临官旺地，日元弱最喜禄神来扶助</p>\n<p>帮身，再遇印生，吉星相助，建勋立业为有福之人。禄之吉凶</p>\n<p>喜忌如下：</p>\n<p>甲禄在寅，见丙为福星禄，戊寅为伏马禄俱吉。庚寅谓之</p>\n<p>破禄，半吉半凶，壬寅为之正禄，（带截路空亡，必为僧道）</p>\n<p>甲寅谓之长生禄大吉。</p>\n<h2>参见</h2>\n<li>旺衰派·财运</li>\n<li>格局派·财运</li>\n<li>盲派·财运</li>\n<li>调候·财运</li>\n<li>病药·财运</li>\n<li>阴阳·财运</li>\n<li>综合·财运</li>\n<li>其他·财运</li>", "source_count": 119, "block_count": 470, "see_also": ["旺衰派·财运", "格局派·财运", "盲派·财运", "调候·财运", "病药·财运", "阴阳·财运", "综合·财运", "其他·财运"]}]}, {"name": "综合", "topics": [{"topic": "事业", "content": "<h2>综合 · 事业</h2>\n<p>共收录 1082 条相关内容，来自 160 本书籍。</p>\n<p><strong>来源《《八字读象预测法》黄勇智(1)》</strong></p>\n<p>性，甚至容易走极端，但每到危险的边缘， 你都能清醒过来、适可而止，所以不会造成毁灭性的灾难；（是的）</p>\n<p>37、比劫为用，与同学同事关系虽然能友好相处，但真正的朋友不多，与亲人关系反而 不如朋友亲密，总是有些淡淡的感觉，虽然本人也很希望享受亲情的天伦之乐，但总是事与 愿违，遇到喜怒哀乐总爱与朋友分享；（与母亲及弟弟的关系很好，其他亲人一般 。朋友不 错）</p>\n<p>38、你虽然性急、焦躁，但不是没有计划性，反而做事有计划、有章法，条理很分明， 做事有板有眼，不会杂乱无章；（是的）</p>\n<p>39、七杀为用，工作能力很强，没有什么能难道你的；（我希望如此 。但能力有限。。）</p>\n<p>40、凡事要求较高，对自己或对别人都要求严格，显得有些冷酷无情，这样也得罪了不 少的人；（是的）</p>\n<p>41、你脾气有点大、还有些任性、心里不舒服时、也爱发发脾气，一点也不低于男同胞； （是的 。所以，强悍的男人不一定能容忍我）</p>\n<p>42、你的性格不算外向，一般不太爱讲话，但若真正讲起来口才颇好；（是的。话不多， 不算外向）</p>\n<hr>\n<p><strong>来源《《潘昭佑老师新浪微博所有文章》569页副本》</strong></p>\n<p>体</p>\n<p>用是</p>\n<p>指先</p>\n<p>天不</p>\n<p>变的</p>\n<p>为体</p>\n<p>，后</p>\n<p>天变</p>\n<p>化为</p>\n<p>用。</p>\n<p>可见</p>\n<p>段建</p>\n<p>业的</p>\n<p>臆断</p>\n<p>是多</p>\n<p>么荒</p>\n<p>唐。</p>\n<p>段</p>\n<p>建业</p>\n<p>论：</p>\n<p>我</p>\n<p>们把</p>\n<p>日主</p>\n<p>、</p>\n<p>印</p>\n<p>星</p>\n<p>、</p>\n<p>禄</p>\n<p>神</p>\n<p>、</p>\n<p>比</p>\n<p>劫当</p>\n<p>体</p>\n<p>，</p>\n<p>财</p>\n<p>星</p>\n<p>、</p>\n<p>官</p>\n<p>杀星</p>\n<p>当用</p>\n<p>，</p>\n<p>食</p>\n<p>神与</p>\n<p>伤官</p>\n<p>既可</p>\n<p>以</p>\n<hr>\n<p><strong>来源《四柱像法 九阴真经 第一卷 516页》</strong></p>\n<p>心尽力， 功德圆满， 不管事情做成做不成都是功德圆满， 心地清</p>\n<p>净平等觉，这才叫学佛，这才叫得受用。</p>\n<p>净空法师：抓住一句阿弥陀佛，修如如不动 </p>\n<p>摘自净空法师-净土大经解演义第 125 集  2012.03.12    </p>\n<p>    [[[[[在修行过程当中，所有的现象是什么？是来给我们表法</p>\n<p>的。]]]]]善财童子为什么一生圆满成佛？善财童子跟我们的关系很密</p>\n<p>切，因为你看我们这一品「德遵普贤」 ，净宗的学人修什么法门？修</p>\n<p>普贤法门， 普贤法门修的就是清净平等觉。[[[[[ 一定要帮助他， 要给他真实的利益。 这个真实到底是什么？</p>\n<p>佛说 「开化显示真实之际」 ， 这是把真实意思说出来了。 「开」 是开导、</p>\n<p>是开示， 「化」 是变化， 这个意思就是说， 佛为一切众生开示、 开导；</p>\n<p>真实之际就是宇宙人生的真相。 经过佛的开示、 佛的教导， 众生明白</p>\n<p>了、觉悟了，就转凡成圣，转迷成悟，这叫化；将迷惑变成觉悟，将</p>\n<p>凡夫变化成佛菩萨。</p>\n<hr>\n<p><strong>来源《杭州班·道清阴阳整理(1)》</strong></p>\n<p>吧，这一</p>\n<p>动应就牵扯到这一个字，到底有没有的问题。冬天嘛，它是肯定没有的，是吧，冬天它没有，春天它到</p>\n<p>Sn\u000543QlO\u0017S÷ett\u0006\u0000·QM9QqN«Rÿ)SV·R)</p>\n<p>56 / 72</p>\n<p>底有没有的问题，因为你没有它就没有它啊，春天这个事就搞大了。冬天嘛，它没有就看它有没有救应</p>\n<p>了。你看他一肯定，你肯定之后什么，他就是否定，特别是冬天，他一是否定你还想火，不是破太极吗？</p>\n<p>寿星破太极吗？所以你冬天这个木头，正常乙木不都是，枯零快死的一些状态嘛，对不对。那你要伤它，</p>\n<p>你真正的发现哦，你可以看诶出现了，辛巳年之类的啊，癸巳年什么什么之类的。你克了火，我们讲可</p>\n<p>克火，你不要仅仅盯到火啊，一克了火知道它完了，确实是克了火了，是太极因素破太极了，是确确实</p>\n<p>实里面有这种寿星它不能平衡太极了，是因为寿星不能平衡太极，实际上就叫寿星破太极。那么，从数</p>\n<p>术角度来说，你就要认识到它这里面的客观性，就知道它必然是什么样的死，必然什么样死。</p>\n<p>这种太极我们看命例，我们看，为了明确这个太极，这种因素呢，我们讲一种叫标准的寿星应期方</p>\n<p>法。 ，就是这种生死都是在我们这个太极上面是标标准准的发生方式。</p>\n<hr>\n<p><strong>来源《神峰通考命理正宗原本校注》</strong></p>\n<p>丁亥先兄西庵 制杀太过</p>\n<p>楠曰：乙木生临酉巳垣，两金四火制相连。</p>\n<p>不宜见火重攻杀，去火存金是福田。</p>\n<p>乙木生酉月，本根轻也，畏金制。夫何金少而火多，制杀太过，尽法无 民。早行丙午，制过杀星，屡屡克子，且财名不遂。大运入辰，望壬癸之水， 去火存金，财源大振，资产佳儿，福寿两全。寅运见火克金，灾生回禄。入 丑杀星入墓，八十三岁而死。</p>\n<p>甲戌、庚午、乙亥、丁丑  逸叟自命 真伤官庚金官星为病</p>\n<p>楠曰：乙木生居火土旬，时干透露火为真。</p>\n<p>庚金月上为真病，壬癸伤丁便可嗔。</p>\n<p>乙木生午，透出丁火为真伤官。奈何庚金贴身制我，而只能用丙丁火也， 所以青云志弗克就，只为此一点庚金羁绊。再行壬癸，伤损所透丁火，愈不  能制去官星，故多蹇滞。后来行甲乙丙丁颇遂，盖因能去庚金也。然又只畏  壬癸天干之水，盖因丁火露出，火少故也。不畏地支之水，盖为地支火多， 有土去水耳。</p>\n<p>乙酉、己丑、庚子、壬午逸叟弟 真伤官用劫</p>\n<p>楠曰：庚生丑月气寒凝，气弱能亲劫有情。</p>\n<p>最畏丙丁能破劫，西方金旺颇精神。</p>\n<hr>\n<p><strong>来源《八字命理秘传【我好疼你啊我要嫁给你版】》</strong></p>\n<p>\u00009\u00007\u00005\u00002\u00006\u0000 \u0001SCg,|¾TÁf\u0013[fu5[PNf</p>\n<p>AAKK0088800加微信进群聊</p>\n<p>义心论坛</p>\n<p>h</p>\n<p>t</p>\n<p>t</p>\n<p>p</p>\n<p>:</p>\n<p>/</p>\n<p>/</p>\n<p>w</p>\n<p>w</p>\n<p>w</p>\n<p>.</p>\n<p>e</p>\n<p>s</p>\n<p>e</p>\n<p>n</p>\n<p>1</p>\n<p>1</p>\n<p>.</p>\n<p>n</p>\n<p>e</p>\n<p>t</p>\n<p>无私奉献</p>\n<p>义心论坛</p>\n<p>h</p>\n<p>t</p>\n<p>t</p>\n<p>p</p>\n<p>:</p>\n<p>/</p>\n<p>/</p>\n<p>w</p>\n<p>w</p>\n<p>w</p>\n<p>.</p>\n<p>e</p>\n<p>s</p>\n </p>\n<hr>\n<p><strong>来源《003-2003.12《命理技法与决断：四维时空占吉凶》_董忠清著》</strong></p>\n<p>4407916 公众号：九鼎学堂</p>\n<p>获取更多最新易学资料 加微信：804407916 公众号：九鼎学堂</p>\n<p>命理技法与决断</p>\n<p>若更得天权禄马星助者，荣昌富贵，若犯重者，主悲泣翻悔中</p>\n<p>下小人，半吉之命，若逢孤厄，破刃照命者，必为朝堂折挫之</p>\n<p>人，见贵而未为全吉也。</p>\n<p>鬼道天厄星</p>\n<p>时在厄中人混沌，惺惺作事又迟疑，此人带疾方延寿，劳</p>\n<p>碌生涯运见迟。此星在命，主人带疾，若逢破刃犯冲，灾病必</p>\n<p>重，若逢权贵星，主人轻疾乃中上命也，若逢孤释奸星，主作</p>\n<p>事迟令，一生劳碌，定主蹭蹬离祖乃中下命也。</p>\n<p>人道天权星</p>\n<p>寅位逢之号天权，性格操持志气坚，作事差迟人也喜，一</p>\n<p>呼百诺在人前。此星在命，主人聪明，俊秀洒落，襟怀有权有</p>\n<p>势，多智多能，若逢贵福文寿星相助者，人人钦敬，权而无权</p>\n<p>乃中命也，若逢厄破孤骚在命者，作事劳力，财帛不聚，未能</p>\n<p>先能，未会先会，浮浪中命也。</p>\n<p>畜道天破星</p>\n<p>时辰落在天破宫，堆金积玉也成空，夜眠算计图家富，钞</p>\n<p>袋谁知有蛀虫。此星主财帛空虚，祖业耗散，若得权贵福星相</p>\n<p>助，亦为中命，如遇骚刃孤厄犯重者，作事艰难，重重破败，</p>\n<p>浮浪东西之下命也。</p>\n<h2>参见</h2>\n<li>旺衰派·寿命</li>\n<li>格局派·寿命</li>\n<li>盲派·寿命</li>\n<li>神煞·寿命</li>\n<li>调候·寿命</li>\n<li>病药·寿命</li>\n<li>阴阳·寿命</li>\n<li>其他·寿命</li>", "source_count": 84, "block_count": 238, "see_also": ["旺衰派·寿命", "格局派·寿命", "盲派·寿命", "神煞·寿命", "调候·寿命", "病药·寿命", "阴阳·寿命", "其他·寿命"]}, {"topic": "性格", "content": "<h2>综合 · 性格</h2>\n<p>共收录 418 条相关内容，来自 107 本书籍。</p>\n<p><strong>来源《1.5盲派精髓大全（上） (2)》</strong></p>\n<p>这一本性所呈显的性格，这俩种性格在日主身上有，都有显示。那么此人是什么样的人，俩者一结合，了然于心。</p>\n<p>再比如，日主为丙火，有七杀的特性，若柱中火多或旺，那么可断：</p>\n<p>1）日主性急，向上，有积极进取不服输的性格，这是丙火的特性。</p>\n<p>2）为人有霸道，或蛮横一面，但又聪明伶俐，这是七杀的心性。</p>\n<p>同理，当日主为金时，金则为比劫，因为十天干五行属性与十神的心性趋于一致，那么日主所反映的各种信息之象比较单纯，比较直观，比较强烈。</p>\n<p>当十神信息之象与五行中十天干所具有的本性相反时，体现出的实际信息之象就比较复杂，此人具有俩面性，忽隐忽露，露一面，藏一面，为人也是这样，表面上给人一种感觉，实际此人与表面的感觉相反。例如有的人表面很柔弱，很随和，实际此人内心十分刚强，有主意，抵触心也很强，只是不说。</p>\n<hr>\n<p><strong>来源《老人参盲派命理《过三关》303页微信zysp9099副本》</strong></p>\n<p>\u0000m\u0000 R _®Oá\u0000 \u00006\u00006\u00006\u00009\u00007\u00005\u00002\u00006\u0000 \u0001SCg,|¾TÁf\u0013[fu5[PNf</p>\n<p>264 / 303</p>\n<p>艮与离组合，离为美丽，表示坐着打扮自己，坐着化妆；离为镜子，</p>\n<p>表示坐着照镜子。</p>\n<p>艮与震组合，震为动，表示坐着也不安静；震为敲打，表示坐着敲打</p>\n<p>东西；震为演讲，表示坐在那里演讲。</p>\n<p>艮与巽组合，巽为摇摆，表示坐着摇晃，或坐在摇椅里面；巽为教 ,</p>\n<p>表示坐着教学</p>\n<p>艮与坎组合，坎为劳苦，表示坐着工作；坎为思考，表示坐在那里思</p>\n<p>考；坎为算计，表示坐在那里算计，如会计工作人员。</p>\n<p>艮为弯腰：</p>\n<p>艮与离组合，离为文明礼仪，表示礼貌 >\n<hr>\n<p><strong>来源《05.王相山-子平真诠《格局真诠》544页1》</strong></p>\n<p>戊癸化火象炎上格，丙辛化水象润下格，</p>\n<p>丁壬化木象曲直格。这种论法，实质是把化气格与专旺格混为一谈了。化气</p>\n<p>格真的如专旺格吗？我们把十干合化情况列出来，就清楚了。</p>\n<p>甲己化土格，甲日象从财格，己日象稼穑格，均喜火土；</p>\n<p>乙庚化金格，乙日象从煞格，庚日象从革格，均喜土金；</p>\n<p>丙辛化水格，丙日象从煞格，辛日象从儿格，均喜金水；</p>\n<p>丁壬化木格，丁日象从强格，壬日象从儿格，均喜水木；</p>\n<p>戊癸化火格，戊日象从强格，癸日象从财格，均喜木火。</p>\n<p>可见，十干化气中，只有己日元、庚日元两个合化象专旺格，其它八个都不</p>\n<p>是专旺格，那段象专旺的论述，仅对了十之有二。其它的，癸甲日两个象从</p>\n<p>财格，乙丙日两个象从煞格，丁戊日两个又象从强格，辛壬日两个又象 从儿</p>\n<p>格。同样是木，甲象从财，乙象从煞；同样是火，丙象从煞，丁象从强。等等</p>\n<p>，根本就不是一会事。四象，又四不象， 这就是化气格的特殊性。所以，绝不</p>\n<p>能把简单地把从化与专旺、从格混为一谈。不然， 古人就不会多此一举， 立</p>\n<p>什么化气格了？因为专旺格是日元独旺，没有从的意象，化气格是有的日元</p>\n<p>独旺，不失独立性，有的则日元无气，失去了独立性，才要从化。</p>\n<hr>\n<p><strong>来源《老人参盲派命理《过三关》303页微信zysp9099副本》</strong></p>\n<p>，巽为教，为技术，表示技术，设计类院校；巽为商业，</p>\n<p>表示经济类院校；巽为传播，表示邮政，传媒类院校。</p>\n<p>离与坎组合，坎为法律，表示法律性院校；坎为水，表示水利性的院</p>\n<p>校；坎为计算机，表示计算机院校。</p>\n<p>离与艮组合，艮为保卫，表示军校；艮为房产，表示建筑类院校；艮</p>\n<p>为矿山，表示矿业类院校。</p>\n<p>Y}SÈQhDnQ\u0000w\u0000w\u0000w\u0000.\u0000h\u0000a\u0000o\u00008\u00004\u00005\u00001\u0000.\u0000c\u0000o\u0000m\u0000 R _®Oá\u0000 \u00006\u00006\u00006\u00009\u00007\u00005\u00002\u00006\u0000 \u0001SCg,|¾TÁf\u0013[fu5[PNf</p>\n<hr>\n<p><strong>来源《《八字读象预测法》黄勇智》</strong></p>\n<p>，由于月干是日干辛金的同一五行，所以年干庚金 也能帮助日干辛金。</p>\n<p>第七节      合会的应用规律</p>\n<p>我们分析命局离不开对五行强弱变化的分析，而干支合化对五行力量强弱的影响又至关 重要，一个命局免不了发生干支合化、合绊的关系，即使原命局不存在干支相合的情况，但 在进入岁运后，也一定会遇上干支相合，而干支合化的不同情况，也会对整个命局产生不同 的影响，许多吉凶和信息往往就由这些影响所致，如果你不能透彻的理解、掌握会合的作用 关系，就不可能准确地为人批断命运，因此这节关于合会的应用规律，大家一定要掌握，并 能灵活运用到实践中去。</p>\n<p>何谓相合？就是我与别人相合，有相互吸引、亲和、凝聚、和好之意。分天干五合、地 支八合、地支三合、地支三会。凡合而不化，为合绊；合而能化，为合化；经合化变成新的</p>\n<p>五行为化神，比如乙庚合化金，金就是乙庚合化的化神。忌神被合绊、合化大吉，用神被合 绊、合化大凶。五合与六合分生合与克合两种，生合越合越亲密，而克合为合中有隔阂，就 好比两口子虽然彼此相爱，但因性格不合而常常吵闹。</p>\n<p>一、五合规则。</p>\n<hr>\n<p><strong>来源《《八字读象预测法》黄勇智》</strong></p>\n<p>耗其它天干之水。</p>\n<p>7、 巳午火在什么情况下能克金？勇智认为， 巳午火要想能正常发挥克金的特性必须具</p>\n<p>备以下条件：一是巳午火临月建就能克任何位置的庚辛申酉金了；二是巳午火在年日时一般  能克临近之支，隔支与遥支一般不能克之，但特殊情况下还是能克的，比如午火在年支，申  金在时支，中隔巳火、午火，因为月支巳火、日支午火是年支午火的比劫，因为它们是同性， 自然年柱巳火与它们结成火党，就能克时支申金了；三是巳午火能克自己本 /p>\n<p>悟性高，聪明的人，都属于这种人，在这方面我有最深刻的体会。</p>\n<p>要是没什么天赋，那只有通过不断地学习，逐渐地积累来走向成功了。</p>\n<hr>\n<p><strong>来源《《巫咸撮要》解读》</strong></p>\n<p>，这里并非表示门框的质量不好，表示的是人员的不稳定。</p>\n<p>谁的八字月令受冲，谁的门庭不稳，不稳便要出走。</p>\n<p>古代小时候出差，又无法出国，无法去外地读书，所以体现在其它方面，比如过继等。</p>\n<p>官印遇偏，这个偏，主要指偏印。</p>\n<p>偏主孤，不正之象。</p>\n<p>不正，非正室，则是庶出，小妾侍女所生。</p>\n<p>干头火烈，堪嗟伯牛之疾；时日冲刑，难免卜商之泣。</p>\n<p>八字火炎土燥，不利健康，纵然富贵一时，也会有疾病随身。</p>\n<p>此时，就要考虑调候了，如果有水，便会好很多。</p>\n<p>但是，要和格局区别开来。</p>\n<p>我们讲格局时，从来不把调侯拿入考虑因素。</p>\n<p>八字的寒暖燥湿，只会影响健康以及性情等。</p>\n<p>日时冲刑，奔波流离，这个和格局也没有关系，表现的是一种状态和方式。</p>\n<p>比如沙场奔袭、长期出差、经商走卒之类。</p>\n<p>正如原文所引卜商一样，博学笃志，传授五经，但是西河讲学，离群索居。</p>\n<p>六虚临于乙亥，孟浩然徒有文章；三才会于壬辰，石季伦恣情金玉。</p>\n<p>何为六虚？</p>\n<p>在八字命里，六虚指空亡对冲之位，比如甲子旬，空亡在戌亥，则辰巳为六虚。</p>\n<p>空亡对冲，无物可对，也有不实之象，即对面无物，只有自己。</p>\n<p>乙亥六虚，即辰巳空亡，生在甲午旬。</p>\n<p>戌亥居乾位，国家之位，带六虚，则无位，有名无实。</p>\n<hr>\n<p><strong>来源《易海游龙+八字命理教程+167页》</strong></p>\n<p>如果日主身旺，伤官弱而无力，制不住印，就贵不起来，格局就</p>\n<p>要往下降。</p>\n<p>六，寒暖燥湿也会影响格局层次。这一条主要说的是调候，比如， 甲木生</p>\n<p>于子月，即使有庚金杀星，也难富贵，之前我写过冬季金寒水冷不生木，如果</p>\n<p>不见火，这种杀印相生的格局也高不起来，如果有火暖局，能使金温水暖，就</p>\n<p>生身显贵了。</p>\n<p>《子平真诠》将格局大致分为三个层次，真神得用，有情有力的为上格；</p>\n<p>有情但力量不够的为中格；无情又无力的为下格。</p>\n<hr>\n<p><strong>来源《穷通宝鉴  白话评注  下_（明）佚名著；（清）余春台整理；徐乐吾评注；方成竹注译》</strong></p>\n<p>伤官生财格，大富大贵之造，官高名显之命。如不见甲 木，乙木亦可为用，乙木为癸水食神，但仍必须有丙火。</p>\n<p>或支成木局，地支见寅卯辰东方，或亥卯未木局，木虽不得时令之气，但  会合成局，食伤结党，又逢进气之时，木之气势转弱为旺，日元被盗泄太过， 弱不胜泄，日主如无庚辛金为救，必为疾病残伤之人，或主残病呻吟。而且水  木伤官失令，须见财官，否则人虽聪明，不能成名。如见庚辛透干，得月令丑  土为根，则可为癸水印绶，得金透出天干辅主，技艺之流。但凡冬月用丙火  者，须要丙火得地为妙。如不见丙火调候暖局，去寒解冻，土冷水寒，庚辛亦 无生发之能，所以冬癸取用，不管用印用食伤，尤以丙火调和气候最为重要。 若见有丙火透干，逢旺木相生，财星得位，寒谷向阳，万物有生发之机，成食</p>\n<p>徐乐吾曰：重言丙火不能解冻之理，得地者，通根寅巳是也。否则，即使 有丙火出干，未必能用。干透甲乙，支见卯木，寒冻阴湿之木，焉能生火。如 支见卯未会局，或卯戌六合，干透丙火，即为可用。盖戌未火土，地气温暖， 木有生意，即能生火，此中消息至微，非细辨不知也。</p>\n<hr>\n<p><strong>来源《杨清娟《教学体系命例集细解》》</strong></p>\n<p>、酉金生在丑土里）。</p>\n<p>辰土喜欢酉金，但酉金不喜欢辰土（因辰中水化酉金，若酉为禄，遇辰 是险中求）；</p>\n<p>午火喜欢辰土，生起辰土才体现其伟大，而且辰土也喜欢午火，让其变 的温暖；</p>\n<p>未土喜欢卯木，两者互相喜欢；</p>\n<p>未土意向性地生酉金，也就是虚情假意。例如： 戊 甲 戊 戊</p>\n<p>辰 子 午 午  土太燥需要子水来调候，甲木才能茁壮成长。此命就需要 甲木旺，如没有甲木，一片土就一无是处。所以此甲杀不能制。</p>\n<p>会局专，力量强，是因为物以类居；</p>\n<p>三合局不 无法出国，无法去外地读书，所以体现在其它方面，比如过继等。</p>\n<p>官印遇偏，这个偏，主要指偏印。</p>\n<p>偏主孤，不正之象。</p>\n<p>不正，非正室，则是庶出，小妾侍女所生。</p>\n<p>干头火烈，堪嗟伯牛之疾；时日冲刑，难免卜商之泣。</p>\n<p>八字火炎土燥，不利健康，纵然富贵一时，也会有疾病随身。</p>\n<p>此时，就要考虑调候了，如果有水，便会好很多。</p>\n<p>但是，要和格局区别开来。</p>\n<p>我们讲格局时，从来不把调侯拿入考虑因素。</p>\n<p>八字的寒暖燥湿，只会影响健康以及性情等。</p>\n<p>日时冲刑，奔波流离，这个和格局也没有关系，表现的是一种状态和方式。</p>\n<p>比如沙场奔袭、长期出差、经商走卒之类。</p>\n<p>正如原文所引卜商一样，博学笃志，传授五经，但是西河讲学，离群索居。</p>\n<p>六虚临于乙亥，孟浩然徒有文章；三才会于壬辰，石季伦恣情金玉。</p>\n<p>何为六虚？</p>\n<p>在八字命里，六虚指空亡对冲之位，比如甲子旬，空亡在戌亥，则辰巳为六虚。</p>\n<p>空亡对冲，无物可对，也有不实之象，即对面无物，只有自己。</p>\n<p>乙亥六虚，即辰巳空亡，生在甲午旬。</p>\n<p>戌亥居乾位，国家之位，带六虚，则无位，有名无实。</p>\n<hr>\n<p><strong>来源《《八字读象预测法》黄勇智(1)》</strong></p>\n<p>，为财多身弱，一  事无成 。至甲午运，木无根而从火， 己巳年火土并旺，气血必伤，病患肠胃血症而亡。</p>\n<p>此造己土生于丑月，全局一片寒湿之地，没有丁点阳暖之象，故不宜用火调候，应顺其  寒湿之气，取金水为用，忌火运逆其寒湿之气 。所以此造是从寒格 。年月二柱为用神之象， 按象直读祖业必丰、荫庇有余；日支为妻宫，亥水正财临之为得位，大运癸巳，与日柱反吟，</p>\n<p>妻星妻宫被伤之象很明显，按象直读妻有灾；同样甲午大运为忌神大运，大运之象为忌神凶  象，流年己巳与日干天比地冲，地支用神被伤，凶险之象感应到日主与妻宫，妻已故，与妻  无关，这时必应自己，按象直读，他自己有灾病，什么病？ 巳火为红色之象、亥水为水之象， 合起来为血水、血液之象，又己土为脾胃之象，按象直读病患肠胃血症而亡。</p>\n<p>食神   劫财    日干   食神</p>\n<p>例三： 男命  乙巳   丙戌   丁未    乙巳</p>\n<p>大运： 乙酉  甲申  癸未  壬午  庚辰  辛巳  己卯  戊寅</p>\n<hr>\n<p><strong>来源《穷通宝鉴  白话评注  下_（明）佚名著；（清）余春台整理；徐乐吾评注；方成竹注译》</strong></p>\n<p>绶，一则月令七煞也。壬不离丙，丙不离壬，水火以既济为 美，故次用丙火。用土者，以煞为子，以财为妻星。</p>\n<p>方先生曰：此段总结九月壬水取用总的原则，季秋戌土月建，土旺秉令之 时，七杀乘权，用甲木破土，食神制杀为正用。与八月用甲不同，八月水旺， 印绶当令，取甲木者，用食神以泄秀。九月壬水，如果汪洋一片，取一戊制群 水，为 一 将当关，群邪自伏，又要用丙火为辅。所谓次看丙火者，因水旺于 秋，则土寒水冷之故。所以，九月土旺秉令之时，不外乎用甲、用戊两法，丙 火、庚金，只为应病之药。以甲木破土为正用，如见水旺，戊土须酌用之，因 水寒土冷，要次看丙火，水多无丙，只以戊土为用者，则为平常人物。壬不离 丙，丙不离壬，壬旺取丙，丙旺用壬，水火总以既济为美。用甲木者，木子水 妻；以戊土为用者，土子火妻。</p>\n<p>命例 一：</p>\n<p>才丙寅 杀 戊戌 壬戌 印辛丑</p>\n<p>身旺官旺，又得丙透，参政。</p>\n<p>徐乐吾曰：财生煞旺，无甲，以辛金化煞为用。甲木藏寅，寅戌会局，不 能取以制煞也。</p>\n<p>命例二：</p>\n<p>印 辛丑</p>\n<p>杀 戊戌 壬戌</p>\n<p>食甲 辰</p>\n<p>支成四库， 一 甲透时，太史。</p>\n<hr>\n<p><strong>来源《无风道 盲师口诀断命300招》</strong></p>\n<p>星在四墓中的人会死里逃生)。实际情况 是：因身体有病，多次流产，1994甲戌年剖腹生 女，险些伤命。</p>\n<p>10、财星被穿不生儿，穿倒财星不生儿。</p>\n<p>乾造 己 甲 庚 己  此造卯辰穿，穿倒</p>\n<p>酉 戌 辰 卯 卯木财星，财星被穿不 生儿，穿倒财星不生儿。断他只生女儿不生男 。事实是此造家中有五个女儿，送人了两个，</p>\n<p>家中剩下三女，无男孩。</p>\n<p>11、火炎土焦不生育，金寒水冷不生育。</p>\n<p>坤造丙甲戊丁此造日主身旺无</p>\n<p>辰 午 戌 巳  财，不生儿。身旺财为</p>\n<hr>\n<p><strong>来源《易海游龙+八字命理教程+167页》</strong></p>\n<p>如果日主身旺，伤官弱而无力，制不住印，就贵不起来，格局就</p>\n<p>要往下降。</p>\n<p>六，寒暖燥湿也会影响格局层次。这一条主要说的是调候，比如， 甲木生</p>\n<p>于子月，即使有庚金杀星，也难富贵，之前我写过冬季金寒水冷不生木，如果</p>\n<p>不见火，这种杀印相生的格局也高不起来，如果有火暖局，能使金温水暖，就</p>\n<p>生身显贵了。</p>\n<p>《子平真诠》将格局大致分为三个层次，真神得用，有情有力的为上格；</p>\n<p>有情但力量不够的为中格；无情又无力的为下格。</p>\n<hr>\n<p><strong>来源《穷通宝鉴  白话评注  下_（明）佚名著；（清）余春台整理；徐乐吾评注；方成竹注译》</strong></p>\n<p>伤官生财格，大富大贵之造，官高名显之命。如不见甲 木，乙木亦可为用，乙木为癸水食神，但仍必须有丙火。</p>\n<p>或支成木局，地支见寅卯辰东方，或亥卯未木局，木虽不得时令之气，但  会合成局，食伤结党，又逢进气之时，木之气势转弱为旺，日元被盗泄太过， 弱不胜泄，日主如无庚辛金为救，必为疾病残伤之人，或主残病呻吟。而且水  木伤官失令，须见财官，否则人虽聪明，不能成名。如见庚辛透干，得月令丑  土为根，则可为癸水印绶，得金透出天干辅主，技艺之流。但凡冬月用丙火  者，须要丙火得地为妙。如不见丙火调候暖局，去寒解冻，土冷水寒，庚辛亦 无生发之能，所以冬癸取用，不管用印用食伤，尤以丙火调和气候最为重要。 若见有丙火透干，逢旺木相生，财星得位，寒谷向阳，万物有生发之机，成食</p>\n<p>徐乐吾曰：重言丙火不能解冻之理，得地者，通根寅巳是也。否则，即使 有丙火出干，未必能用。干透甲乙，支见卯木，寒冻阴湿之木，焉能生火。如 支见卯未会局，或卯戌六合，干透丙火，即为可用。盖戌未火土，地气温暖， 木有生意，即能生火，此中消息至微，非细辨不知也。</p>\n<hr>\n<p><strong>来源《穷通宝鉴  白话评注  下_（明）佚名著；（清）余春台整理；徐乐吾评注；方成竹注译》</strong></p>\n<p>月，引通庚金，生扶嫩木，而从财  也，亦是秀气流行。更喜运走东南，生化不悖，木亦得其敷荣，所以早登甲</p>\n<p>方先生曰：支成火局者，地支见寅午戌三合火局，或巳午未三会南方，又  生于二月，阳和之际，火势必然乘旺，而辛金又为珠玉之质，不耐旺火锻炼， 若见火旺，必然熔金，弱金不能生旺水，微弱之水，亦难胜旺盛之火，金水两 伤，身弱杀旺，必为贫贱夭折之命。或见有戊己土出干，火土同源，火旺土 相，火旺土燥，燥土亦不能生金，反见火土混杂，所谓官印相争，亦是贫贱下 格。所以见地支会成火局者，需要有庚壬并透，以庚生壬，以壬制火；如不见 庚金透干，或见二壬并透，壬水得势，亦可制旺火，此二者，用伤官驾杀，均 为病重得猛药，格局配得中和，反成富贵。</p>\n<hr>\n<p><strong>来源《丁亮   君臣命理525》</strong></p>\n<p>寅    未    辰</p>\n<p>大运  乙 丑 5 甲子15  癸亥25 壬戌35 辛酉45  庚申55</p>\n<p>此命以辛为命主。辛生寅月寒气未除，幸得丙火从月令透出解冻暖  身。可惜时干壬水透出灭火、年干己土坐亥水泄火，丙火受伤，只有日  支未土可以暖身。食伤为忌与子女无缘。 一路行水、金寒运，无火土运  制水护火解寒，故婚结二次，中药也服用无数，也未能孕育出一男半女。 医院化验诊断是精虫数量偏少，活力不足，与命理分析十分相符。用丁  老师的盲派干支喜忌理论看命局简单又准确。</p>\n<p>4、1980年坤造</p>\n<p>庚  乙  庚  丁</p>\n<p>申  酉  子  亥</p>\n<p>大 运 甲 申 7 癸未17 壬午27 辛巳37  庚辰47</p>\n<p>此女为一化工试剂销售员。 命局以庚金为命主， 庚生酉月比劫多而 实，为顽金硬铁一块，庚金本为无情无义，需要火炼、水泄方能成器。</p>\n<p>此命金太多太旺，水得金生但不透，泄金力度有限；丁火无根气弱，用 火炼庚金难以胜任。综合考虑只能取水为用神。用水则不能再用火，用</p>\n<p>则水火相斗。此造丁火透干，地支子亥难以克尽天干，暗藏不吉。</p>\n<p>2011辛卯年，行壬午运之午运，丁火下地，卯午破、子午冲，制忌</p>\n<h2>参见</h2>\n<li>旺衰派·健康</ 偏弱，喜木火，伤官癸水 在两子中，为忌神，这是星，儿子宫在辰，子辰合水为忌，子星没有起到 好的作用，浙以代表克子，女儿星是壬水不见，女儿宫庚金为喜，女儿宫 起到好的作用，表示女儿可靠，故有女儿。</p>\n<hr>\n<p><strong>来源《王君凌+月光八字命例精析+高级教材+上部240页1730204550》</strong></p>\n<p>甲乙为同手足两姐妹。辰为水库，</p>\n<p>亥也为辰中物，故看作甲乙都是辰中物，两胞胎两人。</p>\n<p>二、格局层次：</p>\n<p>甲木坐戌，偏财透干，伤官贴身泄秀生财。乙木在年帮扶力量不大， 也被火泄。伤官火主口才表达能力，又能调候。最喜生在亥月，为伤官 佩印的组合。是伤官泄身有点过，需要用印生身，故为老师。既用口才</p>\n<p>表达又用学历文凭、脑力智慧滋身。</p>\n<p>甲为姐是亥中真神，乙为妹不是亥中物，所以姐学历高。妹妹乙坐 卯合亥，也有学历。戌为伤官库，表示工作单位，口才表达的场所。甲</p>\n<p>坐戌为自己先得到，妹妹乙坐卯合戌，工作单位不如姐，环境差或小。</p>\n<p>偏财是伤官生出来的，是口才表达的结果。偏财戊土库根在甲坐下，</p>\n<p>姐比妹富有。妹妹用卯合戌，也可以得到，但没有甲得到的多。</p>\n<p>大运戊子、己丑，水旺之地，能有学历文凭。天干财克印不吉，使</p>\n<p>印减力，学习不是特别优秀。</p>\n<p>二、婚姻感情：</p>\n<p>甲坐戌，辛金官星为夫。夫星在夫位且不混杂，表示一婚。辰戌相 冲，又表示婚姻不是很好。辰是坏婚姻之物，看辰的出处。辰上坐戊， 戊是戌中物。甲的外遇是自己工作单位的同事。卯也是合戌的，辰戌冲 乙妹也有外遇。</p>\n<p>三、姐妹长相：</p>\n<h2>参见</h2>\n<li>旺衰派·六亲</li>\n<li>格局派·六亲</li>\n<li>盲派·六亲</li>\n<li>神煞·六亲</li>\n<li>病药·六亲</li>\n<li>阴阳·六亲</li>\n<li>综合·六亲</li>\n<li>其他·六亲</li>", "source_count": 25, "block_count": 36, "see_also": ["旺衰派·六亲", "格局派·六亲", "盲派·六亲", "神煞·六亲", "病药·六亲", "阴阳·六亲", "综合·六亲", "其他·六亲"]}, {"topic": "基础理论", "content": "<h2>调候 · 基础理论</h2>\n<p>共收录 21 条相关内容，来自 18 本书籍。</p>\n<p><strong>来源《007-2007.09《四柱乾坤》徐丙昕编》</strong></p>\n<p>4407916 公众号：九鼎学堂</p>\n<p>获取更多最新易学资料 加微信：804407916 公众号：九鼎学堂</p>\n<p>第二十一章死期浅论 317</p>\n<p>命理分析：日主甲木生于丁巳月，年支午火，未戌中所藏</p>\n<p>丁火，巳午未会成火局，皆助火势，火旺可用水调候。而整个</p>\n<p>命局中只见克泄耗，而不见生扶，日主极弱之命，自身不保只</p>\n<p>能从儿火。这时甲木不能再见生扶，忌木助身，如果木来助身</p>\n<p>则凶，当大运乙丑来临，乙木有助身之势，丑未戌构成了三</p>\n<p>刑，又和时柱天克地冲，这些不稳定因素注定了凶险，流年甲</p>\n<p>戌一到，地支一片刑冲混乱，又加辰月，四土刑冲，日主得乙</p>\n<p>与甲的帮扶，起了反叛抗之心，激起土怒，于是驾鹤西去。那</p>\n<p>日主为什么不在74年甲寅流年死去呢，那个运程为甲子，也</p>\n<p>具备了邦身助气运年。子运也冲午，但流年甲寅与命局构成寅</p>\n<p>午戌火局，不但没有帮身而是化火，乙卯流年依然与戌合化</p>\n<p>火，都不至为大灾。</p>\n<p>实例说明，乾造，1961年10月9日（农历八月三十）申</p>\n<p>时生人，死于1991年。</p>\n<p>辛丑戊戌乙亥甲申</p>\n<p>大运：乙未。流年：辛未。</p>\n<hr>\n<p><strong>来源《陈朝阳-《象法大成精华版》盲派高级象法分享版.》</strong></p>\n<p>西方：申藏庚壬戊，酉藏辛，戌藏戊辛丁。西方白虎。</p>\n<p>北方：亥藏壬甲，子藏癸，丑藏己癸辛。北方玄武。</p>\n<p>地支藏天干的歌诀：子中藏癸水，丑藏己癸辛，寅中甲丙戊，卯中乙木逢。辰藏戊 乙癸，巳中丙戊庚，午宫丁己土，未宫己乙丁。申宫庚壬戊，酉中独辛金，戌宫戊 辛丁，亥中壬甲逢。</p>\n<p>象 法 大 成 精 华 版</p>\n<p>第四章  阴阳</p>\n<p>阴阳本无细分，阴中有阳，阳中有阴；阴极变阳，阳极化阴。阴阳既相互对立， 阴阳又彼此互补；只有在相互对立的情况下，才产生阴阳。刚开始先熟悉对立，然 后再运用互补，相生，相克。</p>\n<p>日月 大小  多少 干湿  高低  明暗  长短  软硬  快慢  黑 白</p>\n<p>胖瘦  男女  雌雄  寒暖  冷热  燥湿  喜怒  哀乐  悲喜  忙闲</p>\n<p>凉暖  来去 尖钝  美丑  粗细  俯仰  浮沉  好坏 轻重  前后</p>\n<p>左右  是非 有无  老少  新旧 首尾  始终  宽窄  难易 深浅</p>\n<p>强弱  出 入 开 关 斜正  动静  开合 生 熟 成败 贵贱  爱恨</p>\n<p>生死  贫富 死活  买卖  远 近 增减  安危 松紧  善恶  忠奸</p>\n<hr>\n<p><strong>来源《穷通宝鉴  白话评注  下_（明）佚名著；（清）余春台整理；徐乐吾评注；方成竹注译》</strong></p>\n<p>火，有甲欠癸，先泰后否。或支成火局，不见壬癸，僧道孤贫。 癸透者贵，壬透者富。用水者，要审水之多少。</p>\n<p>徐乐吾曰：承上文，正月戊土，月令自有丙甲，天干一派丙火，无癸滋  润，先泰后否，何也?丙为印，月令煞印相生，承上人之荫，是先泰也；癸为  财，无癸本身乏财禄，是后否也；故云先泰后否。见午戌会寅成局，火炎土  燥，非有壬癸为救，土无生意，癸透主贵，壬透主富。总之，不论丙透出干， 或支成火局，火旺必以壬癸为救也，详下三月支成火局节。火旺者水为救，土  燥者水润泽，均无取其多；水多又嫌湿重，宜丙火以暄之，比劫以分之，故云  审水之多寡也。以上论财印之法。</p>\n<hr>\n<p><strong>来源《象法是这样练成的－天干象意》</strong></p>\n<p>8</p>\n<p>:</p>\n<p>5</p>\n<p>1</p>\n<p>:</p>\n<p>1</p>\n<p>1</p>\n<p>多少</p>\n<p>毫安人</p>\n<p>家要看</p>\n<p>到</p>\n<p>唐湖</p>\n<p>清：</p>\n<p>下午</p>\n<p>8</p>\n<p>:</p>\n<p>5</p>\n<p>1</p>\n<p>:</p>\n<p>2</p>\n<p>3</p>\n<p>4</p>\n<p>2</p>\n<p>6</p>\n<p>我的</p>\n<p>是不清</p>\n<p>晰了</p>\n<p>唐湖</p>\n<p>清：</p>\n<p>下午</p>\n<p>8</p>\n<p>:</p>\n<p>5</p>\n<p>1</p>\n<p>:</p>\n<p>3</p>\n<p>9</p>\n<p>其它</p>\n<p>地方没</p>\n<p>事</p>\n<p>唐湖</p>\n<p>清：</p>\n<p>下午</p>\n<p>8</p>\n<p>:</p>\n<p>5</p>\n<p>1</p>\n<p>:</p>\n<p>5</p>\n<p>1</p>\n<p>就南</p>\n<p>京鸟毛</p>\n<p>的严格</p>\n<p>丹元</p>\n<p>：</p>\n<p>下午</p>\n<p>8</p>\n<p>:</p>\n<p>5</p>\n<p>1</p>\n<p>:</p>\n<p>5</p>\n<p>9</p>\n<p>丹元</p>\n<p>：</p>\n<p>下午</p>\n<p>8</p>\n<p>:</p>\n<p>5</p>\n<p>2</p>\n<p>:</p>\n<p>0</p>\n<p>5</p>\n<p>说来</p>\n<p>您也</p>\n<p>窝火啊</p>\n<p>丹元</p>\n<p>：</p>\n<p>下午</p>\n<p>8</p>\n<p>:</p>\n<p>5</p>\n<p>2</p>\n<p>:</p>\n<p>1</p>\n<p>3</p>\n<p>艾玛</p>\n<p>我找</p>\n<p>到同伴</p>\n<p>了</p>\n<p>丹元</p>\n<p>：</p>\n<p>下午</p>\n<p>8</p>\n<p>:</p>\n<p>5</p>\n<p>2</p>\n<p>:</p>\n<p>2</p>\n<p>0</p>\n<p>丹元</p>\n<p>：</p>\n<p>下午</p>\n<p>8</p>\n<p>:</p>\n<p>5</p>\n<p>2</p>\n<p>:</p>\n<p>3</p>\n<p>9</p>\n<p>消消</p>\n<p>火</p>\n<p>火炎</p>\n<p>焱燚：</p>\n<p>下午</p>\
