n<p><strong>来源《《八字读象预测法》黄勇智》</strong></p>\n<p>望大家能够灵活辩证运用， 为批准八字打好基石，这才是我的真正初衷。</p>\n<p>第一节：  日干旺衰的来源</p>\n<p>日干旺衰的来源有三： 一是月令对日干旺衰的影响， 即日干在月令所处旺相 休囚死的原始状态，月支在不受制的情况下，月令对日干旺衰的影响力有 4 成左右 （3－5 成），其它 6 个干支合共占 6 成左右；二是日支、月干、 时干  对日干的五 行生克作用的影响；三是年柱对日干旺衰的影响，它不直接作用日干，而是通过对 月柱的影响而间接影响日干的旺衰，年柱是决定日干是否从弱从旺的关键。时支对 日干的影响微乎其微，它只对日支、时干起损益作用，从而间接作用日干。</p>\n<p>比如：坤造   辛酉   庚子   丁亥   壬寅</p>\n<p>日干丁火生子月处死地，受克伐，有 5 成弱的状态， 日支、月干、时干都是克耗日  干的， 日干有从弱的趋向，是否真的从弱，最后看年柱，年柱双体辛酉财星不帮扶  日干， 日干从弱，此命为从弱格 。有人会问， 时支寅木为日干正印可以生助日干， 这种理解是错误的，在正格八个干支中，时支对日干影响最小，微乎其微，何况时</p>\n<hr>\n<p><strong>来源《千里命稿 (1)》</strong></p>\n<p>合而不作冲矣。</p>\n<p>刑冲克害例</p>\n<p>刑冲克合害，变化多端，再举数例如后： 乙 丑 庚 辰 乙 亥 戊 寅</p>\n<p>(天干)月庚合年乙，又合日乙。其情不专，(地支),寅亥六合。</p>\n<p>乙 丑 乙 酉 庚 午 戊 寅</p>\n<p>(天干)月乙合日庚(地支)酉丑金局，寅午火局。</p>\n<p>庚 申 乙 酉 乙 卯 丁 丑</p>\n<p>(天干)年庚合月乙 。 ( 地 支 )卯酉冲 ，酉 丑 隔位而不合。</p>\n<p>庚 午 乙 酉 庚 辰 己 卯</p>\n<p>(天干)月乙合年庚，又合日庚，其情不专。(地支)辰酉合，卯辰缺寅，故不作方合。卯酉 间辰，故不能冲。</p>\n<p>丙 午 庚 寅 己 卯 丁 丑</p>\n<p>(天干)丙庚相克而庚败，作克不作合。(地支)寅午三合，成半火局。寅卯缺辰，不作方</p>\n<p>合。</p>\n<p>甲 午 庚 午 乙 丑 丁 丑</p>\n<p>(天干)庚甲相克而甲败，作合不作克。(地支)二午自刑，月午日丑变相害，然皆于命局无</p>\n<p>影响。</p>\n<p>庚午 壬午 甲申甲子</p>\n<p>(天干)庚壬接近，庚甲间隔，以生论，不以克论。(地支)二午自刑，申子三合成地水局。</p>\n<p>丙 午 庚 寅 甲 申 乙 丑</p>\n<p>(天干)丙庚先克，庚甲不克。(地支)寅木得令，寅千又三合，故申不能冲寅。</p>\n<p>乙未 庚辰 甲寅 乙丑</p>\n<hr>\n<p><strong>来源《千里命稿 (1)》</strong></p>\n<p>防)。</p>\n<p>火</p>\n<p>原始       南方阳极而生热，热乃生火。</p>\n<p>性          属太阳，炎上。</p>\n<p>体          积阳之热气反者为火，火虽阳物，阴在其内，故火体内暗。 质          炽烈。</p>\n<p>天干        丙 丁属火。</p>\n<p>地支       巳午属火 。</p>\n<p>地藏        巳午未寅戌中 皆 藏火。</p>\n<p>生克       受木之生，生火，为水所克，克金。</p>\n<p>种类       火分六类，和有喜忌。</p>\n<p>(一)强火，当令或繁盛为强，喜金分力、水相济、土泄秀，忌木生火、火加重。  ( 二 ) 弱火，失令或稀少为弱，喜木生火、火 比助，忌金分力、水 克 熄 、土 掩晦。 ( 三 ) 炽火，木多易晦，喜金制木，忌水助木。</p>\n<p>(四)晦火，土多易晦，喜金泄土、木制土，忌火生土、土坚重。 ( 五 ) 熄火，金多易熄，喜木生火，忌金加重。</p>\n<p>( 六 ) 灭火，水多易灭，喜土制水存火、木泄水生火，忌金助水、水盛旺。 四 季火之喜忌</p>\n<p>土</p>\n<p>原始       中央属阴阳交而生湿，湿乃生土。</p>\n<p>性</p>\n<p>体</p>\n<p>质</p>\n<p>天干 地支 支藏 生克 种类</p>\n<hr>\n<p><strong>来源《沙漠绿洲八字教学录音辛苦打字讲义（上）(1)》</strong></p>\n<p>主。</p>\n<p>木到木地旺，火地休，金地死，水地相，土地囚。</p>\n<p>火到木地相，火地旺，金地囚，水地死，土地休。</p>\n<p>金到木地囚，火地死，金地旺，水地休，土地相。</p>\n<p>土到木地死，火地相，金地休，水地囚，土地旺。</p>\n<p>水到木地休，火地囚，金地相，水地旺，土地死。</p>\n<p>形象的说：</p>\n<p>兄弟多，旺。</p>\n<p>爹妈在，相。</p>\n<p>打别人，囚。</p>\n<p>撞枪口，死。</p>\n<p>生孩子，休。</p>\n<p>月令：</p>\n<p>甲木：寅卯旺，寅旺于卯月，辰月旺，次于寅卯；巳午弱，未根据情况定；申酉戌弱；亥旺，子略微旺，丑偏旺。</p>\n<p>乙木：寅卯辰旺，卯大于寅，寅大于辰；巳午弱，未根据情况定（亥，癸未帮，辛未，酉不帮）；申酉戌弱；亥子旺，丑旺，亥大于子，子大于丑，小于寅卯。</p>\n<p>丙火：寅卯旺，辰弱，雨水之前的寅月，丙火旺衰需要考虑其他地支，不生也不泄（木）；巳午旺，未根据情况确定，巳大于午；申酉弱，戌根据情况确定，不生者泄；亥子弱，丑弱，亥合木时帮火。</p>\n<p>丁火：寅卯旺，辰弱，雨水之前的寅月，丁火旺衰需要考虑其他地支，不生也不泄（木），卯木需要详细看；巳午旺，午大于巳，未根据情况确定；申酉弱，戌根据情况确定；亥子弱，丑弱，亥卯未三合局帮火。</p>\n<hr>\n<p><strong>来源《《君臣之道》》</strong></p>\n<p>。</p>\n<p>比劫在年上，中间戊戌隔着。</p>\n<p>庚还得气，在帮的时候就更旺了，他就他更可以生儿子了。主要就是看季节。</p>\n<p>乾：甲 甲庚庚</p>\n<p>辰 戌 戌 辰</p>\n<p>19681978198819982008201820282038</p>\n<p>运 乙 亥丙 子 丁 丑 戊 寅己 卯 庚 辰 辛 巳壬 午</p>\n<p>六四年的人，那时候学历基本不太高，跟现在不一样，现在随随便便就本科，</p>\n<p>不可同日而语。</p>\n<p>生在秋天，地支全是土，土金旺是肯定的。</p>\n<p>日主身旺足以用财。</p>\n<p>比劫克财了能生儿子吗?</p>\n<p>地支戌冲辰，也砍伐，天干也是贴着财克。</p>\n<p>即使走好运寅卯辰发财了，走了三十年好运助起财星发了财了，但是他一样生</p>\n<p>不了儿子，因为比劫贴着克我的财。</p>\n<hr>\n<p><strong>来源《01.滴天髓阐微(完美排版)》</strong></p>\n<p>枯索。运 逢壬戌，本主</p>\n<p>受伤；年逢辛未，紧克乙木，卒于九月患弱症而亡。 </p>\n<p>此造运用逆行，大抵是右命。</p>\n<p>十五、月令 </p>\n<p>月令乃提纲之府，譬之宅也，人元为用事之神，宅之定向也，不可以不卜。 </p>\n<p>原注：令星乃三命之至要，气象得令者吉，喜神得令者吉，令其可忽乎？月令如人之家宅，支中之三</p>\n<p>元，定宅中之向道，不可以不卜。如寅月生人，立春后七日前，皆值戊土用事；八日后十四日前者，丙火</p>\n<p>用事 ；十五日后，甲木用事。知此则可以取格，可以取用矣。 </p>\n<p>任氏曰：月令者，命中之至要也。气象、格局、用神，皆属提纲司令，天干又有引助之神，譬如广厦</p>\n<p>不移之象。人元用事者，即此月此日之司令神也，如宅中之向道，不可不卜。 《地理玄机云》云： “宇宙有</p>\n<p>癸酉 </p>\n<p>甲子 </p>\n<p>丙寅 </p>\n<p>戊戌 </p>\n<p>癸亥 </p>\n<p>壬戌 </p>\n<p>辛酉 </p>\n<p>庚申 </p>\n<p>己未 </p>\n<p>戊午 </p>\n<p>癸未 </p>\n<p>乙卯 </p>\n<p>丙辰 </p>\n<p>庚寅 </p>\n<p>甲寅 </p>\n<p>癸丑 </p>\n<p>壬子 </p>\n<p>辛亥 </p>\n<p>庚戌 </p>\n<p>己酉 </p>\n<p>戊戌 </p>\n<p>乙丑 </p>\n<p>丙辰 </p>\n<p>己丑 </p>\n<p>甲子 </p>\n<p>癸亥 </p>\n<p>壬戌 </p>\n<p>辛酉 </p>\n<p>庚申 </p>\n<p>己未</p>\n<p>31</p>\n<hr>\n<p><strong>来源《京南道人2024-5月深圳》</strong></p>\n<p>印 旺印是母亲，帮自己人，像母亲有本事了，并不代表自己的儿子有本事。 只能说这个母亲能给予自己帮助。比劫旺了也不等于自己旺，比劫是自己  手足，自己的朋友，所以这个八字表面看是身弱，因为已未日主，怎么看 也是身弱，大家很容易看成三层金二层水， 一层米，这样看日主怎么看都 是身弱 心性、能 力方面 (杀印是儒将，食杀是福将)</p>\n<p>您说壬是真神可用，那壬起什么作用(是你命造的真用神)是身弱生身吗(体用)(不是) 还是化杀?( 是 ) 如果壬也化杀，是否与癸混杂?  (不混，一个在天一个在地，不叫混) 性格主要体现在哪个神上面?  (杀、印)</p>\n<p>辛已是天地合，有没有这种说法呢?  (子平术不用这种解法，学、用东西要配套)</p>\n<p>巳酉合，辛杀的根没了，是否不好?  (是，杀虚则不强，关系到成就层次) 巳酉合解没解已亥冲?   (巳亥本来就隔位不冲)</p>\n<p>大雪后九日八时辰。</p>\n<p>壬 子 壬 子 壬 午 庚 子</p>\n<p>依真宗子平，是否此造三子冲倒午火。</p>\n<hr>\n<p><strong>来源《02-金镖门老人参辛丑弟子班笔记中（325页》</strong></p>\n<p>今天讲母象</p>\n<p>日主是母，日主所生的食伤为子，当母旺子弱的时候，实际也 就是用“子”来泄“母”的旺势。</p>\n<p>我们说的食伤泄秀，或者是八字身旺，有一食伤足矣，说的就 是母旺，用食伤泄；实际也是一种顺局的意思，就是要顺着这个母旺 之势，用子来泄秀，则“母慈而子亦昌矣”。</p>\n<p>比如甲乙木是日主，是“母”,满盘都是木，有一到两个火， 那这个火就是“子”,因为木生火，就是用火泄秀，那么母旺，母多 了，就是病，其实什么多了它也不好。</p>\n<p>第一是不能见水，水是木的源头，有水就会克火，伤到这个“子”, 因为他用的是“子”。</p>\n<p>第二个是不能见到金，因为“母”旺，金自然就克制不住这个 母了，这样也会激怒这个母性，就是激怒日主，必须得用火，如果火 弱，就必须要走带火土的运，这样既加强了火的力量，也生了土，也 就是相当于食伤生财了，顺着母而生孙了，就是生了财了，这财就是 “子”生的，所以叫“孙”。</p>\n<p>说白了就是要顺着这个“母”,泄“母”的旺势，不能克。要 是走带水的土运，就会激起“母”的性，反而制约“子”了，就是克 制这个火了，就是印来克制食伤了。</p>\n<p>所以这种“母”象的，“母”旺不能克制，也不能生她，越生</p>\n<p>264</p>\n<hr>\n<p><strong>来源《王庆学格局论命》</strong></p>\n<p>再没有出去工作，偶而做点小生意，也从没超 过一年，经济一直拮据。</p>\n<p>劫    杀    日    食</p>\n<p>例 5 坤 造：戊 申 乙 丑  己 亥 辛 未 ( 辰 巳 空 ) 大 运 ： 甲 子 癸 亥 壬 戌 辛 酉 庚 申</p>\n<p>17</p>\n<p>2015</p>\n<p>此造月支本气为比肩，主自己、主独立；杀局用食神成的局且食神在 时柱，那肯定是靠自己创业发财的老板。命主是一美容院老板，富有千万。十神与工作职业的关系</p>\n<p>格局是天地作用对人富贵贫贱的影响；旺衰中和为五行之气对人吉凶 祸福的影响；生克制化刑冲合害破是八字的作用方式；五行十神为人生各 种事件的代言人，尤其十神更是人生传奇的讲述者。</p>\n<p>断工作职业，十神既是基础又是重点。对十神的认识有多深刻，看工 作职业的能力就有多强。</p>\n<p>每个十神都有先天含义和后天象义。</p>\n<p>先天含义为十神的独立含义，也叫十神原始含义或称十神本义。它与 旺衰、喜忌、宫位、组合无关， 只体现本象。</p>\n<p>后天象义为组合以后所体现出来的含义。 一个十神和另一十神相作 用，就会体现不同的象义，这和一个人和谁在一块就会受其影响的原理是 一样的。</p>\n<hr>\n<p><strong>来源《九龙道长笔记 196页 封面》</strong></p>\n<p>大部分的八字，据我个人的一个经验呢，大部分的八字五行流 通之气是非常不顺畅的。因为它的五行不够平衡，</p>\n<p>它少了一样，或者某种五行太多，这都叫不平衡，那大家可以看这个八字案例。这个八 字案例满盘没有金。它哪怕地支的藏干，里边有一丁点金呢，都好。它没有金，那没有金 呢，就出现什么问题，他的性格儿就有缺失，这个人是个土命，咱不管他身强身弱，他是 个土命，那土是生金的。金就是他的食神和伤官。食神和伤官缺失，那你就要分析他什么 缺失，他的食神伤官却是十神代表了福气之神，吃喝玩乐享受之神。这个人没有食神，他</p>\n<p>就不会玩儿。整天就是说很闷。没有伤官，伤官代表了一个奋斗，一个上进心，那他上进</p>\n<p>心也不太强，这就是。五行缺失，五行不平衡，现在是少了一个五行，那我经常铁口直断， 就是有朋友来找我看八字，我直接给他断，我说你要小孩儿不好要，</p>\n<p>女同志食神伤官缺失的话，食神为女，伤官为子。她食神和伤官没有，他不好要孩子，</p>\n<p>那所以这个男同志的食神伤官也代表了他很多的意向，食神为口才。他没有食神，他心里 有事，他不会说，表达不出来</p>\n<hr>\n<p><strong>来源《玄门内部资料-《四柱精髓高级预测》207页》</strong></p>\n<p>子   癸丑    甲寅    乙卯</p>\n<p>始于：74.4   84.4    94.4    04.4</p>\n<p>旺衰：此命局是一个明显的从弱格，相信大家一眼就能够看出来。印星为忌 没有出现，此人聪明，以地支最旺的用神代印星，子水当令旺是偏印，故此人心 眼多、子水是偏印、亥水就是正印了，正印空亡，故此人心地不善良，狡猾多变， 不可深交。</p>\n<p>我们关键来看看大运、流年到底与命局是如何作用的：</p>\n<p>首先、我们看看93年：93年是癸酉年，在癸丑大运里，由于大运和流年是 同性，又没有命局中的字出现，所以以大运为主——大运癸水坐丑土本身比较旺， 流年癸水坐酉金也旺，有力去帮大运的癸水，癸水与命局中的同性字作用力度大， 故癸水生乙木正官用神应吉。所以此年参军。</p>\n<hr>\n<p><strong>来源《八字》</strong></p>\n<p>要，故凡五行之喜忌，干支之性情，以及生旺</p>\n<p>死绝合刑冲之解法，同为取用时所当注意，虽为理论，实为根本。</p>\n<p>第 48 页 共 417 页</p>\n<p>按：以上所言“用神”，分为两种，不可混淆。</p>\n<p>一、局中所用之物（或有用之物），为用神。如己日干生于酉月，天干透辛，则以辛为用神，辛</p>\n<p>为己之食神，即食神为用，此为食神格。但这个食神并不一定是使命局趋向综合平衡之物，只是</p>\n<p>八字“有用”之物而已，见下。</p>\n<p>二、使命局趋向综合平衡的一种五行，为用神。承上，己生酉月，天干透辛。</p>\n<p>①如果四柱其余干支中有许多己土比肩、戊土劫财、丙丁火印星，己虽生酉月泄气，而日干仍然</p>\n<p>较旺，柱中又有壬癸水财星的话，可以取财星作为用神，如：</p>\n<p>戊己辛癸</p>\n<p>辰巳酉未</p>\n<p>辛金得月令透干，金之力强，可取辛金为用（因辛金有用），为食神格，柱多比劫印星，日干强，</p>\n<p>取年上癸水为用神，为食神生财格，火生土，土生金，金生水，秀气流通，诚为美格，大运走水</p>\n<p>运，必然大吉大利，发福百端，金运次吉，也是好运。火运损了食神不利，木运平常，土运有吉</p>\n<p>有凶。此身旺，食神之利在于泄身、生财。</p>\n<hr>\n<p><strong>来源《千里命稿 (1)》</strong></p>\n<p>防)。</p>\n<p>火</p>\n<p>原始       南方阳极而生热，热乃生火。</p>\n<p>性          属太阳，炎上。</p>\n<p>体          积阳之热气反者为火，火虽阳物，阴在其内，故火体内暗。 质          炽烈。</p>\n<p>天干        丙 丁属火。</p>\n<p>地支       巳午属火 。</p>\n<p>地藏        巳午未寅戌中 皆 藏火。</p>\n<p>生克       受木之生，生火，为水所克，克金。</p>\n<p>种类       火分六类，和有喜忌。</p>\n<p>(一)强火，当令或繁盛为强，喜金分力、水相济、土泄秀，忌木生火、火加重。  ( 二 ) 弱火，失令或稀少为弱，喜木生火、火 比助，忌金分力、水 克 熄 、土 掩晦。 ( 三 ) 炽火，木多易晦，喜金制木，忌水助木。</p>\n<p>(四)晦火，土多易晦，喜金泄土、木制土，忌火生土、土坚重。 ( 五 ) 熄火，金多易熄，喜木生火，忌金加重。</p>\n<p>( 六 ) 灭火，水多易灭，喜土制水存火、木泄水生火，忌金助水、水盛旺。 四 季火之喜忌</p>\n<p>土</p>\n<p>原始       中央属阴阳交而生湿，湿乃生土。</p>\n<p>性</p>\n<p>体</p>\n<p>质</p>\n<p>天干 地支 支藏 生克 种类</p>\n<hr>\n<p><strong>来源《千库子平》</strong></p>\n<p>看看这个人都什么病。哦，对的，他是心</p>\n<p>脏不太好、血压高，有陈旧性的脂肪肝。对吧?卯木那里是脂</p>\n<p>肪肝。此人出车祸头部被撞过，哦还有糖尿病，戌土克子水，</p>\n<p>糖尿病，泌尿系统的问题。非常有意思的，我当年拿到这些八</p>\n<p>字，我断的写出来之后，我自己再拿书看，我当时都是出了一</p>\n< 说的。 土虚的， 日主过泄， 日主过泄的。</p>\n<p>制杀， 虽然说忌讳杀， 你制了杀也没用， 这叫克泄交加， 还不如不制。 这时候身衰印做儿， 有比劫也不管用， 比劫都虚了， 必须找印。</p>\n<p>命局没有印， 就不能生儿子了， 八字没有这个功能， 不能生儿子。</p>\n<p>所以日主生的是闺女。</p>\n<p>泄体太过， 金得局， 克泄交加， 没有儿子的命。</p>\n<p>不是说你没儿子， 你就可以富了， 此命没儿子也富不了。</p>\n<p>因为他的用神只能用劫， 劫很弱。</p>\n<p>没印是没有儿子， 劫财决定他的财富， 劫财很弱。</p>\n<p>用神很弱， 食伤制杀大格局是吗?</p>\n<p>不是， 你身弱， 再怎么制杀， 你也不是大格局。</p>\n<p>你也没有格局， 你只能打工， 因为你的财富值太低了， 比劫太弱了， 并不是说 因为我制的杀小， 我没钱， 而是因为我的用神弱了， 我的财富值才低的。</p>\n<p>走什么运?</p>\n<p>他没有印， 他生不了儿子。</p>\n<hr>\n<p><strong>来源《穷通宝鉴  白话评注  下_（明）佚名著；（清）余春台整理；徐乐吾评注；方成竹注译》</strong></p>\n<p>生，必然顽实而枯燥，要须用癸水 解炎润土，若无水救，火势炎烈，土势焦燥，五行不和协，秀气不流通，势象</p>\n<p>偏枯而旺，必为奸诈凶顽之徒；而且火燥土顽，无水为救，亦无克泄，旺气及 其身而止，必无后嗣。或见丙火透干，而癸水藏于地支，滴水亦不能解旺土之 燥，有被火土困干之虞，如四柱有金相生，癸水有金为源，己土得以润泽，土 生金，金生水，食伤泄秀，秀气流行，财星为用，则小有富贵，家境亦主小 康。或得一壬水透出辅癸，身强财旺，偏财为用，主人慷慨；偏财得用，亦主 才略；正财得用，身旺主富；自然慷慨才略，富贵双全，且贤名远播。若见戊 透出，则合癸制壬，比劫争财，以戊土为病，更须甲木为救，有病得药，木得 水润，方能破土，有救者亦能吉庆。无救者，用神破损，便遭凶恶，财星被 劫，亦主贫贱。</p>\n<p>三秋己土，支成金局，无丙丁出救，此人单寒孤苦。如得丙丁，生己元 神，此人名魁天下，五福俱集，富贵非轻。即风土不及，亦不失巨族英才，人 中豪杰。</p>\n<h2>参见</h2>\n<li>格局派·用神</li>\n<li>盲派·用神</li>\n<li>神煞·用神</li>\n<li>调候·用神</li>\n<li>病药·用神</li>\n<li>阴阳·用神</li>\n<li>综合·用神</li>\n<li>其他·用神</li>", "source_count": 46, "block_count": 111, "see_also": ["格局派·用神", "盲派·用神", "神煞·用神", "调候·用神", "病药·用神", "阴阳·用神", "综合·用神", "其他·用神"]}, {"topic": "财运", "content": "<h2>旺衰派 · 财运</h2>\n<p>共收录 973 条相关内容，来自 132 本书籍。</p>\n<p><strong>来源《05.王相山-子平真诠《格局真诠》544页1》</strong></p>\n<p>运。如果食重煞</p>\n<p>轻，则原局食神制煞太过，行印运制食神护煞和行财运化食神生煞为最好。</p>\n<p>二是喜身旺食伤。如果身旺的话，就能给食神供足能量，也不怕泄身太</p>\n<p>过，使食伤更好地发挥制煞的作用；食伤运来，可以进一步制煞，也是好运，</p>\n<p>主职位升高。</p>\n<p>三是行财运最忌。财运则化食神而党煞破格，所以最为忌讳。但如果能</p>\n<hr>\n<p><strong>来源《君臣命主八字论道网课试读版》</strong></p>\n<p>生，主生者减力，被生者增力。所以对主生者来说，是被泄减力量的状态，对这</p>\n<p>一点，一般人往往没有注意到。</p>\n<p>— 23 —</p>\n<p>第十六课 五行反克规律</p>\n<p>五行反克是生克的力量对比发生重大失衡，主要有以下三种情况：</p>\n<p>一，被克者力量比主克者力量大而发生反克：</p>\n<p>金能克木，木坚金缺。</p>\n<p>木能克土，土重木折。</p>\n<p>土能克水，水多土荡。</p>\n<p>水能克火，火旺水干。</p>\n<p>火能克金，金多火熄。</p>\n<p>例 86，1984年女命：</p>\n<p>伤 财 日 官</p>\n<p>甲 丙 癸 戊</p>\n<p>子 寅 巳 午 【午未空】</p>\n<p>癸水日干生于寅月休囚，戊癸合火，丙火引化，不受克制，为格神。日干癸水本来克火，</p>\n<p>但是丙巳午火得令得生而旺，反克日干，年支子水生甲寅木，不帮日干，日干化为了火，为</p>\n<p>火旺水干，只能从丙火财星格神。</p>\n<p>丙火正财为格神强旺，从小家境良好，学业好，木火通明，有艺术才华，画画能力强。</p>\n<p>官为用神合日干，又是坐空亡的，结婚的时间虽然迟，但夫妻感情很好的。</p>\n<p>例 85，1973年男命：</p>\n<p>财 印 日 比</p>\n<p>癸 丁 戊 戊</p>\n<p>丑 巳 午 午</p>\n<p>日干戊土被丁巳午火生，火多土焦之象，戊土同为燥土泄不了好，只能找湿土为用神，</p>\n<p>就以年支丑土为用。</p>\n<hr>\n<p><strong>来源《八字命理秘传【我好疼你啊我要嫁给你版】》</strong></p>\n<p>子时，春夏，财官生旺吉；秋冬四季，背禄逐马，凶。寅</p>\n<p>月，金火运，郎官。午月，东北运，金紫。忌壬寅月，</p>\n<p>恶死。壬申月，</p>\n<p>过贫遭刑。癸酉月，破败。己日喜逢甲子时，财官双美贵希奇；一朝</p>\n<p>得遇风云会，独步蟾宫折桂枝。己日时临甲子，化生土厚滋基。财官</p>\n<p>既助显光辉，有似青龙戏水。不遇庚金卯午，为人禄至福齐。常人发</p>\n<p>福有施为，君子登科及第。</p>\n<p>AAKK0088800加微信进群聊</p>\n<p>222</p>\n<p>六己日乙丑</p>\n<p>时断</p>\n<p>六己日生时乙丑，煞星受制不为伤；柱中身旺多荣贵，无助生人昼</p>\n<p>夜忙。</p>\n<p>己日乙丑时，专财逢鬼，丑上有明乙为鬼，暗癸为财。若有倚托通</p>\n<p>身旺者，贵；通运亦吉。若鬼有助，旺不能任者，衣禄平常。</p>\n<p>己丑日乙丑时，时上偏官，居武职都阃，还看地方断之。卯月金水</p>\n<p>运，六七品贵。</p>\n<p>己卯日乙丑时，子申月，行金土运，侯伯。巳酉丑戌年月，俱吉。</p>\n<p>己巳日乙丑时，寅卯月，偏官格。无酉戌字，文进贵命。</p>\n<p>己未日乙丑时，时日并冲，妻生财可也。卯午年月，金神入火乡，</p>\n<p>西南运，贵。辰戌四季全，大贵。干透丁辛，纯阴亦贵。</p>\n<p>己酉日乙丑时，卯月，偏官。辰月，</p>\n<p>财煞，贵。申酉，伤官伤尽。</p>\n<p>巳午，印绶，俱贵。丑戌，亦贵。</p>\n<hr>\n<p><strong>来源《君臣命主八字论道网课试读版》</strong></p>\n<p>杀，本身就身旺，此时喜欢官杀来克；如果还用印来化杀，反</p>\n<p>而日主更强了，官杀弱了，这时也是贫穷的情况。</p>\n<p>— 45 —</p>\n<p>第八课 独龙派旺衰真机：源流根基</p>\n<p>《滴天髓》源流章曰：何处起根源，流到何方住，机括此中求，知来亦知去。</p>\n<p>传说唐朝韩愈不信神佛，反对修行之道。其侄子韩湘子为八仙之一，多次劝说不得，就</p>\n<p>写了两句诗留给他：“云横秦岭家何在，雪拥蓝关马不前。”之后飘然离去。</p>\n<p>后来韩愈因为得罪了皇帝，被贬广东潮州，在经过蓝关的时候，果然下了大雪，进退</p>\n<p>不得。这时候韩湘子出现来帮助他。韩愈恍然大悟，确信有神仙之道，能未卜先知。故写下</p>\n<p>了《左迁至蓝关示侄孙湘》，曰：“一封朝奏九重天，夕贬潮州路八千。欲为圣明除弊事，</p>\n<p>肯将衰朽惜残年。云横秦岭家何在？雪拥蓝关马不前。知汝原来应有意，好收吾骨瘴江边。”</p>\n<p>而唐朝杜甫也有著名诗句：“安得广厦千万间，大庇天下寒士俱欢颜。”这都说明了安</p>\n<p>居乐业是我们中华传统农耕社会的理想状态。时至今日，很多人还为拥有一间蜗居而奋斗努</p>\n<p>力。</p>\n<p>而在我们独龙派君臣命主四柱八字预测学中，对“家”的重视也是秘传之一。</p>\n<hr>\n<p><strong>来源《民间师父八字课程学习笔记本地》</strong></p>\n<p>神为偏财。（详见十三章正印用神例）。</p>\n<p>本段落论述已涉及后面章节，学习者可前后参比， 以求融会贯通。</p>\n<p>本例举要意欲读者知晓， 日干寄旺十二宫中的五阳干顺布，五阴干 逆布是适用命理推论的，一些书中否定五阴干是没有以事实为依据所下 的结论，是对后学之人不负责任的结论。如果辛金不以五阴干逆推论生 旺墓绝，而按五行之金都以阳金论，那么辛金长生在巳的话，午月就不 弱，得令之力如此之大，又得印旺生身，七杀又可得印化而不为忌，何 来身弱杀旺逢财年祸患连连。只因身弱逢财挑不起，而生杀克身，是故 非身旺是其病源。</p>\n<p>但是，由于五阴干与五阳干的本气在临官、帝旺都处旺地，是为禄、 刃，故五行旺于本气是不会更改的。同一一行若五阴干和五阳干分别在 长生和衰弱之地，五阴干和五阳干所处的月令便截然相反。此间一念之 差，身旺身弱的判断就会失误，用神取错全盘皆错，不但不能起到预测  的趋吉避凶作用，还会帮倒忙。故学习者一定要把握这一关。</p>\n<p>第二节 日干五行取用宜忌</p>\n<hr>\n<p><strong>来源《正本清源之象法八字真传 上  236P》</strong></p>\n<p>往往都不是那么大的钱，是你做一些小生意挣</p>\n<p>的，或者说你朝九晚五上班挣的啊；官印食伤，这个才是大钱。</p>\n<p>然后财呢，怕多见，财旺日主弱，这个人命就不怎么样，他是做什么什么就不 成，财重身弱担不住这些财，这些财对你来说就是压力，就是负担，而且呢， 他求生存赚钱都会很艰难很辛苦，工作也不也不能够称心如意，这也是因为什</p>\n<p>么?因为财就是你的这个你追求的东西，那你想想，人的一生的精力时间都是 有限的啊，你要是注意力能够集中，你干一个事那很简单，你哪怕说你的这个 没有天分，你做得慢，你全部的注意力都在这个事上，你最终一定也能够成</p>\n<p>功，你也能够赚到钱。但是好几个财就代表怎么样，这个人他不坚定，他又想 弄这个，又想弄那个，最终的结果是什么?他一个都弄不到，所以他碌碌无为 啊，没有什么成就。</p>\n<p>那么如果一个八字财旺身弱，这个时候就需要比劫来去帮他分担，这个时候有 比劫帮忙分担这个财星的话呢，这个人就非常适合别人一块合伙，合作创业做 事情。</p>\n<hr>\n<p><strong>来源《崔老师 催文举 盲派八字精进班 328页W》</strong></p>\n<p>发财的机会。第三看看我是 否身弱。</p>\n<p>这个八字，我原局中没有禄，可是我有印，我禄来的时候我也会发财。</p>\n<p>比如说丁酉年，酉金一来，我的印就生了禄了，印禄相随了，虽然说印禄相随了， 可能你们会说，这个酉金和寅木相克了， 一码归一码，我给你钱和你去别人的地 方挣钱。妈妈给我一百万，可是合我自己挣到钱了，没有关系，你给我是给我，  我外边挣是我外边挣。</p>\n<p>第二就是看看我弱不弱。如果我弱的话，那来了我的印，我得财轻松。这个八 字，比如来了一个己土，己土生了辛金，这一年你就告诉他，你得财特别容易， 因为他让我旺了，我们暂时先这么理解。再说找财和官，再看有没有库，原局中 有个丑库，但是丑库既没开官库，也没开财库，这个丑库我们理解它是印就完事 儿了。你这个丑库也没有开其他的库的时候，这个就是土，它就是我的印来了，</p>\n<p>生身也很好。</p>\n<p>如果是天干来的印也很因我身弱。这是一个重点。完了之后，我们再看财和官， 像这个八字，我们第一点就看到了身弱。所以说我们只要土来的时候，我们知到 他就能做出成绩来。比如说辛丑年，辛金带着丑土来丑土生我，我有印，那么就 是告诉你了，我今年有了成就了。</p>\n<hr>\n<p><strong>来源《018-2009.11_《子平实战指引》_徐伟刚著 (2) (1)》</strong></p>\n<p>4407916 公众号：九鼎学堂</p>\n<p>获取更多最新易学资料 加微信：804407916 公众号：九鼎学堂</p>\n<p>之不同属性去区别之。</p>\n<p>财为养命之源，人人需要有用。既然月令有财星有益人生之物，则此宝</p>\n<p>物必须保卫或生养之，使其长久生存兴旺发达而不遭破坏败绝，故而财格之</p>\n<p>成立，有如下几条因素：一者喜官星之保卫；二者喜伤食之生财；三者喜佩</p>\n<p>印助身以担任之。财格之失败也同样有如下之因素：一者忌比劫之分夺；二</p>\n<p>者忌生煞以害命攻身；三者忌身弱不能负荷而破财成“富室贫人” 。</p>\n<p>总结上文之成格败格因素，大致可以把财格分为以下几种情况：</p>\n<p>一、财格透正偏财；</p>\n<p>二、财格透官煞；</p>\n<p>三、财格透正偏印；</p>\n<p>四、财格透伤食；</p>\n<p>五、财格透比劫。</p>\n<p>这五种基本情形就是财格所要讨论的对象。</p>\n<p>乾造：丙午庚寅辛酉壬辰</p>\n<p>1 11 2131 41516171</p>\n<p>大运：辛卯壬辰癸巳甲午乙未丙申丁酉戊戌</p>\n<p>这个男命是典型的财格生官又逢伤破的局面，月令寅财生年干丙官，年</p>\n<p>上丙官又逢时上壬伤，形成格局先成后败之象。</p>\n<hr>\n<p><strong>来源《02-金镖门老人参辛丑弟子班笔记中（325页》</strong></p>\n<p>今天讲母象</p>\n<p>日主是母，日主所生的食伤为子，当母旺子弱的时候，实际也 就是用“子”来泄“母”的旺势。</p>\n<p>我们说的食伤泄秀，或者是八字身旺，有一食伤足矣，说的就 是母旺，用食伤泄；实际也是一种顺局的意思，就是要顺着这个母旺 之势，用子来泄秀，则“母慈而子亦昌矣”。</p>\n<p>比如甲乙木是日主，是“母”,满盘都是木，有一到两个火， 那这个火就是“子”,因为木生火，就是用火泄秀，那么母旺，母多 了，就是病，其实什么多了它也不好。</p>\n<p>第一是不能见水，水是木的源头，有水就会克火，伤到这个“子”, 因为他用的是“子”。</p>\n<p>第二个是不能见到金，因为“母”旺，金自然就克制不住这个 母了，这样也会激怒这个母性，就是激怒日主，必须得用火，如果火 弱，就必须要走带火土的运，这样既加强了火的力量，也生了土，也 就是相当于食伤生财了，顺着母而生孙了，就是生了财了，这财就是 “子”生的，所以叫“孙”。</p>\n<p>说白了就是要顺着这个“母”,泄“母”的旺势，不能克。要 是走带水的土运，就会激起“母”的性，反而制约“子”了，就是克 制这个火了，就是印来克制食伤了。</p>\n<p>所以这种“母”象的，“母”旺不能克制，也不能生她，越生</p>\n<p>264</p>\n<hr>\n<p><strong>来源《王庆学格局论命》</strong></p>\n<p>再没有出去工作，偶而做点小生意，也从没超 过一年，经济一直拮据。</p>\n<p>劫    杀    日    食</p>\n<p>例 5 坤 造：戊 申 乙 丑  己 亥 辛 未 ( 辰 巳 空 ) 大 运 ： 甲 子 癸 亥 壬 戌 辛 酉 庚 申</p>\n<p>17</p>\n<p>2015</p>\n<p>此造月支本气为比肩，主自己、主独立；杀局用食神成的局且食神在 时柱，那肯定是靠自己创业发财的老板。命主是一美容院老板，富有千万。十神与工作职业的关系</p>\n<p>格局是天地作用对人富贵贫贱的影响；旺衰中和为五行之气对人吉凶 祸福的影响；生克制化刑冲合害破是八字的作用方式；五行十神为人生各 种事件的代言人，尤其十神更是人生传奇的讲述者。</p>\n<p>断工作职业，十神既是基础又是重点。对十神的认识有多深刻，看工 作职业的能力就有多强。</p>\n<p>每个十神都有先天含义和后天象义。</p>\n<p>先天含义为十神的独立含义，也叫十神原始含义或称十神本义。它与 旺衰、喜忌、宫位、组合无关， 只体现本象。</p>\n<p>后天象义为组合以后所体现出来的含义。 一个十神和另一十神相作 用，就会体现不同的象义，这和一个人和谁在一块就会受其影响的原理是 一样的。</p>\n<h2>参见</h2>\n<li>格局派·财运</li>\n<li>盲派·财运</li>\n<li>神煞·财运</li>\n<li>调候·财运</li>\n<li>病药·财运</li>\n<li>阴阳·财运</li>\n<li>综合·财运</li>\n<li>其他·财运</li>", "source_count": 132, "block_count": 973, "see_also": ["格局派·财运", "盲派·财运", "神煞·财运", "调候·财运", "病药·财运", "阴阳·财运", "综合·财运", "其他·财运"]}]}, {"name": "格局派", "topics": [{"topic": "事业", "content": "<h2>格局派 · 事业</h2>\n<p>共收录 538 条相关内容，来自 105 本书籍。</p>\n<p><strong>来源《素水盲派第六期《格局加气象运用》559页》</strong></p>\n<p>不出事儿，伤官不会因为有了财就不伤官， 正常情况下除非这 个上官被裁呢画的啊没有了自己的什么立场啦。</p>\n<p>我讲最初五行平衡的时候， 我就说了五行是一个平衡状态，我们这个 世界也是要构造一个五行平衡，我们才能就是正常的互相成就、发展， 那是那也就是说在这种情况下，这句话的意思就是说在这种平衡的状 态下，五行生克是同时的， 它你正常情况下金生水， 金也刻木，你不 能说金去生水，它就不刻木了，那这个世界也是要乱套了， 是不是？ 所以说呢今天。</p>\n<p>蒸水的时候还能克木， 那如果金是伤官，他生财，他就不客观了吗？ 只要他还有他的力量在那里，他还是去刻刻。</p>\n<p>所以说呢为什么凶神啊， 志是第一，修神是智是第一的，伤官配印是 很出名的一个格局，洋人家饭也是，但是这两者呢也是有前提条件的。 那如果你身和印那么旺， 你去配那里上官，那也算，我看有的人啊我 经常从别的地方看到，有的人看见天上看见他有个伤官啊又有个印， 不管格局如何，哎呀就是大肆宣传这是一个伤官配印啊， 以后了不得 了。</p>\n<p>其实这就是什么呢？</p>\n<p>就是门一还没入门吧，还没学太明白呢。</p>\n<p>你伤官配易，人家指的是什么呢？ 凶狠的上官，还有虚弱的日主。</p>\n<hr>\n<p><strong>来源《崔老师盲派八字（专项）笔记-》</strong></p>\n<p>百就有</p>\n<p>牢狱之灾了。这个己土不仅无根无气， 还被酉金化了， 也就告诉你说，</p>\n<p>但凡有事情，花钱可摆平。就是这么个理儿。 </p>\n<p>原局里面有一个化官生印， 这是得到官了。还有一个丁亥合。这</p>\n<p>个亥是两个金生的， 一方面是自己拿工资， 一方面是我自己单干。 做</p>\n<p>的事情都是金， 那一定是官方和自己做的那个职业有关系。 或者说叫</p>\n<p>做以权谋私。 </p>\n<p>我们在看流年大运的时候，着重看几个点。我们找着官了，就知</p>\n<p>道官来好，财来好，印来好。 那这三个流年，好的方式和模式不一样。 </p>\n<p>我们打开八字之后，先看一看是否有格局。 什么叫有格局呢？先</p>\n<p>183</p>\n<p>从大方向来看，有没有病？有病的同时有没有药？如果有病又有药，</p>\n<p>这个命就有格局。 那再看如何得到财和官。 有格局的人， 他做的事就</p>\n<p>不会太低。当官也是高官，如果是当老板那也是有钱人。</p>\n<hr>\n<p><strong>来源《018-2009.11_《子平实战指引》_徐伟刚著 (2) (1)》</strong></p>\n<p>4407916 公众号：九鼎学堂</p>\n<p>获取更多最新易学资料 加微信：804407916 公众号：九鼎学堂</p>\n<p>之不同属性去区别之。</p>\n<p>财为养命之源，人人需要有用。既然月令有财星有益人生之物，则此宝</p>\n<p>物必须保卫或生养之，使其长久生存兴旺发达而不遭破坏败绝，故而财格之</p>\n<p>成立，有如下几条因素：一者喜官星之保卫；二者喜伤食之生财；三者喜佩</p>\n<p>印助身以担任之。财格之失败也同样有如下之因素：一者忌比劫之分夺；二</p>\n<p>者忌生煞以害命攻身；三者忌身弱不能负荷而破财成“富室贫人” 。</p>\n<p>总结上文之成格败格因素，大致可以把财格分为以下几种情况：</p>\n<p>一、财格透正偏财；</p>\n<p>二、财格透官煞；</p>\n<p>三、财格透正偏印；</p>\n<p>四、财格透伤食；</p>\n<p>五、财格透比劫。</p>\n<p>这五种基本情形就是财格所要讨论的对象。</p>\n<p>乾造：丙午庚寅辛酉壬辰</p>\n<p>1 11 2131 41516171</p>\n<p>大运：辛卯壬辰癸巳甲午乙未丙申丁酉戊戌</p>\n<p>这个男命是典型的财格生官又逢伤破的局面，月令寅财生年干丙官，年</p>\n<p>上丙官又逢时上壬伤，形成格局先成后败之象。</p>\n<hr>\n<p><strong>来源《王庆学格局论命》</strong></p>\n<p>再没有出去工作，偶而做点小生意，也从没超 过一年，经济一直拮据。</p>\n<p>劫    杀    日    食</p>\n<p>例 5 坤 造：戊 申 乙 丑  己 亥 辛 未 ( 辰 巳 空 ) 大 运 ： 甲 子 癸 亥 壬 戌 辛 酉 庚 申</p>\n<p>17</p>\n<p>2015</p>\n<p>此造月支本气为比肩，主自己、主独立；杀局用食神成的局且食神在 时柱，那肯定是靠自己创业发财的老板。命主是一美容院老板，富有千万。十神与工作职业的关系</p>\n<p>格局是天地作用对人富贵贫贱的影响；旺衰中和为五行之气对人吉凶 祸福的影响；生克制化刑冲合害破是八字的作用方式；五行十神为人生各 种事件的代言人，尤其十神更是人生传奇的讲述者。</p>\n<p>断工作职业，十神既是基础又是重点。对十神的认识有多深刻，看工 作职业的能力就有多强。</p>\n<p>每个十神都有先天含义和后天象义。</p>\n<p>先天含义为十神的独立含义，也叫十神原始含义或称十神本义。它与 旺衰、喜忌、宫位、组合无关， 只体现本象。</p>\n<p>后天象义为组合以后所体现出来的含义。 一个十神和另一十神相作 用，就会体现不同的象义，这和一个人和谁在一块就会受其影响的原理是 一样的。</p>\n<hr>\n<p><strong>来源《《君臣之道》》</strong></p>\n<p>多败，能做事，做生意也多灾， 麻烦多，事业角度官司多。</p>\n<p>相神两透的，不清了，出贵的少，出富命的多。</p>\n<p>有的先上班，后改道的，有富的机会，能富的，也有不发财的，仍要看位置。 此命走甲食神运时，发财的同时又打官司了，原局就是有矛盾的。</p>\n<p>此人走巳午未运发的财。 杀配正印与食又不同。</p>\n<p>印与食不相战，但也降为技术，这个跟官配食是一样的，降格，还是不够清。 印与食也有相克的关系。</p>\n<p>正印格，怕时上正财。若时上偏财，又不同。 以伤官格举例，伤官格的相神是财与印。</p>\n<p>伤官格的三个乾例： 癸丁甲戊</p>\n<p>丑巳辰辰</p>\n<p>庚壬甲戊 申午戌辰 庚壬甲乙 戌午戌亥</p>\n<p>都是伤官格，第三个是官，厅级干部。前2个是求财的。</p>\n<p>第一个是伤官高透了，而且相神两透，又透印，又透财，就不贵了。 财与印还相战了。</p>\n<p>伤官透了，配了印，但印也没官杀配，就普通求财命。</p>\n<p>第二个，伤官不透，配了枭又配财，浊富，为上市公司老总。 第三个伤官不透，配了枭，吉，财不透，相神就不打架。</p>\n<p>凶神不透，又有乙庚合，劫合杀，也是贵点。 若是透丁火，丁壬合，就不好了。</p>\n<p>印也归禄在时，与甲同宫，身也不弱，也是贵点。 凶神透与不透就是很关键的。</p>\n<hr>\n<p><strong>来源《97828416900627人生轨迹的干支解读  新派命理简论_12437712》</strong></p>\n<p>自己的研究成果被易友重视好开心；看到自己的成果被改姓好伤 心!</p>\n<p>第二十一章</p>\n<p>命理起名法的操作规则</p>\n<p>如今，找预测师给孩子起名字，给新办的店铺、公司起个字号已经成为 中国现实生活中一个不可或缺的组成部分。自然也成为预测师服务业务的主 要内容。眼下起名字的方法流派众多，其中影响最大的就是所谓五格剖象法 和命理起名法。五格剖象法把人的名字作为一个独立的载体对待，不考虑命 主四柱中的喜忌。命理起名法则是根据求名者四柱中的喜忌以及起作用好坏 的五行为据起名的。命理起名法的操作规则是：</p>\n<p>1.科学地确定四柱格局，准确区分命中的用神、忌神和中神，这是起 名字的前提。名字作为后天可以任意改变的一个外在符号，它到底是好是坏 应该取决于它对求名者命中喜忌的助益或克制。和风水一样，它助益了命中 喜欢的五行，克制了命中忌讳的五行，就对命主后天改命起到了好作用，反 之则起了坏作用。起坏作用还是起好作用要有标准，这个标准就是求名者的 命中喜忌。用五格剖象法起名也应该考虑命中喜忌，通过五行数理的调理达 到补益的目的。</p>\n<p>2.把助益第一事业放在第一位。如四柱：</p>\n<p>甲子  庚 午  辛 未  壬 辰  从弱</p>\n<hr>\n<p><strong>来源《《君臣之道》(1)》</strong></p>\n<p>一下。</p>\n<p>地支也有个卯护官， 很巧妙， 卯离己土远， 远水不太解近渴， 己土多少也克癸， 级别 小。</p>\n<p>学历也低， 因为官月的局，不能透伤官违背格局。</p>\n<p>是海监公务员， 他本人小学文凭， 专门干自来水工程， 官不大， 但干了几十年了。</p>\n<p>官月局(墓库透什么就是什么局)孤官无辅， 但是有个小卯木护官， 管点事， 现实中命 主一定就是个多少管点事的小官。</p>\n<p>接下来找做功方式， 合亥水是他的做功求财方式，这局围绕着官。</p>\n<p>官是什么五行吃什么官饭。</p>\n<p>官是水，有水库， 干水利的。</p>\n<p>坤： 己己甲戊</p>\n<p>巳巳午辰</p>\n<p>大学老师。</p>\n<p>伤官月配财或者印。</p>\n<p>这个是配财， 身偏弱， 就一个辰根， 食伤生财吃皇粮。</p>\n<p>大学老师， 有点格局层次但是略低， 比一般人强点。</p>\n<p>身旺食伤喜生财， 身弱食伤喜配印。</p>\n<p>先锁定月令格局层次， 稍有层次， 木生火配食神做功， 就是老师。</p>\n<p>老师就是用食神， 比劫， 印来做事。</p>\n<p>总之， 什么局， 就以什么为核心， 配合月令配合的越好， 就越贵。</p>\n<p>富命，应该怎么看?</p>\n<p>财官相生若成局， 但得向背入主流万事环环相扣， 感应而成。</p>\n<p>换句话， 就是要看财官能否感应到日主。</p>\n<hr>\n<p><strong>来源《10.鄗邑山人-《五行八字案例分析》478页》</strong></p>\n<p>木，擢北京吏部，又选司郎中，名显天下。大运入巳，有庚金刑克寅亥衰木，王荣 奏本，戍辽东铁鼎卫而死也。</p>\n<p>盖因亥寅二字相联，木神有气，两点食神，遂作假伤官格，正谓假伤官行伤官运发也。 如甲木散乱，原非类聚，亦不作此格。</p>\n<p>先术人妄取官印，俱断丁卯年卯运克损官星必死，殊无些些应验。</p>\n<p>大凡看格，不拘月令，只看动静归秀气在何处，十有八九验也。</p>\n<p>甲午、丙寅、乙丑、癸未    盱江张思布政贵命木火通明之格。</p>\n<p>楠曰：乙木生寅喜气深，通明木火耀光明。日时癸水名为病，虚火南方出翰林。</p>\n<p>乙丑日生寅月上旬，木不嫩而火亦不衰也。年月透火通明，时上木火神有气，盖得丑 中微有癸水，透出时上，暗来克火，作癸水为病也。所以运行戊己，去病存火，再行南方， 衰火辉耀，位擢方伯。</p>\n<p>若原无水，再行南方，亦恐泄木之气。此则原水破火，火轻也，所以行南方补起火来， 贵本宜也。运入壬申，破损用神，虚火死矣。</p>\n<p>此亦假伤官行伤官运多荣显，假伤官行印运必死。</p>\n<p>丙寅、庚子、壬子、辛亥    书林杨环五公富贵假伤官格</p>\n<p>楠曰：壬水重重气有余，岁时有木吐南枝。木衰贵有庚辛病，运到东方大有余。</p>\n<hr>\n<p><strong>来源《《巫咸撮要》解读》</strong></p>\n<p>，这里并非表示门框的质量不好，表示的是人员的不稳定。</p>\n<p>谁的八字月令受冲，谁的门庭不稳，不稳便要出走。</p>\n<p>古代小时候出差，又无法出国，无法去外地读书，所以体现在其它方面，比如过继等。</p>\n<p>官印遇偏，这个偏，主要指偏印。</p>\n<p>偏主孤，不正之象。</p>\n<p>不正，非正室，则是庶出，小妾侍女所生。</p>\n<p>干头火烈，堪嗟伯牛之疾；时日冲刑，难免卜商之泣。</p>\n<p>八字火炎土燥，不利健康，纵然富贵一时，也会有疾病随身。</p>\n<p>此时，就要考虑调候了，如果有水，便会好很多。</p>\n<p>但是，要和格局区别开来。</p>\n<p>我们讲格局时，从来不把调侯拿入考虑因素。</p>\n<p>八字的寒暖燥湿，只会影响健康以及性情等。</p>\n<p>日时冲刑，奔波流离，这个和格局也没有关系，表现的是一种状态和方式。</p>\n<p>比如沙场奔袭、长期出差、经商走卒之类。</p>\n<p>正如原文所引卜商一样，博学笃志，传授五经，但是西河讲学，离群索居。</p>\n<p>六虚临于乙亥，孟浩然徒有文章；三才会于壬辰，石季伦恣情金玉。</p>\n<p>何为六虚？</p>\n<p>在八字命里，六虚指空亡对冲之位，比如甲子旬，空亡在戌亥，则辰巳为六虚。</p>\n<p>空亡对冲，无物可对，也有不实之象，即对面无物，只有自己。</p>\n<p>乙亥六虚，即辰巳空亡，生在甲午旬。</p>\n<p>戌亥居乾位，国家之位，带六虚，则无位，有名无实。</p>\n<hr>\n<p><strong>来源《京南道人2024-5月深圳》</strong></p>\n<p>用，那么就要先 看八字当中的病，比方说我们人生病，有的就适合用西医，有的就适合用中医，就是这个道理。知道了现在八字总体三大派别之后，就是说格局法，旺衰法，还有盲派的财官法，知道这个以后，我们现在要学的是什么样的思路，我们现在 学的就是旺衰法。大家可以参看滴天髓，我们的思路和曲炜李顺向是一样 的，经过实践验证，曲炜和李顺向的思路是非常不错，看事也很到位，怎么样具体学习旺衰法呢，看八字他就如造车一样，造车我们怎么样把这部车造好，第一步我们先要造每一个细小的零件，等到把每个零件都会造之 后，再把他组装起来，这样就组装成一部车，拿到八字上来讲，这个细小的零件就是我们学的每节课的基础知识，所以每节的基础知识都要掌握， 每一节细小的问题都要懂，如果不懂，就影响到以后的运用，我们在学的每一点的讲解，比方说生克制化旺衰等等，都是和造零件是一个道理的， 只有把每一件零件都造好了，到最后才能组装成一部车。</p>\n<h2>参见</h2>\n<li>旺衰派·事业</li>\n<li>盲派·事业</li>\n<li>神煞·事业</li>\n<li>调候·事业</li>\n<li>病药·事业</li>\n<li>阴阳·事业</li>\n<li>综合·事业</li>\n<li>其他·事业</li>", "source_count": 105, "block_count": 538, "see_also": ["旺衰派·事业", "盲派·事业", "神煞·事业", "调候·事业", "病药·事业", "阴阳·事业", "综合·事业", "其他·事业"]}, {"topic": "健康", "content": "<h2>格局派 · 健康</h2>\n<p>共收录 808 条相关内容，来自 128 本书籍。</p>\n<p><strong>来源《素水盲派第六期《格局加气象运用》559页》</strong></p>\n<p>不出事儿，伤官不会因为有了财就不伤官， 正常情况下除非这 个上官被裁呢画的啊没有了自己的什么立场啦。</p>\n<p>我讲最初五行平衡的时候， 我就说了五行是一个平衡状态，我们这个 世界也是要构造一个五行平衡，我们才能就是正常的互相成就、发展， 那是那也就是说在这种情况下，这句话的意思就是说在这种平衡的状 态下，五行生克是同时的， 它你正常情况下金生水， 金也刻木，你不 能说金去生水，它就不刻木了，那这个世界也是要乱套了， 是不是？ 所以说呢今天。</p>\n<p>蒸水的时候还能克木， 那如果金是伤官，他生财，他就不客观了吗？ 只要他还有他的力量在那里，他还是去刻刻。</p>\n<p>所以说呢为什么凶神啊， 志是第一，修神是智是第一的，伤官配印是 很出名的一个格局，洋人家饭也是，但是这两者呢也是有前提条件的。 那如果你身和印那么旺， 你去配那里上官，那也算，我看有的人啊我 经常从别的地方看到，有的人看见天上看见他有个伤官啊又有个印， 不管格局如何，哎呀就是大肆宣传这是一个伤官配印啊， 以后了不得 了。</p>\n<p>其实这就是什么呢？</p>\n<p>就是门一还没入门吧，还没学太明白呢。</p>\n<p>你伤官配易，人家指的是什么呢？ 凶狠的上官，还有虚弱的日主。</p>\n<hr>\n<p><strong>来源《民间师父八字课程学习笔记本地》</strong></p>\n<p>格局，论配合，是徐子平的初衷。</p>\n<p>◇  格局论，是取类比象。</p>\n<p>◇  干支搭配合理才可成为大吉格局。</p>\n<p>◇  继续说上面例子，如果原局没有丁火，大运遇到丁火亦吉。</p>\n<p>◇  日干庚金，取用神时先要想到丁火，这是经验。</p>\n<p>◇  古语有言“土多埋金”，难道“火多就不埋金”吗？火生土啊！</p>\n<p>◇  所以，批八字是要在动态条件下辩证。</p>\n<p>◇  如食神制杀是大格局。。。定格局至少要看两股力量，这里，食神 对七杀。</p>\n<p>◇  如羊刃驾杀是大格局。。。定格局至少要看两股力量，这里，羊刃 对七杀。</p>\n<p>◇   《子平真诠》只看静态月令中的某一五行。。。显然经不起推敲。</p>\n<p>◇  说句大白话：定格局主要在于分出来命主在社会阶层档次，此即大 功告成了。至于损官、破财、疾厄之类等这些先放在一边免谈，大道至 简，不要制造麻烦，否则一塌糊涂。。。</p>\n<p>◇   定格局要参看大限，还有大运。</p>\n<p>◇  事物皆一分为二。月令固然重要，却也只是冰山一角。</p>\n<p>◇  死抠“月令格局”，就和练习瞄准打靶子一样，靶子是死的。</p>\n<p>◇  活用“格局用神”，就和瞄准打流动靶子一样，靶子是活的，或许是 动物，或许是战场上的敌人。</p>\n<hr>\n<p><strong>来源《子平烛观》</strong></p>\n<p>年确非佳运，不可盲目冲刺乱投 资。</p>\n<p>保守安分领份薪水可保无大破败。幸用神财根在时支。尚有老运可走。</p>\n<p>阿星：立时上伤官局，伤官是凶神，要用财化.取月上丁财为用，财用根于时支巳火.年干伤官为 体用之神护卫财星.现行甲申运有两坏，一是甲食与乙伤浊局，二是申金穿伤巳火，使丁火根虚. 癸未与壬午运是好运，先天有年干乙木不忌后天透水，更喜财星得根.</p>\n<p>Test:先聊水火交战。</p>\n<p>法一通关，可用得强根之木来汲水。乙木难以亥为根。不过幸好乙木不若甲木畏惧水旺。</p>\n<p>法二阻水，只可以乾燥之土来止之，而非湿土冻土反增湿增寒， 寒冬丁火力不如丙火。幸时支藏了丙火。</p>\n<p>尺素：戊當令的話成局，乙未殺局是個半成品，地支的火金待用，透出成局。</p>\n<p>72、许世英</p>\n<p>癸 辛  乙 辛 酉 酉 丑 巳</p>\n<p>大 运 ： 庚 申 己 未 戊 午 丁 巳 丙 辰 乙 卯 甲 寅 癸 丑 壬 子 辛 亥</p>\n<p>月中七杀当令透出，本来要立时上七杀格，但是以真宗子平系统论，立从或化的格局 比正格优先。四柱地支三合金局，得当令真神七杀透出引化，八字杀旺无遮</p>\n<hr>\n<p><strong>来源《素水盲派《壬寅年格局大运流年班内部资料》2022年格局大运流年培训教材209页》</strong></p>\n<p>透印，从不了。</p>\n<p>透印是好的。但是又透财坏印了。出身就差。父亲也不行。困难。兄弟姐 妹多，上不起学。</p>\n<p>但时上落比劫，正因为财坏印，这时比劫就制财护印了。姐姐把上学的机  会让给他了。供他上大学。但是，这样的格局总是有问题的。我拿劫制财护印， 也是在一个平台上用手脚做事的人。这是一个教师。</p>\n<p>杀印相生的格局，变成一个技术的人，就没有体现出杀印相生的威力，格 局不纯了。</p>\n<p>例：财坏印，时上落杀，极差命。</p>\n<p>分析：这是杀格，时上透杀。此人失业，生病，大牢。年纪不大就蹲过几 次牢，其中有七年牢的。</p>\n<p>杀生印时，财来坏印，位置不同，结果不同。</p>\n<p>如果生来有残疾，可能不会进大牢。</p>\n<p>财坏印，败祖啃老。不务正业。对长辈不利。靠父母帮一点。</p>\n<p>时为果，时为人生最后的成败。时为  格局成败的关键点。</p>\n<p>坤例：看婚姻。</p>\n<p>枭伤日劫</p>\n<p>壬丁甲乙</p>\n<p>申未寅亥</p>\n<p>分析：此女命月上伤官，自坐禄，时上劫财，年支申七杀冲寅，寅是禄根， 这几点都是婚姻必离的信息。</p>\n<p>因为自坐禄，所以不会妥协。伤十劫的组合，即使有一个印，都不好使。 寅亥合，有解寅申冲的作用。亥上透乙，说明以后会找一个二婚的男人结婚。</p>\n<hr>\n<p><strong>来源《崔老师盲派八字（专项）笔记-》</strong></p>\n<p>百就有</p>\n<p>牢狱之灾了。这个己土不仅无根无气， 还被酉金化了， 也就告诉你说，</p>\n<p>但凡有事情，花钱可摆平。就是这么个理儿。 </p>\n<p>原局里面有一个化官生印， 这是得到官了。还有一个丁亥合。这</p>\n<p>个亥是两个金生的， 一方面是自己拿工资， 一方面是我自己单干。 做</p>\n<p>的事情都是金， 那一定是官方和自己做的那个职业有关系。 或者说叫</p>\n<p>做以权谋私。 </p>\n<p>我们在看流年大运的时候，着重看几个点。我们找着官了，就知</p>\n<p>道官来好，财来好，印来好。 那这三个流年，好的方式和模式不一样。 </p>\n<p>我们打开八字之后，先看一看是否有格局。 什么叫有格局呢？先</p>\n<p>183</p>\n<p>从大方向来看，有没有病？有病的同时有没有药？如果有病又有药，</p>\n<p>这个命就有格局。 那再看如何得到财和官。 有格局的人， 他做的事就</p>\n<p>不会太低。当官也是高官，如果是当老板那也是有钱人。</p>\n<hr>\n<p><strong>来源《子平烛观》</strong></p>\n<p>比劫争财。损了先天格局。 在此有一人生挫折要经历。</p>\n<p>test 发表于2009-11-1517:23</p>\n<p>呆师：连我认为最细心的小鼠samoyed 都没看出来我的用意，看来一定是我自己的错，,一 定是我自己没有讲解清楚，,在旧帖中讲过“子平用多寡之暗冲不用暗合”,,看来没有老师 注意到我那句话，如天元老师所讲，地支三申可以暗冲出一个寅木虚神。寅为丙火虚神之 根，弱而不从。立才格论成败。用年上正官为用。地支申亥互破害，已经从格的能量级别 降入局的级别。癸根受伤，层次再将。最不妥的是虚神寅木，通官比之关，官星再也难以 护住财星。岁运忌再克泄官杀。</p>\n<p>正官       偏财       日主       比 肩</p>\n<p>乾造：    癸         庚         丙         丙         (辰巳空)</p>\n<p>亥          申                申                 申</p>\n<p>大运：己未   戊 午    丁 巳   丙 辰    乙 卯    甲 寅    癸 丑   壬 子</p>\n<hr>\n<p><strong>来源《子平真诠本义精简版》</strong></p>\n<p>拘泥外格为活变；论生克，则不察喜忌，而以伤旺扶弱为定法；论行运，则不问同中有异，而以干支相类为一例。</p>\n<p>解读：以八字算命是有定理和法则的。有些人不得真传，不知道正宗的子平命理及其法则，便胡编乱造一些似是而非的命理和法则，弄得命学界歪理当道，邪说横行。千千万万的后学者没有能力辨别是非，妄听妄信妄传，现在已经达到了积重难返的地步了。</p>\n<p>比如论干支，就不知道干支的阴阳之理，而以所谓的“体象歌诀”来论干支，说什么甲木为参天大木，宜斫削，而乙木是花草弱木，宜生扶等等，都是乱弹琴。</p>\n<p>比如论格局，则不知道要专从月令取用定格，而是随便到处取用神定格局，还说这是活变！特别是现在好多人，连用神的概念都还没有弄清楚，哪里就谈得上活变呢！</p>\n<p>比如论生克，则不从格局上着眼，总是只按旺则宜克，弱则宜扶的死法来论命，只讲八字五行的平衡与流通，不讲八字格局的成败与高低，你看旺，我看衰，瞎猜胡断。</p>\n<p>比如论行运，则不问是甲还是乙，是寅还是卯，只看干支都属木，就以木来论喜忌，而不知有时候甲木破格而乙木成格，有时候则寅木成格而卯木破格，没有看到某些细节的不同会导致整体格局的变化。</p>\n<hr>\n<p><strong>来源《06.素水-素水盲派《壬寅年格局大运流年班内部资料》2022年格局大运流年培训教材209页--原版(1)》</strong></p>\n<p>年柱</p>\n<p>正印</p>\n<p>戊正官</p>\n<p>辛偏印</p>\n<p>丁偏财</p>\n<p>衰</p>\n<p>衰</p>\n<p>寅卯</p>\n<p>钗钏金</p>\n<p>月柱</p>\n<p>偏印</p>\n<p>丙正财</p>\n<p>庚 正 印</p>\n<p>戊正官</p>\n<p>胎</p>\n<p>死</p>\n<p>申酉</p>\n<p>白腊金</p>\n<p>日柱</p>\n<p>元男</p>\n<p>丙正财</p>\n<p>庚正印</p>\n<p>戊正官</p>\n<p>午未  长流水</p>\n<p>时柱</p>\n<p>比肩</p>\n<p>壬劫 财</p>\n<p>甲伤官</p>\n<p>帝旺</p>\n<p>帝旺</p>\n<p>子丑</p>\n<p>大海水</p>\n<p>2018201920202 02120222023202                    4202520262027</p>\n<p>戊官己杀庚印 戌官亥劫子比</p>\n<p>辛枭壬劫癸比甲伤 丑杀寅伤卯食辰官</p>\n<p>乙食丙财丁才 巳财午才未杀</p>\n<p>小运        壬子癸丑甲寅           乙卯丙辰     丁巳戊午          己未庚申辛酉</p>\n<p>此命财格，但财官同宫。时上透比，是败格。晚限要败。</p>\n<p>戌是官，巳是财，财官没坏。但没透。上面透印和比，所以是在一个国企 中当中医。断会计也对。</p>\n<p>但亥是冲巳的，隔位冲，说明这个官不长久。以后会自己做。</p>\n<p>丙戌大运，丙是从巳中出来的，是带着财官来的。坐着戌，戌是天罗，亥 是地网。也到了50多，到晚限了，所以要应灾。是格局败了出的问题。不然， 财临旺地，如何会有灾?</p>\n<hr>\n<p><strong>来源《018-2009.11_《子平实战指引》_徐伟刚著 (2) (1)》</strong></p>\n<p>4407916 公众号：九鼎学堂</p>\n<p>获取更多最新易学资料 加微信：804407916 公众号：九鼎学堂</p>\n<p>之不同属性去区别之。</p>\n<p>财为养命之源，人人需要有用。既然月令有财星有益人生之物，则此宝</p>\n<p>物必须保卫或生养之，使其长久生存兴旺发达而不遭破坏败绝，故而财格之</p>\n<p>成立，有如下几条因素：一者喜官星之保卫；二者喜伤食之生财；三者喜佩</p>\n<p>印助身以担任之。财格之失败也同样有如下之因素：一者忌比劫之分夺；二</p>\n<p>者忌生煞以害命攻身；三者忌身弱不能负荷而破财成“富室贫人” 。</p>\n<p>总结上文之成格败格因素，大致可以把财格分为以下几种情况：</p>\n<p>一、财格透正偏财；</p>\n<p>二、财格透官煞；</p>\n<p>三、财格透正偏印；</p>\n<p>四、财格透伤食；</p>\n<p>五、财格透比劫。</p>\n<p>这五种基本情形就是财格所要讨论的对象。</p>\n<p>乾造：丙午庚寅辛酉壬辰</p>\n<p>1 11 2131 41516171</p>\n<p>大运：辛卯壬辰癸巳甲午乙未丙申丁酉戊戌</p>\n<p>这个男命是典型的财格生官又逢伤破的局面，月令寅财生年干丙官，年</p>\n<p>上丙官又逢时上壬伤，形成格局先成后败之象。</p>\n<hr>\n<p><strong>来源《《君臣之道》》</strong></p>\n<p>多败，能做事，做生意也多灾， 麻烦多，事业角度官司多。</p>\n<p>相神两透的，不清了，出贵的少，出富命的多。</p>\n<p>有的先上班，后改道的，有富的机会，能富的，也有不发财的，仍要看位置。 此命走甲食神运时，发财的同时又打官司了，原局就是有矛盾的。</p>\n<p>此人走巳午未运发的财。 杀配正印与食又不同。</p>\n<p>印与食不相战，但也降为技术，这个跟官配食是一样的，降格，还是不够清。 印与食也有相克的关系。</p>\n<p>正印格，怕时上正财。若时上偏财，又不同。 以伤官格举例，伤官格的相神是财与印。</p>\n<p>伤官格的三个乾例： 癸丁甲戊</p>\n<p>丑巳辰辰</p>\n<p>庚壬甲戊 申午戌辰 庚壬甲乙 戌午戌亥</p>\n<p>都是伤官格，第三个是官，厅级干部。前2个是求财的。</p>\n<p>第一个是伤官高透了，而且相神两透，又透印，又透财，就不贵了。 财与印还相战了。</p>\n<p>伤官透了，配了印，但印也没官杀配，就普通求财命。</p>\n<p>第二个，伤官不透，配了枭又配财，浊富，为上市公司老总。 第三个伤官不透，配了枭，吉，财不透，相神就不打架。</p>\n<p>凶神不透，又有乙庚合，劫合杀，也是贵点。 若是透丁火，丁壬合，就不好了。</p>\n<p>印也归禄在时，与甲同宫，身也不弱，也是贵点。 凶神透与不透就是很关键的。</p>\n<h2>参见</h2>\n<li>旺衰派·健康</li>\n<li>盲派·健康</li>\n<li>神煞·健康</li>\n<li>调候·健康</li>\n<li>病药·健康</li>\n<li>阴阳·健康</li>\n<li>综合·健康</li>\n<li>其他·健康</li>", "source_count": 128, "block_count": 808, "see_also": ["旺衰派·健康", "盲派·健康", "神煞·健康", "调候·健康", "病药·健康", "阴阳·健康", "综合·健康", "其他·健康"]}, {"topic": "六亲", "content": "<h2>格局派 · 六亲</h2>\n<p>共收录 169 条相关内容，来自 77 本书籍。</p>\n<p><strong>来源《京南道人2024-5月深圳》</strong></p>\n<p>死记硬背，那么多口诀。 但是怎么样查神煞一定要学会这个方法。这个是几千年流传下来，也没有 什么捷径，</p>\n<p>第四步，象法。象法是从盲派演变过来，读象的一种方法，这种方法 非常的快速简便，不用排大运流年，他直接从八字原局来看事情，有的事 情你用格局法看不了，用旺衰法也无能为力，但是用象法就能把他解读下 来，下面讲一下象法他的作用。也就是说学好象法他能有那一些作用，看 到什么样事和象法怎么样来用，象法他是非常直观的着某一些事情的，特 征的。比如说妓女小姐的命造，我们用象法就能直观的解读，还有乱论的， 同性恋，就是不符合社会常理的这种，还有的就是女命当小三的，被人家包养，还有父母离异，或者父母有外遇，或者是自己的老婆和老公有外遇 的，还有有的娶多妻的，同时娶两个老婆，这两老婆是她的亲姐妹的。像 这些情况，我们只有用象法来解读，在很多时候，我们不用具体的给人家 看什么事，我们用像法能拿住人家主要问的事，人家就会信服。</p>\n<hr>\n<p><strong>来源《素水盲派《壬寅年格局大运流年班内部资料》2022年格局大运流年培训教材209页》</strong></p>\n<p>透印，从不了。</p>\n<p>透印是好的。但是又透财坏印了。出身就差。父亲也不行。困难。兄弟姐 妹多，上不起学。</p>\n<p>但时上落比劫，正因为财坏印，这时比劫就制财护印了。姐姐把上学的机  会让给他了。供他上大学。但是，这样的格局总是有问题的。我拿劫制财护印， 也是在一个平台上用手脚做事的人。这是一个教师。</p>\n<p>杀印相生的格局，变成一个技术的人，就没有体现出杀印相生的威力，格 局不纯了。</p>\n<p>例：财坏印，时上落杀，极差命。</p>\n<p>分析：这是杀格，时上透杀。此人失业，生病，大牢。年纪不大就蹲过几 次牢，其中有七年牢的。</p>\n<p>杀生印时，财来坏印，位置不同，结果不同。</p>\n<p>如果生来有残疾，可能不会进大牢。</p>\n<p>财坏印，败祖啃老。不务正业。对长辈不利。靠父母帮一点。</p>\n<p>时为果，时为人生最后的成败。时为  格局成败的关键点。</p>\n<p>坤例：看婚姻。</p>\n<p>枭伤日劫</p>\n<p>壬丁甲乙</p>\n<p>申未寅亥</p>\n<p>分析：此女命月上伤官，自坐禄，时上劫财，年支申七杀冲寅，寅是禄根， 这几点都是婚姻必离的信息。</p>\n<p>因为自坐禄，所以不会妥协。伤十劫的组合，即使有一个印，都不好使。 寅亥合，有解寅申冲的作用。亥上透乙，说明以后会找一个二婚的男人结婚。</p>\n<hr>\n<p><strong>来源《素水-素水盲派《2022壬寅年夏季班网络盛夏班·三才理法篇.壬寅网络盛夏班（3000元）--打印版--发出》</strong></p>\n<p>没格局了。此命即使能发财，也不是格局，也不是</p>\n<p>贵，只是做功。</p>\n<p>即使走“杀”旺地，能发财，也不贵。</p>\n<p>如果杀只一位，就可能当官了，走杀地时，也许提拔 了，这种层次就截然不同了。</p>\n<p>八字的贵点在哪?如何贵的?层次如何定位的?这些 是要清晰出来的。</p>\n<p>这个命，走火地是可以开饭店的。火克金，很多是饭 店的像。</p>\n<p>右边这个，也透两杀，但有食取清一位，反而成贵， 当官的。地道申寅冲，也影响身体六亲什么的，但不影响 事业。杀浊了，就不能当官的。</p>\n<p>女 例 ：</p>\n<p>劫  财  日  杀</p>\n<p>丙  庚  丁  癸</p>\n<p>子  寅  酉  卯</p>\n<p>有杀先看杀。熟练后先抓重点。</p>\n<p>时上杀，先看这个杀。</p>\n<p>月令上除了官杀外，其他的印，食伤，是可以配合其 他字的，有官杀时，要先配合官杀的。</p>\n<p>财见官杀，财大官小，官也不是真神，也不会求官， 这个也要辩证。</p>\n<p>这个杀透在时上，也有财，不容忽视。</p>\n<p>月令正印，时透杀，印配杀，要么杀印同宫，要么杀 在时上，是最好的。</p>\n<p>杀虚时，代表名气。此命的特点是坐下是财，也是天 乙，正财透出，纯粹一位杀时，要往贵断。但财生官杀</p>\n<p>时，往往是因有财而出的名。</p>\n<hr>\n<p><strong>来源《015-2009.07_《四柱学教程》_徐丙昕著 (2)》</strong></p>\n<p>男性而吃亏。</p>\n<p>官星离日主位置近，与男性关系密切，受男性影响也大；若离日主远，则关</p>\n<p>系也淡，影响也小。</p>\n<p>女性官星不宜太旺，也不宜官杀混杂，不然大都有感情的困扰，也带有</p>\n<p>不贞之嫌。故女命以一位正官或一位七杀星最理想，若是喜神，能近日干或</p>\n<p>合日干，又坐长生、冠带、建禄或帝旺者，丈夫必发达，婚姻幸福，并得丈</p>\n<p>夫之疼爱。</p>\n<p>如果一个人四柱中带桃花，或走到桃花运，也是异性缘较佳的标志，有</p>\n<p>关这一点，我们放到神煞的章节中去讨论。</p>\n<p>人们常说，“千里姻缘一线牵，无缘对面不相识。 ”结婚最讲究的就是</p>\n<p>缘分问题，缘分是什么？用四柱预测学的观点来看，就是两个人四柱中的天</p>\n<p>干，地支相生相合或五行上旺衰的互补关系，以及他们与流年，大运等的相</p>\n<p>生相合关系，与异性结缘恋爱结婚确定就是以此为根据的。</p>\n<hr>\n<p><strong>来源《民间师父八字课程学习笔记本地》</strong></p>\n<p>不了矛盾。无论大家小家，矛盾激化了， 就会不和谐，就会战争。常言道，和为贵，和气生财，可想而知，用神</p>\n<p>的重要性了。。。比方说，一个六口之家，有父母，有兄弟，有姊妹， 父母是农民，大哥是工人，二哥是局长，姊妹是工人——父亲一定是日 干了，用神则二哥当之无愧。好了， 我再继续说，就是多余的废话了！</p>\n<p>◇ 一个八字命局是一个太极， 日干是先天之主， 处于静态；用神是后 天之主，处于动态。</p>\n<p>◇  比如我是君主，用神好比执政党首脑，喜神好比执政党成员，忌神 好比反对党成员。反对党目的是推翻执政党，反对党推翻了执政党，反 对党就成为了执政党。此乃大运改变用神。</p>\n<p>◇  执政党与在野党处于相战状态，就不顾及君主了。此乃应凶。</p>\n<p>◇ 格局，好比一间房子；用神，好比这间房子的主人。</p>\n<p>◇ 格局，好比一家企业；用神，好比这家企业的主人。</p>\n<p>◇ 试想，用神能力发挥大，人生成就就大。</p>\n<p>◇ 八字格局，决定人生价值！这同时也是八字命理科学价值所在。</p>\n<p>◇ 批八字，不可死套格局。“八个字”任何一个字都具有不确定性，大 运一到，用神一变，格局安在？</p>\n<p>◇ 皮之不在，毛发焉存？</p>\n<hr>\n<p><strong>来源《清沈孝瞻《子平真诠》》</strong></p>\n<p>驷</p>\n<p>马\"， 盖财官如人美貌， 贵人如人衣服， 貌之美者， 衣服美则现。 其实财官成格，</p>\n<p>卷三 13</p>\n<p>即非贵人头上，怕不门充驷马！又局清贵，又带二德，必受荣封。若专主二德，</p>\n<p>则何不竟云带二德受两国之封， 而必先曰无煞乎？若云命逢险格， 柱有二德， 逢</p>\n<p>凶有救，有免于危，则亦有之，然终无关于格局之贵贱也。 </p>\n<p>论外格用舍 </p>\n<p>八字用神既专主月令， 何以又有外格乎？外格者， 盖因月令无用， 权而用之，</p>\n<p>故曰外格也。 </p>\n<p>如春木冬水、土生四季之类，日与月同，难以作用，类象、属象、冲财、会</p>\n<p>禄、 刑合、 遥迎、 井栏、 朝阳诸格， 皆可用也。 若月令自有用神， 岂可另寻外格？</p>\n<p>又或春木冬水， 干头已有财官七煞， 而弃之以就外格， 亦太谬矣。 是故乾头有财，</p>\n<p>何用冲财？乾头有官，何用合禄？书云\"提纲有用提纲重\"，又曰\"有官莫寻格局</p>\n<p>\"，不易之论也。 </p>\n<p>然所谓月令无用者， 原是月令本无用神， 而今人不知， 往往以财被劫官被伤</p>\n<p>之类。用神已破，皆以为月令无取，而弃之以就外格，则谬之又谬矣。 </p>\n<p>论宫分用神配六亲 </p>\n<p>人有六亲，配之八字，亦存于命。</p>\n<hr>\n<p><strong>来源《06.素水-素水盲派《壬寅年格局大运流年班内部资料》2022年格局大运流年培训教材209页--原版》</strong></p>\n<p>戊午大运时，跟年柱癸卯是天合地破的关系，老婆有灾。</p>\n<p>实际是欠人钱，被追债的人把老婆孩子都杀了。</p>\n<p>孩子是官杀，寅午戌三合官局，卯午破，丑午穿，这个官杀也不行了。 乾例：凶神相合，为吉。</p>\n<p>枭伤日杀</p>\n<p>戊癸庚丙</p>\n<p>午亥寅子</p>\n<p>此命是食神格。天干透枭+伤+杀。枭+伤，戊癸合，是凶神合凶神，为吉。 凶神合绊而不发凶。这样，时上再落一个七杀，层次就高了。所以，是一个大  学老师，做行政管理的。</p>\n<p>年支有一个午，是正官。有子午冲，算取清了。时上一位杀，勉强成立。</p>\n<p>庚金身弱，时上落杀，是有攻身的。格局虽成，但身体会受损。累，压力 大。子女受累等。</p>\n<p>这个命也可以理解为：食神格，透枭与伤，合了。剩时上杀，杀不旺，坐 下有财生杀。</p>\n<p>戊癸合，印还是有力的，不是完全不生身，只是不专心了。身弱，所以也 没做什么大官。身旺可以做大官。</p>\n<p>有一个女命：</p>\n<p>枭伤日杀</p>\n<p>丙辛戊甲</p>\n<p>寅丑辰寅</p>\n<p>伤官合印。时上落杀。但这里杀过旺，且多(年支还有),无食神，所以也 是搞文化的，但老换工作，事业不行。</p>\n<p>还有一个女命：</p>\n<p>枭伤日杀</p>\n<p>丙辛戊甲</p>\n<p>午丑子寅</p>\n<p>这个真正的时上一位杀，且清纯。所以此命层次更高。</p>\n<hr>\n<p><strong>来源《夏光明真传八字基础核心教程》</strong></p>\n<p>视他</p>\n<p>尤其是正官正印相生或正官和财星相生的格局，此财官印又为喜用的人，前者，能在官场或公职中而有所</p>\n<p>成就，且表示幼年温文乖巧，较喜欢读书，不让父母操心，若非本人在校功课甚佳，就是父辈在社会中颇 有名望，而后者能够在财界上享有盛名，且表幼年时家境尚不甚丰裕，须至青年时期家中经济才开始有突 破性的好转，且其本人中年以前便可获取功名，建立其社会地位，且表现优越，顺遂如意之现象，此种格 局多生长在有名望的家庭，更主其人自幼生长在家业庇荫丰隆的世家子弟。</p>\n<p>当正官为喜用时，我们可以断定不管男女其长相必定庄严而端正，不但如此，而且，这种人的头脑也 很聪明，声音悦耳，和蔼可亲，家境也不错。</p>\n<p>正官又为女性的夫星，若为喜用，且格局配得好的话，表示有理想的对象，且夫唱妇随令人羡慕。正官- 位，荣贵之命。</p>\n<hr>\n<p><strong>来源《05.王相山-子平真诠《格局真诠》544页1》</strong></p>\n<p>是不会想</p>\n<p>到格局的栽损原理的，他们想到的，财多首先是身弱，喜比的作用是为帮身</p>\n<p>的，以为身旺才能担财。此格只有财多与比劫，一不能有官煞；二不能有印</p>\n<p>星；三不能有食伤泄比生财，有之则不以此格论。</p>\n<p>一、财星喜比格成格的条件。</p>\n<p>1.财星当令，数量多达三个以上；</p>\n<p>2.有比劫损其多余的财星；</p>\n<p>3.八字无印，无官煞，且无食伤泄比生财。</p>\n<p>《财星喜比格》诀曰：</p>\n<p>财多如何不发财，只因用多无剪裁，运到比劫清格局，财源如水滚滚来。</p>\n<p>财星太多格不清，反成累赘害自身，最喜兄弟分财去，家富人殷百事亨。</p>\n<p>财星太多刃刚强，不见官煞大吉昌，只怕劫财相遇会，一生名利被分张。</p>\n<p>君子小人俱爱财，孰知财多反为灾，若无印比相救助，富屋贫人实可哀。</p>\n<p>财多身旺足荣欢，身旺财多化作官。身衰财多财累己， 是非不竞起争端。</p>\n<p>理解此格，首先是理解财多的数量问题。任何十神，多达两到三个以上，</p>\n<p>都叫多了。《三命通会·论偏财》：“凡人命有两位财，身弱不妨。”看，财星</p>\n<p>达两个，就不为多，即便身弱也不妨。不妨则不喜比劫来分福。《秘诀》就说</p>\n<hr>\n<p><strong>来源《97828416900627人生轨迹的干支解读  新派命理简论_12437712》</strong></p>\n<p>为其断出往年的悲剧时，命主仍然有些震撼。半天后 抬起头来，双目已经发红了：祝老师，这难道真的是命吗?</p>\n<p>看到这里读者自然会问：为什么乾隆皇帝四柱的酉金为事业大小，而不 是丁火为事业大小呢?为什么酉金弱了事业和权力就大呢?为什么高某的四 柱以时干庚金为丈夫，又以寅木为丈夫的身体呢?月干七杀为官，怎么不用 月干七杀为丈夫呢?为什么寅木弱了丈夫的身体就出问题呢?实际上这些内 容都是四柱新派命理的具体运用。这部书就是对新派命理技术体系的具体阐 述。以上问题在本书以后的章节中都会逐渐得到解释的。</p>\n<p>第二节  学习四柱预测的方法</p>\n<p>国英通过大量的教学和预测实践体会到，要想成为一个四柱预测高手，</p>\n<p>必须扎实地掌握三个方面的知识：一是广博而全面的命理基础知识，即阴阳</p>\n<p>五行基本原理和天干地支所承载的一切知识。这些基础知识一般命学书上都</p>\n<p>有，但对一些基本概念的解释却是众说纷纭，出入很大。这类知识必须进行</p>\n<p>大刀阔斧的清理才行，国英在本书中已经这么做了。</p>\n<p>二是熟练地运用分析日干旺衰的技术、准确地判定四柱格局、正确地区</p>\n<p>分用忌神。稍懂四柱预测的人都知道，这是最难过而又必须过的一关。这是</p>\n<h2>参见</h2>\n<li>旺衰派·六亲</li>\n<li>盲派·六亲</li>\n<li>神煞·六亲</li>\n<li>调候·六亲</li>\n<li>病药·六亲</li>\n<li>阴阳·六亲</li>\n<li>综合·六亲</li>\n<li>其他·六亲</li>", "source_count": 77, "block_count": 169, "see_also": ["旺衰派·六亲", "盲派·六亲", "神煞·六亲", "调候·六亲", "病药·六亲", "阴阳·六亲", "综合·六亲", "其他·六亲"]}, {"topic": "基础理论", "content": "<h2>格局派 · 基础理论</h2>\n<p>共收录 63 条相关内容，来自 43 本书籍。</p>\n<p><strong>来源《文曾八字高级班上册_274页》</strong></p>\n<p>的喜忌，这就是为什么有的八字格局  里面全是体，一点用都没有，但是这个人还能很有钱，就是暗冲出来的。</p>\n<p>文曾手場                   6   虚神喜忌用法</p>\n<p>虚神只与六合、穿、冲、填实作用</p>\n<p>寅  午  戌</p>\n<p>未、午、丑、子</p>\n<p>虚神吉凶断法依照原局，吉时忌六合、穿、冲、填实</p>\n<p>虚神的喜忌和用法：虚神的用法，其实跟正常的用法是一样的，还 是要根据局中的体用来看，如果局中的体很旺了，那么冲出来一个虚神 是用，那这个一定是好的，如果局中这个用很旺了，又冲出来一个，这 个就是不好的，那么我们来看一下关于虚神，虚神得用的时候， 一般都 非常吉，因为虚代表无限、无限可能、无穷无尽、力量极大。虚神只与 六合，穿、冲、填实作用，就是说虚神最怕遇到六合的，怕冲、怕穿，</p>\n<p>传承传统文化89洞悉生命本质</p>\n<p>看</p>\n<p>那么地支上有六合有冲穿，填实。那天干的话只有冲和填实，所以天干 的虚神和地支的虚神，还有点区别的。</p>\n<hr>\n<p><strong>来源《祝国英天人接命理授徒讲义》</strong></p>\n<p>则。</p>\n<p>后天风水中如阴宅阳宅格局的阴阳关系是平衡为吉：不平衡如青龙低矮白</p>\n<p>虎高大就是阴克阳而男人不吉。此种情况如果是阳宅，此时把青龙方的建筑物</p>\n<p>改建成与白虎方建筑物同样高大就实现了阴阳平衡而治好了男人受克制的病。</p>\n<p>八字预测技法中的阴阳关系却与此相反，完全平衡的八字即木火与金水力量相</p>\n<p>当的八字是最大的病，肯定不是富贵命，所以才有地支阴阳三制一一般都是富</p>\n<p>贵命之说。八字预测的阴阳之间只有克制，没有平衡之说。要注意的是“日干</p>\n<p>中和、偏旺偏弱”之类与本节说的阴阳平衡是风马牛。</p>\n<p>制用做功的主要作用方式包括刑、冲、合、害、克、晦、脆、生等，另外</p>\n<p>扶、泄、耗、破等也有制用之功，只不过相比之下功小而已。但必须要明确的</p>\n<p>是，制用做功中最根本的做功点是阴制阳或阳制阴，就是同是刑冲合害，如果</p>\n<p>阳刑阳如未刑戌则无制用之功，丑刑戌则有制用之功；合也是如此，如辰酉合、</p>\n<p>卯戌合则无制用之功，巳申合、寅丑合则肯定有制用之功等等。</p>\n<p>制用做功分为典型制用做功与一般制用两种方式。典型制用方式就是地支</p>\n<p>三阴制一阳或三阳制一阴的格局，此时不论天干如何。这类八字阴或阳一方明</p>\n<p>显势大，另一方明显势小，势大一方克制势小一方为功。</p>\n<hr>\n<p><strong>来源《007-2007.09《四柱乾坤》徐丙昕编》</strong></p>\n<p>午月，五月丁火旺极，地支三酉之金，加</p>\n<p>上天干己土相生，正所谓火夏长天金叠叠，格局如此，未有不</p>\n<p>富者。</p>\n<p>还有一种立命之四柱，其土厚重重见金结局者，亦为巨</p>\n<p>富。举一例：</p>\n<p>己已己巳己巳庚辰</p>\n<p>分析：己土生于巳月，四月火土两旺，妙在最后庚金出，</p>\n<p>获取更多最新易学资料 加微信：804407916 公众号：九鼎学堂</p>\n<p>获取更多最新易学资料 加微信：804407916 公众号：九鼎学堂</p>\n<hr>\n<p><strong>来源《从零开始学八字202210》</strong></p>\n<p>雪月之场所，为花街柳巷、为草坪、菜园等。</p>\n<p>卯木所对应的身体部位：肝、四肢、十指、毛发等。</p>\n<p>辰土：</p>\n<p>辰上为季春，节令为农历三月。辰土是水泥湿土，万物之根靠它培养生长。辰为草泽。大泽 是水聚的地方，而辰位置在东方稍偏一点的地方，正好是水库，所以在草泽之名。八字中如 果辰逢壬戌、癸亥，就贵为“龙归大海”格了。</p>\n<p>辰所对应的类象：为湿泥、水库、井、泉等积水之所，如池塘、沼泽、沟渠等。辰土还为土 堆、田园、稻田、有“草泽”之称。</p>\n<p>辰所对应的身体部位：皮肤、肌肉、肩、胸、胃、消化系统等。</p>\n<p>巳火：</p>\n<p>巳为孟夏，节令为农历四月，这时巳火更旺，巳为大驿，所谓的大驿，就是人烟密集，道路 通达的地方。因为巳里面藏有丙火、戊土，加之巳下面的一个地支又是午马，所以用大驿作 巳的象征。凡巳年生人，逢上辰时为吉利，巳属蛇，辰为龙、蛇化为青龙，在格局里为“千</p>\n<p>里龙驹”。</p>\n<p>巳火所对应的类象：为汇聚人烟之所、为小城镇、为道路、为寺观、楼台之象。巳为蛇、为 烟火等。</p>\n<p>巳火所对应的身体部位：咽喉、齿、肛门、为眼目、心脏系统等。</p>\n<p>午火：</p>\n<hr>\n<p><strong>来源《太极阴阳法命理入门（李法能）-2023年 (1)》</strong></p>\n<p>仰则观象于天，俯则观法于地。人有贤不肖之殊， 命有过不及之异。 太过者</p>\n<p>从之斯成，不及者益之则利。万物玄宗，立极本根，先论格局之气象规模，</p>\n<p>次观用神之出处精微。 白洞裂变， 其天光下临无限， 黑洞聚变，其地德上载</p>\n<p>无穷。 </p>\n<p>观天之道，在于顺行；察地之道，在于逆用。天地顺遂而精粹者昌，阴</p>\n<p>阳乖悖而混乱者亡。 天倾西北， 始其所始； 地陷东南， 终其所终。 天阳地阴，</p>\n<p>气兮势兮；阴阳五气，生兮克兮。势斯增减，气有盈亏；运岁顺逆，吉兮凶</p>\n<p>兮。 </p>\n<p>五行法天地， 阴阳道世间。 生扶护卫， 时雨滋苗； 冲刑害绝， 秋霜杀草；</p>\n<p>长生帝旺，争如金谷之园；墓破空亡，尤如泥犁之地；阴阳相乘，祸咎必踵</p>\n<p>李法能——太极阴阳法入门（命理卷）</p>\n<hr>\n<p><strong>来源《素水盲派第六期《格局加气象运用》559页》</strong></p>\n<p>80 岁护下来了这个事实。</p>\n<p>还是没有还是被画的很厉害，所以说要用结彩这个时候。</p>\n<p>那么当你的官杀。</p>\n<p>并席上做的很厉害的时候， 你拿进去护，可是你呼吸下来以后， 你你 又把他给画的很厉害的时候， 你又一拿起就服，就一个弯儿一个弯的 去管。</p>\n<p>一定是围绕着这个格局为中心的时候， 每走一步还得看你俩没走一步 都离开了一点。</p>\n<p>你把他救下来了，你把他从老虎嘴里救下来了， 可是你又把他给什么 呢？</p>\n<p>哎，你又把他给边那个用别的手段也给他折 来，读象的一种方法，这种方法 非常的快速简便，不用排大运流年，他直接从八字原局来看事情，有的事 情你用格局法看不了，用旺衰法也无能为力，但是用象法就能把他解读下 来，下面讲一下象法他的作用。也就是说学好象法他能有那一些作用，看 到什么样事和象法怎么样来用，象法他是非常直观的着某一些事情的，特 征的。比如说妓女小姐的命造，我们用象法就能直观的解读，还有乱论的， 同性恋，就是不符合社会常理的这种，还有的就是女命当小三的，被人家包养，还有父母离异，或者父母有外遇，或者是自己的老婆和老公有外遇 的，还有有的娶多妻的，同时娶两个老婆，这两老婆是她的亲姐妹的。像 这些情况，我们只有用象法来解读，在很多时候，我们不用具体的给人家 看什么事，我们用像法能拿住人家主要问的事，人家就会信服。</p>\n<hr>\n<p><strong>来源《子平烛观》</strong></p>\n<p>年确非佳运，不可盲目冲刺乱投 资。</p>\n<p>保守安分领份薪水可保无大破败。幸用神财根在时支。尚有老运可走。</p>\n<p>阿星：立时上伤官局，伤官是凶神，要用财化.取月上丁财为用，财用根于时支巳火.年干伤官为 体用之神护卫财星.现行甲申运有两坏，一是甲食与乙伤浊局，二是申金穿伤巳火，使丁火根虚. 癸未与壬午运是好运，先天有年干乙木不忌后天透水，更喜财星得根.</p>\n<p>Test:先聊水火交战。</p>\n<p>法一通关，可用得强根之木来汲水。乙木难以亥为根。不过幸好乙木不若甲木畏惧水旺。</p>\n<p>法二阻水，只可以乾燥之土来止之，而非湿土冻土反增湿增寒， 寒冬丁火力不如丙火。幸时支藏了丙火。</p>\n<p>尺素：戊當令的話成局，乙未殺局是個半成品，地支的火金待用，透出成局。</p>\n<p>72、许世英</p>\n<p>癸 辛  乙 辛 酉 酉 丑 巳</p>\n<p>大 运 ： 庚 申 己 未 戊 午 丁 巳 丙 辰 乙 卯 甲 寅 癸 丑 壬 子 辛 亥</p>\n<p>月中七杀当令透出，本来要立时上七杀格，但是以真宗子平系统论，立从或化的格局 比正格优先。四柱地支三合金局，得当令真神七杀透出引化，八字杀旺无遮</p>\n<hr>\n<p><strong>来源《素水盲派《壬寅年格局大运流年班内部资料》2022年格局大运流年培训教材209页》</strong></p>\n<p>透印，从不了。</p>\n<p>透印是好的。但是又透财坏印了。出身就差。父亲也不行。困难。兄弟姐 妹多，上不起学。</p>\n<p>但时上落比劫，正因为财坏印，这时比劫就制财护印了。姐姐把上学的机  会让给他了。供他上大学。但是，这样的格局总是有问题的。我拿劫制财护印， 也是在一个平台上用手脚做事的人。这是一个教师。</p>\n<p>杀印相生的格局，变成一个技术的人，就没有体现出杀印相生的威力，格 局不纯了。</p>\n<p>例：财坏印，时上落杀，极差命。</p>\n<p>分析：这是杀格，时上透杀。此人失业，生病，大牢。年纪不大就蹲过几 次牢，其中有七年牢的。</p>\n<p>杀生印时，财来坏印，位置不同，结果不同。</p>\n<p>如果生来有残疾，可能不会进大牢。</p>\n<p>财坏印，败祖啃老。不务正业。对长辈不利。靠父母帮一点。</p>\n<p>时为果，时为人生最后的成败。时为  格局成败的关键点。</p>\n<p>坤例：看婚姻。</p>\n<p>枭伤日劫</p>\n<p>壬丁甲乙</p>\n<p>申未寅亥</p>\n<p>分析：此女命月上伤官，自坐禄，时上劫财，年支申七杀冲寅，寅是禄根， 这几点都是婚姻必离的信息。</p>\n<p>因为自坐禄，所以不会妥协。伤十劫的组合，即使有一个印，都不好使。 寅亥合，有解寅申冲的作用。亥上透乙，说明以后会找一个二婚的男人结婚。</p>\n<hr>\n<p><strong>来源《子平烛观》</strong></p>\n<p>比劫争财。损了先天格局。 在此有一人生挫折要经历。</p>\n<p>test 发表于2009-11-1517:23</p>\n<p>呆师：连我认为最细心的小鼠samoyed 都没看出来我的用意，看来一定是我自己的错，,一 定是我自己没有讲解清楚，,在旧帖中讲过“子平用多寡之暗冲不用暗合”,,看来没有老师 注意到我那句话，如天元老师所讲，地支三申可以暗冲出一个寅木虚神。寅为丙火虚神之 根，弱而不从。立才格论成败。用年上正官为用。地支申亥互破害，已经从格的能量级别 降入局的级别。癸根受伤，层次再将。最不妥的是虚神寅木，通官比之关，官星再也难以 护住财星。岁运忌再克泄官杀。</p>\n<p>正官       偏财       日主       比 肩</p>\n<p>乾造：    癸         庚         丙         丙         (辰巳空)</p>\n<p>亥          申                申                 申</p>\n<p>大运：己未   戊 午    丁 巳   丙 辰    乙 卯    甲 寅    癸 丑   壬 子</p>\n<hr>\n<p><strong>来源《06.素水-素水盲派《壬寅年格局大运流年班内部资料》2022年格局大运流年培训教材209页--原版(1)》</strong></p>\n<p>年柱</p>\n<p>正印</p>\n<p>戊正官</p>\n<p>辛偏印</p>\n<p>丁偏财</p>\n<p>衰</p>\n<p>衰</p>\n<p>寅卯</p>\n<p>钗钏金</p>\n<p>月柱</p>\n<p>偏印</p>\n<p>丙正财</p>\n<p>庚 正 印</p>\n<p>戊正官</p>\n<p>胎</p>\n<p>死</p>\n<p>申酉</p>\n<p>白腊金</p>\n<p>日柱</p>\n<p>元男</p>\n<p>丙正财</p>\n<p>庚正印</p>\n<p>戊正官</p>\n<p>午未  长流水</p>\n<p>时柱</p>\n<p>比肩</p>\n<p>壬劫 财</p>\n<p>甲伤官</p>\n<p>帝旺</p>\n<p>帝旺</p>\n<p>子丑</p>\n<p>大海水</p>\n<p>2018201920202 02120222023202                    4202520262027</p>\n<p>戊官己杀庚印 戌官亥劫子比</p>\n<p>辛枭壬劫癸比甲伤 丑杀寅伤卯食辰官</p>\n<p>乙食丙财丁才 巳财午才未杀</p>\n<p>小运        壬子癸丑甲寅           乙卯丙辰     丁巳戊午          己未庚申辛酉</p>\n<p>此命财格，但财官同宫。时上透比，是败格。晚限要败。</p>\n<p>戌是官，巳是财，财官没坏。但没透。上面透印和比，所以是在一个国企 中当中医。断会计也对。</p>\n<p>但亥是冲巳的，隔位冲，说明这个官不长久。以后会自己做。</p>\n<p>丙戌大运，丙是从巳中出来的，是带着财官来的。坐着戌，戌是天罗，亥 是地网。也到了50多，到晚限了，所以要应灾。是格局败了出的问题。不然， 财临旺地，如何会有灾?</p>\n<hr>\n<p><strong>来源《《君臣之道》》</strong></p>\n<p>同，就是想与女人配。</p>\n<p>天干甲被水围住了，思想就是想着女的。</p>\n<p>毕竟有夫星在，能有婚姻，但自己不愿意嫁。</p>\n<p>169</p>\n<p>坤：乙己甲丙</p>\n<p>卯卯戌寅</p>\n<p>丙火泻秀生财格局：财弱，丙火在时，故财不多，泄秀晚。</p>\n<p>阳刃格一、配杀为有权二、泄秀为文与技术。年为乙卯占主位，克父标志明显。</p>\n<p>泄秀目的是什么?这个靠丙火泄秀生财。以嘴巴为吃饭，因为丙寅主文。</p>\n<p>这个格比较简单，就是阳刃喜食伤泄秀。</p>\n<p>这个八字，哪个字是代表男人?</p>\n<p>甲己本为一对人。壬午大运成婚，因为午与己是一个字。己卯应该是对的。因为午运</p>\n<p>午中己出现。</p>\n<p>第一个男人是己。己土很弱所以这个男人也很弱。</p>\n<p>第二个男的如何定位?第二个是戊。如果定位准了，找婚期就容易。</p>\n<p>戌为夫，自己坐下的是一家人。何时出现?丙戌年，寅午戌三合，但是有个毛病，这</p>\n<p>个戌中藏个辛难受，辛是本气，三合难受。</p>\n<p>戊与辛都在库里，所以是昙花一现，戊是一个，辛是一个，戊在06年出现，但是马上</p>\n<p>连同辛一起进入墓里，所以不出来，短暂。</p>\n<p>一起进入坟墓，戌要用辰來冲才会开库。戌中辛需要辰救，辰来是冲动为什么是辰救，</p>\n<p>众水灭火。辰年第二次婚姻。</p>\n<p>乾：辛壬辛癸</p>\n<p>亥辰卯巳</p>\n<p>结婚年何时?庚寅运戊寅年。</p>\n<hr>\n<p><strong>来源《05.王相山-子平真诠《格局真诠》544页1》</strong></p>\n<p>。她事业辉煌，独婚姻不佳。原因就</p>\n<p>在于印星官轻，甲木食伤盖头，本身有弃官不用之意，加之辰土与巳火（中</p>\n<p>第四章 印绶格</p>\n<li>189-</li>\n<p>藏戊土）两个官星，都与带着劫财异性的酉金作合，这就是老公用情不专的</p>\n<p>信息。可怜她纵有万种风情，到头来也是独自黯然神伤。</p>\n<p>都察御史夏汉寿：癸未、辛酉、壬申、乙巳。</p>\n<p>刑部尚书周孟命：癸未、辛酉、壬辰、乙巳。</p>\n<p>这两个八字与张曼玉基本相同，大运方向也相同。但二人均为大贵，原</p>\n<p>因就在于巳中戊土七煞未被克制，虽然印绶喜食伤，但食伤没有去掉官煞的</p>\n<p>意思。就既要才华，也要官贵。实质上，这两八字天干都一样，乙木伤官有</p>\n<p>未土库根，都是印绶喜食伤的格局；地支都有官煞，有印化官煞的意象，故</p>\n<p>地支是印绶用官或印绶化煞格。是天地两格并存的八字，所以为贵。</p>\n<p>有些印绶喜食格，虽然先天没有官煞助印，但大运遇官煞来助印，届时</p>\n<p>也一样能发贵。比如雪楼程命：己酉、庚午、戊午、戊午。这八字，就是标</p>\n<p>准的印绶喜食格，印多食少，印重食轻，本身就显了贵气，再到东方官煞之</p>\n<p>地，故命主官至荣禄大夫。有的八字构成了食伤吐秀与印绶用官格的局面，</p>\n<p>那么，命主就既能当官又才华横溢，而当文学艺术之人了。</p>\n<hr>\n<p><strong>来源《05.王相山-子平真诠《格局真诠》544页1》</strong></p>\n<p>。</p>\n<p>“孤财不贵”的本意，是财旺身衰难担财，故财旺身弱时，“财旺就不能自生</p>\n<p>官星”，需要佩印帮身才贵。</p>\n<p>格局真诠</p>\n<li>108-</li>\n<p>“财旺身弱而配印”，必须做到“财印不宜相并”。财印相并，则冤家路</p>\n<p>窄，财星克印，印星受伤，就不能生助日元，仍然是孤财一个，所以富贵就</p>\n<p>没有了，顶多小富而已。唯有做到财印不碍，月令财旺，有食神相生，并有</p>\n<p>印星扶身，食印相辅，有食生财，有印帮身，印不夺食，方为上格。这就是</p>\n<p>沈氏说“位置妥贴，两不相克”的意思。如财印互碍， 印被财坏，依然是“孤</p>\n<p>财不贵”。便先损了学业，大运虽逢比劫助弱身，也是只富不贵的。</p>\n<p>范例1：《子平真诠》葛参政命。</p>\n<p>乾造：壬 壬 戊 乙</p>\n<p>申 子 午 卯</p>\n<p>清朝的“参政”，级别相当于侍郎，属于中贵高官。这是子平真诠唯一</p>\n<p>举的一个财旺生官格八字。这八字，财星当令而旺，日元自坐印星，财旺身</p>\n<p>旺，没有七煞，不见伤官，本来是很好的财旺生官格，但时柱偏偏带了正官</p>\n<p>乙卯，还是“财旺生官格”吗？不是说财旺生官，不喜见官星吗？见了官是</p>\n<p>“财官格”吗？就因为日元坐午，午中有己，也是阳刃，原局有阳刃克财之</p>\n<p>患，故喜见官星制刃护财，卯午相破，则官能制刃发用。</p>\n<hr>\n<p><strong>来源《《君臣之道》》</strong></p>\n<p>的。</p>\n<p>这种女命就不旺夫。</p>\n<p>七杀得令的，情人可以。</p>\n<p>02年结婚，后离婚，离婚后成为集团里小领导的情人。</p>\n<p>388</p>\n<p>父亲是个乡镇小官。</p>\n<p>女命年月有七杀的，占据了官的位置，贵气已失败。</p>\n<p>女命的食，官，印为人生三宝。</p>\n<p>有食时，不受七杀的迫害；有印时，不受伤官的迫害。</p>\n<p>即使伤，枭，杀有成就的人，也无福气。</p>\n<p>如食配杀的，也要解决问题，但福气低了。</p>\n<p>格局讲暗冲暗引的力量，如食可生财，暗合印，暗合官，不见财官印的食神成</p>\n<p>格的反而厉害。</p>\n<p>食神格，没有杀的，透食，没枭来夺时好。</p>\n<p>正印，可制伤官，但一旦伤透就辛苦。</p>\n<p>从福气降到做功层面。格局层降到用神层。</p>\n<p>家庭主妇</p>\n<p>坤 ：癸 甲戊癸 未</p>\n<p>子 午 亥</p>\n<p>20122022203220422052206220722082</p>\n<p>运乙丑丙寅丁卯戊辰己巳庚午辛未壬 申 这是一</p>\n<p>个反例。</p>\n<p>财滋弱杀的条件是日主身强用杀，杀弱，才用财滋弱杀格。</p>\n<p>戊土生子月，地支作用关系是财旺了，财破印了，那么只能用未土比劫，就不</p>\n<p>能用杀了。</p>\n<p>杀旺，财星党杀攻身，杀就为忌，这时候就怕财来滋杀。</p>\n<p>旺财旺杀就要攻身，日主身衰就撑不住，就要出问题，非贫即夭：不光财要来</p>\n<p>坏印，而且财要生杀来克身。</p>\n<h2>参见</h2>\n<li>旺衰派·婚姻</li>\n<li>盲派·婚姻</li>\n<li>神煞·婚姻</li>\n<li>调候·婚姻</li>\n<li>病药·婚姻</li>\n<li>阴阳·婚姻</li>\n<li>综合·婚姻</li>\n<li>其他·婚姻</li>", "source_count": 109, "block_count": 477, "see_also": ["旺衰派·婚姻", "盲派·婚姻", "神煞·婚姻", "调候·婚姻", "病药·婚姻", "阴阳·婚姻", "综合·婚姻", "其他·婚姻"]}, {"topic": "学业", "content": "<h2>格局派 · 学业</h2>\n<p>共收录 133 条相关内容，来自 59 本书籍。</p>\n<p><strong>来源《京南道人2024-5月深圳》</strong></p>\n<p>死记硬背，那么多口诀。 但是怎么样查神煞一定要学会这个方法。这个是几千年流传下来，也没有 什么捷径，</p>\n<p>第四步，象法。象法是从盲派演变过来，读象的一种方法，这种方法 非常的快速简便，不用排大运流年，他直接从八字原局来看事情，有的事 情你用格局法看不了，用旺衰法也无能为力，但是用象法就能把他解读下 来，下面讲一下象法他的作用。也就是说学好象法他能有那一些作用，看 到什么样事和象法怎么样来用，象法他是非常直观的着某一些事情的，特 征的。比如说妓女小姐的命造，我们用象法就能直观的解读，还有乱论的， 同性恋，就是不符合社会常理的这种，还有的就是女命当小三的，被人家包养，还有父母离异，或者父母有外遇，或者是自己的老婆和老公有外遇 的，还有有的娶多妻的，同时娶两个老婆，这两老婆是她的亲姐妹的。像 这些情况，我们只有用象法来解读，在很多时候，我们不用具体的给人家 看什么事，我们用像法能拿住人家主要问的事，人家就会信服。</p>\n<hr>\n<p><strong>来源《子平真诠本义精简版》</strong></p>\n<p>拘泥外格为活变；论生克，则不察喜忌，而以伤旺扶弱为定法；论行运，则不问同中有异，而以干支相类为一例。</p>\n<p>解读：以八字算命是有定理和法则的。有些人不得真传，不知道正宗的子平命理及其法则，便胡编乱造一些似是而非的命理和法则，弄得命学界歪理当道，邪说横行。千千万万的后学者没有能力辨别是非，妄听妄信妄传，现在已经达到了积重难返的地步了。</p>\n<p>比如论干支，就不知道干支的阴阳之理，而以所谓的“体象歌诀”来论干支，说什么甲木为参天大木，宜斫削，而乙木是花草弱木，宜生扶等等，都是乱弹琴。</p>\n<p>比如论格局，则不知道要专从月令取用定格，而是随便到处取用神定格局，还说这是活变！特别是现在好多人，连用神的概念都还没有弄清楚，哪里就谈得上活变呢！</p>\n<p>比如论生克，则不从格局上着眼，总是只按旺则宜克，弱则宜扶的死法来论命，只讲八字五行的平衡与流通，不讲八字格局的成败与高低，你看旺，我看衰，瞎猜胡断。</p>\n<p>比如论行运，则不问是甲还是乙，是寅还是卯，只看干支都属木，就以木来论喜忌，而不知有时候甲木破格而乙木成格，有时候则寅木成格而卯木破格，没有看到某些细节的不同会导致整体格局的变化。</p>\n<hr>\n<p><strong>来源《97828416900627人生轨迹的干支解读  新派命理简论_12437712》</strong></p>\n<p>自己的研究成果被易友重视好开心；看到自己的成果被改姓好伤 心!</p>\n<p>第二十一章</p>\n<p>命理起名法的操作规则</p>\n<p>如今，找预测师给孩子起名字，给新办的店铺、公司起个字号已经成为 中国现实生活中一个不可或缺的组成部分。自然也成为预测师服务业务的主 要内容。眼下起名字的方法流派众多，其中影响最大的就是所谓五格剖象法 和命理起名法。五格剖象法把人的名字作为一个独立的载体对待，不考虑命 主四柱中的喜忌。命理起名法则是根据求名者四柱中的喜忌以及起作用好坏 的五行为据起名的。命理起名法的操作规则是：</p>\n<p>1.科学地确定四柱格局，准确区分命中的用神、忌神和中神，这是起 名字的前提。名字作为后天可以任意改变的一个外在符号，它到底是好是坏 应该取决于它对求名者命中喜忌的助益或克制。和风水一样，它助益了命中 喜欢的五行，克制了命中忌讳的五行，就对命主后天改命起到了好作用，反 之则起了坏作用。起坏作用还是起好作用要有标准，这个标准就是求名者的 命中喜忌。用五格剖象法起名也应该考虑命中喜忌，通过五行数理的调理达 到补益的目的。</p>\n<p>2.把助益第一事业放在第一位。如四柱：</p>\n<p>甲子  庚 午  辛 未  壬 辰  从弱</p>\n<hr>\n<p><strong>来源《007-2007.09《四柱乾坤》徐丙昕编》</strong></p>\n<p>午月，五月丁 生 、 机 电 工 程 等 ， 则 可 化 解 不 利 的 特 性 。</p>\n<p>魁罡具有煞气,代表容易发生意外灾病，需要经常出外工作或喜爱旅游的</p>\n<p>戊 戌 人 ， 就 需 要 特 别 注 意 安 全 了 。</p>\n<hr>\n<p><strong>来源《王庆学格局论命》</strong></p>\n<p>喜弱喜生，如冬木喜火、辛金乐水、丙火 要王等等。这些取用法和格局成败没太大关系，甚至一 点关系都没有</p>\n<p>格局中心说和日主中心说各司其职、各行其道，没 有任何矛盾，只是如何使用的问题。</p>\n<p>我们的矛盾来自不识格局中心说和日主中心说的 实质，不懂格局中心论和日主中心论的使用方法。不明 其理，两法混用，当然稀里糊涂、矛盾重重。</p>\n<p>不知我说的够不够明白，还是多啰嗦几句吧。</p>\n<p>格局所体现的是八字中天地主气的运行情况和作 用结果，专论人生之大象，如富贵贫贱、吉凶祸福、工 作职业、外部环境。它是一个八字的总框架，是富、是 费、是贫、是贱、有无工作、是否稳定，基本上就敲定 了。</p>\n<p>它表述的是日主所需要面对的外部世界，或叫客观 规律</p>\n<p>因此，论人名利成败得失，论一个人在社会中的身 份地位以及外部的环境，都以格局为中心论</p>\n<p>日主为己身，是八字的主人，以它为中心论什么 呢?论日主的本性，论日主的愿望和想法，论日主对富</p>\n<p>266贵贫贱、吉凶祸福的内心感受和接受能力，论日主的一 切身内事。</p>\n<p>日主对富贵贫贱、吉凶祸福的态度和感受，主要涉 及到两个方面：日主的旺衰和日干的属性。</p>\n<hr>\n<p><strong>来源《三命通会》</strong></p>\n<p>庚申爲⽩虎之神，利於武⽽不利於⽂，有抱道</p>\n<p>孤騫之性，善中嚴外，⾊厲內荏，有仁義，好幽僻；⾟⾣爲太陰之</p>\n<p>神，懷肅殺之氣，有清⽩之⾵，爲⽂章利⼝，不世之才，然更各以親</p>\n<p>疏休旺定遇者之情性禍福。</p>\n<p>[ 甲⼦⼄丑海中⾦ ]</p>\n<p>海中⾦者，寶藏⿓宮，珠孕蛟寶，出現雖假於空沖，成器無借乎</p>\n<p>⽕⼒，故東⽅朔以蛤蚌名之，良有理也。妙選有珠藏淵海格，以甲⼦</p>\n<p>⾒癸亥，是不⽤⽕；逢空有蚌珠照⽉格，以甲⼦⾒⼰未，是欲合化互</p>\n<p>貴。蓋以海⾦無形，⾮空沖則不能出現，⽽⼄丑⾦庫，⾮旺⽕則不能</p>\n<p>陶鑄故也。如甲⼦⾒戊寅、庚午，是⼟⽣⾦，⼄丑⾒丙寅、丁卯，是</p>\n<p>⽕制⾦。⼜天⼲逢三奇，此等格局，無有不貴。</p>\n<p>[ 壬寅癸卯⾦泊⾦ ]</p>\n<p>⾦泊⾦者，潤⾊杯盤，增光宮室，打薄須借乎別⾦，描彩必假乎</p>\n<p>⽔⼒。此⾦甚微，⾮⽊則無所依。以平地爲上，有此不宜⾒⽕，有⽕</p>\n<p>主夭。遇太陽爲⽇間之顯，⼆⽕相反，不宜同⾒。⼭下、⼭頭，有清</p>\n<p>⽔助之，亦吉。惟忌爐⽕，就位相克。此⾦體薄，不能反源定夭，限</p>\n<p>運同論。井泉、澗下、天河⽔清，⽇時喜⾒，須⽉令有⽊，⽅吉；溪</p>\n<p>流、⼤海⽔濁，⾒溪流主漂蕩，⾒⼤海無⽊爲基，主兇殘。</p>\n<hr>\n<p><strong>来源《05.王相山-子平真诠《格局真诠》544页1》</strong></p>\n<p>以劫抗煞，但财重生煞，比劫根本抗</p>\n<p>不了七煞，反被七煞所累。再说，比劫运泄印，比劫为人气，所以成了国人</p>\n<p>格局真诠</p>\n<p>-62-</p>\n<p>皆曰可杀的大汉奸。</p>\n<p>女命：壬 庚 甲 乙</p>\n<p>辰 戌 寅 亥</p>\n<p>此造与陈公博、上面富命也相似，同属于煞印相生格。且此命日元甲木</p>\n<p>坐寅木强强根，又得时支长生根，又有劫刃帮身，应该是个大富大贵的命吧。</p>\n<p>但命主是个独眼残疾人士，没文化，多年来一直给人家当保姆。为什么？就</p>\n<p>因为辰戌一冲，坏了壬印，寅亥一合，化印成劫，反破了煞印格，加上女命</p>\n<p>大运逆行南方，印星无气，更破了煞印相生格，所以没文化。好在时干乙木</p>\n<p>能合庚煞，格局构成以劫合煞，煞不攻身，故虽贫而不夭。这反过来也证明，</p>\n<p>煞有无制化，与身强身弱无关。此命自身坐禄，身再强旺，就因辰戌冲而伤</p>\n<p>印，寅亥合而印化，印受伤，不能以仁化煞。</p>\n<p>乾造：庚 庚 甲 己</p>\n<p>子 辰 午 巳</p>\n<p>明成化十六年三月十四日巳时（1480.5.2）生，戊令。</p>\n<p>徐问，明南京户部尚书。甲生辰月，财星当令，两煞透干，财煞逞肆。</p>\n<p>这个天干无印化食制，是否就是七煞无制的破格了？不是。因为双煞坐下恰</p>\n<p>恰是子辰，子辰合印，也是一仁可化。</p>\n<hr>\n<p><strong>来源《民间师父八字课程学习笔记本地》</strong></p>\n<p>家。女命主的儿女方面。男性青少年事物方面，如学校、清晨时 光、朝气蓬勃的状态。娱乐场面。娱乐场所等。</p>\n<p>◇ 老阳（正财、偏财）——遥远的。外面的。爸爸方面。钱财方面。技 术成果方面。成功成就方面。男人事物方面，如烟酒商店、争斗场面等。</p>\n<p>◇ ——这些属于动态类象。</p>\n<p>我谈批八字取象（草稿七） ---------（7） 2011-07-28 05:23</p>\n<p>◇ 批八字，怎样才能不被“格局、用神”困绑住思维，那就是“配合”读象。</p>\n<p>◇ 假如一个关起门来的家庭:</p>\n<p>◇ 格局——这个家的房屋院落。</p>\n<p>◇ 用神——这一家之主。其它干支就好比其他家庭成员。</p>\n<p>◇ 读象——通过观察房屋内外的装修设计风格，通过观察房屋内外物品 陈列的贵贱雅俗，通过观察家庭中每个成员的言谈举止、性格喜好。。。 等等，来认识并最终确定这一家人的人品素质、档次、阶层等。</p>\n<p>◇  少阴生老阴，命主和蔼可亲。</p>\n<p>◇  少阳生老阳，命主努力进取。</p>\n<p>◇  少阳弱运行北方，命主必遭水灾。</p>\n<p>◇  少阴弱运行南方， 多肺功能系统有问题。</p>\n<p>◇  孩子像母亲还是像父亲，如何断？</p>\n<hr>\n<p><strong>来源《穷通宝鉴  白话评注  下_（明）佚名著；（清）余春台整理；徐乐吾评注；方成竹注译》</strong></p>\n<p>破酉等，皆可使癸水有根而破格，格局由成转败，则为贫贱之人。或见甲 乙出干制杀，或癸水有根，亦为破格。</p>\n<p>但徐乐吾在《造化元钥》的评注中却认为：支成火局，最宜透戊土，格成 从化，无戊，不能作从财格看。并分析说：“午宫丁已并旺，丁火之气泄于己 土，故不能从财，见一派己土，己土制住癸水，故可从杀。”徐大师此论仅为 一家之言，但他在《穷通宝鉴》的评注中又认为： “五月癸水，至弱无根，火 旺则从火，土旺则从土，原局无破，自然富贵也。”两书评注前后理论有些矛 盾，不能自圆其说。多数命学著作认为，如地支见火局，干透丙丁，癸水无 根，即可从财，但以四柱不见金水甲木为成格的首要条件。凡从格，皆忌刑冲 破害，或日主得根逢生。总之，五月癸水，至弱无根，火旺则从火，土旺则从 土，原局无破，自然富贵。</p>\n<p>总之，五月癸水，庚辛壬癸参酌并用可也。</p>\n<p>徐乐吾曰：总结上文。</p>\n<p>方先生曰：此节总结五月癸水取用总的原则，五月癸水，身临绝地，气势 衰竭，性质干涸，火势炎炎，万物皆燥，见一滴水，可泽千里之润。夏水见比</p>\n<hr>\n<p><strong>来源《242 -佚名 - 真宗子平格局法论述》</strong></p>\n<p>不透，不算混杂)?</p>\n<p>印是相神吧?正印化杀好，还是偏印化杀好呢?  (是杀局的用神，正偏印都能化杀)</p>\n<p>杀局的成立条件是印化杀或食制杀，这两种对应到现实中，分别说明什么呢?如心性、能 力方面   (杀印是儒将，食杀是福将)</p>\n<p>您说壬是真神可用，那壬起什么作用?  (是你命造的真用神) 是身弱生身吗(体用)?  (不是)还是化杀?  (是)</p>\n<p>如果壬也化杀，是否与癸混杂?  (不混，一个在天一个在地，不叫混) 性格主要体现在哪个神上面?  (杀、印)</p>\n<p>辛巳是天地合，有没有这种说法呢?  (子平术不用这种解法，学、用东西要配套)</p>\n<p>巳酉合，辛杀的根没了，是否不好?  (是，杀虚则不强，关系到成就层次) 巳酉合解没解巳亥冲?   (巳亥本来就隔位不冲)</p>\n<p>变格的情况很少见，只要先天格局一定绝大多99。9%都不会改变意向： 1.特殊情况是先天假从格局和假化格局时，有可能改变格局。</p>\n<p>2.先天的格局用神是假神，后天走到某些极特殊的(合、化、虚拱夹)运时，会改变先天 格局机制的意向，暂时改变格局，比如：</p>\n<hr>\n<p><strong>来源《君臣命理资料系列02-君臣命理全套理论讲义》</strong></p>\n<p>第一章</p>\n<p>归真子平格局 开创命理新篇</p>\n<p>各位老师、同仁，大家好：</p>\n<p>首先感谢诸位老师与同仁!感谢你们不辞辛劳，于百忙中赶赴石家 庄参加首届子平格局归真理论的研讨学习。能与各位老师在燕赵之地进 行八字命理学上的学习研讨和交流，我深感荣幸。这是诸位老师与同仁 对我莫大的信任和鼓励，在这里请允许我向在座的诸位老师与同仁表示 衷心的感谢和崇高的敬意!</p>\n<p>子平格局理论在金锁玉关现代宗师张树淮先生的亲切关怀下，承蒙 张正亚老师、程中老师、吕泽进等老师的大力支持，于2009年第二届中</p>\n<p>国金锁玉关青岛研讨会上首次与大家结缘。尽管当时我自己学习的还很</p>\n<p>不到位，讲的也不尽完美，但是鉴于这个学理的正确性以及它独特的阴 阳五行干支组合的特殊作用关系，引起了与会许多老师和易友的特有兴 趣和极大关注。</p>\n<p>在 2010 年第三届中国金锁玉关清河研讨班上，张树淮老师再次让我 把子平格局的理论进行展示，并且进行了现场八字实测，更进一步加深 了大家对子平格局的认可和喜爱。这是张树淮老师对我的信任，也是各位 老师及易友对我的支持。借此契机，这次学习研讨才有幸得以举办。</p>\n<h2>参见</h2>\n<li>旺衰派·性格</li>\n<li>盲派·性格</li>\n<li>神煞·性格</li>\n<li>调候·性格</li>\n<li>病药·性格</li>\n<li>阴阳·性格</li>\n<li>综合·性格</li>\n<li>其他·性格</li>", "source_count": 40, "block_count": 64, "see_also": ["旺衰派·性格", "盲派·性格", "神煞·性格", "调候·性格", "病药·性格", "阴阳·性格", "综合·性格", "其他·性格"]}, {"topic": "用神", "content": "<h2>格局派 · 用神</h2>\n<p>共收录 71 条相关内容，来自 37 本书籍。</p>\n<p><strong>来源《子平真诠本义精简版》</strong></p>\n<p>拘泥外格为活变；论生克，则不察喜忌，而以伤旺扶弱为定法；论行运，则不问同中有异，而以干支相类为一例。</p>\n<p>解读：以八字算命是有定理和法则的。有些人不得真传，不知道正宗的子平命理及其法则，便胡编乱造一些似是而非的命理和法则，弄得命学界歪理当道，邪说横行。千千万万的后学者没有能力辨别是非，妄听妄信妄传，现在已经达到了积重难返的地步了。</p>\n<p>比如论干支，就不知道干支的阴阳之理，而以所谓的“体象歌诀”来论干支，说什么甲木为参天大木，宜斫削，而乙木是花草弱木，宜生扶等等，都是乱弹琴。</p>\n<p>比如论格局，则不知道要专从月令取用定格，而是随便到处取用神定格局，还说这是活变！特别是现在好多人，连用神的概念都还没有弄清楚，哪里就谈得上活变呢！</p>\n<p>比如论生克，则不从格局上着眼，总是只按旺则宜克，弱则宜扶的死法来论命，只讲八字五行的平衡与流通，不讲八字格局的成败与高低，你看旺，我看衰，瞎猜胡断。</p>\n<p>比如论行运，则不问是甲还是乙，是寅还是卯，只看干支都属木，就以木来论喜忌，而不知有时候甲木破格而乙木成格，有时候则寅木成格而卯木破格，没有看到某些细节的不同会导致整体格局的变化。</p>\n<hr>\n<p><strong>来源《八字》</strong></p>\n<p>要，故凡五行之喜忌，干支之性情，以及生旺</p>\n<p>死绝合刑冲之解法，同为取用时所当注意，虽为理论，实为根本。</p>\n<p>第 48 页 共 417 页</p>\n<p>按：以上所言“用神”，分为两种，不可混淆。</p>\n<p>一、局中所用之物（或有用之物），为用神。如己日干生于酉月，天干透辛，则以辛为用神，辛</p>\n<p>为己之食神，即食神为用，此为食神格。但这个食神并不一定是使命局趋向综合平衡之物，只是</p>\n<p>八字“有用”之物而已，见下。</p>\n<p>二、使命局趋向综合平衡的一种五行，为用神。承上，己生酉月，天干透辛。</p>\n<p>①如果四柱其余干支中有许多己土比肩、戊土劫财、丙丁火印星，己虽生酉月泄气，而日干仍然</p>\n<p>较旺，柱中又有壬癸水财星的话，可以取财星作为用神，如：</p>\n<p>戊己辛癸</p>\n<p>辰巳酉未</p>\n<p>辛金得月令透干，金之力强，可取辛金为用（因辛金有用），为食神格，柱多比劫印星，日干强，</p>\n<p>取年上癸水为用神，为食神生财格，火生土，土生金，金生水，秀气流通，诚为美格，大运走水</p>\n<p>运，必然大吉大利，发福百端，金运次吉，也是好运。火运损了食神不利，木运平常，土运有吉</p>\n<p>有凶。此身旺，食神之利在于泄身、生财。</p>\n<hr>\n<p><strong>来源《玄门内部资料-《四柱精髓高级预测》207页》</strong></p>\n<p>是有帮助的。</p>\n<p>1、阴阳对立：</p>\n<p>阴阳对立即指世间一切事物或现象都存在着相互对立的阴阳两个方面，如上</p>\n<p>与下、天与地、好与坏、动与静、升与降等等，其中上属阳，下属阴；天为阳， 地为阴，好为阳，坏为阴；动为阳，静为阴，升属阳，降属阴。它们之间永远是  处于对立的角度。这也是太极成立的必要条件，如果没有了阴阳对立，世间的事  物就不会存在。换句话说，任何事物必须存在阴阳两个面，这是一个客观规律。 例如一个再伟大的人，也难免会有些缺点。一个无恶不作的坏人，也势必有他的 优点。这就是阴阳的体现。也可以引申我们后面要讲的八字中的用神、忌神(其  实所谓用神忌神也就是一个相对而言的说法，而实质也是一个阴阳对立的表现), 一个命局的成立，不管是什么格局，永远都会存在着用神、忌神(其中包含用神  起坏作用、忌神起好作用)两帮相对立的力量。它们在时空状态下永远是对立的  两个方面。我们仔细从阴阳太极图可以看出，从大太极球分出的阴、阳两个区间  里，阴里有阳、阳里含阴。故而结合四柱预测而言，太极球中的木、火、土、金、 水，永远都是处于阴阳两个面。</p>\n<hr>\n<p><strong>来源《太极阴阳法命理入门（李法能）-2023年 (1)》</strong></p>\n<p>仰则观象于天，俯则观法于地。人有贤不肖之殊， 命有过不及之异。 太过者</p>\n<p>从之斯成，不及者益之则利。万物玄宗，立极本根，先论格局之气象规模，</p>\n<p>次观用神之出处精微。 白洞裂变， 其天光下临无限， 黑洞聚变，其地德上载</p>\n<p>无穷。 </p>\n<p>观天之道，在于顺行；察地之道，在于逆用。天地顺遂而精粹者昌，阴</p>\n<p>阳乖悖而混乱者亡。 天倾西北， 始其所始； 地陷东南， 终其所终。 天阳地阴，</p>\n<p>气兮势兮；阴阳五气，生兮克兮。势斯增减，气有盈亏；运岁顺逆，吉兮凶</p>\n<p>兮。 </p>\n<p>五行法天地， 阴阳道世间。 生扶护卫， 时雨滋苗； 冲刑害绝， 秋霜杀草；</p>\n<p>长生帝旺，争如金谷之园；墓破空亡，尤如泥犁之地；阴阳相乘，祸咎必踵</p>\n<p>李法能——太极阴阳法入门（命理卷）</p>\n<hr>\n<p><strong>来源《《君臣之道》(1)》</strong></p>\n<p>9891999200920192029203920492059</p>\n<p>运丙戌丁亥戊子己丑庚寅辛卯壬辰癸巳</p>\n<p>生仲秋了， 金旺， 还有金库， 会金局还在秋天， 金旺到极端了。</p>\n<p>但是丑也是己的根， 辰月和丑月的土非彼未戌月之实也， 古人是这么说的。 土虚的， 日主过泄， 日主过泄的。</p>\n<p>制杀， 虽然说忌讳杀， 你制了杀也没用， 这叫克泄交加， 还不如不制。 这时候身衰印做儿， 有比劫也不管用， 比劫都虚了， 必须找印。</p>\n<p>命局没有印， 就不能生儿子了， 八字没有这个功能， 不能生儿子。</p>\n<p>所以日主生的是闺女。</p>\n<p>泄体太过， 金得局， 克泄交加， 没有儿子的命。</p>\n<p>不是说你没儿子， 你就可以富了， 此命没儿子也富不了。</p>\n<p>因为他的用神只能用劫， 劫很弱。</p>\n<p>没印是没有儿子， 劫财决定他的财富， 劫财很弱。</p>\n<p>用神很弱， 食伤制杀大格局是吗?</p>\n<p>不是， 你身弱， 再怎么制杀， 你也不是大格局。</p>\n<p>你也没有格局， 你只能打工， 因为你的财富值太低了， 比劫太弱了， 并不是说 因为我制的杀小， 我没钱， 而是因为我的用神弱了， 我的财富值才低的。</p>\n<p>走什么运?</p>\n<p>他没有印， 他生不了儿子。</p>\n<hr>\n<p><strong>来源《神峰通考命理正宗原本校注》</strong></p>\n<p>京吏部， 又选司郎中，名显天下。大运入巳，巳有庚金刑克寅亥衰木，王荣奏本，谪 辽东铁鼎，卫戍而死也。</p>\n<p>盖因亥寅二字相联，木神有气，两点食神，遂作假伤官格，正谓假伤官</p>\n<p>行伤官运发也。如甲木散乱，原非类聚，亦不作此格。</p>\n<p>先术人妄取官印，俱断丁卯年卯运克损官星必死，殊无些些应验。</p>\n<p>大凡看格，不拘月令，只看动静归秀气在何处，十有八九验也。</p>\n<p>甲午、丙寅、乙丑、癸未 盱江张恩布政贵命  木火通明之格。</p>\n<p>楠曰：乙木生寅春气深，通明木火耀光明。</p>\n<p>日时癸水名为病，虚火南方出翰林。</p>\n<p>乙丑日生寅月上旬，木本嫩而火亦本衰也。年月透火通明，时 <p><strong>来源《06.素水-素水盲派《壬寅年格局大运流年班内部资料》2022年格局大运流年培训教材209页--原版(1)》</strong></p>\n<p>年柱</p>\n<p>正印</p>\n<p>戊正官</p>\n<p>辛偏印</p>\n<p>丁偏财</p>\n<p>衰</p>\n<p>衰</p>\n<p>寅卯</p>\n<p>钗钏金</p>\n<p>月柱</p>\n<p>偏印</p>\n<p>丙正财</p>\n<p>庚 正 印</p>\n<p>戊正官</p>\n<p>胎</p>\n<p>死</p>\n<p>申酉</p>\n<p>白腊金</p>\n<p>日柱</p>\n<p>元男</p>\n<p>丙正财</p>\n<p>庚正印</p>\n<p>戊正官</p>\n<p>午未  长流水</p>\n<p>时柱</p>\n<p>比肩</p>\n<p>壬劫 财</p>\n<p>甲伤官</p>\n<p>帝旺</p>\n<p>帝旺</p>\n<p>子丑</p>\n<p>大海水</p>\n<p>2018201920202 02120222023202                    4202520262027</p>\n<p>戊官己杀庚印 戌官亥劫子比</p>\n<p>辛枭壬劫癸比甲伤 丑杀寅伤卯食辰官</p>\n<p>乙食丙财丁才 巳财午才未杀</p>\n<p>小运        壬子癸丑甲寅           乙卯丙辰     丁巳戊午          己未庚申辛酉</p>\n<p>此命财格，但财官同宫。时上透比，是败格。晚限要败。</p>\n<p>戌是官，巳是财，财官没坏。但没透。上面透印和比，所以是在一个国企 中当中医。断会计也对。</p>\n<p>但亥是冲巳的，隔位冲，说明这个官不长久。以后会自己做。</p>\n<p>丙戌大运，丙是从巳中出来的，是带着财官来的。坐着戌，戌是天罗，亥 是地网。也到了50多，到晚限了，所以要应灾。是格局败了出的问题。不然， 财临旺地，如何会有灾?</p>\n<hr>\n<p><strong>来源《018-2009.11_《子平实战指引》_徐伟刚著 (2) (1)》</strong></p>\n<p>4407916 公众号：九鼎学堂</p>\n<p>获取更多最新易学资料 加微信：804407916 公众号：九鼎学堂</p>\n<p>之不同属性去区别之。</p>\n<p>财为养命之源，人人需要有用。既然月令有财星有益人生之物，则此宝</p>\n<p>物必须保卫或生养之，使其长久生存兴旺发达而不遭破坏败绝，故而财格之</p>\n<p>成立，有如下几条因素：一者喜官星之保卫；二者喜伤食之生财；三者喜佩</p>\n<p>印助身以担任之。财格之失败也同样有如下之因素：一者忌比劫之分夺；二</p>\n<p>者忌生煞以害命攻身；三者忌身弱不能负荷而破财成“富室贫人” 。</p>\n<p>总结上文之成格败格因素，大致可以把财格分为以下几种情况：</p>\n<p>一、财格透正偏财；</p>\n<p>二、财格透官煞；</p>\n<p>三、财格透正偏印；</p>\n<p>四、财格透伤食；</p>\n<p>五、财格透比劫。</p>\n<p>这五种基本情形就是财格所要讨论的对象。</p>\n<p>乾造：丙午庚寅辛酉壬辰</p>\n<p>1 11 2131 41516171</p>\n<p>大运：辛卯壬辰癸巳甲午乙未丙申丁酉戊戌</p>\n<p>这个男命是典型的财格生官又逢伤破的局面，月令寅财生年干丙官，年</p>\n<p>上丙官又逢时上壬伤，形成格局先成后败之象。</p>\n<hr>\n<p><strong>来源《王庆学格局论命》</strong></p>\n<p>再没有出去工作，偶而做点小生意，也从没超 过一年，经济一直拮据。</p>\n<p>劫    杀    日    食</p>\n<p>例 5 坤 造：戊 申 乙 丑  己 亥 辛 未 ( 辰 巳 空 ) 大 运 ： 甲 子 癸 亥 壬 戌 辛 酉 庚 申</p>\n<p>17</p>\n<p>2015</p>\n<p>此造月支本气为比肩，主自己、主独立；杀局用食神成的局且食神在 时柱，那肯定是靠自己创业发财的老板。命主是一美容院老板，富有千万。十神与工作职业的关系</p>\n<p>格局是天地作用对人富贵贫贱的影响；旺衰中和为五行之气对人吉凶 祸福的影响；生克制化刑冲合害破是八字的作用方式；五行十神为人生各 种事件的代言人，尤其十神更是人生传奇的讲述者。</p>\n<p>断工作职业，十神既是基础又是重点。对十神的认识有多深刻，看工 作职业的能力就有多强。</p>\n<p>每个十神都有先天含义和后天象义。</p>\n<p>先天含义为十神的独立含义，也叫十神原始含义或称十神本义。它与 旺衰、喜忌、宫位、组合无关， 只体现本象。</p>\n<p>后天象义为组合以后所体现出来的含义。 一个十神和另一十神相作 用，就会体现不同的象义，这和一个人和谁在一块就会受其影响的原理是 一样的。</p>\n<hr>\n<p><strong>来源《《君臣之道》》</strong></p>\n<p>多败，能做事，做生意也多灾， 麻烦多，事业角度官司多。</p>\n<p>相神两透的，不清了，出贵的少，出富命的多。</p>\n<p>有的先上班，后改道的，有富的机会，能富的，也有不发财的，仍要看位置。 此命走甲食神运时，发财的同时又打官司了，原局就是有矛盾的。</p>\n<p>此人走巳午未运发的财。 杀配正印与食又不同。</p>\n<p>印与食不相战，但也降为技术，这个跟官配食是一样的，降格，还是不够清。 印与食也有相克的关系。</p>\n<p>正印格，怕时上正财。若时上偏财，又不同。 以伤官格举例，伤官格的相神是财与印。</p>\n<p>伤官格的三个乾例： 癸丁甲戊</p>\n<p>丑巳辰辰</p>\n<p>庚壬甲戊 申午戌辰 庚壬甲乙 戌午戌亥</p>\n<p>都是伤官格，第三个是官，厅级干部。前2个是求财的。</p>\n<p>第一个是伤官高透了，而且相神两透，又透印，又透财，就不贵了。 财与印还相战了。</p>\n<p>伤官透了，配了印，但印也没官杀配，就普通求财命。</p>\n<p>第二个，伤官不透，配了枭又配财，浊富，为上市公司老总。 第三个伤官不透，配了枭，吉，财不透，相神就不打架。</p>\n<p>凶神不透，又有乙庚合，劫合杀，也是贵点。 若是透丁火，丁壬合，就不好了。</p>\n<p>印也归禄在时，与甲同宫，身也不弱，也是贵点。 凶神透与不透就是很关键的。</p>\n<h2>参见</h2>\n<li>旺衰派·财运</li>\n<li>盲派·财运</li>\n<li>神煞·财运</li>\n<li>调候·财运</li>\n<li>病药·财运</li>\n<li>阴阳·财运</li>\n<li>综合·财运</li>\n<li>其他·财运</li>", "source_count": 119, "block_count": 833, "see_also": ["旺衰派·财运", "盲派·财运", "神煞·财运", "调候·财运", "病药·财运", "阴阳·财运", "综合·财运", "其他·财运"]}]}, {"name": "病药", "topics": [{"topic": "事业", "content": "<h2>病药 · 事业</h2>\n<p>共收录 19 条相关内容，来自 15 本书籍。</p>\n<p><strong>来源《王庆探8探索门命理学象法班笔记2014-王庆1730037215》</strong></p>\n<p>为天地主气时，格局用神只要在，针对立格局点的天敌就算在岁运中出 现，也伤害不到立格局点。</p>\n<p>财杀日伤</p>\n<p>例2乾造：癸丑甲子戊寅辛酉（申酉空）</p>\n<p>1、\t阴阳象法：甲木被癸水侵入，有严重的风湿病。甲木成了癸水的保护神。只 有金出，木死，土出，水阴有制之时，病情才能好转。</p>\n<p>按照之前的论命方法看,庚寅年，是不可能治疗风湿的。金生水，水又生木, 风湿会更严重。</p>\n<p>2、\t实际情况:风湿病在庚寅年遇到治疗风湿的高手，庚寅、辛卯年基本治好 的，虽然没有根治，但是已经不影响工作了。之前也到处在找医生，全国都找过 了，就是没有效果。</p>\n<p>财食日才</p>\n<p>例3乾造：壬戌辛亥己未癸酉（子丑空）</p>\n<p>1、阴阳象法:原局水阴旺，甲寅运，大运见到保护神木，想要水阴有制必须要制住木。</p>\n<p>八字有格局架，取财的方式有两种，一种是去掉格局瑕疵的岁运，不用看五 行，只看十神。还有一种发财的方式，不看格局，看五行。</p>\n<p>如果不看格局，甲寅大运很不好。原局水阴旺，甲寅大运，水阴得到保护，但 原局有用神辛金，所以甲寅、乙卯大运，照样会有几年能发财。等到流年金出现克 木的时候，就能发财。</p>\n<hr>\n<p><strong>来源《从零开始学八字202210》</strong></p>\n<p>表示考试之类，所以七杀有可能为火，或与火直接交涉之干支； 等等，所有不利我之物，都可引申为七杀之意。</p>\n<p>七杀，还表示疾病。因为是克我之物，犹如疾病缠身，克哪，哪得病。也要看七杀是哪个干 支表示的，带何种恶煞。比如七杀是子水，冲了午火禄星，那么病在子或午。或者子刑了卯， 病也有可能在卯。所以命带七杀之人，最好日主生旺，这样多少能抗住七杀之克，得病时， 也能挺住。如果身弱，再有七杀重克，多半身体不好，亚健康之类。这一点，看病时，百断 百验，千算千准。</p>\n<p>继续想，正官是贵，正统；七杀则与之相反，是贱，是偏门。此贱，可表示卑贱，不仅仅是 品性的描述，还可以指一类人，比如小人，卑鄙的小人，因为小人性贱，不做正直之事，行 事作风与君子相异，所以命带七杀，就容易遇小人，遇到不利自己的人，不管是在生活还是 工作中。是什么样的小人，就要看这个七杀带有什么特点。比如，七杀是酉，就带酉的性质， 酉是兑卦，表示少女，这个小人或许就是个女的。然后还要看酉上带何物，比如带丁，即丁 酉，丁是朱雀，表示语言，丁是阴火，絮絮叨叨，可能就是背后说人坏话了。</p>\n<hr>\n<p><strong>来源《子平烛观》</strong></p>\n<p>午</p>\n<p>0 4 岁 1 4 岁 2 4 岁 3 4 岁 4 4 岁 5 4 岁 6 4 岁 7 4 岁</p>\n<p>节后16天，可能戊土当令。壬水无根，论弱。取年上枭神局，月上偏才局用。坐下空亡， 时巳火为根，但被已申绊。偏才无根，局半成。时上伤官为体用。</p>\n<p>海马甲：印局一定要犯艺!枭局，初运视同正印。</p>\n<p>阿星：俺认为金旺，根气浓厚，故先立枭；戌中戊当令，丁火还是可以为丙的根，但丙坐  空了，乙就能把戊土压了；只是病在丙坐空了，但丙假如实了，那么真神就有可能通关了， 所以这个丙火处于月干这个位置是进退两难的；对于岁运，俺认为最喜水透干，因先天有</p>\n<p>体用神乙木通水火的关，那个就注定水是岁运用神之一了。</p>\n<p>大运：丁亥，戊子，己丑，庚寅，辛卯。</p>\n<p>亥子两运是用神运，俺看吉，最少利学业；但子运又透戊土忌神，也不算好，家里不算富</p>\n<p>有；</p>\n<p>己丑运也不好，也是忌神透；庚寅运，体用神得地，吉。</p>\n<p>270、公历：1981年11月08日10时07分   立冬：公历1981年11月07日20时09分 劫财     正印      日柱     劫财</p>\n<p>坤造： 辛        己        庚       辛</p>\n<hr>\n<p><strong>来源《正本清源之象法八字真传 上  236P》</strong></p>\n<p>人断卦时说你儿子现在正在养病，就是因为卦中子孙爻处养地，代表在休养、</p>\n<p>养病、代表卧病在床。</p>\n<p>长生</p>\n<p>代表出生、生长、来源、产生、起点，源泉、源头、根子、也代表原始。</p>\n<p>所以，长生在六亲定位上，可以直接作为定位到这个人的父母或者养育者的重 要参考因素。如果日主在月支是养的状态，那么基本可以确定月柱是命主母</p>\n<p>亲，你的长生在这里，这里就是你的出生，长大的发源地；</p>\n<p>长生还特别的代表什么呢，代表老家。</p>\n<p>之前有个人找我算大六壬卦，说想要看看工作往外地调动的时间，我当时就直 接说，你这个工作调动，是要往你老家调的，这个人当时就很震惊，说这怎么 看出来的?实际上就是因为支辰是日干的长生之位，长生就是老家，所以你断 这个人要往老家调动，那是一 目了然的。</p>\n<p>一个人卦中逢长生，如果再和冲合驿马之类的相并，那你说这个人某个月回了 老家一趟，往往不会错。如果再加上天干地支神煞的取象，你也可以分析推理 出来这个人因为什么事回老家的细节，顺便说一下，月柱的宫位，印绶都可以 代表老家；</p>\n<hr>\n<p><strong>来源《《潘昭佑老师新浪微博所有文章》569页副本》</strong></p>\n<p>不</p>\n<p>足</p>\n<p>。</p>\n<p>制</p>\n<p>掉甲</p>\n<p>才是</p>\n<p>土透</p>\n<p>干成</p>\n<p>象</p>\n<p>呈</p>\n<p>凶之</p>\n<p>时。</p>\n<p>申运</p>\n<p>甲弱</p>\n<p>，寅</p>\n<p>年为</p>\n<p>甲被</p>\n<p>制之</p>\n<p>应。</p>\n<p>壬申</p>\n<p>运甲</p>\n<p>寅年</p>\n<p>是壬</p>\n<p>水出</p>\n<p>干受</p>\n<p>制</p>\n<p>，</p>\n<p>三</p>\n<p>刑</p>\n<p>，寅</p>\n<p>甲被</p>\n<p>制，</p>\n<p>壬水</p>\n<p>之生</p>\n<p>源申</p>\n<p>金也</p>\n<p>受伤</p>\n<p>之运</p>\n<p>，巳</p>\n<p>火戊</p>\n<p>已土</p>\n<p>呈凶</p>\n<p>，阴</ 子水坏，未中的已土和丁火都不完整。 如果丁为官，己为印，就是不如意，未达理想。</p>\n<p>看工作变动，未穿子，是把子水制住了，但未中的丁火和已土都受伤了，得到 的工作也不理想，自己不喜欢。</p>\n<p>应病：子水旺，如子遇辰，男命多为前列腺、肾等疾病；女命多为妇科方面的 疾病，多为子宫肌瘤。</p>\n<p>子水旺的共同点是心脏和视力不好(丁火代表眼睛和心脏),睡眠也不好。</p>\n<p>丑午穿：</p>\n<p>多数是丑中癸水穿坏午中丁火；</p>\n<p>火旺能烤干丑中的癸水及湿气，同时能把丑中辛金穿坏； 穿坏禄要破财，而且身体有病。</p>\n<p>午火旺穿坏丑食伤，病在嘴上，两个丑土，就是两颗牙坏了(丑是食神才断牙)。 应病：如果穿坏的是体，就往身体上断。</p>\n<p>第一、牙齿不好；</p>\n<p>第二、又多为糖尿病(血液中有土杂质); 第三、特殊情况下为甲状腺炎；</p>\n<p>第四、肺病(肺气肿、哮喘、严重即午太旺为癌。因丑中有辛金，辛金代表肺);</p>\n<p>第五、血液有病(辛、酉为精血)、气血不舒； 第六、女性为乳腺增生、乳腺癌、子宫癌等；</p>\n<p>第七、还有腰、咽喉等疾病，严重者会有手术(尤其遇枭神夺食的年份)。 第八、得癌症多为丑午穿。因为丑为阴中至阴又为包，多为囊肿。</p>\n<hr>\n<p><strong>来源《05.王相山-子平真诠《格局真诠》544页1》</strong></p>\n<p>丁火发挥作用，且以巳火为根，七煞</p>\n<p>不弱，这样，食神制煞不但未破，丁火七煞还能起到调候的作用，所以“贵</p>\n<p>格局真诠</p>\n<li>234-</li>\n<p>而且秀”，做了尚书。但是， 我认为此命能成为尚书，并不是“贵而且秀”</p>\n<p>那么简单，更不是调候的作用，年月伤官合煞，本身就是贵证，煞遭合制后</p>\n<p>移到时干，表示我得到了煞的权威。</p>\n<p>二是“夏木食神，透印不碍”的问题。食神格最怕印绶，因为印绶会伤</p>\n<p>害食神，导致破格。木火食神格为什么不怕印呢？只能说，这是一个个例，</p>\n<p>木生火月，火炎木焦，不是说需要水印来滋润，而是这个印星处的位置好，</p>\n<p>食印不碍，伤害不到食神，有利于格局，才取贵的。如果印星位置不好，伤</p>\n<p>到了食神，再怎么滋润八字，都会破格的。</p>\n<p>范例：《子平真诠》钱参政命。</p>\n<p>乾造：丙 癸 甲 丙</p>\n<p>午 巳 子 寅</p>\n<p>日主通根寅木有力，食神更加有力，印星的作用并不是调候，而是因为</p>\n<p>食神太多，食多为伤，印星可以栽损伤官，优化格局用神，才“贵而且秀”</p>\n<p>的。且这个食伤格，月食巳中本身藏有庚金七煞，但七煞不透，则印星不能</p>\n<p>化煞破格，丙火制煞得力，是食制暗煞的格局。病在食重煞轻，格局有限，</p>\n<p>故到西方煞旺地，贵为参政。</p>\n<hr>\n<p><strong>来源《象法是这样练成的－天干象意》</strong></p>\n<p>看病先</p>\n<p>看生气</p>\n<p>木火，</p>\n<p>重病木</p>\n<p>火与干</p>\n<p>之生源</p>\n<p>不能伤</p>\n<p>，再看</p>\n<p>病之干</p>\n<p>支，乙</p>\n<p>是风在</p>\n<p>年有</p>\n<p>脖子</p>\n<p>像，庚</p>\n<p>是伤官</p>\n<p>伤到乙</p>\n<p>，未又</p>\n<p>是己之</p>\n<p>身，那</p>\n<p>定是上</p>\n<p>半身病</p>\n<p>，巳空</p>\n<p>还是血</p>\n<p>虚，有</p>\n<p>未根没</p>\n<p>伤人</p>\n<p>大事</p>\n<p>没有，</p>\n<p>乙头受</p>\n<p>庚合制</p>\n<p>，还是</p>\n<p>昏沉气</p>\n<p>血不足</p>\n<p>，制庚</p>\n<p>申者巳</p>\n<p>也，调</p>\n<p>养气血</p>\n<p>，冲开</p>\n<p>乙庚，</p>\n<p>壬能</p>\n<p>生乙</p>\n<p>，那如</p>\n<p>果是近</p>\n<p>病，今</p>\n<p>天就会</p>\n<p>好一点</p>\n<p>，甲戌</p>\n<p>时</p>\n<p>问の</p>\n<p>率：</p>\n<p>下午</p>\n<p>4</p>\n<p>:</p>\n<p>0</p>\n<p>6</p>\n<p>:</p>\n<p>0</p>\n<p>9</p>\n< </p>\n<p>家庭支撑，会比较辛苦；</p>\n<p>八字预测，批八字加微信：mpy5689</p>\n<p>八字预测，批八字加微信：mpy5689</p>\n<p>232</p>\n<p>232</p>\n<p>这个时候其实用火，或者用金，一个化一个克，都是可以的，</p>\n<p>但是火金不能一块出来，一块出来就枭神夺食（而你就是枭</p>\n<p>神夺食的情况，食神处境很差，这是克子的信息），所以说，</p>\n<p>印星扶身反而成病，那么用神的选择，土和水都有作用，可</p>\n<p>以通关，可以病药，这里就选择财星病药，取水，金水并用</p>\n<p>更好，至于具体原因限于篇幅，不再赘述。</p>\n<p>而你这种命局，比较普通，个性偏急，但又敏感易消极，比</p>\n<p>较适合打工，尽可能多学习多提升自我；</p>\n<p>重点要跟你提一件事，当你的孩子出生之后，你的重点就会</p>\n<p>放在孩子身上，那么就一定会激发枭神的力量，疯狂夺食，</p>\n<p>为了孩子操碎了心，而孩子的情况从这个命局来看，处境不</p>\n<p>佳，学习比较吃力，那你就很上头了，继续疯狂夺食，恶性</p>\n<p>循环，这个枭神夺食，其实也可以理解为对孩子的期待，对</p>\n<p>孩子的要求；</p>\n<p>不一定是你的期望很高，仅仅是孩子达不到你的基本要求而</p>\n<p>已，也是因为早年子女运比较差。</p>\n<p>再说孩子的命局；</p>\n<h2>参见</h2>\n<li>旺衰派·六亲</li>\n<li>格局派·六亲</li>\n<li>盲派·六亲</li>\n<li>神煞·六亲</li>\n<li>调候·六亲</li>\n<li>阴阳·六亲</li>\n<li>综合·六亲</li>\n<li>其他·六亲</li>", "source_count": 9, "block_count": 10, "see_also": ["旺衰派·六亲", "格局派·六亲", "盲派·六亲", "神煞·六亲", "调候·六亲", "阴阳·六亲", "综合·六亲", "其他·六亲"]}, {"topic": "基础理论", "content": "<h2>病药 · 基础理论</h2>\n<p>共收录 3 条相关内容，来自 2 本书籍。</p>\n<p><strong>来源《这个书牛逼得我不知道取什么名》</strong></p>\n<p>固定五行如阳井必为木，阴井</p>\n<p>必为金之论也。关于这点参看博文《针灸探秘 1-子午流注定时开穴术数原理》</p>\n<p>三是穴性 “乱经”“周身十二经,各有井、荥、俞、经、合,其所主病,亦各不同。假如病在肝,宜针肝之荥穴—</p>\n<p>—行间,乃曰乙日肝之荥穴不属行间,而属心之荥穴——少府。舍肝之荥而针心之荥,是谓乱经,病可去乎? 不可去</p>\n<p>乎? ”</p>\n<p>答：汪机不知道有本经流注刺法和它经流注刺法两种流注，认为只有一种十二经流注法，关于这点参看《针灸探</p>\n<p>秘 10-纳支法根本不是子午流注 》</p>\n<p>四是 “谓阳日气先血后， 阴日气后血先， 此亦不通之论”“甲与己合,己日己巳时,脾引血出,甲戌时,胆引</p>\n<p>气行,固合阴日血先气后说矣。然甲日己巳时居前,而脾亦可引血先出,甲戌时居后,而胆亦可引气后行,如此则阳日</p>\n<p>血亦可先,气亦可后矣” ；</p>\n<p>五是纳甲法与养子时刻 法开穴各不相同， “甲与己合,己日己巳时,脾引血出,甲戌时,胆引气行,固合阴日血先</p>\n<p>气后说矣。</p>\n<hr>\n<p><strong>来源《这个书牛逼得我不知道取什么名》</strong></p>\n<p>转载子午流注针法之后， 曰： “此皆臆说， 素难不载， 不惟悖其经旨， 所说亦自相矛盾 多</p>\n<p>矣” 。</p>\n<p>其质疑有五： 一是无所谓阳日阳时阳穴开、 阴日 阴时阴穴开之说。云“故甲子日甲戌时,甲胆窍阴井开,此固然</p>\n<p>也。丙子时,属于乙丑日辰,乃阴日阳时也,而谓丙小肠前谷荥穴开,其与阳日阳时之说,合乎?”； 二是经脉腧穴五行</p>\n<p>属性 “颠倒错 乱” “经曰:阴井木,阳井金;阴荥火,阳荥水;阴经土,阳经木;阴俞金,阳俞火;阴合水,阳合土。今</p>\n<p>何公尽变其法,皆以十干配之十经,取干旺日时而注井荥俞经合。故甲日甲时取属甲胆,而甲胆阳井之金,亦依日干</p>\n<p>而变为木;小肠前谷荥水,亦依日干而变为火。然三焦、包络, 又依《难经》而无所变。颠倒错乱如此,与经合</p>\n<p>乎? ”； 三是穴性 “乱经”“周身十二经,各有井、荥、俞、经、合,其所主病,亦各不同。假如病在肝,宜针肝之</p>\n<p>荥穴——行间,乃曰乙日肝之荥穴不属行间,而属心之荥穴——少府。</p>\n<hr>\n<p><strong>来源《八字命理秘传【我好疼你啊我要嫁给你版】》</strong></p>\n<p>，丑亥属脚子为</p>\n<p>阴。</p>\n<p>又曰：</p>\n<p>干首坤腹坎耳俦，震足巽股艮手留；兑口离目分八卦，凡看疾病此推</p>\n<p>求。</p>\n<p>夫疾病皆因五行不和，即人身五脏不和也。盖五行通于五脏，六腑</p>\n<p>通于九窍，凡十干受病属六腑，十二支受病属五脏。丙丁己午火局南</p>\n<p>离，主病在上；壬癸亥子水局北坎，主病在下；甲乙寅卯属震，主病</p>\n<p>在左；庚辛申酉属兑，主病在右；戊己辰戌丑未属坤艮，主病在脾胃</p>\n<p>及中脘。诸风晕掉、眼光日昏，血不调畅、早年落发、筋青瓜枯，属</p>\n<p>肝家甲</p>\n<p>乙寅卯木受亏主病故也；诸脓血疮疥、舌苦喑哑者，属心家丙</p>\n<p>丁巳午火受亏主病故也；浮肿、脚气、黄肿、口臭、翻胃、脾寒膈热</p>\n<p>者，属脾家戊己辰戌丑未土受亏主病故也；鼻塞酒槁、语蹇气结、咳</p>\n<p>嗽喊者，属肺家庚辛申酉受亏主病故也；白浊、白带、霍乱、泻痢、</p>\n<p>疝气小肠，属肾家壬癸亥子受亏主病故也。</p>\n<p>甲乙见庚辛申酉多者，内主肝胆惊悸、劳瘵、手足顽麻、筋骨疼痛；</p>\n<p>外主头目眩晕、口眼歪斜、左瘫右痪，叠扑损伤。遇丙丁火多无水相</p>\n<p>济，则痰喘咯血、中风不语、皮肤干燥，内热口干。女人主血气欠调、</p>\n<p>有孕者堕胎。小儿急慢惊风、夜啼咳嗽、面色青黯是也。</p>\n<h2>参见</h2>\n<li>旺衰派·基础理论</li>\n<li>格局派·基础理论</li>\n<li>盲派·基础理论</li>\n<li>神煞·基础理论</li>\n<li>调候·基础理论</li>\n<li>阴阳·基础理论</li>\n<li>综合·基础理论</li>\n<li>其他·基础理论</li>", "source_count": 2, "block_count": 3, "see_also": ["旺衰派·基础理论", "格局派·基础理论", "盲派·基础理论", "神煞·基础理论", "调候·基础理论", "阴阳·基础理论", "综合·基础理论", "其他·基础理论"]}, {"topic": "大运", "content": "<h2>病药 · 大运</h2>\n<p>共收录 2 条相关内容，来自 2 本书籍。</p>\n<p><strong>来源《祝国英天人接命理授徒讲义》</strong></p>\n<p>及比劫争配偶等等。</p>\n<p>因这些问题结不了婚，解决了这些问题才能成婚，所以解决问题的岁运就是成</p>\n<p>婚之年运。</p>\n<p>（1）配偶星多现为病的</p>\n<p>偶星多现且与偶宫都有关联，这类组合只有制住了多余的偶星才能成婚。</p>\n<p>坤造 丙辰 辛丑 乙丑 丁丑</p>\n<p>宫星同位三重，病在宫星太多，制住宫星时结婚。大运己亥，流年丙子天</p>\n<p>合地合偶星结婚。</p>\n<p>坤造 戊戌 己未 庚戌 丁丑</p>\n<p>局中戌、未偶宫三重，未、戌中都有火再加丁偶星四重，这类八字结婚应</p>\n<p>期就是制住了多余宫星之年。1975 年 8 月进入丁巳偶星运，甲子年前没有制住</p>\n<p>未、戌的流年，只有乙丑年刑戌冲未，制住了戌、未。1985 年阳历 2 月 5 日立</p>\n<p>春，是农历 1984年的腊月十六。说来奇怪，此前双方都没打算结婚，可一过立</p>\n<p>春两家就都忙活着结婚了。此年还有一个成婚象，就是乙年干与日干相合。</p>\n<p>乾造 己未 甲戌 甲戌 丙寅</p>\n<p>壬申运乙酉年结婚。大运宫星不现，也与宫星无关。流年也不是宫星同柱。</p>\n<p>为何结婚？局中宫星三重，且与日干比肩都合，要制去多余的偶星才能成婚。</p>\n<p>乙酉年穿害戌，制去偶星成婚。这与上例丑年刑去戌冲去未是同一种应期法。</p>\n<hr>\n<p><strong>来源《神峰通考命理正宗原本校注》</strong></p>\n<p>，女命食伤重者，多是品行不端、放逸为非之悍妇，安能合乎礼节?家庭 岂能和谐?此说不合实情，不宜盲从。</p>\n<p>如男命木盛宜金者，得女命之刚金补之，则为尽美。得土生金者亦佳。 得火者较次。得水木者则无取矣。如女命金刚喜火者，得男命之烈火助之， 则为尽美。得木生火者，亦佳。得水者较次。得金土者，则无取矣。</p>\n<
